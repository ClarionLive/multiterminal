<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Session History</title>
<style>
body {
    --bg-primary: #1a1a2e; --bg-card: #2d2d44; --bg-card-hover: #353550;
    --bg-card-expanded: #32324e; --bg-detail: #252540;
    --border: #3d3d5c; --border-column: #2a2a4a; --text-primary: #e0e0e0;
    --text-secondary: #a0a0b8; --text-muted: #707088; --accent: #89b4fa;
    --bg-header: #12122a; --green: #a6e3a1; --yellow: #f9e2af;
    --bg-tag: rgba(255,255,255,0.08); --bg-file-tag: rgba(137,180,250,0.12);
    --user-bg: rgba(137,180,250,0.08); --assistant-bg: rgba(166,227,161,0.08);

    margin: 0; padding: 0;
    font-family: "Segoe UI", system-ui, sans-serif; font-size: 12px;
    background: var(--bg-primary); color: var(--text-primary);
    overflow: hidden; height: 100vh; display: flex; flex-direction: column;
}
body.light {
    --bg-primary: #f5f5f5; --bg-card: #fff; --bg-card-hover: #fafafa;
    --bg-card-expanded: #f8f8ff; --bg-detail: #f0f0f5;
    --border: #e0e0e0; --border-column: #dcdcdc; --text-primary: #333;
    --text-secondary: #666; --text-muted: #999; --accent: #1e66f5;
    --bg-header: #e8e8e8; --green: #40a02b; --yellow: #df8e1d;
    --bg-tag: rgba(0,0,0,0.06); --bg-file-tag: rgba(30,102,245,0.08);
    --user-bg: rgba(30,102,245,0.06); --assistant-bg: rgba(64,160,43,0.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sessions-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; background: var(--bg-header);
    border-bottom: 1px solid var(--border-column); flex-shrink: 0;
}
.sessions-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-secondary);
}
.sessions-count {
    font-size: 10px; color: var(--text-muted);
    background: var(--bg-tag); padding: 0 5px; border-radius: 8px;
}

.sessions-list { flex: 1; overflow-y: auto; padding: 6px 10px; min-height: 0; }

.session-card {
    padding: 8px 10px; margin-bottom: 4px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg-card); transition: background 0.15s, border-color 0.15s;
    cursor: pointer;
}
.session-card:hover { background: var(--bg-card-hover); }
.session-card.expanded {
    background: var(--bg-card-expanded);
    border-color: var(--accent);
}

.session-row {
    display: flex; gap: 10px; align-items: flex-start;
}

.session-timeline {
    display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px;
}
.session-date { font-size: 9px; color: var(--text-muted); font-weight: 600; }
.session-time { font-size: 9px; color: var(--text-muted); }
.session-dot {
    width: 8px; height: 8px; border-radius: 50%; margin: 3px 0;
    background: var(--accent);
}
.session-dot.terminal { background: var(--green); }
.session-dot.subagent { background: var(--yellow); }

.session-content { flex: 1; min-width: 0; }
.session-meta {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.session-agent {
    font-size: 11px; font-weight: 600; color: var(--text-primary);
}
.session-type {
    font-size: 9px; padding: 0 4px; border-radius: 6px;
    background: var(--bg-tag); color: var(--text-muted);
}
.session-duration {
    font-size: 9px; color: var(--text-muted); margin-left: auto;
}
.session-topic {
    font-size: 11px; color: var(--text-primary); line-height: 1.4;
    margin-top: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
}
.session-stats {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
}
.session-no-summary { font-style: italic; color: var(--text-muted); font-size: 11px; margin-top: 3px; }
.session-expand-hint {
    font-size: 9px; color: var(--text-muted); opacity: 0;
    transition: opacity 0.15s; margin-top: 2px;
}
.session-card:hover .session-expand-hint { opacity: 1; }
.session-card.expanded .session-expand-hint { display: none; }

/* Expanded detail section */
.session-detail {
    display: none; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
}
.session-card.expanded .session-detail { display: block; }

.detail-loading {
    text-align: center; padding: 12px; color: var(--text-muted); font-size: 10px;
}

.detail-files {
    margin-bottom: 8px;
}
.detail-files-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 4px;
}
.detail-file-tags {
    display: flex; flex-wrap: wrap; gap: 3px;
}
.detail-file-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--bg-file-tag); color: var(--accent);
    font-family: "Cascadia Code", "Consolas", monospace;
}

.detail-messages {
    display: flex; flex-direction: column; gap: 4px;
    max-height: 200px; overflow-y: auto;
}
.detail-msg {
    font-size: 10px; line-height: 1.35; padding: 4px 6px;
    border-radius: 3px; border-left: 2px solid transparent;
}
.detail-msg.user {
    background: var(--user-bg); border-left-color: var(--accent);
    color: var(--text-primary);
}
.detail-msg.assistant {
    background: var(--assistant-bg); border-left-color: var(--green);
    color: var(--text-secondary);
}
.detail-msg-role {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.03em; margin-bottom: 1px;
    color: var(--text-muted);
}

.sessions-empty {
    text-align: center; padding: 24px; color: var(--text-muted); font-size: 11px;
}
.sessions-empty-icon { font-size: 28px; opacity: 0.3; margin-bottom: 6px; }

.no-project { display: none; flex: 1; flex-direction: column; align-items: center;
    justify-content: center; color: var(--text-muted); font-size: 12px; gap: 6px; }
.no-project-icon { font-size: 28px; opacity: 0.3; }
body.no-project-state .sessions-header, body.no-project-state .sessions-list { display: none; }
body.no-project-state .no-project { display: flex; }
</style>
</head>
<body>
<div class="no-project">
    <div class="no-project-icon">&#128337;</div>
    <span>Open a project to see session history</span>
</div>

<div class="sessions-header">
    <span class="sessions-title">Sessions</span>
    <span class="sessions-count" id="sessions-count">0</span>
</div>
<div class="sessions-list" id="sessions-list">
    <div class="sessions-empty">
        <div class="sessions-empty-icon">&#128337;</div>
        <div>No sessions recorded</div>
    </div>
</div>

<script>
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }
function applyTheme(isDark) { document.body.classList.toggle('light', !isDark); }

function formatDate(isoStr) {
    if (!isoStr) return { date: '', time: '' };
    const d = new Date(isoStr);
    const mo = (d.getMonth()+1).toString().padStart(2,'0');
    const dy = d.getDate().toString().padStart(2,'0');
    const hr = d.getHours().toString().padStart(2,'0');
    const mn = d.getMinutes().toString().padStart(2,'0');
    return { date: `${mo}/${dy}`, time: `${hr}:${mn}` };
}

let _expandedSessionId = null;
let _sessionDetailCache = {};

function toggleSession(sessionId, cardEl) {
    if (_expandedSessionId === sessionId) {
        // Collapse
        cardEl.classList.remove('expanded');
        _expandedSessionId = null;
        return;
    }

    // Collapse previous
    const prev = document.querySelector('.session-card.expanded');
    if (prev) prev.classList.remove('expanded');

    // Expand this one
    cardEl.classList.add('expanded');
    _expandedSessionId = sessionId;

    const detailEl = cardEl.querySelector('.session-detail');
    if (!detailEl) return;

    // Check cache
    if (_sessionDetailCache[sessionId]) {
        renderDetail(detailEl, _sessionDetailCache[sessionId]);
    } else {
        detailEl.innerHTML = '<div class="detail-loading">Loading session detail...</div>';
        // Request detail from C#
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage({ type: 'get_session_detail', sessionId: sessionId });
        }
    }
}

function renderDetail(detailEl, data) {
    let html = '';

    // Edited files
    if (data.editedFiles && data.editedFiles.length > 0) {
        html += '<div class="detail-files">';
        html += '<div class="detail-files-label">Files changed</div>';
        html += '<div class="detail-file-tags">';
        data.editedFiles.forEach(f => {
            html += `<span class="detail-file-tag">${escapeHtml(f)}</span>`;
        });
        html += '</div></div>';
    }

    // Messages
    if (data.messages && data.messages.length > 0) {
        html += '<div class="detail-messages">';
        data.messages.forEach(m => {
            const roleClass = m.role === 'user' ? 'user' : 'assistant';
            const roleLabel = m.role === 'user' ? 'You' : 'Agent';
            html += `<div class="detail-msg ${roleClass}">`;
            html += `<div class="detail-msg-role">${roleLabel}</div>`;
            html += escapeHtml(m.content);
            html += '</div>';
        });
        html += '</div>';
    }

    if (!html) {
        html = '<div class="detail-loading">No detail available</div>';
    }

    detailEl.innerHTML = html;
}

function renderSessions(sessions) {
    document.body.classList.remove('no-project-state');
    document.getElementById('sessions-count').textContent = sessions.length;
    const list = document.getElementById('sessions-list');
    _expandedSessionId = null;
    _sessionDetailCache = {};

    if (!sessions.length) {
        list.innerHTML = '<div class="sessions-empty"><div class="sessions-empty-icon">&#128337;</div><div>No sessions recorded</div></div>';
        return;
    }

    let html = '';
    sessions.forEach(s => {
        const dt = formatDate(s.startedAt);
        const sType = (s.sessionType||'terminal').toLowerCase();
        const dotClass = sType === 'subagent' ? 'subagent' : 'terminal';
        const sid = escapeHtml(s.sessionId||'');

        // Topic line
        let topicHtml = '';
        if (s.topic) {
            topicHtml = `<div class="session-topic">${escapeHtml(s.topic)}</div>`;
        } else {
            topicHtml = '<div class="session-no-summary">No topic recorded</div>';
        }

        // Stats line
        let statsHtml = '';
        if (s.stats) {
            statsHtml = `<div class="session-stats">${escapeHtml(s.stats)}</div>`;
        }

        // Duration
        let durationHtml = '';
        if (s.duration) {
            durationHtml = `<span class="session-duration">${escapeHtml(s.duration)}</span>`;
        }

        html += `<div class="session-card" data-session-id="${sid}" onclick="toggleSession('${sid}', this)">
            <div class="session-row">
                <div class="session-timeline">
                    <span class="session-date">${dt.date}</span>
                    <span class="session-dot ${dotClass}"></span>
                    <span class="session-time">${dt.time}</span>
                </div>
                <div class="session-content">
                    <div class="session-meta">
                        <span class="session-agent">${escapeHtml(s.agentName||'Unknown')}</span>
                        <span class="session-type">${escapeHtml(sType)}</span>
                        ${durationHtml}
                    </div>
                    ${topicHtml}
                    ${statsHtml}
                    <div class="session-expand-hint">Click to expand</div>
                </div>
            </div>
            <div class="session-detail"></div>
        </div>`;
    });
    list.innerHTML = html;
}

function handleSessionDetail(data) {
    if (!data.sessionId) return;
    _sessionDetailCache[data.sessionId] = data;

    // If this session is currently expanded, render it
    if (_expandedSessionId === data.sessionId) {
        const card = document.querySelector(`.session-card[data-session-id="${data.sessionId}"]`);
        if (card) {
            const detailEl = card.querySelector('.session-detail');
            if (detailEl) renderDetail(detailEl, data);
        }
    }
}

if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage({ type: 'ready' });
    window.chrome.webview.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'sessions') renderSessions(data.sessions);
        else if (data.type === 'session_detail') handleSessionDetail(data);
        else if (data.type === 'theme') applyTheme(data.isDark !== false);
        else if (data.type === 'no_project') document.body.classList.add('no-project-state');
    });
}
</script>
</body>
</html>
