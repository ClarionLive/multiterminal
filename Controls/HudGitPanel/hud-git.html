<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root {
    --bg: #1a1a2e;
    --bg-elevated: #16213e;
    --border: #2a2a4a;
    --fg: #e0e0e0;
    --fg-muted: #707088;
    --fg-dim: #4a4a6a;
    --accent: #89b4fa;
    --green: #a6e3a1;
    --red: #f38ba8;
    --yellow: #fab387;
    --pink: #f5c2e7;
    --select-bg: rgba(137, 180, 250, 0.18);
}
body.light {
    --bg: #f5f5f5;
    --bg-elevated: #ffffff;
    --border: #d0d0d0;
    --fg: #222;
    --fg-muted: #666;
    --fg-dim: #999;
    --accent: #4a90e2;
    --green: #2e8540;
    --red: #c5282f;
    --yellow: #b35900;
    --pink: #a83a82;
    --select-bg: rgba(74, 144, 226, 0.18);
}
html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
}

/* ------- Unified project-overview tree -------
   Full-width single tree: repo root → `branches` + `folders` → worktrees
   → working changes + recent commits → task groups → files. Replaces the
   201266ff left-pane + right-tabbed-pane split. Renderer wires the DOM
   from the `git_state_tree` payload (item 1, Frank). Expand state per
   node is persisted in localStorage under `hudGit.tree.expanded.{projectId}`. */
.tree {
    padding: 4px 0 8px 0;
    font-size: 11px;
    overflow-y: auto;
    overflow-x: hidden;
    height: 100%;
    box-sizing: border-box;
    background: var(--bg);
}
/* A tree-row is the clickable label line of a node. The chevron + label
   live inside; children render in the sibling .tree-children container. */
.tree-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px 3px 4px;
    cursor: pointer;
    color: var(--fg);
    line-height: 1.4;
    user-select: none;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
    font-size: inherit;
}
.tree-row:hover { background: var(--bg-elevated); }
.tree-row.selected {
    background: var(--select-bg);
    color: var(--accent);
    font-weight: 600;
}
.tree-row:focus-visible { outline: 1px dotted var(--accent); outline-offset: -1px; }

/* Chevron — clickable; double-click on the .tree-row label also toggles. */
.tree-chevron {
    width: 12px;
    flex: 0 0 auto;
    color: var(--fg-muted);
    font-size: 9px;
    text-align: center;
    cursor: pointer;
}
.tree-chevron.leaf { visibility: hidden; }

/* Depth-based indentation via data-depth attribute. Each level adds 14px
   of padding to the row (chevron stays aligned within the depth slot). */
.tree-row[data-depth="0"] { padding-left: 4px; }
.tree-row[data-depth="1"] { padding-left: 18px; }
.tree-row[data-depth="2"] { padding-left: 32px; }
.tree-row[data-depth="3"] { padding-left: 46px; }
.tree-row[data-depth="4"] { padding-left: 60px; }
.tree-row[data-depth="5"] { padding-left: 74px; }
.tree-row[data-depth="6"] { padding-left: 88px; }

/* Section / category nodes (branches, folders, working changes, recent commits). */
.tree-row.section {
    color: var(--fg-muted);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.tree-row.section .tree-count {
    color: var(--fg-dim);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
}
/* Short plain-English hint after a section label. Used on BRANCHES /
   Working changes / Recent commits headers so a git-naive reader
   immediately knows what they're looking at. */
.tree-row.section .tree-tagline {
    color: var(--fg-dim);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-style: italic;
    margin-left: 6px;
}

/* Worktree row — dot + branch + dirty + linked-task title + parent badge. */
.tree-row .wt-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--fg-muted);
    flex: 0 0 auto;
    box-sizing: border-box;
}
.tree-row.selected .wt-dot,
.tree-row .wt-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
}
.tree-row .wt-branch {
    font-weight: 600;
    flex: 0 0 auto;
    direction: ltr;
    unicode-bidi: isolate;
}
.tree-row .wt-dirty {
    color: var(--fg-muted);
    flex: 0 0 auto;
}
.tree-row.selected .wt-dirty { color: var(--accent); }
.tree-row .wt-task {
    color: var(--fg-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
    min-width: 0;
    direction: ltr;
    unicode-bidi: isolate;
}
.tree-row.selected .wt-task { color: var(--accent); }
.tree-row .wt-badge {
    color: var(--fg-dim);
    font-size: 10px;
    font-weight: 400;
    flex: 0 0 auto;
}

/* Branch row (under `branches` section). */
.tree-row .br-name {
    font-weight: 600;
    flex: 0 0 auto;
    direction: ltr;
    unicode-bidi: isolate;
}
.tree-row .br-tip-sha {
    color: var(--fg-dim);
    font-family: ui-monospace, Consolas, "Courier New", monospace;
    font-size: 10px;
    flex: 0 0 auto;
}
.tree-row .br-tip-subject {
    color: var(--fg-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
    min-width: 0;
    direction: ltr;
    unicode-bidi: isolate;
}
.tree-row .br-wt-hint {
    color: var(--fg-dim);
    font-size: 10px;
    flex: 0 0 auto;
}

/* Task-group row (within working changes — links a file group to its owning task). */
.tree-row.task-group {
    color: var(--fg);
}
.tree-row .tg-check {
    color: var(--green, var(--accent));
    flex: 0 0 auto;
}
.tree-row .tg-title {
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
}
.tree-row .tg-agent,
.tree-row .tg-count {
    color: var(--fg-muted);
    font-size: 10px;
    flex: 0 0 auto;
}

/* Collapsible children container. */
.tree-children { /* nothing structural; rows handle their own indent via data-depth */ }
.tree-children.collapsed { display: none; }

/* ------- Header strip (item [7]) ------- */
.header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex: 0 0 auto;
}
.header .branch { font-weight: 600; color: var(--fg); }
.header .changes { color: var(--fg-muted); }
.header .ahead-behind { color: var(--accent); }
.header .fetch-info { color: var(--fg-muted); }
.header .spacer { flex: 1; }
.header button {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 3px 9px;
    cursor: pointer;
    border-radius: 3px;
    font-size: 11px;
    line-height: 1.3;
}
.header button:hover { background: var(--border); }
.header button[disabled] { opacity: 0.45; cursor: default; }
.header button[disabled]:hover { background: var(--bg); }
.dot-sep { color: var(--fg-dim); }

/* ------- Empty state ------- */
#empty {
    display: none;
    padding: 32px 24px;
    text-align: center;
    color: var(--fg-muted);
}
#empty h3 { color: var(--fg); margin: 0 0 8px 0; font-size: 13px; font-weight: 600; }
#empty p { margin: 0 auto; max-width: 420px; line-height: 1.55; }

/* ------- Body — unified tree consumes full panel width.
   201266ff's left-pane + right-pane split + splitter + drag handlers
   were removed when the tree took over. */
#body {
    display: none;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    background: var(--bg);
}

/* ------- Section headers (left column) ------- */
.section-header {
    padding: 6px 10px;
    font-size: 10px;
    font-weight: 600;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1;
}
.section-empty {
    padding: 16px;
    text-align: center;
    color: var(--fg-muted);
    font-style: italic;
    font-size: 11px;
}

/* Tab strip / panels removed alongside the body-split when the unified
   tree took over. Contamination signal now rides on the worktree row
   in the tree (still surfaced; see .tree-row variants) instead of on a
   tab label. */

/* ------- File rows (working changes) ------- */
.file-list { padding: 0; margin: 0; }
.file-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    user-select: none;
}
.file-row:hover { background: var(--border); }
.file-row.selected { background: var(--select-bg); }
/* Subtle group separator inserted between status-kind groups (smoke-1
   polish [15] fix #4) — a 1px top border on the first row of each
   non-leading group renders as a hairline divider between M / A / D /
   R / T / C / U clusters without screaming for attention. */
.file-row.group-start { border-top: 1px solid var(--border); }
.file-marker {
    width: 16px; height: 16px;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex: 0 0 16px;
    font-family: 'Cascadia Code', monospace;
}
.file-marker.M { background: rgba(137, 180, 250, 0.18); color: var(--accent); }
.file-marker.A { background: rgba(166, 227, 161, 0.18); color: var(--green); }
.file-marker.D { background: rgba(243, 139, 168, 0.18); color: var(--red); }
.file-marker.U { background: rgba(112, 112, 136, 0.18); color: var(--fg-muted); }
.file-marker.R { background: rgba(245, 194, 231, 0.18); color: var(--pink); }
.file-marker.T { background: rgba(250, 179, 135, 0.18); color: var(--yellow); }
.file-marker.C { background: rgba(243, 139, 168, 0.32); color: var(--red); }
.file-marker.UNK { background: rgba(112, 112, 136, 0.10); color: var(--fg-dim); }
.file-path {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px;
}
.file-stats { font-size: 10px; color: var(--fg-dim); flex: 0 0 auto; }
.file-stats .added { color: var(--green); }
.file-stats .deleted { color: var(--red); }
.file-chips { display: flex; gap: 2px; flex: 0 0 auto; align-items: center; }
.chip {
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 2px;
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--fg-muted);
    line-height: 1.2;
}
.chip:empty { display: none; }
/* Muted variant for files whose owning task has shipped (status='done') but
   the file isn't committed yet. Distinguished from active chips by three
   independent cues: italic text + dashed border + leading ✓ glyph on the
   chipTask (added in the JS render block). Color tier stays at --fg so the
   chip remains readable in dark mode — earlier opacity-0.55 + --fg-dim
   approach failed user smoke walk on highlighted rows where the translucent
   selection bg crushed contrast further. v2 ratified via local browser
   mockup (scripts/_chip-mockup.html) before applying. */
.chip.chip--shipped {
    border-style: dashed;
    border-color: var(--fg-dim);
    font-style: italic;
}

/* ------- Phase 4 worktree groups -------
   Renders when groupedByTask is non-empty (i.e. one or more files have
   active/shipped task linkage). Each group is a <details> with a header
   summary (task title + file count + agent chip) and the file rows
   nested inside. Falls back to the original flat list when no group
   data is present. */
.wt-group {
    margin: 4px 0;
    border-radius: 4px;
}
.wt-group-summary {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    cursor: pointer;
    background: var(--border);
    user-select: none;
    list-style: none;
    font-size: 11px;
}
.wt-group-summary::-webkit-details-marker { display: none; }
.wt-group-summary::before {
    content: '▶';
    font-size: 8px;
    opacity: 0.6;
    transition: transform 0.15s ease;
    width: 10px;
    flex: 0 0 auto;
    display: inline-block;
}
.wt-group[open] > .wt-group-summary::before {
    transform: rotate(90deg);
}
.wt-group-title {
    font-weight: 600;
    flex: 0 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.wt-group-count {
    color: var(--fg-dim);
    font-size: 10px;
    margin-left: auto;
    flex: 0 0 auto;
}
.wt-group--shipped > .wt-group-summary {
    opacity: 0.7;
    border: 1px dashed var(--fg-dim);
    background: transparent;
}
.wt-group--unlinked > .wt-group-summary {
    font-style: italic;
    opacity: 0.85;
}
.wt-group-info-icon {
    color: var(--fg-dim);
    font-size: 12px;
    font-style: normal;
    cursor: help;
    flex: 0 0 auto;
    margin-left: 4px;
    user-select: none;
    line-height: 1;
}
.wt-group-info-icon:hover { color: var(--fg); }
.wt-group .file-row { padding-left: 24px; }
.wt-group-open-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--fg-dim);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 6px;
}
.wt-group-open-btn:hover { color: var(--accent); border-color: var(--accent); }
.wt-group-open-btn:focus-visible { outline: 1px dotted var(--accent); outline-offset: 1px; }

/* ------- Commit rows (item [9]) ------- */
.commits-list { padding: 0; margin: 0; }
.commit-row {
    padding: 6px 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
}
.commit-row:hover { background: var(--border); }
.commit-row.selected { background: var(--select-bg); }
.commit-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
}
.commit-sha {
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 10px;
    color: var(--accent);
    flex: 0 0 auto;
}
.commit-subject {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
}
.commit-meta {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 2px;
    font-size: 10px;
    color: var(--fg-muted);
    overflow: hidden;
}
.commit-author { color: var(--fg-muted); }
.commit-coauthors { color: var(--fg-dim); font-style: italic; }
.commit-time { color: var(--fg-dim); margin-left: auto; flex: 0 0 auto; }

/* ------- Cross-task contamination banner (item [11]) ------- */
.contam-banner {
    padding: 8px 12px;
    background: rgba(243, 139, 168, 0.18);
    border-bottom: 1px solid var(--red);
    color: var(--red);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.contam-banner::before {
    content: '⚠';
    font-size: 14px;
    line-height: 1;
}

/* ------- Branch rows (item [10]) ------- */
.branches-list { padding: 0; margin: 0; }
.branch-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 5px 10px;
    border-bottom: 1px solid var(--border);
    user-select: none;
}
.branch-row.stale { opacity: 0.5; }
.branch-row.current { background: var(--select-bg); }
.branch-marker {
    width: 10px;
    flex: 0 0 10px;
    color: var(--fg-dim);
    font-size: 9px;
    line-height: 1;
}
.branch-row.current .branch-marker { color: var(--accent); }
.branch-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px;
}
.branch-row.current .branch-name { font-weight: 600; color: var(--fg); }
.branch-tag {
    font-size: 9px;
    color: var(--fg-dim);
    background: transparent;
    border: 1px solid var(--fg-dim);
    border-radius: 2px;
    padding: 0 4px;
    line-height: 1.4;
    flex: 0 0 auto;
}
.branch-time { color: var(--fg-dim); font-size: 10px; flex: 0 0 auto; }

/* ------- Body stubs ------- */
.body-stub {
    padding: 20px;
    color: var(--fg-dim);
    font-style: italic;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
}
.body-stub strong { color: var(--fg-muted); font-style: normal; display: block; margin-bottom: 4px; }
.body-stub small { font-size: 10px; }

/* ------- Diff pane ------- */
#diff-pane-empty {
    padding: 32px;
    text-align: center;
    color: var(--fg-muted);
    font-style: italic;
}
.diff-pane-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    flex: 0 0 auto;
}
.diff-pane-path {
    font-family: 'Cascadia Code', 'Consolas', monospace;
    color: var(--accent);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
}
.diff-pane-header .spacer { flex: 0 0 8px; }
.diff-pane-header button {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 2px 8px;
    cursor: pointer;
    border-radius: 3px;
    font-size: 11px;
}
.diff-pane-header button:hover { background: var(--border); }
.diff-pane-header button.active { background: var(--accent); color: white; border-color: var(--accent); }

#diff-lines {
    flex: 1;
    /* Smoke-2 #2: force both scrollbars permanently visible so users see
       (and can use) them without hovering or experimenting. `overflow: scroll`
       always-on is friendlier for the casual "what's in this file" use case
       than `auto` which only shows bars when content overflows AND the user
       has hovered. WebView2's Chromium honors this. */
    overflow: scroll;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.5;
    background: var(--bg);
}

/* Unified mode */
.diff-line {
    padding: 0 10px;
    white-space: pre;
}
.diff-line.add { background: rgba(166, 227, 161, 0.12); color: var(--green); }
.diff-line.del { background: rgba(243, 139, 168, 0.12); color: var(--red); }
.diff-line.hunk { background: rgba(137, 180, 250, 0.10); color: var(--accent); font-style: italic; }
.diff-line.meta { color: var(--fg-dim); font-weight: 600; }
.diff-line.ctx { color: var(--fg-muted); }

/* Side-by-side mode */
.diff-side-row {
    display: flex;
    align-items: stretch;
    /* Smoke-2 #2: rows must size to their natural content width so #diff-lines'
       horizontal scrollbar reflects the longest row. Without this the row
       shrinks to fit the visible width and long lines clip silently inside
       individual cells. */
    min-width: max-content;
}
.diff-side-cell {
    flex: 1; min-width: 0;
    padding: 0 10px;
    white-space: pre;
    /* Smoke-2 #2: dropped per-cell overflow-x:auto (smoke-1 polish #6
       reverted). The parent #diff-lines now provides ONE shared horizontal
       scrollbar at the bottom of the right pane, matching what the smoke
       walk asked for. Synced left/right scroll comes for free since both
       cells live in the same overflowing container. */
    overflow: visible;
}
.diff-side-cell:first-child { border-right: 1px solid var(--border); }
.diff-side-cell.add { background: rgba(166, 227, 161, 0.12); color: var(--green); }
.diff-side-cell.del { background: rgba(243, 139, 168, 0.12); color: var(--red); }
.diff-side-cell.empty { background: rgba(112, 112, 136, 0.06); }
.diff-side-cell.ctx { color: var(--fg-muted); }
.diff-side-row.full {
    /* Hunk + meta lines span both columns */
}
.diff-side-row.full > .diff-side-cell {
    flex: 1 1 100%;
    border-right: none;
}

/* ------- File-row context menu (smoke-1 polish [15] fix #7) -------
   Custom HTML menu replacing the WebView's default browser context menu
   (disabled at the C# layer for security: no copy-image, no inspect, no
   navigate-to-source-as-URL). Anchored at the click coordinates and
   clamped to the panel bounds. Only one entry in v1: "Open in pop-up
   diff editor", which routes via `open_diff_popup` message → C# →
   TerminalDocument.ShowDiffPopup with the same renderer the inline pane
   uses. */
.context-menu {
    position: fixed;
    z-index: 100;
    min-width: 200px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    padding: 4px 0;
    font-size: 11px;
    display: none;
}
.context-menu-item {
    padding: 6px 14px;
    cursor: pointer;
    color: var(--fg);
    user-select: none;
}
.context-menu-item:hover { background: var(--select-bg); color: var(--accent); }
.context-menu-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
}

/* Defense-in-depth (auditor LOW finding from item [8]): isolate bidi codepoints
   in user-controlled text so filenames containing U+202E (RLO) etc. can't visually
   spoof file extensions or rearrange diff line text. `unicode-bidi: isolate`
   prevents bidi controls inside a span from affecting siblings or the surrounding
   layout; `direction: ltr` pins the rendering direction so paths and diff text
   render in code-conventional order. Pure presentation fix — content is unchanged.
   Forward-applies to commits log [9], branches [10], and chip values [11] by
   precedent: any user-controlled text rendered into these classes inherits the
   protection automatically. */
.file-path,
.file-stats,
.diff-pane-path,
.diff-line,
.diff-side-cell,
.chip,
.commit-subject,
.commit-author,
.commit-coauthors,
.branch-name {
    direction: ltr;
    unicode-bidi: isolate;
}
</style>
</head>
<body>
<div style="display: flex; flex-direction: column; height: 100vh;">

<!-- Header strip -->
<div class="header" id="header" style="display: none;">
    <span class="branch" id="branch">—</span>
    <span class="dot-sep">·</span>
    <span class="changes" id="changes">—</span>
    <span class="dot-sep" id="sep-ahead-behind" style="display: none;">·</span>
    <span class="ahead-behind" id="ahead-behind" style="display: none;"></span>
    <span class="dot-sep" id="sep-fetch" style="display: none;">·</span>
    <span class="fetch-info" id="fetch-info"></span>
    <span class="spacer"></span>
    <button id="fetch-button" style="display: none;" title="Fetch remote refs (read-only)">⤓ Fetch</button>
    <button id="refresh-button" title="Refresh">↻</button>
</div>

<!-- Empty state -->
<div id="empty">
    <h3 id="empty-title">Loading…</h3>
    <p id="empty-message"></p>
</div>

<!-- Body — single unified tree (root → branches + folders → worktrees → working changes + recent commits).
     Replaces the 201266ff left-tree + right-tabbed-pane split. Renderer (items 3-5) populates
     this from the `git_state_tree` payload Frank ships in item 1. Tree DOM uses stable node-ids
     for localStorage expand-state persistence (hudGit.tree.expanded.{projectId}). -->
<div id="body">
    <div id="tree" class="tree" role="tree" aria-label="Project overview"></div>
    <div id="contamination-banner" class="contam-banner" style="display: none;"></div>
</div>

</div>

<!-- File-row context menu (smoke-1 polish [15] fix #7) -->
<div class="context-menu" id="file-context-menu">
    <div class="context-menu-item" id="ctx-open-diff-popup">Open Code Review</div>
</div>

<script>
(function () {
    const $ = id => document.getElementById(id);

    // --- State ---
    let diffMode = 'side-by-side'; // 'side-by-side' | 'unified'
    let selectedPath = null;       // currently selected working-tree file
    let selectedSha = null;        // currently selected commit SHA
    let lastWorkingTree = [];
    let lastRecentCommits = [];
    let lastBranches = [];
    let lastDiffLines = [];
    let lastDiffPath = null;
    let lastRepoRoot = '';         // repo root from C# git_state — used to compose
                                   // absolute-path tooltips (smoke-1 polish [15] fix #3)
    let lastShownProjectPath = ''; // separate state for project-switch tab-reset
                                   // detection. Only updated when s.repoRoot is
                                   // non-empty so a transient empty-root git_state
                                   // can't poison the comparison and silently
                                   // disable the next legitimate switch reset
                                   // (cross-model adversary MEDIUM, run 2).
    let contextMenuPath = null;    // path the file-row context menu was raised on
    // SPLITTER_KEY ('mt.git.treePaneWidthPx') retired alongside the
    // body-split + splitter DOM. One-shot cleanup of the stale entry
    // happens in initTreeKeysCleanup() called once at script init below;
    // legacy splitter code paths reference it via the throwaway constant
    // so they no-op gracefully until the dead-code sweep in a follow-up.
    const SPLITTER_KEY = 'mt.git.treePaneWidthPx';
    try { localStorage.removeItem('mt.git.treePaneWidthPx'); } catch (e) { /* non-fatal */ }

    // --- Theme ---
    function applyTheme(isDark) {
        document.body.classList.toggle('light', !isDark);
    }

    // --- Outbound messages ---
    function send(msg) {
        try { window.chrome.webview.postMessage(msg); } catch (e) {}
    }

    // --- Empty state / standard render dispatch ---
    function showEmpty(title, message) {
        $('header').style.display = 'none';
        $('body').style.display = 'none';
        $('empty').style.display = 'block';
        $('empty-title').textContent = title;
        $('empty-message').textContent = message;
    }

    function showStandard(s) {
        $('empty').style.display = 'none';
        $('header').style.display = 'flex';
        $('body').style.display = 'flex';

        // Project-switch tab reset (cross-model adversary HIGH, run 1; refined
        // for empty-root robustness in run 2):
        // HudGitRenderer.SetProject does NOT navigate the WebView2 — it just
        // unsubscribes the old service and pushes new git_state messages.
        // Without this guard, the user's last-selected tab persists across
        // project switches, contradicting the "default tab is Working Changes
        // per project" promise. Detect via repoRoot change against a separate
        // `lastShownProjectPath` cache that is only updated when s.repoRoot is
        // non-empty — that way a transient empty-root git_state can't poison
        // the next legitimate switch comparison. Reset fires only on actual
        // project change, not on every refresh.
        if (lastShownProjectPath && s.repoRoot && s.repoRoot !== lastShownProjectPath) {
            setActiveGitTab('working-changes');
        }
        if (s.repoRoot) {
            lastShownProjectPath = s.repoRoot;
        }

        // Capture repoRoot before renderWorkingTree so file rows can compose
        // absolute-path tooltips on first render (no second pass needed).
        // Tooltip composition needs the CURRENT project's path even if it's
        // empty, so this assignment is unconditional — separate from the
        // project-switch detection above.
        lastRepoRoot = s.repoRoot || '';

        renderHeader(s);
        renderContaminationBanner(s.workingTree || [], s.contamTaskIds || []);

        // Phase 4: dispatch to grouped render when the renderer emits group
        // data; fall back to the original flat list otherwise. Both paths
        // share the same files-array data.
        const grouped = s.groupedByTask || [];
        const unlinked = s.unlinked || [];
        const flat = s.workingTree || [];
        if (grouped.length > 0) {
            renderWorkingTreeGrouped(grouped, unlinked, flat.length);
        } else {
            renderWorkingTree(flat);
        }

        renderRecentCommits(s.recentCommits || []);
        renderBranches(s.branches || []);
    }

    // --- Cross-task contamination banner (item [11]) ---
    // Renders only when uncommitted files belong to >1 active kanban task.
    // The ONLY place red/⚠ iconography appears in this panel — earns its alarm.
    // Wording per Oracle's correction: "two tasks' uncommitted work in this tree"
    // (commit-bundling risk), NOT "auto-commit risk" — there is no auto-commit;
    // commits require explicit user approval.
    function renderContaminationBanner(workingTree, contamTaskIds) {
        const banner = $('contamination-banner');
        // Mirror the contamination state onto the Working Changes tab itself
        // so users parked on Recent Commits or Branches still see the cross-
        // task warning glyph (cross-model adversary MEDIUM, run 1). Banner
        // text-content is gated by the active panel; the tab badge isn't.
        // Also expose the state to assistive tech via aria-label so screen-
        // reader users get parity with the visual ⚠ glyph (adversary LOW,
        // run 2). When contamination resolves, remove the override so the
        // tab's natural accessible name (text + count) is restored.
        const wcTab = document.querySelector('.git-tab[data-tab="working-changes"]');
        const isContam = !!(contamTaskIds && contamTaskIds.length > 1);
        if (wcTab) {
            wcTab.classList.toggle('contam-active', isContam);
            if (isContam) {
                wcTab.setAttribute('aria-label',
                    'Working Changes (cross-task contamination warning — ' +
                    contamTaskIds.length + ' active tasks span the working tree)');
            } else {
                wcTab.removeAttribute('aria-label');
            }
        }
        if (!isContam) {
            banner.style.display = 'none';
            banner.textContent = '';
            return;
        }
        // Count files contributing to the contamination (those with a task assignment).
        let claimedFiles = 0;
        for (const f of workingTree) {
            if (f.taskId) claimedFiles++;
        }
        const msg = claimedFiles + ' uncommitted file' + (claimedFiles === 1 ? '' : 's')
            + ' span ' + contamTaskIds.length + ' active tasks — commit-bundling risk.';
        banner.textContent = msg;
        banner.style.display = 'flex';
    }

    // --- Header strip (item [7]) ---
    function renderHeader(s) {
        $('branch').textContent = s.branch || '—';

        const c = s.changes | 0;
        let changesText;
        if (c === 0) changesText = 'clean';
        else if (c === 1) changesText = '1 uncommitted change';
        else changesText = c + ' uncommitted changes';
        $('changes').textContent = changesText;

        if (s.hasRemote) {
            $('sep-ahead-behind').style.display = 'inline';
            $('ahead-behind').style.display = 'inline';
            $('ahead-behind').textContent = '↑' + (s.ahead | 0) + ' ↓' + (s.behind | 0);
            $('sep-fetch').style.display = 'inline';
            $('fetch-info').textContent = s.lastFetch ? 'fetched ' + s.lastFetch : 'never fetched';
            $('fetch-button').style.display = 'inline-block';
        } else {
            $('sep-ahead-behind').style.display = 'none';
            $('ahead-behind').style.display = 'none';
            $('sep-fetch').style.display = 'inline';
            $('fetch-info').textContent = 'no remote configured';
            $('fetch-button').style.display = 'none';
        }
    }

    // --- Working changes file tree (item [8] + smoke-1 polish [15]) ---
    const KIND_TO_MARKER = {
        Modified: 'M', Added: 'A', Deleted: 'D', Untracked: 'U',
        Renamed: 'R', TypeChanged: 'T', Conflicted: 'C', Unknown: 'UNK',
    };
    const KIND_TO_LETTER = {
        Modified: 'M', Added: 'A', Deleted: 'D', Untracked: 'U',
        Renamed: 'R', TypeChanged: 'T', Conflicted: 'C', Unknown: '?',
    };
    // Full-name lookup feeds the marker tooltip (smoke-1 polish [15] fix #1)
    // so the M/A/D/U/R/T/C/UNK badge is self-explanatory on hover.
    const KIND_TO_FULLNAME = {
        Modified: 'Modified', Added: 'Added', Deleted: 'Deleted',
        Untracked: 'Untracked (new file, not yet added)',
        Renamed: 'Renamed', TypeChanged: 'Type changed',
        Conflicted: 'Conflicted (merge conflict)', Unknown: 'Unknown status',
    };
    // Group/sort order (smoke-1 polish [15] fix #4) — clusters similar
    // changes together. Modified/Added/Deleted lead because they're the
    // most common review focus; Untracked sinks to the bottom because
    // codex-temp output and screenshots tend to dominate that bucket.
    const KIND_SORT_RANK = {
        Modified: 0, Added: 1, Deleted: 2, Renamed: 3,
        TypeChanged: 4, Conflicted: 5, Untracked: 6, Unknown: 7,
    };

    function composeAbsolutePath(repoRoot, relPath) {
        // Compose `repoRoot + sep + relPath` for the row hover tooltip
        // (smoke-1 polish [15] fix #3). Repo root from C# uses native
        // separators (Windows backslashes); relPath from LibGit2Sharp uses
        // forward slashes. Normalize the join only — preserve the rest of
        // each segment exactly so bidi/case-sensitivity round-trip.
        if (!repoRoot) return relPath || '';
        const trimmedRoot = repoRoot.replace(/[\\/]+$/, '');
        const sep = trimmedRoot.indexOf('\\') >= 0 ? '\\' : '/';
        const normRel = (relPath || '').replace(/\//g, sep);
        return trimmedRoot + sep + normRel;
    }

    // ------------------------------------------------------------------
    // Unified-tree renderer state.
    //   lastTreeState — last `git_state_tree` payload, retained so a
    //     re-render triggered by an expand toggle can rebuild from the
    //     same data without re-asking the host.
    //   treeExpandState — map of nodeId → boolean (true = expanded).
    //     Populated from localStorage on each render; mutations go
    //     through setExpanded() which persists.
    //   treeExpandKey — current localStorage key (`hudGit.tree.expanded.{projectKey}`).
    //
    // Node-id contract (used as keys in treeExpandState):
    //   'root', 'branches'
    //   'branch:<name>', 'branch:<name>:working', 'branch:<name>:commits'
    //   'branch:<name>:group:<taskId>'
    //
    // Branch-name keys over worktree-path keys: a branch's identity
    // outlives a worktree being added/removed (the same `task/xxx`
    // branch keeps its expand state even if its working folder gets
    // pruned and re-created). Legacy `wt:<path>...` keys from the
    // prior FOLDERS-section shape are swept by gcOrphanExpandKeys on
    // each render so the map doesn't carry dead entries forever.
    // ------------------------------------------------------------------
    const EXPAND_KEY_PREFIX = 'hudGit.tree.expanded.';
    let lastTreeState = null;
    let treeExpandState = {};
    let treeExpandKey = '';

    function loadTreeExpandState(projectKey) {
        treeExpandKey = EXPAND_KEY_PREFIX + (projectKey || '_default');
        try {
            const raw = localStorage.getItem(treeExpandKey);
            treeExpandState = raw ? (JSON.parse(raw) || {}) : {};
            if (typeof treeExpandState !== 'object' || treeExpandState === null) {
                treeExpandState = {};
            }
        } catch (e) {
            treeExpandState = {};
        }
    }

    function saveTreeExpandState() {
        if (!treeExpandKey) return;
        try {
            localStorage.setItem(treeExpandKey, JSON.stringify(treeExpandState));
        } catch (e) {
            // Quota exceeded — non-fatal; tree still works for this session.
        }
    }

    // Returns the effective expand state for a node: user setting if
    // present, else the locked-design default for that node type.
    function isExpanded(nodeId, defaultExpanded) {
        if (Object.prototype.hasOwnProperty.call(treeExpandState, nodeId)) {
            return treeExpandState[nodeId] !== false;
        }
        return !!defaultExpanded;
    }

    function setExpanded(nodeId, value) {
        if (!nodeId) return;
        treeExpandState[nodeId] = !!value;
        saveTreeExpandState();
    }

    // ------------------------------------------------------------------
    // Tree-node factory.
    //
    // A node is a wrap containing two children: a row (the clickable
    // label line) and an optional children container that holds the
    // subtree. Chevron click + double-click on the row label both
    // toggle expansion; single-click on the row body fires onSelect.
    //
    // Returns {wrap, row, children, setSelected}. Caller appends content
    // children to `node.row` (after the chevron) and child rows to
    // `node.children`.
    // ------------------------------------------------------------------
    function makeTreeNode(opts) {
        opts = opts || {};
        const nodeId = opts.nodeId || '';
        const depth = opts.depth || 0;
        const leaf = !!opts.leaf;
        const defaultExpanded = !!opts.defaultExpanded;
        const onSelect = typeof opts.onSelect === 'function' ? opts.onSelect : null;
        const classes = Array.isArray(opts.classes) ? opts.classes : [];

        const wrap = document.createElement('div');
        wrap.className = 'tree-node-wrap';
        if (nodeId) wrap.dataset.nodeId = nodeId;

        const row = document.createElement('div');
        row.className = 'tree-row';
        row.setAttribute('role', 'treeitem');
        row.setAttribute('data-depth', String(depth));
        row.setAttribute('tabindex', '0');
        classes.forEach(c => { if (c) row.classList.add(c); });

        const chevron = document.createElement('span');
        chevron.className = 'tree-chevron';
        if (leaf) {
            chevron.classList.add('leaf');
            chevron.textContent = '';
        } else {
            chevron.textContent = isExpanded(nodeId, defaultExpanded) ? '▼' : '▶';
            chevron.setAttribute('aria-hidden', 'true');
        }
        row.appendChild(chevron);
        wrap.appendChild(row);

        let children = null;
        if (!leaf) {
            children = document.createElement('div');
            children.className = 'tree-children';
            if (!isExpanded(nodeId, defaultExpanded)) {
                children.classList.add('collapsed');
            }
            wrap.appendChild(children);

            const toggle = () => {
                const wasCollapsed = children.classList.contains('collapsed');
                children.classList.toggle('collapsed');
                chevron.textContent = wasCollapsed ? '▼' : '▶';
                if (nodeId) setExpanded(nodeId, wasCollapsed);
            };
            chevron.addEventListener('click', e => {
                e.stopPropagation();
                toggle();
            });
            row.addEventListener('dblclick', e => {
                e.preventDefault();
                toggle();
            });
        }

        if (onSelect) {
            row.addEventListener('click', e => {
                if (e.target === chevron) return; // chevron handles itself
                onSelect(row);
            });
            row.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    onSelect(row);
                }
            });
        }

        return { wrap, row, children };
    }

    // ------------------------------------------------------------------
    // renderUnifiedTree — main entry. Builds the full tree DOM from a
    // `git_state_tree` payload.
    //
    // Tree shape (revised 2026-05-13): single BRANCHES section. Each
    // checked-out branch is expandable and contains its worktree's
    // working changes + recent commits inline. Orphan branches (no
    // worktree) are leaves with just tip SHA + subject. The prior
    // FOLDERS section was dropped — it duplicated checked-out branches.
    // ------------------------------------------------------------------
    function renderUnifiedTree(state) {
        const tree = $('tree');
        if (!tree) return;
        lastTreeState = state || {};

        // Panel visibility — mirror showStandard's body/header/empty toggles
        // so the panel actually surfaces when the first git_state_tree arrives.
        $('empty').style.display = 'none';
        $('header').style.display = 'flex';
        $('body').style.display = 'flex';

        const repoRoot = lastTreeState.repoRoot || '';
        lastRepoRoot = repoRoot; // existing module-level cache used by file-row tooltip composition.

        // Per-project expand-state key: sanitize the repo root so the key
        // is filesystem-derivation-stable but localStorage-safe (alnum only).
        const projectKey = repoRoot.replace(/[^A-Za-z0-9]/g, '_');
        loadTreeExpandState(projectKey);

        tree.innerHTML = '';
        const fragment = document.createDocumentFragment();

        const repoName = lastTreeState.repoName || repoRoot.split(/[\\/]/).pop() || 'project';
        const branches = Array.isArray(lastTreeState.branches) ? lastTreeState.branches : [];
        const folders = Array.isArray(lastTreeState.folders) ? lastTreeState.folders : [];
        const selectedPath = lastTreeState.selectedWorktreePath || '';

        // ROOT — project node (depth 0). Always expanded.
        const rootNode = makeTreeNode({
            nodeId: 'root',
            depth: 0,
            defaultExpanded: true,
            classes: ['section'],
        });
        const rootLabel = document.createElement('span');
        rootLabel.textContent = repoName;
        rootNode.row.appendChild(rootLabel);
        fragment.appendChild(rootNode.wrap);

        // BRANCHES — the only section now. Expanded by default since it's
        // the primary view (worktrees roll up under their owning branch).
        const branchesNode = makeTreeNode({
            nodeId: 'branches',
            depth: 1,
            defaultExpanded: true,
            classes: ['section'],
        });
        const branchesLabel = document.createElement('span');
        branchesLabel.textContent = 'BRANCHES';
        branchesNode.row.appendChild(branchesLabel);
        const branchesCount = document.createElement('span');
        branchesCount.className = 'tree-count';
        branchesCount.textContent = ' (' + branches.length + ')';
        branchesNode.row.appendChild(branchesCount);
        const branchesTagline = document.createElement('span');
        branchesTagline.className = 'tree-tagline';
        branchesTagline.textContent = '— lines of work; each one can have its own folder';
        branchesNode.row.appendChild(branchesTagline);
        renderBranchesSection(branchesNode.children, branches, folders, selectedPath);
        rootNode.children.appendChild(branchesNode.wrap);

        tree.appendChild(fragment);

        // GC orphan expand-state entries. Live set = branch names from
        // the current payload; drop any `branch:<name>...` entries whose
        // branch is no longer present. Also sweep legacy `wt:<path>...`
        // keys from the prior tree shape so the map doesn't accumulate
        // dead entries forever.
        gcOrphanExpandKeys(branches);
    }

    function gcOrphanExpandKeys(branches) {
        if (!treeExpandKey) return;
        const liveBranches = new Set();
        for (const b of branches) {
            if (b && b.name) liveBranches.add(String(b.name));
        }
        let dropped = 0;
        for (const key of Object.keys(treeExpandState)) {
            // Legacy `wt:<path>...` keys from the prior FOLDERS-section
            // shape — always sweep; the new shape never writes them.
            if (key.startsWith('wt:')) {
                delete treeExpandState[key];
                dropped++;
                continue;
            }
            if (!key.startsWith('branch:')) continue;
            // Key forms: branch:<name>, branch:<name>:working,
            // branch:<name>:commits, branch:<name>:group:<taskId>.
            // Branch names contain `/` (e.g. `task/4363577a`) but never
            // `:`, so we can split on the `:working`/`:commits`/`:group:`
            // markers safely.
            const afterPrefix = key.slice(7); // 'branch:'.length
            let name = afterPrefix;
            for (const suffix of [':working', ':commits', ':group:']) {
                const i = afterPrefix.lastIndexOf(suffix);
                if (i > 0) { name = afterPrefix.slice(0, i); break; }
            }
            if (!liveBranches.has(name)) {
                delete treeExpandState[key];
                dropped++;
            }
        }
        if (dropped > 0) saveTreeExpandState();
    }

    // ------------------------------------------------------------------
    // Branches section — one row per branch. The unified organizing unit:
    //
    //   • A checked-out branch (worktreePath != null) is expandable and
    //     contains its worktree's working changes + recent commits inline.
    //     Clicking the row switches the HUD to that worktree (switch_repo).
    //   • An orphan branch (no worktree) is a leaf with just tip SHA +
    //     subject. Clicking selects but does not switch (branch actions —
    //     create-worktree-from-branch, delete — are out of scope).
    //
    // Ordering: parent/main branch first, then other checked-out branches
    // in source order, then orphan branches in source order.
    //
    // The `(main)` badge lives on the parent branch row — the branch
    // whose worktree is the IsMain worktree (typically `master`/`main`).
    // ------------------------------------------------------------------
    function renderBranchesSection(container, branches, folders, selectedPath) {
        if (!container) return;
        container.innerHTML = '';
        if (!branches.length) {
            const empty = document.createElement('div');
            empty.className = 'tree-row';
            empty.setAttribute('data-depth', '2');
            const span = document.createElement('span');
            span.style.color = 'var(--fg-muted)';
            span.style.fontStyle = 'italic';
            span.textContent = '(no branches)';
            empty.appendChild(span);
            container.appendChild(empty);
            return;
        }

        // Build a path → folder lookup (lowercased) so each checked-out
        // branch can find its worktree's working-changes / commits payload.
        const folderByPath = new Map();
        let mainFolderPath = '';
        for (const f of (folders || [])) {
            if (!f || !f.path) continue;
            const lower = String(f.path).toLowerCase();
            folderByPath.set(lower, f);
            if (f.isMain) mainFolderPath = lower;
        }

        // Sort: parent first, other checked-out next, orphans last. Within
        // each tier, preserve the payload's source order (HudGitRenderer
        // sorts branches by last-commit-time newest-first by default).
        const parentBranches = [];
        const checkedOutBranches = [];
        const orphanBranches = [];
        for (const b of branches) {
            if (!b || !b.name) continue;
            const wtLower = b.worktreePath ? String(b.worktreePath).toLowerCase() : '';
            if (wtLower && wtLower === mainFolderPath) {
                parentBranches.push(b);
            } else if (b.checkedOut || b.worktreePath) {
                checkedOutBranches.push(b);
            } else {
                orphanBranches.push(b);
            }
        }
        const ordered = parentBranches.concat(checkedOutBranches, orphanBranches);

        const selectedLower = (selectedPath || '').toLowerCase();

        for (const b of ordered) {
            const name = String(b.name);
            const wtPath = b.worktreePath ? String(b.worktreePath) : '';
            const hasWorktree = !!wtPath;
            const folder = hasWorktree ? folderByPath.get(wtPath.toLowerCase()) : null;
            const isSelected = hasWorktree && wtPath.toLowerCase() === selectedLower;
            const isParent = hasWorktree && wtPath.toLowerCase() === mainFolderPath;

            const node = makeTreeNode({
                nodeId: 'branch:' + name,
                depth: 2,
                // Orphan branches render as leaves (no expand chevron, no
                // children container). Checked-out branches expand by
                // default only if their worktree is the currently-selected
                // one — user toggle is persisted and overrides on next
                // render.
                leaf: !hasWorktree,
                defaultExpanded: isSelected,
                onSelect: () => {
                    if (hasWorktree && !isSelected) {
                        send({ type: 'switch_repo', path: wtPath });
                    }
                },
            });

            if (isSelected) {
                node.row.classList.add('selected');
                node.row.setAttribute('aria-current', 'true');
            }

            const dot = document.createElement('span');
            dot.className = 'wt-dot' + (hasWorktree ? ' filled' : '');
            node.row.appendChild(dot);

            const brName = document.createElement('span');
            brName.className = 'br-name';
            brName.textContent = name;
            node.row.appendChild(brName);

            if (b.tipSha) {
                const sha = document.createElement('span');
                sha.className = 'br-tip-sha';
                sha.textContent = String(b.tipSha);
                node.row.appendChild(sha);
            }
            if (b.tipSubject) {
                const subj = document.createElement('span');
                subj.className = 'br-tip-subject';
                subj.textContent = String(b.tipSubject);
                node.row.appendChild(subj);
            }

            const wtHint = document.createElement('span');
            wtHint.className = 'br-wt-hint';
            wtHint.textContent = hasWorktree ? '· open in working folder' : '· no working folder';
            node.row.appendChild(wtHint);

            if (isParent) {
                const badge = document.createElement('span');
                badge.className = 'wt-badge';
                badge.textContent = '(main)';
                node.row.appendChild(badge);
            }

            // Surface dirty count + linked task title from the matched
            // folder (these used to live on the FOLDERS section row;
            // now they ride along the branch row). Only render when we
            // have a folder match — orphan branches skip.
            if (folder) {
                const dirtyText = (typeof folder.dirtyCount === 'number' && folder.dirtyCount >= 0)
                    ? String(folder.dirtyCount)
                    : '';
                if (dirtyText) {
                    const dirty = document.createElement('span');
                    dirty.className = 'wt-dirty';
                    dirty.textContent = '· ' + dirtyText;
                    node.row.appendChild(dirty);
                }
                if (folder.linkedTaskTitle) {
                    const task = document.createElement('span');
                    task.className = 'wt-task';
                    task.textContent = '· ' + String(folder.linkedTaskTitle);
                    node.row.appendChild(task);
                }
            }

            node.row.title = name
                + (wtPath ? '\n' + wtPath : '')
                + (folder && folder.linkedTaskTitle ? '\n' + String(folder.linkedTaskTitle) : '');

            if (hasWorktree && folder) {
                renderWorktreeSubtree(node.children, folder, /*depth*/ 3, /*idPrefix*/ 'branch:' + name);
            }

            container.appendChild(node.wrap);
        }
    }

    // ------------------------------------------------------------------
    // Per-worktree subtree — wired under each expandable BRANCH row by
    // renderBranchesSection. Two siblings:
    //
    //   • Working changes  — expanded by default. Children are task
    //     groups + an `Unlinked changes` group at the end. Groups with
    //     ≤5 files default expanded, >5 default collapsed.
    //
    //   • Recent commits   — collapsed by default. Flat commit rows.
    //
    // `idPrefix` is the parent branch's nodeId prefix (e.g.
    // `branch:task/4363577a`); children compose their own ids on top
    // (`:working`, `:commits`, `:group:<taskId>`) so expand-state
    // persists against the branch identity rather than the filesystem
    // path of the worktree.
    // ------------------------------------------------------------------
    function renderWorktreeSubtree(container, folder, depth, idPrefix) {
        if (!container) return;
        const path = folder.path || '';
        const wc = folder.workingChanges || {};
        const groupedByTask = Array.isArray(wc.groupedByTask) ? wc.groupedByTask : [];
        const unlinked = Array.isArray(wc.unlinked) ? wc.unlinked : [];
        const workingTreeFlat = Array.isArray(wc.workingTree) ? wc.workingTree : [];
        const recentCommits = Array.isArray(folder.recentCommits) ? folder.recentCommits : [];

        // --- working changes ---
        const wcNode = makeTreeNode({
            nodeId: idPrefix + ':working',
            depth: depth,
            defaultExpanded: true,
            classes: ['section'],
        });
        const wcLabel = document.createElement('span');
        wcLabel.textContent = 'Working changes';
        wcNode.row.appendChild(wcLabel);
        const wcCount = document.createElement('span');
        wcCount.className = 'tree-count';
        wcCount.textContent = ' (' + workingTreeFlat.length + ')';
        wcNode.row.appendChild(wcCount);
        const wcTagline = document.createElement('span');
        wcTagline.className = 'tree-tagline';
        wcTagline.textContent = "— files you've edited but not yet committed";
        wcNode.row.appendChild(wcTagline);

        if (workingTreeFlat.length === 0) {
            const emptyRow = document.createElement('div');
            emptyRow.className = 'tree-row';
            emptyRow.setAttribute('data-depth', String(depth + 1));
            const span = document.createElement('span');
            span.style.color = 'var(--fg-muted)';
            span.style.fontStyle = 'italic';
            span.textContent = '(clean)';
            emptyRow.appendChild(span);
            wcNode.children.appendChild(emptyRow);
        } else if (groupedByTask.length === 0 && unlinked.length === 0) {
            // Worktree-mode OFF — groupedByTask + unlinked are empty arrays.
            // Fall back to flat file listing under the working-changes node
            // (no task-group nesting) so the user still sees the files.
            for (const file of workingTreeFlat) {
                wcNode.children.appendChild(buildFileRow(file, depth + 1, path));
            }
        } else {
            // Render task groups in payload order (HudGitRenderer sorts
            // active before shipped, then by title) plus an Unlinked changes
            // group at the end when present.
            for (const group of groupedByTask) {
                wcNode.children.appendChild(buildTaskGroupNode(group, depth + 1, path, idPrefix));
            }
            if (unlinked.length > 0) {
                wcNode.children.appendChild(buildUnlinkedGroupNode(unlinked, depth + 1, path, idPrefix));
            }
        }

        container.appendChild(wcNode.wrap);

        // --- recent commits ---
        const rcNode = makeTreeNode({
            nodeId: idPrefix + ':commits',
            depth: depth,
            defaultExpanded: false,
            classes: ['section'],
        });
        const rcLabel = document.createElement('span');
        rcLabel.textContent = 'Recent commits';
        rcNode.row.appendChild(rcLabel);
        const rcCount = document.createElement('span');
        rcCount.className = 'tree-count';
        rcCount.textContent = ' (' + recentCommits.length + ')';
        rcNode.row.appendChild(rcCount);
        const rcTagline = document.createElement('span');
        rcTagline.className = 'tree-tagline';
        rcTagline.textContent = '— recent saved snapshots on this branch';
        rcNode.row.appendChild(rcTagline);

        if (recentCommits.length === 0) {
            const emptyRow = document.createElement('div');
            emptyRow.className = 'tree-row';
            emptyRow.setAttribute('data-depth', String(depth + 1));
            const span = document.createElement('span');
            span.style.color = 'var(--fg-muted)';
            span.style.fontStyle = 'italic';
            span.textContent = '(no commits)';
            emptyRow.appendChild(span);
            rcNode.children.appendChild(emptyRow);
        } else {
            for (const c of recentCommits) {
                rcNode.children.appendChild(buildCommitRow(c, depth + 1));
            }
        }

        container.appendChild(rcNode.wrap);
    }

    // Task-group node. Header row carries: ✓ for shipped/done task, title,
    // agent, file count. Children are file rows. Default expand state is
    // file-count-driven: ≤5 files expanded (inline scan), >5 collapsed
    // (drill required) — overridable by user toggle (persisted).
    function buildTaskGroupNode(group, depth, worktreePath, idPrefix) {
        const taskId = group && group.taskId ? String(group.taskId) : '';
        const files = Array.isArray(group.files) ? group.files : [];
        const isShipped = group.linkageState === 'shipped';
        const defaultExpanded = files.length <= 5;
        // idPrefix is the parent branch's nodeId (e.g.
        // `branch:task/4363577a`). Compose `:group:<taskId>` so
        // expand-state binds to the branch, not the worktree path.
        const nodeId = idPrefix + ':group:' + taskId;

        const node = makeTreeNode({
            nodeId: nodeId,
            depth: depth,
            defaultExpanded: defaultExpanded,
            classes: ['task-group'],
        });

        if (isShipped) {
            const check = document.createElement('span');
            check.className = 'tg-check';
            check.textContent = '✓';
            node.row.appendChild(check);
        }

        const title = document.createElement('span');
        title.className = 'tg-title';
        title.textContent = (group.taskTitle && String(group.taskTitle)) || '(untitled task)';
        node.row.appendChild(title);

        if (group.agent) {
            const agent = document.createElement('span');
            agent.className = 'tg-agent';
            agent.textContent = '· ' + String(group.agent);
            node.row.appendChild(agent);
        }

        const count = document.createElement('span');
        count.className = 'tg-count';
        count.textContent = '· ' + files.length;
        node.row.appendChild(count);

        // Tooltip surfaces the short task id for cross-reference with the kanban board.
        const idShort = group.taskIdShort || (taskId.slice(0, 8));
        node.row.title = (group.taskTitle || '') + (idShort ? '\n[' + idShort + ']' : '');

        for (const file of files) {
            node.children.appendChild(buildFileRow(file, depth + 1, worktreePath));
        }

        return node.wrap;
    }

    // Unlinked changes group — files with no task linkage. Always rendered
    // at the bottom when present, with `drill-if->5` rule applied per
    // locked design (matches the per-task-group default).
    function buildUnlinkedGroupNode(unlinked, depth, worktreePath, idPrefix) {
        const defaultExpanded = unlinked.length <= 5;
        const nodeId = idPrefix + ':group:_unlinked';

        const node = makeTreeNode({
            nodeId: nodeId,
            depth: depth,
            defaultExpanded: defaultExpanded,
            classes: ['task-group'],
        });

        const title = document.createElement('span');
        title.className = 'tg-title';
        title.textContent = 'Unlinked changes';
        node.row.appendChild(title);

        const count = document.createElement('span');
        count.className = 'tg-count';
        count.textContent = '· ' + unlinked.length;
        node.row.appendChild(count);

        for (const file of unlinked) {
            node.children.appendChild(buildFileRow(file, depth + 1, worktreePath));
        }

        return node.wrap;
    }

    // File row — leaf in the tree. Status marker (M/A/D/U/R/T/C glyph) +
    // path + line stats. Click handler + right-click → Open Code Review
    // are wired in item 5 from the existing handlers.
    function buildFileRow(file, depth, worktreePath) {
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.setAttribute('role', 'treeitem');
        row.setAttribute('data-depth', String(depth));
        row.setAttribute('tabindex', '0');
        row.dataset.path = (file && file.path) || '';
        row.dataset.worktreePath = worktreePath || '';

        // Chevron slot kept for visual alignment with other rows even
        // though file rows are leaves.
        const chevron = document.createElement('span');
        chevron.className = 'tree-chevron leaf';
        row.appendChild(chevron);

        const marker = document.createElement('span');
        const glyph = (file && file.statusGlyph) || '?';
        const kindRaw = (file && file.statusKindRaw) || 'UNK';
        marker.className = 'file-marker ' + kindRaw;
        marker.textContent = glyph;
        row.appendChild(marker);

        const pathSpan = document.createElement('span');
        pathSpan.className = 'file-path';
        pathSpan.textContent = (file && file.path) || '';
        row.appendChild(pathSpan);

        const added = (file && file.linesAdded) | 0;
        const deleted = (file && file.linesDeleted) | 0;
        if (added || deleted) {
            const stats = document.createElement('span');
            stats.className = 'file-stats';
            if (added) {
                const a = document.createElement('span');
                a.className = 'added';
                a.textContent = '+' + added;
                stats.appendChild(a);
            }
            if (added && deleted) stats.appendChild(document.createTextNode(' '));
            if (deleted) {
                const d = document.createElement('span');
                d.className = 'deleted';
                d.textContent = '-' + deleted;
                stats.appendChild(d);
            }
            row.appendChild(stats);
        }

        row.title = composeAbsolutePath(lastRepoRoot, (file && file.path) || '') || (file && file.path) || '';

        // Right-click → Open Code Review. Reuses the existing context-menu
        // DOM (#file-context-menu) and #ctx-open-diff-popup click handler
        // → fires {type: 'open_diff_popup', path} → the C# host
        // (TerminalDocument.OnHudGitOpenDiffPopupRequested) opens the
        // Code Review popup.
        row.addEventListener('contextmenu', e => {
            e.preventDefault();
            const p = (file && file.path) || '';
            if (p) showFileContextMenu(e.clientX, e.clientY, p);
        });

        return row;
    }

    // Commit row — leaf in the recent-commits subtree.
    function buildCommitRow(commit, depth) {
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.setAttribute('role', 'treeitem');
        row.setAttribute('data-depth', String(depth));
        row.setAttribute('tabindex', '0');
        row.dataset.sha = (commit && commit.fullSha) || (commit && commit.shortSha) || '';

        const chevron = document.createElement('span');
        chevron.className = 'tree-chevron leaf';
        row.appendChild(chevron);

        const sha = document.createElement('span');
        sha.className = 'br-tip-sha';
        sha.textContent = (commit && commit.shortSha) || '';
        row.appendChild(sha);

        const subj = document.createElement('span');
        subj.className = 'br-tip-subject';
        subj.textContent = (commit && commit.subject) || '';
        row.appendChild(subj);

        if (commit && commit.authorName) {
            const author = document.createElement('span');
            author.className = 'tg-agent';
            author.textContent = '· ' + String(commit.authorName);
            row.appendChild(author);
        }

        row.title = ((commit && commit.shortSha) || '') + '\n' + ((commit && commit.subject) || '');
        return row;
    }

    function renderWorkingTree(files) {
        lastWorkingTree = files;
        const list = $('file-list');
        list.innerHTML = '';

        $('changes-count').textContent = String(files.length);

        if (files.length === 0) {
            $('working-changes-empty').style.display = 'block';
            list.style.display = 'none';
            return;
        }
        $('working-changes-empty').style.display = 'none';
        list.style.display = 'block';

        // Sort by KIND_SORT_RANK then by path so each kind is a contiguous
        // group (smoke-1 polish [15] fix #4). `sortedFiles` is a copy so
        // we don't mutate the caller's array (mostly defensive — the snapshot
        // is freshly minted by C# each refresh).
        const sortedFiles = [...files].sort((a, b) => {
            const ar = KIND_SORT_RANK[a.kind] ?? 99;
            const br = KIND_SORT_RANK[b.kind] ?? 99;
            if (ar !== br) return ar - br;
            return (a.path || '').localeCompare(b.path || '');
        });

        let prevKind = null;
        for (const f of sortedFiles) {
            const row = document.createElement('div');
            row.className = 'file-row';
            row.dataset.path = f.path;
            if (f.path === selectedPath) row.classList.add('selected');
            // First row of each non-leading kind group gets a 1px divider
            // so M / A / D / U buckets read as visually distinct clusters
            // without resorting to full sub-headers.
            if (prevKind !== null && f.kind !== prevKind) row.classList.add('group-start');
            prevKind = f.kind;

            const cls = KIND_TO_MARKER[f.kind] || 'UNK';
            const letter = KIND_TO_LETTER[f.kind] || '?';

            const marker = document.createElement('span');
            marker.className = 'file-marker ' + cls;
            marker.textContent = letter;
            // Self-explanatory tooltip on the badge — the letter alone
            // is opaque to anyone who hasn't memorized git status codes.
            marker.title = KIND_TO_FULLNAME[f.kind] || ('Status: ' + f.kind);

            const path = document.createElement('span');
            path.className = 'file-path';
            path.textContent = f.path;
            // Full absolute path on hover — even short relative paths get
            // useful info now (previously the title repeated the visible
            // text). Composed from repoRoot + path for native-separator
            // display so the user can paste it straight into Explorer.
            path.title = composeAbsolutePath(lastRepoRoot, f.path);

            const stats = document.createElement('span');
            stats.className = 'file-stats';
            const addedCount = (f.linesAdded | 0);
            const deletedCount = (f.linesDeleted | 0);
            // Stats tooltip (smoke-1 polish [15] fix #2) — disambiguates
            // the +N -N notation for users not steeped in git diff syntax.
            stats.title = addedCount + ' lines added, ' + deletedCount + ' lines removed';
            const added = document.createElement('span');
            added.className = 'added';
            added.textContent = '+' + addedCount;
            const deleted = document.createElement('span');
            deleted.className = 'deleted';
            deleted.textContent = ' −' + deletedCount;
            stats.appendChild(added);
            stats.appendChild(deleted);

            // Per-row chips (item [11] Phase 2 overlays) — agent / task / pipeline-status.
            // Empty chips collapse via .chip:empty { display: none } so files without
            // attribution data don't show empty boxes.
            // When linkageState === 'shipped', all three chips get the muted
            // .chip--shipped variant — the owning task is done but the file
            // isn't committed yet. Active linkage (default) renders normally.
            const isShipped = f.linkageState === 'shipped';
            const shippedSuffix = ' Task done — commit when ready.';
            const chips = document.createElement('span');
            chips.className = 'file-chips';
            const chipAgent = document.createElement('span');
            chipAgent.className = isShipped ? 'chip chip-agent chip--shipped' : 'chip chip-agent';
            if (f.agent) {
                // Prefix with kanban glyph so the visual cue is "task-attributed"
                // not "edit-attributed" — the chip surfaces the active task's
                // ASSIGNEE, which may differ from the actual file editor in
                // multi-agent / sub-agent / helper scenarios. Tooltip discloses
                // the limitation explicitly.
                chipAgent.textContent = '📋 ' + f.agent;
                chipAgent.title = 'Task assignee — may not be the file’s actual editor. '
                    + 'Per-line attribution from activity_feed coming in a follow-up item.'
                    + (isShipped ? shippedSuffix : '');
            }
            const chipTask = document.createElement('span');
            chipTask.className = isShipped ? 'chip chip-task chip--shipped' : 'chip chip-task';
            if (f.taskId) {
                // Show short task id (first 8 chars) to keep the chip compact.
                // Hover reveals the full task title for context.
                // Shipped rows get a ✓ glyph prefix so the state is announced
                // not just implied — italic+opacity alone reads as "disabled"
                // at 9px on monospace fonts (adversary MEDIUM Run 1).
                const shortId = f.taskId.length > 8 ? f.taskId.substring(0, 8) : f.taskId;
                chipTask.textContent = isShipped ? ('✓ ' + shortId) : shortId;
                const baseTitle = f.taskTitle ? (f.taskId + ' — ' + f.taskTitle) : f.taskId;
                chipTask.title = isShipped ? (baseTitle + ' (' + shippedSuffix.trim() + ')') : baseTitle;
            }
            const chipStatus = document.createElement('span');
            chipStatus.className = isShipped ? 'chip chip-status chip--shipped' : 'chip chip-status';
            if (f.pipelineStatus) {
                const verdictGlyph = pipelineGlyph(f.pipelineStatus);
                chipStatus.textContent = verdictGlyph + ' ' + f.pipelineStatus;
                chipStatus.title = 'Latest pipeline verdict for ' + (f.taskId || 'this file')
                    + (isShipped ? shippedSuffix : '');
            }
            chips.appendChild(chipAgent);
            chips.appendChild(chipTask);
            chips.appendChild(chipStatus);

            row.appendChild(marker);
            row.appendChild(path);
            row.appendChild(stats);
            row.appendChild(chips);

            row.addEventListener('click', () => onSelectFile(f.path));
            row.addEventListener('contextmenu', e => {
                e.preventDefault();
                showFileContextMenu(e.clientX, e.clientY, f.path);
            });

            list.appendChild(row);
        }
    }

    // --- Phase 4: grouped render ---
    // Mirrors renderWorkingTree but groups files by task (using the
    // server-side groupedByTask + unlinked arrays). Each task group is a
    // <details>; the task-id chip is suppressed inside groups since the
    // group header carries it. Expand/collapse state persists in
    // localStorage so users keep their layout across refreshes.
    function renderWorkingTreeGrouped(groupedByTask, unlinked, totalCount) {
        const list = $('file-list');
        list.innerHTML = '';

        $('changes-count').textContent = String(totalCount);

        if (totalCount === 0) {
            $('working-changes-empty').style.display = 'block';
            list.style.display = 'none';
            return;
        }
        $('working-changes-empty').style.display = 'none';
        list.style.display = 'block';

        // Cache the flat array on the rendering surface so context-menu
        // helpers + other consumers that read lastWorkingTree still see
        // the union of all files (preserves existing global behavior).
        const allFiles = [];
        for (const g of groupedByTask) {
            for (const f of (g.files || [])) allFiles.push(f);
        }
        for (const f of (unlinked || [])) allFiles.push(f);
        lastWorkingTree = allFiles;

        for (const group of groupedByTask) {
            list.appendChild(buildGroupDetails(group, false));
        }
        if (unlinked && unlinked.length > 0) {
            list.appendChild(buildUnlinkedDetails(unlinked));
        }
    }

    function buildGroupDetails(group, isUnlinked) {
        const details = document.createElement('details');
        let cls = 'wt-group';
        if (group.linkageState === 'shipped') cls += ' wt-group--shipped';
        details.className = cls;

        // Persist expand/collapse keyed by taskId; default open on first sight.
        const storageKey = 'worktree-group-' + (group.taskId || 'group');
        const stored = (function () { try { return localStorage.getItem(storageKey); } catch (e) { return null; } })();
        details.open = stored !== 'closed';
        details.addEventListener('toggle', () => {
            try { localStorage.setItem(storageKey, details.open ? 'open' : 'closed'); } catch (e) { /* ignore quota / private mode */ }
        });

        const summary = document.createElement('summary');
        summary.className = 'wt-group-summary';

        const title = document.createElement('span');
        title.className = 'wt-group-title';
        title.textContent = (group.linkageState === 'shipped' ? '✓ ' : '')
            + (group.taskTitle || 'Task ' + group.taskIdShort);
        title.title = (group.taskId || '') + (group.taskTitle ? (' — ' + group.taskTitle) : '');
        summary.appendChild(title);

        if (group.agent) {
            const agentChip = document.createElement('span');
            agentChip.className = group.linkageState === 'shipped'
                ? 'chip chip-agent chip--shipped'
                : 'chip chip-agent';
            agentChip.textContent = '📋 ' + group.agent;
            agentChip.title = 'Task assignee';
            summary.appendChild(agentChip);
        }

        if (group.taskId) {
            const openButton = document.createElement('button');
            openButton.className = 'wt-group-open-btn';
            openButton.type = 'button';
            openButton.textContent = '↗';
            openButton.title = 'Open lifecycle board';
            openButton.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                send({ type: 'open_lifecycle_board', taskId: group.taskId });
            });
            summary.appendChild(openButton);
        }

        const count = document.createElement('span');
        count.className = 'wt-group-count';
        const n = group.fileCount | 0;
        count.textContent = n + (n === 1 ? ' file' : ' files');
        summary.appendChild(count);

        details.appendChild(summary);

        const sortedFiles = [...(group.files || [])].sort((a, b) => {
            const ar = KIND_SORT_RANK[a.kind] ?? 99;
            const br = KIND_SORT_RANK[b.kind] ?? 99;
            if (ar !== br) return ar - br;
            return (a.path || '').localeCompare(b.path || '');
        });
        for (const f of sortedFiles) {
            details.appendChild(buildLegacyFileRow(f, /*suppressTaskChip*/ true));
        }
        return details;
    }

    function buildUnlinkedDetails(unlinked) {
        const details = document.createElement('details');
        details.className = 'wt-group wt-group--unlinked';
        const storageKey = 'worktree-group-unlinked';
        const stored = (function () { try { return localStorage.getItem(storageKey); } catch (e) { return null; } })();
        details.open = stored !== 'closed';
        details.addEventListener('toggle', () => {
            try { localStorage.setItem(storageKey, details.open ? 'open' : 'closed'); } catch (e) { /* ignore */ }
        });

        const summary = document.createElement('summary');
        summary.className = 'wt-group-summary';

        const title = document.createElement('span');
        title.className = 'wt-group-title';
        title.textContent = 'Unlinked changes';
        title.title = 'Files with no active task linkage';
        summary.appendChild(title);

        // Info icon documents the 3-day shipped-chip cliff: done tasks
        // touched within the last 3 days surface as their own "shipped"
        // group above, anything older falls into this Unlinked group with
        // no signal explaining why. Tooltip uses "recently-touched" not
        // "completed" because the SQL gate at TaskDatabase.cs:1513 filters
        // on tasks.updated_at — and per the caveat at TaskDatabase.cs:1486-
        // 1503, ANY edit to a done task (pipeline reports, review notes,
        // summary edits) bumps updated_at. A real completed_at gate is
        // tracked in ticket a28a3fe6. Native title= keeps it consistent
        // with the chip tooltip pattern used throughout (no JS popover).
        // cursor:help on the icon signals it's informational, not
        // interactive (per task 521f0449).
        const infoIcon = document.createElement('span');
        infoIcon.className = 'wt-group-info-icon';
        infoIcon.textContent = 'ⓘ';
        infoIcon.title = 'Files with no active task claim. Recently-touched done tasks (last 3 days of activity) appear in their own group above; older done tasks aren’t matched.';
        infoIcon.setAttribute('aria-label', 'About unlinked changes');
        summary.appendChild(infoIcon);

        const count = document.createElement('span');
        count.className = 'wt-group-count';
        count.textContent = unlinked.length + (unlinked.length === 1 ? ' file' : ' files');
        summary.appendChild(count);

        details.appendChild(summary);

        const sortedFiles = [...unlinked].sort((a, b) => {
            const ar = KIND_SORT_RANK[a.kind] ?? 99;
            const br = KIND_SORT_RANK[b.kind] ?? 99;
            if (ar !== br) return ar - br;
            return (a.path || '').localeCompare(b.path || '');
        });
        for (const f of sortedFiles) {
            details.appendChild(buildLegacyFileRow(f, /*suppressTaskChip*/ false));
        }
        return details;
    }

    // Legacy file-row builder for the dead `git_state` / `wt-group` render
    // path (showStandard → renderWorkingTreeGrouped → buildGroupDetails /
    // buildUnlinkedDetails). Kept alongside the still-routed `git_state`
    // switch case until that branch is excised. Distinct from the
    // tree-mode `buildFileRow` (data-depth driven) — the old name was
    // hoisting over the new one and stripping depth from every file row.
    function buildLegacyFileRow(f, suppressTaskChip) {
        const row = document.createElement('div');
        row.className = 'file-row';
        row.dataset.path = f.path;
        if (f.path === selectedPath) row.classList.add('selected');

        const cls = KIND_TO_MARKER[f.kind] || 'UNK';
        const letter = KIND_TO_LETTER[f.kind] || '?';

        const marker = document.createElement('span');
        marker.className = 'file-marker ' + cls;
        marker.textContent = letter;
        marker.title = KIND_TO_FULLNAME[f.kind] || ('Status: ' + f.kind);

        const path = document.createElement('span');
        path.className = 'file-path';
        path.textContent = f.path;
