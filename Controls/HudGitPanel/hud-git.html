        for (const r of sortedRoots) buckets.set(r, []);
        const topLevel = [];
        for (const file of files) {
            const path = (file && file.path) ? String(file.path) : '';
            let matched = null;
            for (const r of sortedRoots) {
                if (path.startsWith(r)) { matched = r; break; }
            }
            if (matched) buckets.get(matched).push(file);
            else topLevel.push(file);
        }
        const dirGroups = [];
        // Preserve server-side root order for deterministic display.
        for (const r of roots) {
            const files = buckets.get(r);
            if (files && files.length > 0) dirGroups.push({ rootPath: r, files: files });
        }
        return { topLevel, dirGroups };
    }

    // Needs-a-quick-task group — files with no task linkage. Phase 2a of
    // task d42423e3 reframes this group as a forced-prompt zone: every
    // file here needs an attribution anchor (a quick-task) before commit.
    // Always rendered at the bottom when present, with `drill-if->5` rule
    // applied per locked design (matches the per-task-group default).
    // Hide-at-0 is enforced by the caller (`unlinked.length > 0` gate).
    //
    // Porcelain alignment (task 046f2dea Phase 2): with `untrackedDirRoots`
    // from the server, fold inner files of each untracked-dir root into a
    // single collapsible folder node. Top-level entry count then matches
    // `git status --porcelain` and the HUD badge instead of expanding to
    // every recursed file.
    // suppressQuickTask (task fb718102 follow-up): true when the parent branch
    // is a task branch. On a task branch the quick-task affordance is wrong —
    // these files already belong to the branch's task — so we drop the bulk
    // "+ Wrap all" button, drop the per-file "+ Quick task" buttons, and
    // relabel the group from the prompt-y "Needs a quick task" to the neutral
    // "Unlinked changes". (In the common case FIX A on the C# side has already
    // attributed these files to the branch's task and this group is empty; this
    // is the belt-and-suspenders path for when the task isn't in a live status
    // or the project/branch couldn't be resolved server-side.)
    function buildUnlinkedGroupNode(unlinked, depth, worktreePath, idPrefix, untrackedDirRoots, suppressQuickTask) {
        const partition = partitionByUntrackedRoots(unlinked, untrackedDirRoots);
        const porcelainEntries = partition.topLevel.length + partition.dirGroups.length;
        const defaultExpanded = porcelainEntries <= 5;
        const nodeId = idPrefix + ':group:_unlinked';

        const node = makeTreeNode({
            nodeId: nodeId,
            depth: depth,
            defaultExpanded: defaultExpanded,
            // 'unlinked-group' marker class pairs with a CSS rule that
            // un-grows .tg-title so the bulk button below stays visible.
            classes: ['task-group', 'unlinked-group'],
        });

        const title = document.createElement('span');
        title.className = 'tg-title';
        title.textContent = suppressQuickTask ? 'Unlinked changes' : 'Needs a quick task';
        title.title = suppressQuickTask
            ? 'Working changes on this task branch that have no explicit task link. They belong to this branch’s task; commit them on the branch — no quick-task needed.'
            : 'Files with no task attribution — each needs a quick-task to anchor commit history. Done tasks touched in the last 3 days appear in their own group above; older ones aren’t matched.';
        node.row.appendChild(title);

        // Phase 2c: group-level bulk wrap button. Passes the FLAT unlinked
        // file list (not the porcelain partition) — the partition is purely
        // visual; "wrap all" means every uncommitted unlinked file gets a
        // task_file_links row, including the inner files of untracked-dir roots.
        // Appended BEFORE count so it sits in the left-clustered visible area
        // rather than past the right edge (see CSS .tree-row.unlinked-group).
        // Suppressed on task branches (fb718102) — no competing quick-task.
        if (!suppressQuickTask) attachBulkQuickTaskUI(node.row, unlinked);

        const count = document.createElement('span');
        count.className = 'tg-count';
        count.textContent = '· ' + porcelainEntries;
        node.row.appendChild(count);

        for (const file of partition.topLevel) {
            node.children.appendChild(buildFileRow(file, depth + 1, worktreePath, /*isUnlinked*/ true, suppressQuickTask));
        }
        for (const group of partition.dirGroups) {
            node.children.appendChild(buildUntrackedDirNode(group, depth + 1, worktreePath, idPrefix, suppressQuickTask));
        }

        return node.wrap;
    }

    // Untracked-directory node — collapsible folder containing the recursed
    // file list inside one of the `?? dirname/` porcelain entries. Collapsed
    // by default since these are by definition the directories git itself
    // would roll up at the top level.
    function buildUntrackedDirNode(group, depth, worktreePath, idPrefix, suppressQuickTask) {
        const rootPath = String(group.rootPath || '');
        // Strip trailing slash for the nodeId so it round-trips with other
        // expand-state keys; display keeps the slash for "this is a folder".
        const idSegment = rootPath.endsWith('/') ? rootPath.slice(0, -1) : rootPath;
        const nodeId = idPrefix + ':untrackedDir:' + idSegment;

        const node = makeTreeNode({
            nodeId: nodeId,
            depth: depth,
            defaultExpanded: false,
            classes: ['untracked-dir'],
        });

        // Glyph-column alignment with sibling file rows. File rows render
        // [invisible-leaf-chev 12px] [gap] [marker 16px] [gap] [path]; the
        // folder chevron must occupy the same 16px marker slot so '▼' lines
        // up with '?' above. Inject a leading 12px invisible leaf-chev to
        // match the file-row prefix, then widen the makeTreeNode chevron to
        // 16px so it visually IS the marker (no separate spacer needed).
        const leadPad = document.createElement('span');
        leadPad.className = 'tree-chevron leaf';
        node.row.insertBefore(leadPad, node.row.firstChild);
        const chev = node.row.querySelector('.tree-chevron:not(.leaf)');
        if (chev) {
            chev.style.width = '16px';
            chev.style.flex = '0 0 16px';
        }

        const title = document.createElement('span');
        title.className = 'tg-title';
        title.textContent = rootPath;
        node.row.appendChild(title);

        const count = document.createElement('span');
        count.className = 'tg-count';
        count.textContent = '· ' + group.files.length;
        node.row.appendChild(count);

        // Children of an untracked-dir node are themselves unlinked files
        // (their parent dir landed in the "Needs a quick task" group via
        // partitionByUntrackedRoots), so propagate the unlinked flag here too —
        // along with suppressQuickTask so the per-file button is dropped on a
        // task branch (fb718102), consistent with the parent group.
        for (const file of group.files) {
            node.children.appendChild(buildFileRow(file, depth + 1, worktreePath, /*isUnlinked*/ true, suppressQuickTask));
        }

        return node.wrap;
    }

    // File row — leaf in the tree. Status marker (M/A/D/U/R/T/C glyph) +
    // path + line stats. Click handler + right-click → Open Code Review
    // are wired in item 5 from the existing handlers.
    // isUnlinked (Phase 2b): when true, append the inline quick-task form
    // (collapsed "+ Quick task" button by default).
    // suppressQuickTask (fb718102): when true, omit that button even for an
    // unlinked file — the parent branch is a task branch, so the file already
    // belongs to a task and a quick-task here would only fragment attribution.
    function buildFileRow(file, depth, worktreePath, isUnlinked, suppressQuickTask) {
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.setAttribute('role', 'treeitem');
        row.setAttribute('data-depth', String(depth));
        row.setAttribute('tabindex', '0');
        row.dataset.path = (file && file.path) || '';
        row.dataset.worktreePath = worktreePath || '';

        // Chevron slot kept for visual alignment with other rows even
        // though file rows are leaves.
        const chevron = document.createElement('span');
        chevron.className = 'tree-chevron leaf';
        row.appendChild(chevron);

        const marker = document.createElement('span');
        const glyph = (file && file.statusGlyph) || '?';
        const kindRaw = (file && file.statusKindRaw) || 'UNK';
        marker.className = 'file-marker ' + kindRaw;
        marker.textContent = glyph;
        row.appendChild(marker);

        const pathSpan = document.createElement('span');
        pathSpan.className = 'file-path';
        pathSpan.textContent = (file && file.path) || '';
        row.appendChild(pathSpan);

        // Place qt-btn to the LEFT of the path (immediately after the file
        // marker) so it sits at a predictable position regardless of path
        // length and is never pushed past the right edge by the .tree's
        // `overflow-x: hidden` / scrollbar. Mirrors the bulk button on the
        // "Needs a quick task" group header. Visual order becomes:
        // [chevron] [marker] [+ Quick task] [path…] [stats]
        if (isUnlinked && !suppressQuickTask) attachQuickTaskUI(row, file, pathSpan);

        const added = (file && file.linesAdded) | 0;
        const deleted = (file && file.linesDeleted) | 0;
        if (added || deleted) {
            const stats = document.createElement('span');
            stats.className = 'file-stats';
            if (added) {
                const a = document.createElement('span');
                a.className = 'added';
                a.textContent = '+' + added;
                stats.appendChild(a);
            }
            if (added && deleted) stats.appendChild(document.createTextNode(' '));
            if (deleted) {
                const d = document.createElement('span');
                d.className = 'deleted';
                d.textContent = '-' + deleted;
                stats.appendChild(d);
            }
            row.appendChild(stats);
        }

        row.title = composeAbsolutePath(lastRepoRoot, (file && file.path) || '') || (file && file.path) || '';

        // Left-click → select file (drives inspector Details + Help tabs).
        // The unified-tree row builders previously only handled contextmenu;
        // wiring up click was the missing piece making selection a no-op.
        row.addEventListener('click', () => {
            const p = (file && file.path) || '';
            if (p) onSelectFile(p);
        });

        // Right-click → Open Code Review. Reuses the existing context-menu
        // DOM (#file-context-menu) and #ctx-open-diff-popup click handler
        // → fires {type: 'open_diff_popup', path} → the C# host
        // (TerminalDocument.OnHudGitOpenDiffPopupRequested) opens the
        // Code Review popup.
        row.addEventListener('contextmenu', e => {
            e.preventDefault();
            const p = (file && file.path) || '';
            if (p) showFileContextMenu(e.clientX, e.clientY, p);
        });

        return row;
    }

    // Commit row — leaf in the recent-commits subtree.
    function buildCommitRow(commit, depth) {
        const row = document.createElement('div');
        row.className = 'tree-row';
        row.setAttribute('role', 'treeitem');
        row.setAttribute('data-depth', String(depth));
        row.setAttribute('tabindex', '0');
        row.dataset.sha = (commit && commit.fullSha) || (commit && commit.shortSha) || '';

        const chevron = document.createElement('span');
        chevron.className = 'tree-chevron leaf';
        row.appendChild(chevron);

        const sha = document.createElement('span');
        sha.className = 'br-tip-sha';
        sha.textContent = (commit && commit.shortSha) || '';
        row.appendChild(sha);

        const subj = document.createElement('span');
        subj.className = 'br-tip-subject';
        subj.textContent = (commit && commit.subject) || '';
        row.appendChild(subj);

        if (commit && commit.authorName) {
            const author = document.createElement('span');
            author.className = 'tg-agent';
            author.textContent = '· ' + String(commit.authorName);
            row.appendChild(author);
        }

        row.title = ((commit && commit.shortSha) || '') + '\n' + ((commit && commit.subject) || '');

        // Left-click → select commit (drives inspector Details + Help tabs).
        // displayName mirrors the legacy renderRecentCommits signature so
        // any downstream consumer of {type:'select_commit'} payloads gets
        // the same shape.
        row.addEventListener('click', () => {
            const sha = (commit && (commit.fullSha || commit.shortSha)) || '';
            if (!sha) return;
            const subj = (commit && commit.subject) || '';
            const display = ((commit && commit.shortSha) || sha) + (subj ? ' — ' + subj : '');
            onSelectCommit(sha, display);
        });

        return row;
    }

    function renderWorkingTree(files) {
        lastWorkingTree = files;
        const list = $('file-list');
        list.innerHTML = '';

        $('changes-count').textContent = String(files.length);

        if (files.length === 0) {
            $('working-changes-empty').style.display = 'block';
            list.style.display = 'none';
            return;
        }
        $('working-changes-empty').style.display = 'none';
        list.style.display = 'block';

        // Sort by KIND_SORT_RANK then by path so each kind is a contiguous
        // group (smoke-1 polish [15] fix #4). `sortedFiles` is a copy so
        // we don't mutate the caller's array (mostly defensive — the snapshot
        // is freshly minted by C# each refresh).
        const sortedFiles = [...files].sort((a, b) => {
            const ar = KIND_SORT_RANK[a.kind] ?? 99;
            const br = KIND_SORT_RANK[b.kind] ?? 99;
            if (ar !== br) return ar - br;
            return (a.path || '').localeCompare(b.path || '');
        });

        let prevKind = null;
        for (const f of sortedFiles) {
            const row = document.createElement('div');
            row.className = 'file-row';
            row.dataset.path = f.path;
            if (f.path === selectedPath) row.classList.add('selected');
            // First row of each non-leading kind group gets a 1px divider
            // so M / A / D / U buckets read as visually distinct clusters
            // without resorting to full sub-headers.
            if (prevKind !== null && f.kind !== prevKind) row.classList.add('group-start');
            prevKind = f.kind;

            const cls = KIND_TO_MARKER[f.kind] || 'UNK';
            const letter = KIND_TO_LETTER[f.kind] || '?';

            const marker = document.createElement('span');
            marker.className = 'file-marker ' + cls;
            marker.textContent = letter;
            // Self-explanatory tooltip on the badge — the letter alone
            // is opaque to anyone who hasn't memorized git status codes.
            marker.title = KIND_TO_FULLNAME[f.kind] || ('Status: ' + f.kind);

            const path = document.createElement('span');
            path.className = 'file-path';
            path.textContent = f.path;
            // Full absolute path on hover — even short relative paths get
            // useful info now (previously the title repeated the visible
            // text). Composed from repoRoot + path for native-separator
            // display so the user can paste it straight into Explorer.
            path.title = composeAbsolutePath(lastRepoRoot, f.path);

            const stats = document.createElement('span');
            stats.className = 'file-stats';
            const addedCount = (f.linesAdded | 0);
            const deletedCount = (f.linesDeleted | 0);
            // Stats tooltip (smoke-1 polish [15] fix #2) — disambiguates
            // the +N -N notation for users not steeped in git diff syntax.
            stats.title = addedCount + ' lines added, ' + deletedCount + ' lines removed';
            const added = document.createElement('span');
            added.className = 'added';
            added.textContent = '+' + addedCount;
            const deleted = document.createElement('span');
            deleted.className = 'deleted';
            deleted.textContent = ' −' + deletedCount;
            stats.appendChild(added);
            stats.appendChild(deleted);

            // Per-row chips (item [11] Phase 2 overlays) — agent / task / pipeline-status.
            // Empty chips collapse via .chip:empty { display: none } so files without
            // attribution data don't show empty boxes.
            // When linkageState === 'shipped', all three chips get the muted
            // .chip--shipped variant — the owning task is done but the file
            // isn't committed yet. Active linkage (default) renders normally.
            const isShipped = f.linkageState === 'shipped';
            const shippedSuffix = ' Task done — commit when ready.';
            const chips = document.createElement('span');
            chips.className = 'file-chips';
            const chipAgent = document.createElement('span');
            chipAgent.className = isShipped ? 'chip chip-agent chip--shipped' : 'chip chip-agent';
            if (f.agent) {
                // Prefix with kanban glyph so the visual cue is "task-attributed"
                // not "edit-attributed" — the chip surfaces the active task's
                // ASSIGNEE, which may differ from the actual file editor in
                // multi-agent / sub-agent / helper scenarios. Tooltip discloses
                // the limitation explicitly.
                chipAgent.textContent = '📋 ' + f.agent;
                chipAgent.title = 'Task assignee — may not be the file’s actual editor. '
                    + 'Per-line attribution from activity_feed coming in a follow-up item.'
                    + (isShipped ? shippedSuffix : '');
            }
            const chipTask = document.createElement('span');
            chipTask.className = isShipped ? 'chip chip-task chip--shipped' : 'chip chip-task';
            if (f.taskId) {
                // Show short task id (first 8 chars) to keep the chip compact.
                // Hover reveals the full task title for context.
                // Shipped rows get a ✓ glyph prefix so the state is announced
                // not just implied — italic+opacity alone reads as "disabled"
                // at 9px on monospace fonts (adversary MEDIUM Run 1).
                const shortId = f.taskId.length > 8 ? f.taskId.substring(0, 8) : f.taskId;
                chipTask.textContent = isShipped ? ('✓ ' + shortId) : shortId;
                const baseTitle = f.taskTitle ? (f.taskId + ' — ' + f.taskTitle) : f.taskId;
                chipTask.title = isShipped ? (baseTitle + ' (' + shippedSuffix.trim() + ')') : baseTitle;
            }
            const chipStatus = document.createElement('span');
            chipStatus.className = isShipped ? 'chip chip-status chip--shipped' : 'chip chip-status';
            if (f.pipelineStatus) {
                const verdictGlyph = pipelineGlyph(f.pipelineStatus);
                chipStatus.textContent = verdictGlyph + ' ' + f.pipelineStatus;
                chipStatus.title = 'Latest pipeline verdict for ' + (f.taskId || 'this file')
                    + (isShipped ? shippedSuffix : '');
            }
            chips.appendChild(chipAgent);
            chips.appendChild(chipTask);
            chips.appendChild(chipStatus);

            row.appendChild(marker);
            row.appendChild(path);
            row.appendChild(stats);
            row.appendChild(chips);

            row.addEventListener('click', () => onSelectFile(f.path));
            row.addEventListener('contextmenu', e => {
                e.preventDefault();
                showFileContextMenu(e.clientX, e.clientY, f.path);
            });

            list.appendChild(row);
        }
    }

    // --- Phase 4: grouped render ---
    // Mirrors renderWorkingTree but groups files by task (using the
    // server-side groupedByTask + unlinked arrays). Each task group is a
    // <details>; the task-id chip is suppressed inside groups since the
    // group header carries it. Expand/collapse state persists in
    // localStorage so users keep their layout across refreshes.
    function renderWorkingTreeGrouped(groupedByTask, unlinked, totalCount) {
        const list = $('file-list');
        list.innerHTML = '';

        $('changes-count').textContent = String(totalCount);

        if (totalCount === 0) {
            $('working-changes-empty').style.display = 'block';
            list.style.display = 'none';
            return;
        }
        $('working-changes-empty').style.display = 'none';
        list.style.display = 'block';

        // Cache the flat array on the rendering surface so context-menu
        // helpers + other consumers that read lastWorkingTree still see
        // the union of all files (preserves existing global behavior).
        const allFiles = [];
        for (const g of groupedByTask) {
            for (const f of (g.files || [])) allFiles.push(f);
        }
        for (const f of (unlinked || [])) allFiles.push(f);
        lastWorkingTree = allFiles;

        for (const group of groupedByTask) {
            list.appendChild(buildGroupDetails(group, false));
        }
        if (unlinked && unlinked.length > 0) {
            list.appendChild(buildUnlinkedDetails(unlinked));
        }
    }

    function buildGroupDetails(group, isUnlinked) {
        const details = document.createElement('details');
        let cls = 'wt-group';
        if (group.linkageState === 'shipped') cls += ' wt-group--shipped';
        details.className = cls;

        // Persist expand/collapse keyed by taskId; default open on first sight.
        const storageKey = 'worktree-group-' + (group.taskId || 'group');
        const stored = (function () { try { return localStorage.getItem(storageKey); } catch (e) { return null; } })();
        details.open = stored !== 'closed';
        details.addEventListener('toggle', () => {
            try { localStorage.setItem(storageKey, details.open ? 'open' : 'closed'); } catch (e) { /* ignore quota / private mode */ }
        });

        const summary = document.createElement('summary');
        summary.className = 'wt-group-summary';

        const title = document.createElement('span');
        title.className = 'wt-group-title';
        title.textContent = (group.linkageState === 'shipped' ? '✓ ' : '')
            + (group.taskTitle || 'Task ' + group.taskIdShort);
        title.title = (group.taskId || '') + (group.taskTitle ? (' — ' + group.taskTitle) : '');
        summary.appendChild(title);

        if (group.agent) {
            const agentChip = document.createElement('span');
            agentChip.className = group.linkageState === 'shipped'
                ? 'chip chip-agent chip--shipped'
                : 'chip chip-agent';
            agentChip.textContent = '📋 ' + group.agent;
            agentChip.title = 'Task assignee';
            summary.appendChild(agentChip);
        }

        if (group.taskId) {
            const openButton = document.createElement('button');
            openButton.className = 'wt-group-open-btn';
            openButton.type = 'button';
            openButton.textContent = '↗';
            openButton.title = 'Open lifecycle board';
            openButton.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                send({ type: 'open_lifecycle_board', taskId: group.taskId });
            });
            summary.appendChild(openButton);
        }

        const count = document.createElement('span');
        count.className = 'wt-group-count';
        const n = group.fileCount | 0;
        count.textContent = n + (n === 1 ? ' file' : ' files');
        summary.appendChild(count);

        details.appendChild(summary);

        const sortedFiles = [...(group.files || [])].sort((a, b) => {
            const ar = KIND_SORT_RANK[a.kind] ?? 99;
            const br = KIND_SORT_RANK[b.kind] ?? 99;
            if (ar !== br) return ar - br;
            return (a.path || '').localeCompare(b.path || '');
        });
        for (const f of sortedFiles) {
            details.appendChild(buildLegacyFileRow(f, /*suppressTaskChip*/ true));
        }
        return details;
    }

    function buildUnlinkedDetails(unlinked) {
        const details = document.createElement('details');
        details.className = 'wt-group wt-group--unlinked';
        const storageKey = 'worktree-group-unlinked';
        const stored = (function () { try { return localStorage.getItem(storageKey); } catch (e) { return null; } })();
        details.open = stored !== 'closed';
        details.addEventListener('toggle', () => {
            try { localStorage.setItem(storageKey, details.open ? 'open' : 'closed'); } catch (e) { /* ignore */ }
        });

        const summary = document.createElement('summary');
        summary.className = 'wt-group-summary';

        const title = document.createElement('span');
        title.className = 'wt-group-title';
        title.textContent = 'Needs a quick task';
        title.title = 'Files with no task attribution — each needs a quick-task to anchor commit history.';
        summary.appendChild(title);

        // Info icon documents the 3-day shipped-chip cliff plus the new
        // "every change must attribute to a task" framing (task d42423e3
        // Phase 2a): done tasks touched within the last 3 days surface
        // as their own "shipped" group above; anything older — plus any
        // file never linked at all — falls into THIS group, which is now
        // a forced-prompt zone awaiting a quick-task. Tooltip uses
        // "recently-touched" not "completed" because the SQL gate at
        // TaskDatabase.cs:1513 filters on tasks.updated_at — and per
        // the caveat at TaskDatabase.cs:1486-1503, ANY edit to a done
        // task (pipeline reports, review notes, summary edits) bumps
        // updated_at. A real completed_at gate is tracked in ticket
        // a28a3fe6. Native title= keeps it consistent with the chip
        // tooltip pattern used throughout (no JS popover). cursor:help
        // on the icon signals it's informational, not interactive
        // (per task 521f0449).
        const infoIcon = document.createElement('span');
        infoIcon.className = 'wt-group-info-icon';
        infoIcon.textContent = 'ⓘ';
        infoIcon.title = 'Files with no task attribution — each needs a quick-task to anchor commit history. Done tasks touched in the last 3 days appear in their own group above; older ones aren’t matched.';
        infoIcon.setAttribute('aria-label', 'About the needs-a-quick-task group');
        summary.appendChild(infoIcon);

        // Phase 2c: group-level bulk wrap button (parity with the unified
        // tree-mode buildUnlinkedGroupNode). Lives inside the <summary> so
        // it sits on the same row as the title/count, NOT inside <details>'s
        // collapsible body. Appended BEFORE the count chip because count
        // carries `margin-left: auto` and pins itself to the right edge —
        // anything appended AFTER count ends up past the panel's
        // `body { overflow-x: hidden }` clip and goes invisible.
        attachBulkQuickTaskUI(summary, unlinked);

        const count = document.createElement('span');
        count.className = 'wt-group-count';
        count.textContent = unlinked.length + (unlinked.length === 1 ? ' file' : ' files');
        summary.appendChild(count);

        details.appendChild(summary);

        const sortedFiles = [...unlinked].sort((a, b) => {
            const ar = KIND_SORT_RANK[a.kind] ?? 99;
            const br = KIND_SORT_RANK[b.kind] ?? 99;
            if (ar !== br) return ar - br;
            return (a.path || '').localeCompare(b.path || '');
        });
        for (const f of sortedFiles) {
            details.appendChild(buildLegacyFileRow(f, /*suppressTaskChip*/ false, /*isUnlinked*/ true));
        }
        return details;
    }

    // Legacy file-row builder for the dead `git_state` / `wt-group` render
    // path (showStandard → renderWorkingTreeGrouped → buildGroupDetails /
    // buildUnlinkedDetails). Kept alongside the still-routed `git_state`
    // switch case until that branch is excised. Distinct from the
    // tree-mode `buildFileRow` (data-depth driven) — the old name was
    // hoisting over the new one and stripping depth from every file row.
    function buildLegacyFileRow(f, suppressTaskChip, isUnlinked) {
        const row = document.createElement('div');
        row.className = 'file-row';
        row.dataset.path = f.path;
        if (f.path === selectedPath) row.classList.add('selected');

        const cls = KIND_TO_MARKER[f.kind] || 'UNK';
        const letter = KIND_TO_LETTER[f.kind] || '?';

        const marker = document.createElement('span');
        marker.className = 'file-marker ' + cls;
        marker.textContent = letter;
        marker.title = KIND_TO_FULLNAME[f.kind] || ('Status: ' + f.kind);

        const path = document.createElement('span');
        path.className = 'file-path';
        path.textContent = f.path;
        path.title = composeAbsolutePath(lastRepoRoot, f.path);

        const stats = document.createElement('span');
        stats.className = 'file-stats';
        const addedCount = (f.linesAdded | 0);
        const deletedCount = (f.linesDeleted | 0);
        stats.title = addedCount + ' lines added, ' + deletedCount + ' lines removed';
        const added = document.createElement('span');
        added.className = 'added';
        added.textContent = '+' + addedCount;
        const deleted = document.createElement('span');
        deleted.className = 'deleted';
        deleted.textContent = ' −' + deletedCount;
        stats.appendChild(added);
        stats.appendChild(deleted);

        const isShipped = f.linkageState === 'shipped';
        const shippedSuffix = ' Task done — commit when ready.';
        const chips = document.createElement('span');
        chips.className = 'file-chips';

        const chipAgent = document.createElement('span');
        chipAgent.className = isShipped ? 'chip chip-agent chip--shipped' : 'chip chip-agent';
        if (f.agent) {
            chipAgent.textContent = '📋 ' + f.agent;
            chipAgent.title = 'Task assignee — may not be the file’s actual editor.'
                + (isShipped ? shippedSuffix : '');
        }
        chips.appendChild(chipAgent);

        if (!suppressTaskChip) {
            const chipTask = document.createElement('span');
            chipTask.className = isShipped ? 'chip chip-task chip--shipped' : 'chip chip-task';
            if (f.taskId) {
                const shortId = f.taskId.length > 8 ? f.taskId.substring(0, 8) : f.taskId;
                chipTask.textContent = isShipped ? ('✓ ' + shortId) : shortId;
                const baseTitle = f.taskTitle ? (f.taskId + ' — ' + f.taskTitle) : f.taskId;
                chipTask.title = isShipped ? (baseTitle + ' (' + shippedSuffix.trim() + ')') : baseTitle;
            }
            chips.appendChild(chipTask);
        }

        const chipStatus = document.createElement('span');
        chipStatus.className = isShipped ? 'chip chip-status chip--shipped' : 'chip chip-status';
        if (f.pipelineStatus) {
            const verdictGlyph = pipelineGlyph(f.pipelineStatus);
            chipStatus.textContent = verdictGlyph + ' ' + f.pipelineStatus;
            chipStatus.title = 'Latest pipeline verdict for ' + (f.taskId || 'this file')
                + (isShipped ? shippedSuffix : '');
        }
        chips.appendChild(chipStatus);

        row.appendChild(marker);
        row.appendChild(path);
        // Place qt-btn to the LEFT of the path (between marker and path)
        // so it sits at a predictable position and is never pushed past
        // the right edge by trailing siblings. Mirrors the tree-mode
        // buildFileRow placement. Visual order:
        // [marker] [+ Quick task] [path…] [stats] [chips]
        if (isUnlinked) attachQuickTaskUI(row, f, path);
        row.appendChild(stats);
        row.appendChild(chips);

        row.addEventListener('click', () => onSelectFile(f.path));
        row.addEventListener('contextmenu', e => {
            e.preventDefault();
            showFileContextMenu(e.clientX, e.clientY, f.path);
        });

        return row;
    }

    // Phase 2b: per-file inline quick-task form. Appends a compact
    // "+ Quick task" button to the file row that, on click, expands into
    // a text input pre-filled with the file basename + Submit/Cancel
    // buttons. Enter submits, Esc cancels. Tab uses default focus
    // traversal (button-by-button across rows — no magic auto-expand).
    // The submit posts {type:'create_quick_task', filePath, title} to the
    // C# host; success triggers a fresh git_state_tree which moves the
    // file out of the Needs-a-quick-task group on the next render pass.
    function attachQuickTaskUI(row, file, insertBefore) {
        const path = (file && file.path) || '';
        if (!path) return;

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'qt-btn';
        btn.textContent = '+ Quick task';
        btn.title = 'Create a quick-task anchoring this file (commit-message-style title).';
        // Stop click from selecting the file or opening the context menu —
        // the button lives inside an interactive row.
        btn.addEventListener('click', e => {
            e.stopPropagation();
            expandQuickTaskForm(row, btn, path);
        });
        if (insertBefore && insertBefore.parentNode === row) {
            row.insertBefore(btn, insertBefore);
        } else {
            row.appendChild(btn);
        }
    }

    function expandQuickTaskForm(row, btn, filePath) {
        btn.style.display = 'none';

        const form = document.createElement('span');
        form.className = 'qt-form';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'qt-input';
        input.value = basenameOf(filePath);
        input.setAttribute('aria-label', 'Quick-task title for ' + filePath);
        input.spellcheck = false;

        const submit = document.createElement('button');
        submit.type = 'button';
        submit.className = 'qt-submit';
        submit.textContent = 'Create';
        submit.title = 'Create quick-task (Enter)';

        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.className = 'qt-cancel';
        cancel.textContent = '✕';
        cancel.title = 'Cancel (Esc)';

        const err = document.createElement('span');
        err.className = 'qt-error';
        err.style.display = 'none';

        function collapse() {
            form.remove();
            err.remove();
            btn.style.display = '';
            btn.focus();
        }

        function submitForm() {
            const title = (input.value || '').trim();
            if (!title) {
                showError('Title required');
                input.focus();
                return;
            }
            form.classList.add('qt-busy');
            err.style.display = 'none';
            // Stash on row so the inbound 'quick_task_created' echo can
            // find this form (path-keyed; multiple rows can have open forms).
            row._qtPending = { input, submit, cancel, form, err, collapse, showError };
            send({ type: 'create_quick_task', filePath: filePath, title: title });
        }

        function showError(msg) {
            err.textContent = String(msg || 'failed');
            err.style.display = '';
            form.classList.remove('qt-busy');
        }

        // Stop bubbling so the row's click/contextmenu don't fire when the
        // user is typing in the input. Also prevent Enter from doing
        // anything weird inside a non-<form> ancestor.
        ['click', 'contextmenu', 'mousedown'].forEach(ev => {
            form.addEventListener(ev, e => e.stopPropagation());
        });
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitForm();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                collapse();
            }
        });
        submit.addEventListener('click', e => { e.stopPropagation(); submitForm(); });
        cancel.addEventListener('click', e => { e.stopPropagation(); collapse(); });

        form.appendChild(input);
        form.appendChild(submit);
        form.appendChild(cancel);
        // Insert form + err immediately after the (now-hidden) btn so they
        // occupy the same DOM slot the btn was rendered at. Since the btn
        // now sits left-of-path, appendChild-to-row would shove the form
        // past .file-stats / .file-chips and clip it under the scrollbar.
        btn.insertAdjacentElement('afterend', form);
        form.insertAdjacentElement('afterend', err);
        input.focus();
        input.select();
    }

    function basenameOf(p) {
        if (!p) return '';
        const i = Math.max(p.lastIndexOf('/'), p.lastIndexOf('\\'));
        return i >= 0 ? p.substring(i + 1) : p;
    }

    // Phase 2c: group-level "Wrap all in one quick task" UI. Appended to
    // the "Needs a quick task" group header in both render paths
    // (buildUnlinkedGroupNode tree-mode + buildUnlinkedDetails legacy).
    // Submits {type: 'create_quick_task_bulk', title, filePaths[], requestId}
    // to the C# host, which atomically creates one quick-task and links every
    // file to it — rolling back if ANY link fails.
    //
    // Multiple unlinked groups can exist (one per worktree folder in tree
    // mode), so pending forms are keyed by a generated requestId rather than
    // by header element.
    const _bulkQtPendingByReqId = new Map();
    let _bulkQtSeq = 0;

    function attachBulkQuickTaskUI(headerEl, files) {
        if (!headerEl || !Array.isArray(files) || files.length === 0) return;

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'qt-bulk-btn';
        btn.textContent = '+ Wrap all in one quick task';
        btn.title = 'Create one quick-task and attribute every unlinked file in this group to it.';
        // Defensive: keep the click off any parent click handler (e.g. the
        // tree-row chevron toggle, or a <summary> click that would collapse
        // <details>). preventDefault on the click matters specifically for
        // <summary> — which would otherwise toggle the parent <details>.
        btn.addEventListener('click', e => {
            e.preventDefault();
            e.stopPropagation();
            expandBulkQuickTaskForm(headerEl, btn, files);
        });
        headerEl.appendChild(btn);
    }

    function expandBulkQuickTaskForm(headerEl, btn, files) {
        btn.style.display = 'none';

        const form = document.createElement('span');
        form.className = 'qt-form';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'qt-input';
        input.placeholder = 'Commit message…';
        input.setAttribute('aria-label', 'Quick-task title wrapping ' + files.length + ' files');
        input.spellcheck = false;

        const submit = document.createElement('button');
        submit.type = 'button';
        submit.className = 'qt-submit';
        submit.textContent = 'Create (' + files.length + ')';
        submit.title = 'Create one quick-task linking all ' + files.length + ' files (Enter)';

        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.className = 'qt-cancel';
        cancel.textContent = '✕';
        cancel.title = 'Cancel (Esc)';

        const err = document.createElement('span');
        err.className = 'qt-error';
        err.style.display = 'none';

        function collapse() {
            form.remove();
            err.remove();
            btn.style.display = '';
            btn.focus();
        }

        function showError(msg) {
            err.textContent = String(msg || 'failed');
            err.style.display = '';
            form.classList.remove('qt-busy');
        }

        function submitForm() {
            const title = (input.value || '').trim();
            if (!title) {
                showError('Title required');
                input.focus();
                return;
            }
            form.classList.add('qt-busy');
            err.style.display = 'none';

            const reqId = 'bulk-' + (++_bulkQtSeq) + '-' + Date.now();
            _bulkQtPendingByReqId.set(reqId, { input, submit, cancel, form, err, collapse, showError });

            const filePaths = files.map(f => (f && f.path) || '').filter(p => p.length > 0);
            send({
                type: 'create_quick_task_bulk',
                title: title,
                filePaths: filePaths,
                requestId: reqId,
            });
        }

        ['click', 'contextmenu', 'mousedown'].forEach(ev => {
            form.addEventListener(ev, e => e.stopPropagation());
        });
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitForm();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                collapse();
            }
        });
        submit.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); submitForm(); });
        cancel.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); collapse(); });

        form.appendChild(input);
        form.appendChild(submit);
        form.appendChild(cancel);
        headerEl.appendChild(form);
        headerEl.appendChild(err);
        input.focus();
    }

    function pipelineGlyph(verdict) {
        // Map common verdict strings to a small inline glyph. Order matters:
        // failure/warning tokens MUST be checked before success tokens so
        // "PASS WITH WARNINGS" renders as ⚠ not ✅ — adversary HIGH finding.
        // Reviewer-vocabulary tokens (revise/rework/concern) added per
        // reviewer SUGGEST. Fallback is a neutral dot so unknown verdicts
        // still render visibly without implying a status they don't carry.
        const v = (verdict || '').toLowerCase();
        if (v.indexOf('fail') >= 0 || v.indexOf('block') >= 0 || v.indexOf('error') >= 0
            || v.indexOf('warning') >= 0 || v.indexOf('concern') >= 0
            || v.indexOf('revise') >= 0 || v.indexOf('rework') >= 0) return '⚠';
        if (v.indexOf('pending') >= 0 || v.indexOf('progress') >= 0
            || v.indexOf('coding') >= 0 || v.indexOf('testing') >= 0) return '⏳';
        if (v.indexOf('pass') >= 0 || v.indexOf('lgtm') >= 0 || v === 'done' || v === 'ok') return '✅';
        return '·';
    }

    function onSelectFile(path) {
        if (selectedPath === path && selectedSha === null && selectedBranchName === null) return;
        selectedPath = path;
        selectedSha = null;
        selectedBranchName = null;
        // Legacy file-list / commits-list elements were dropped when the unified
        // tree took over (task 4363577a); guards keep these no-ops harmless if
        // the elements ever come back.
        const fl = $('file-list');
        if (fl) {
            for (const row of fl.children) {
                row.classList.toggle('selected', row.dataset.path === path);
            }
        }
        const cl = $('commits-list');
        if (cl) {
            for (const row of cl.children) {
                row.classList.remove('selected');
            }
        }
        renderInspectorDetails();
        renderInspectorHelp();
        send({ type: 'select_file', path });
    }

    // --- Recent commits log (item [9]) ---
    function renderRecentCommits(commits) {
        lastRecentCommits = commits;
        const list = $('commits-list');
        list.innerHTML = '';

        $('commits-count').textContent = String(commits.length);

        if (commits.length === 0) {
            $('commits-empty').style.display = 'block';
            list.style.display = 'none';
            return;
        }
        $('commits-empty').style.display = 'none';
        list.style.display = 'block';

        for (const c of commits) {
            const row = document.createElement('div');
            row.className = 'commit-row';
            row.dataset.sha = c.fullSha || c.shortSha;
            if (selectedSha && row.dataset.sha === selectedSha) row.classList.add('selected');

            const line = document.createElement('div');
            line.className = 'commit-line';
            const sha = document.createElement('span');
            sha.className = 'commit-sha';
            sha.textContent = c.shortSha || '';
            const subj = document.createElement('span');
            subj.className = 'commit-subject';
            subj.textContent = c.subject || '';
            subj.title = c.subject || '';
            line.appendChild(sha);
            line.appendChild(subj);

            const meta = document.createElement('div');
            meta.className = 'commit-meta';
            const author = document.createElement('span');
            author.className = 'commit-author';
            author.textContent = c.authorName || '';
            meta.appendChild(author);
            if (c.coAuthors && c.coAuthors.length > 0) {
                const co = document.createElement('span');
                co.className = 'commit-coauthors';
                co.textContent = '+ ' + c.coAuthors.join(', ');
                meta.appendChild(co);
            }
            const time = document.createElement('span');
            time.className = 'commit-time';
            time.textContent = formatRelativeTime(c.when);
            meta.appendChild(time);

            row.appendChild(line);
            row.appendChild(meta);

            row.addEventListener('click', () => onSelectCommit(c.fullSha || c.shortSha, c.shortSha + ' — ' + (c.subject || '')));

            list.appendChild(row);
        }
    }

    function onSelectCommit(sha, displayName) {
        if (!sha) return;
        if (selectedSha === sha && selectedPath === null && selectedBranchName === null) return;
        selectedSha = sha;
        selectedPath = null;
        selectedBranchName = null;
        // Legacy DOM walks — null-guarded for the same reason as onSelectFile.
        const cl = $('commits-list');
        if (cl) {
            for (const row of cl.children) {
                row.classList.toggle('selected', row.dataset.sha === sha);
            }
        }
        const fl = $('file-list');
        if (fl) {
            for (const row of fl.children) {
                row.classList.remove('selected');
            }
        }
        renderInspectorDetails();
        renderInspectorHelp();
        send({ type: 'select_commit', sha, displayName });
    }

    function onSelectBranch(name) {
        if (!name) return;
        if (selectedBranchName === name && selectedPath === null && selectedSha === null) return;
        selectedBranchName = name;
        selectedPath = null;
        selectedSha = null;
        renderInspectorDetails();
        renderInspectorHelp();
    }

    // --- Branches (item [10]) ---
    const STALE_MS = 30 * 86400 * 1000;

    function renderBranches(branches) {
        lastBranches = branches;
        const list = $('branches-list');
        list.innerHTML = '';

        $('branches-count').textContent = String(branches.length);

        if (branches.length === 0) {
            $('branches-empty').style.display = 'block';
            list.style.display = 'none';
            return;
        }
        $('branches-empty').style.display = 'none';
        list.style.display = 'block';

        // Sort: current first, then by last-commit time DESC, with no-time
        // entries at the end. Stable for branches sharing timestamps.
        const now = Date.now();
        const sorted = [...branches].sort((a, b) => {
            if (a.isCurrent !== b.isCurrent) return a.isCurrent ? -1 : 1;
            const at = a.when ? Date.parse(a.when) : 0;
            const bt = b.when ? Date.parse(b.when) : 0;
            return (bt || 0) - (at || 0);
        });

        for (const b of sorted) {
            const row = document.createElement('div');
            row.className = 'branch-row';
            if (b.isCurrent) row.classList.add('current');
            const branchTime = b.when ? Date.parse(b.when) : NaN;
            if (!isNaN(branchTime) && (now - branchTime) > STALE_MS && !b.isCurrent) {
                row.classList.add('stale');
            }

            const marker = document.createElement('span');
            marker.className = 'branch-marker';
            marker.textContent = b.isCurrent ? '●' : '○';

            const name = document.createElement('span');
            name.className = 'branch-name';
            name.textContent = b.name || '';
            name.title = b.name || '';

            row.appendChild(marker);
            row.appendChild(name);

            if (b.isRemote) {
                const tag = document.createElement('span');
                tag.className = 'branch-tag';
                tag.textContent = 'remote';
                row.appendChild(tag);
            }

            const time = document.createElement('span');
            time.className = 'branch-time';
            time.textContent = formatRelativeTime(b.when);
            row.appendChild(time);

            list.appendChild(row);
        }
    }

    function formatRelativeTime(isoString) {
        if (!isoString) return '';
        const t = Date.parse(isoString);
        if (isNaN(t)) return '';
        const deltaSec = Math.max(0, Math.floor((Date.now() - t) / 1000));
        if (deltaSec < 60) return 'just now';
        if (deltaSec < 3600) return Math.floor(deltaSec / 60) + ' min ago';
        if (deltaSec < 86400) return Math.floor(deltaSec / 3600) + ' hr ago';
        if (deltaSec < 30 * 86400) return Math.floor(deltaSec / 86400) + ' d ago';
        if (deltaSec < 365 * 86400) return Math.floor(deltaSec / (30 * 86400)) + ' mo ago';
        return Math.floor(deltaSec / (365 * 86400)) + ' yr ago';
    }

    // --- Diff pane (legacy inline pane — DOM dropped with the tree-pane refactor).
    // Entry points guard against missing DOM so C# can keep emitting diff_loaded
    // harmlessly. Slated for removal in a follow-up cleanup ticket.
    function renderDiff(path, lines, selectionKey) {
        if (!$('diff-pane-empty')) return;
        const expecting = selectedSha
            ? (selectionKey === selectedSha)
            : (selectionKey === selectedPath);
        if (!expecting) return;

        lastDiffPath = path;
        lastDiffLines = lines;

        $('diff-pane-empty').style.display = 'none';
        $('diff-pane-header').style.display = 'flex';
        $('diff-lines').style.display = 'block';
        $('diff-pane-path').textContent = path;
        $('diff-pane-path').title = path;

        renderDiffLines();
    }

    function renderDiffLines() {
        const container = $('diff-lines');
        if (!container) return;
        container.innerHTML = '';

        if (!lastDiffLines || lastDiffLines.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'diff-line ctx';
            empty.textContent = '(no changes found)';
            container.appendChild(empty);
            return;
        }

        if (diffMode === 'unified') {
            renderUnified(container, lastDiffLines);
        } else {
            renderSideBySide(container, lastDiffLines);
        }
    }

    function renderUnified(container, lines) {
        for (const line of lines) {
            const div = document.createElement('div');
            div.className = 'diff-line ' + cssKind(line.kind);
            div.textContent = line.text;
            container.appendChild(div);
        }
    }

    function renderSideBySide(container, lines) {
        // Pairing algorithm: walk lines; group consecutive Del runs and Add runs;
        // emit row by row pairing lefts with rights (pad with empty cells); flush
        // pairs on context / hunk-header / meta lines (which span both columns).
        let leftBuf = [];
        let rightBuf = [];

        function flushPairs() {
            const n = Math.max(leftBuf.length, rightBuf.length);
            for (let i = 0; i < n; i++) {
                const row = document.createElement('div');
                row.className = 'diff-side-row';
                const lc = document.createElement('div');
                if (i < leftBuf.length) {
                    lc.className = 'diff-side-cell del';
                    lc.textContent = leftBuf[i];
                } else {
                    lc.className = 'diff-side-cell empty';
                    lc.textContent = '';
                }
                const rc = document.createElement('div');
                if (i < rightBuf.length) {
                    rc.className = 'diff-side-cell add';
                    rc.textContent = rightBuf[i];
                } else {
                    rc.className = 'diff-side-cell empty';
                    rc.textContent = '';
                }
                row.appendChild(lc);
                row.appendChild(rc);
                container.appendChild(row);
            }
            leftBuf = [];
            rightBuf = [];
        }

        function emitFullRow(text, cls) {
            flushPairs();
            const row = document.createElement('div');
            row.className = 'diff-side-row full';
            const cell = document.createElement('div');
            cell.className = 'diff-side-cell ' + cls;
            cell.textContent = text;
            row.appendChild(cell);
            container.appendChild(row);
        }

        for (const line of lines) {
            const k = line.kind;
            if (k === 'Add') {
                rightBuf.push(line.text);
            } else if (k === 'Del') {
                leftBuf.push(line.text);
            } else if (k === 'Hunk') {
                emitFullRow(line.text, 'hunk');
            } else if (k === 'Meta') {
                emitFullRow(line.text, 'meta');
            } else {
                // Ctx: flush, then emit context spanning both columns.
                flushPairs();
                const row = document.createElement('div');
                row.className = 'diff-side-row';
                const lc = document.createElement('div');
                lc.className = 'diff-side-cell ctx';
                lc.textContent = line.text;
                const rc = document.createElement('div');
                rc.className = 'diff-side-cell ctx';
                rc.textContent = line.text;
                row.appendChild(lc);
                row.appendChild(rc);
                container.appendChild(row);
            }
        }
        flushPairs();
    }

    function cssKind(kind) {
        switch (kind) {
            case 'Add':  return 'add';
            case 'Del':  return 'del';
            case 'Hunk': return 'hunk';
            case 'Meta': return 'meta';
            default:     return 'ctx';
        }
    }

    function setMode(mode) {
        if (diffMode === mode) return;
        diffMode = mode;
        const sbs = $('toggle-side-by-side');
        const uni = $('toggle-unified');
        if (sbs) sbs.classList.toggle('active', mode === 'side-by-side');
        if (uni) uni.classList.toggle('active', mode === 'unified');
        renderDiffLines();
    }

    // --- Inbound messages ---
    window.chrome.webview.addEventListener('message', e => {
        const m = e.data || {};
        switch (m.type) {
            case 'theme':
                applyTheme(m.isDark !== false);
                break;
            case 'git_state':
                // Legacy selected-only payload — kept while item 1 (Frank)
                // lands the unified `git_state_tree` message. Once that goes
                // green, this case + showStandard / renderWorkingTree /
                // renderRecentCommits / renderBranches / renderWorktreeTree
                // become dead code and are removed in item 5 cleanup.
                showStandard(m);
                break;
            case 'git_state_tree':
                renderUnifiedTree(m);
                // Pipeline Run 2 finding (debugger MEDIUM + adversary HIGH):
                // ONLY clear pendingOutcomeSave when this state pass actually
                // contains the value we tried to save. An unrelated refresh
                // (OnRepoStateChanged from a sibling file change, another
                // panel's BranchOutcomeUpdated, manual refresh) would otherwise
                // cancel the timeout and let a silent save failure look like a
                // success. Compare the trimmed textarea value against the
                // outcome shipped on the saved branch in the new payload.
                if (pendingOutcomeSave && pendingOutcomeSave.branchName) {
                    try {
                        const b = (typeof findBranchByName === 'function')
                            ? findBranchByName(pendingOutcomeSave.branchName)
                            : null;
                        const expected = (pendingOutcomeSave.ta && pendingOutcomeSave.ta.value || '').trim();
                        const actual = (b && typeof b.outcome === 'string') ? String(b.outcome).trim() : '';
                        // Empty save = clear (server stores NULL → payload outcome === null).
                        // Match on null-or-empty AND non-empty equality.
                        const matched = (expected.length === 0 && (b == null || !b.outcome))
                            || (expected.length > 0 && expected === actual);
                        if (matched) {
                            if (pendingOutcomeSave.timeoutId != null) clearTimeout(pendingOutcomeSave.timeoutId);
                            pendingOutcomeSave = null;
                            // The Details rebuild is gated above on editorOpen — manually
                            // re-render now that the save landed and the editor should go.
                            if (typeof renderInspectorDetails === 'function') renderInspectorDetails();
                        }
                        // If not matched: leave pendingOutcomeSave intact. The 6s timeout
                        // (or an explicit set_branch_outcome_failed echo) will recover.
                    } catch (e) { /* non-fatal — let timeout handle it */ }
                }
                break;
            case 'quick_task_created':
                // Phase 2b echo from HudGitRenderer.HandleCreateQuickTask.
                // Find the file row whose form is awaiting this echo (matched
                // by filePath) and either collapse it on success or show an
                // inline error message. On success, the upcoming
                // git_state_tree push will re-render the tree without this
                // file in the Needs-a-quick-task group.
                try {
                    const matchPath = String(m.filePath || '');
                    if (!matchPath) break;
                    const rows = document.querySelectorAll('[data-path]');
                    for (const r of rows) {
                        if (r.dataset.path !== matchPath) continue;
                        if (!r._qtPending) continue;
                        const p = r._qtPending;
                        if (m.success) {
                            p.collapse();
                            r._qtPending = null;
                        } else {
                            p.showError(m.error || 'failed');
                            p.input.focus();
                            p.input.select();
                        }
                    }
                } catch (e) { /* non-fatal — next refresh will reconcile */ }
                break;
            case 'quick_task_bulk_created':
                // Phase 2c echo from HudGitRenderer.HandleCreateQuickTaskBulk.
                // Looked up by requestId so multiple worktree-folder groups
                // can have concurrent bulk forms. On success the upcoming
                // git_state_tree push empties the group; on failure the form
                // stays open with the error inline.
                try {
                    const reqId = String(m.requestId || '');
                    if (!reqId) break;
                    const p = _bulkQtPendingByReqId.get(reqId);
                    if (!p) break;
                    if (m.success) {
                        p.collapse();
                        _bulkQtPendingByReqId.delete(reqId);
                    } else {
                        p.showError(m.error || 'failed');
                        p.input.focus();
                        p.input.select();
                    }
                } catch (e) { /* non-fatal — next refresh will reconcile */ }
                break;
            case 'set_branch_outcome_failed':
                // C# echo when SetOutcome was dropped (project unregistered,
                // service unavailable, missing branchName, or exception). Echo
                // matches the originating branchName so we don't restore the
                // wrong editor if the user has since switched selection.
                if (pendingOutcomeSave
                    && pendingOutcomeSave.branchName === (m.branchName || '')
                    && typeof pendingOutcomeSave.restoreEditableWithError === 'function') {
                    pendingOutcomeSave.restoreEditableWithError(

            case 'diff_loaded':
                renderDiff(m.path, m.lines || [], m.selectionKey);
                break;
            case 'empty_linked':
                showEmpty('Linked git directory',
                    "This project's .git is a submodule or worktree gitlink. The Git tab can only inspect standard repositories. Open the parent repository to view git state.");
                break;
            case 'empty_no_repo':
                showEmpty('No git repository',
                    'This project has no git repository. Initialize one with `git init` to use the Git tab.');
                break;
            case 'empty_no_project':
                showEmpty('No project', 'Select a project to view its git state.');
                break;
            case 'worktrees':
                renderWorktreeTree(m.currentPath || '', m.entries || []);
                break;
        }
    });

    // --- Worktree tree pane ---
    // Renders parent (IsMain=true) as root with worktrees indented beneath.
    // Hidden — along with the splitter — when entries.length ≤ 1, so a plain
    // checkout with no worktrees gets no extra chrome and the content pane
    // takes full width. Current entry highlighted via case-insensitive Path
    // equality vs currentPath. Click on a non-current entry posts
    // {type:'switch_repo', path} — the C# side re-resolves the GitRepoService
    // and re-emits initial state pointing at the new path.
    //
    // Wire schema (unchanged from the prior switcher):
    //   currentPath: string (camelCase outer field)
    //   entries: [{ Path, Branch, IsMain, DirtyCount, LinkedTaskId, LinkedTaskTitle }]
    //   DirtyCount === -1 → render as '?' (uncomputed)
    //   Branch may be '(detached)' / '(bare)' / '(unknown)' — rendered as-is.
    function renderWorktreeTree(currentPath, entries) {
        const tree = $('worktree-tree');
        const splitter = $('splitter');
        if (!tree) return;
        tree.innerHTML = '';

        if (!Array.isArray(entries) || entries.length <= 1) {
            tree.classList.remove('shown');
            if (splitter) splitter.classList.remove('shown');
            return;
        }

        const header = document.createElement('div');
        header.className = 'tree-header';
        header.textContent = 'Worktree';
        tree.appendChild(header);

        // Parent first (IsMain=true), then worktrees in source order.
        const parent = entries.find(e => e && e.IsMain);
        const children = entries.filter(e => e && !e.IsMain);
        const ordered = parent ? [parent, ...children] : entries;

        const cur = (currentPath || '').toLowerCase();
        for (const e of ordered) {
            const path = e && e.Path ? String(e.Path) : '';
            if (!path) continue;

            const btn = document.createElement('button');
            btn.className = 'tree-node';
            if (!e.IsMain) btn.classList.add('child');
            btn.type = 'button';

            const isCurrent = path.toLowerCase() === cur;
            if (isCurrent) {
                btn.classList.add('current');
                btn.setAttribute('aria-current', 'true');
                btn.disabled = true;
            }

            const branch = (e.Branch && String(e.Branch)) || '(unknown)';
            let dirtyText = '?';
            if (typeof e.DirtyCount === 'number' && e.DirtyCount >= 0) {
                dirtyText = String(e.DirtyCount);
            }
            const taskTitle = (e.LinkedTaskTitle && String(e.LinkedTaskTitle)) || '';
            btn.title = path + (taskTitle ? '\n' + taskTitle : '');

            const dot = document.createElement('span');
            dot.className = 'tree-node-dot';
            btn.appendChild(dot);

            const branchSpan = document.createElement('span');
            branchSpan.className = 'tree-node-branch';
            branchSpan.textContent = branch;
            btn.appendChild(branchSpan);

            const dirtySpan = document.createElement('span');
            dirtySpan.className = 'tree-node-dirty';
            dirtySpan.textContent = '· ' + dirtyText;
            btn.appendChild(dirtySpan);

            if (taskTitle) {
                const taskSpan = document.createElement('span');
                taskSpan.className = 'tree-node-task';
                taskSpan.textContent = '· ' + taskTitle;
                btn.appendChild(taskSpan);
            }

            if (e.IsMain) {
                const badge = document.createElement('span');
                badge.className = 'tree-node-badge';
                badge.textContent = '(parent)';
                btn.appendChild(badge);
            }

            if (!isCurrent) {
                btn.addEventListener('click', () => {
                    send({ type: 'switch_repo', path: path });
                });
            }
            tree.appendChild(btn);
        }

        tree.classList.add('shown');
        if (splitter) splitter.classList.add('shown');
    }

    $('refresh-button').addEventListener('click', () => send({ type: 'refresh' }));

    // Replaces the prior stacked-section layout so users can swap sections
    // without scrolling past the previous one. Default tab is Working Changes

    function setActiveGitTab(tabId) {
        document.querySelectorAll('.git-tab').forEach(t => {
            const isActive = t.dataset.tab === tabId;
            t.classList.toggle('active', isActive);
            t.setAttribute('aria-selected', isActive ? 'true' : 'false');

    }
    document.querySelectorAll('.git-tab').forEach(tab => {
        tab.addEventListener('click', () => setActiveGitTab(tab.dataset.tab));

    document.querySelectorAll('.git-tab').forEach(t => {

    // --- Splitter drag (tree pane ↔ content) ---
    // Persists tree-pane width to localStorage so the user's pane balance
    // survives across sessions. Clamps: tree pane 180–400px (matches CSS
    // min-width and keeps the tree slim enough not to crowd the content);
    // content pane min 320px so the three tab labels never truncate.
    (function initSplitter() {
        const splitter = $('splitter');
        const treePane = document.querySelector('.tree-pane');
        const bodySplit = document.querySelector('.body-split');
        if (!splitter || !treePane || !bodySplit) return;

        const MIN_TREE = 180;
        const MAX_TREE = 400;
        const MIN_CONTENT = 320;

        // Restore saved width on load. Clamp into [MIN_TREE, MAX_TREE] so a
        // pre-existing saved value from the old layout (which could be 280+)
        // doesn't blow the tree pane up.
        try {
            const saved = parseInt(localStorage.getItem(SPLITTER_KEY) || '', 10);
            if (!isNaN(saved)) {
                const w = Math.min(Math.max(saved, MIN_TREE), MAX_TREE);
                treePane.style.width = w + 'px';
            }
        } catch (e) { /* localStorage may be unavailable */ }

        let dragging = false;
        splitter.addEventListener('mousedown', e => {
            dragging = true;
            splitter.classList.add('dragging');
            document.body.classList.add('dragging-splitter');
            e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            const rect = bodySplit.getBoundingClientRect();
            // Width = mouse X relative to the split container's left edge
            // (the tree pane is the first child).
            let w = e.clientX - rect.left;
            const splitterWidth = 4;
            const maxByContent = rect.width - MIN_CONTENT - splitterWidth;
            const upper = Math.min(MAX_TREE, maxByContent);
            if (w < MIN_TREE) w = MIN_TREE;
            if (w > upper) w = upper;
            treePane.style.width = w + 'px';
        });
        document.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            splitter.classList.remove('dragging');
            document.body.classList.remove('dragging-splitter');
            // Persist the resolved px width.
            try {
                const px = treePane.getBoundingClientRect().width;
                localStorage.setItem(SPLITTER_KEY, String(Math.round(px)));
            } catch (e) { /* localStorage may be unavailable */ }
        });
    })();

    // --- File-row context menu (smoke-1 polish [15] fix #7) ---
    function showFileContextMenu(x, y, path) {
        contextMenuPath = path;
        const menu = $('file-context-menu');
        // Position first with display: block so we can measure, then
        // clamp to the viewport so the menu doesn't render off-screen
        // when the click is near the right/bottom edges.
        menu.style.display = 'block';

        menu.style.top = '0px';
        const rect = menu.getBoundingClientRect();
        const maxX = window.innerWidth - rect.width - 4;
        const maxY = window.innerHeight - rect.height - 4;
        menu.style.left = Math.min(x, Math.max(0, maxX)) + 'px';
        menu.style.top = Math.min(y, Math.max(0, maxY)) + 'px';

    function hideFileContextMenu() {
