    // --- Inspector splitter + collapse persistence (item 4 of task 6a56f56c).
    // Drag-to-resize, click-to-collapse, click-handle-to-restore. Height +
    // collapsed state persist in localStorage (NOT scoped by project — the
    // inspector is a viewport-level preference, not per-project state).
    // Constraints: MIN_HEIGHT matches CSS min-height (80px); MAX_HEIGHT is
    // 60% of #body's current pixel height (matches CSS max-height: 60%) so
    // the tree always retains at least 40% of the viewport.
    const INSPECTOR_HEIGHT_KEY = 'hudGit.inspector.heightPx';
    const INSPECTOR_COLLAPSED_KEY = 'hudGit.inspector.collapsed';
    const INSPECTOR_DEFAULT_HEIGHT = 220;
    const INSPECTOR_MIN_HEIGHT = 80;

    function readInspectorHeight() {
        try {
            const v = localStorage.getItem(INSPECTOR_HEIGHT_KEY);
            if (v == null) return INSPECTOR_DEFAULT_HEIGHT;
            const n = parseInt(v, 10);
            return Number.isFinite(n) && n >= INSPECTOR_MIN_HEIGHT ? n : INSPECTOR_DEFAULT_HEIGHT;
        } catch (e) { return INSPECTOR_DEFAULT_HEIGHT; }
    }
    function writeInspectorHeight(px) {
        try { localStorage.setItem(INSPECTOR_HEIGHT_KEY, String(Math.round(px))); } catch (e) { /* non-fatal */ }
    }
    function readInspectorCollapsed() {
        try { return localStorage.getItem(INSPECTOR_COLLAPSED_KEY) === 'true'; } catch (e) { return false; }
    }
    function writeInspectorCollapsed(collapsed) {
        try { localStorage.setItem(INSPECTOR_COLLAPSED_KEY, collapsed ? 'true' : 'false'); } catch (e) { /* non-fatal */ }
    }

    function applyInspectorCollapsedState(collapsed) {
        const inspector = $('inspector');
        const splitter = $('inspector-splitter');
        const handle = $('inspector-handle');
        const btn = $('inspector-collapse-btn');
        if (!inspector || !splitter || !handle) return;
        if (collapsed) {
            inspector.classList.add('collapsed');
            splitter.style.display = 'none';
            handle.classList.add('shown');
            if (btn) { btn.textContent = '▾'; btn.title = 'Hide details panel'; }
        } else {
            inspector.classList.remove('collapsed');
            splitter.style.display = '';
            handle.classList.remove('shown');
            if (btn) { btn.textContent = '▾'; btn.title = 'Hide details panel'; }
        }
    }

    function initInspectorSplitter() {
        const inspector = $('inspector');
        const splitter = $('inspector-splitter');
        const collapseBtn = $('inspector-collapse-btn');
        const handle = $('inspector-handle');
        if (!inspector || !splitter || !collapseBtn || !handle) return;

        // Restore persisted height first (always set inline so subsequent
        // collapse/restore round-trips have a value to fall back to), then
        // apply collapsed state — collapse hides #inspector via CSS, but the
        // height is preserved in the inline style for the next un-collapse.
        inspector.style.height = readInspectorHeight() + 'px';
        // Override CSS flex-basis so the inline height wins.
        inspector.style.flexBasis = inspector.style.height;
        applyInspectorCollapsedState(readInspectorCollapsed());

        // Drag-to-resize. We compute the new height as (body bottom - mouse Y)
        // because the inspector is anchored to the bottom of #body. Clamped
        // to [MIN_HEIGHT, 60% of body height] to mirror the CSS max-height.
        let dragging = false;
        splitter.addEventListener('mousedown', e => {
            // Don't start a drag if the inspector is collapsed (splitter is
            // hidden anyway, but defensive).
            if (inspector.classList.contains('collapsed')) return;
            dragging = true;
            splitter.classList.add('dragging');
            document.body.style.cursor = 'ns-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            const body = $('body');
            if (!body) return;
            const rect = body.getBoundingClientRect();
            const maxByContent = Math.floor(rect.height * 0.6);
            let newHeight = Math.round(rect.bottom - e.clientY);
            if (newHeight < INSPECTOR_MIN_HEIGHT) newHeight = INSPECTOR_MIN_HEIGHT;
            if (newHeight > maxByContent) newHeight = maxByContent;
            inspector.style.height = newHeight + 'px';
            inspector.style.flexBasis = newHeight + 'px';
        });
        document.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            splitter.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            // Persist on release (not on every mousemove — too chatty).
            const px = parseInt(inspector.style.height, 10);
            if (Number.isFinite(px)) writeInspectorHeight(px);
        });

        // Collapse / restore.
        collapseBtn.addEventListener('click', () => {
            applyInspectorCollapsedState(true);
            writeInspectorCollapsed(true);
        });
        handle.addEventListener('click', () => {
            applyInspectorCollapsedState(false);
            writeInspectorCollapsed(false);
        });
    }
    initInspectorSplitter();

    // --- Inspector Details tab content (item 5 of task 6a56f56c).
    // Dispatches on selection state (selectedBranchName | selectedPath | selectedSha)
    // and re-resolves the underlying object from lastTreeState so renders stay
    // consistent with whatever the most recent git_state_tree carried. The
    // outcome edit pencil (item 8) and Help-tab content (item 6) are wired
    // by their respective items.
    function findBranchByName(name) {
        if (!name || !lastTreeState || !Array.isArray(lastTreeState.branches)) return null;
        for (const b of lastTreeState.branches) {
            if (b && b.name === name) return b;
        }
        return null;
    }
    function findFolderForBranch(branch) {
        if (!branch || !branch.worktreePath || !lastTreeState || !Array.isArray(lastTreeState.folders)) return null;
        const lower = String(branch.worktreePath).toLowerCase();
        for (const f of lastTreeState.folders) {
            if (f && f.path && String(f.path).toLowerCase() === lower) return f;
        }
        return null;
    }
    function findFileInFolders(path) {
        if (!path || !lastTreeState || !Array.isArray(lastTreeState.folders)) return null;
        for (const f of lastTreeState.folders) {
            if (!f || !f.workingChanges) continue;
            const flat = Array.isArray(f.workingChanges.workingTree) ? f.workingChanges.workingTree : [];
            for (const file of flat) {
                if (file && file.path === path) return { file: file, folder: f };
            }
        }
        return null;
    }
    function findCommitBySha(sha) {
        if (!sha || !lastTreeState || !Array.isArray(lastTreeState.folders)) return null;
        for (const f of lastTreeState.folders) {
            if (!f || !Array.isArray(f.recentCommits)) continue;
            for (const c of f.recentCommits) {
                if (c && (c.fullSha === sha || c.shortSha === sha)) return { commit: c, folder: f };
            }
        }
        return null;
    }
    function kindLabel(k) {
        switch (String(k || '').toUpperCase()) {
            case 'M': return 'Modified';
            case 'A': return 'Added';
            case 'D': return 'Deleted';
            case 'R': return 'Renamed';
            case 'T': return 'Type changed';
            case 'C': return 'Copied';
            case 'U': return 'Untracked';
            default: return k || 'Unknown';
        }
    }
    function joinPath(folderPath, relPath) {
        if (!folderPath) return relPath || '';
        if (!relPath) return folderPath;
        const sep = folderPath.indexOf('\\') >= 0 ? '\\' : '/';
        const stripped = String(folderPath).replace(/[\\/]+$/, '');
        const rel = String(relPath).replace(/^[\\/]+/, '').replace(/[\\/]/g, sep);
        return stripped + sep + rel;
    }
    function detailHeading(text, kind) {
        const h = document.createElement('div');
        h.className = 'detail-heading' + (kind ? ' detail-' + kind : '');
        h.textContent = text;
        return h;
    }
    function detailSubheading(text) {
        const s = document.createElement('div');
        s.className = 'detail-subheading';
        s.textContent = text;
        return s;
    }
    function detailField(label, value, classes) {
        const row = document.createElement('div');
        row.className = 'detail-field';
        const l = document.createElement('span');
        l.className = 'detail-label';
        l.textContent = label;
        row.appendChild(l);
        const v = document.createElement('span');
        v.className = 'detail-value' + (classes ? ' ' + classes : '');
        v.textContent = value == null ? '' : String(value);
        row.appendChild(v);
        return row;
    }
    function detailEmpty(text) {
        const e = document.createElement('div');
        e.className = 'inspector-empty';
        e.textContent = text;
        return e;
    }

    function renderInspectorDetails() {
        const pane = document.querySelector('.inspector-tab-pane[data-tab="details"]');
        if (!pane) return;
        pane.innerHTML = '';
        if (selectedBranchName) {
            renderInspectorBranchDetails(pane, findBranchByName(selectedBranchName));
        } else if (selectedPath) {
            renderInspectorFileDetails(pane, findFileInFolders(selectedPath));
        } else if (selectedSha) {
            renderInspectorCommitDetails(pane, findCommitBySha(selectedSha));
        } else {
            pane.appendChild(detailEmpty('Click a branch, file, or commit in the tree to see details here.'));
        }
    }

    // --- Outcome row + inline edit (item 8 of task 6a56f56c).
    function buildOutcomeRow(b) {
        const row = document.createElement('div');
        row.className = 'detail-field';
        const label = document.createElement('span');
        label.className = 'detail-label';
        label.textContent = 'Outcome';
        row.appendChild(label);

        const valueWrap = document.createElement('span');
        valueWrap.className = 'detail-value';
        valueWrap.style.display = 'flex';
        valueWrap.style.alignItems = 'flex-start';
        valueWrap.style.gap = '4px';

        const hasOutcome = !!(b.outcome && String(b.outcome).trim());
        const text = document.createElement('span');
        text.style.flex = '1';
        text.style.minWidth = '0';
        text.style.wordBreak = 'break-word';
        if (hasOutcome) {
            text.textContent = String(b.outcome);
        } else {
            text.textContent = '(no outcome set — ask any agent to draft one or click ✎ to type your own)';
            text.style.color = 'var(--fg-muted)';
            text.style.fontStyle = 'italic';
        }
        valueWrap.appendChild(text);

        const pencil = document.createElement('button');
        pencil.className = 'detail-edit-btn';
        pencil.title = 'Edit outcome';
        pencil.setAttribute('aria-label', 'Edit outcome');
        pencil.textContent = '✎';
        pencil.addEventListener('click', () => {
            swapToOutcomeEditor(row, b.name || '', hasOutcome ? String(b.outcome) : '');
        });
        valueWrap.appendChild(pencil);

        row.appendChild(valueWrap);
        return row;
    }

    function swapToOutcomeEditor(row, branchName, currentValue) {
        // Replace the row's value column with a textarea + Save/Cancel.
        // Keep the label intact; replace only the second child.
        if (!row || row.childNodes.length < 2) return;
        const label = row.firstChild;
        row.innerHTML = '';
        row.appendChild(label);

        const wrap = document.createElement('div');
        wrap.className = 'detail-outcome-edit';

        // Inline error box (hidden by default) for save failures —
        // "Save timed out" / "project not registered" / etc. Stays visible
        // until the user edits the textarea or clicks Cancel.
        const errorBox = document.createElement('div');
        errorBox.style.display = 'none';
        errorBox.style.color = 'var(--red, #f38ba8)';
        errorBox.style.fontSize = '10.5px';
        errorBox.style.padding = '4px 0';
        wrap.appendChild(errorBox);

        const ta = document.createElement('textarea');
        ta.className = 'detail-outcome-input';
        ta.value = currentValue || '';
        ta.placeholder = 'A one-sentence user-facing capability this branch delivers (e.g. "Allow easy access to a Code Review editor for code changes")';
        wrap.appendChild(ta);

        const actions = document.createElement('div');
        actions.className = 'detail-edit-actions';
        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = 'Cancel';
        cancelBtn.title = 'Discard changes (Esc)';
        const saveBtn = document.createElement('button');
        saveBtn.className = 'primary';
        saveBtn.textContent = 'Save';
        saveBtn.title = 'Save outcome (Ctrl+Enter)';
        actions.appendChild(cancelBtn);
        actions.appendChild(saveBtn);
        wrap.appendChild(actions);

        row.appendChild(wrap);

        // Auto-focus + place cursor at end so the user can start typing immediately.
        try {
            ta.focus();
            ta.setSelectionRange(ta.value.length, ta.value.length);
        } catch (e) { /* non-fatal */ }

        // Hide error box on the first edit so stale messages don't linger.
        ta.addEventListener('input', () => { errorBox.style.display = 'none'; });

        function clearPending() {
            if (pendingOutcomeSave && pendingOutcomeSave.timeoutId != null) {
                clearTimeout(pendingOutcomeSave.timeoutId);
            }
            pendingOutcomeSave = null;
        }
        function restoreEditableWithError(message) {
            clearPending();
            saveBtn.disabled = false;
            cancelBtn.disabled = false;
            saveBtn.textContent = 'Save';
            errorBox.textContent = message || 'Save failed.';
            errorBox.style.display = 'block';
        }
        function commitSave() {
            const newVal = ta.value;
            // Clear any prior pending save before starting a new one.
            clearPending();
            // Empty / whitespace clears the outcome (server stores NULL).
            send({ type: 'set_branch_outcome', branchName: branchName, outcome: newVal });
            // Disable buttons during the round-trip. On success, BranchOutcomeUpdated
            // → RefreshAsync → git_state_tree → renderInspectorDetails rebuilds the
            // row entirely (and clears pendingOutcomeSave). On failure, C# echoes
            // set_branch_outcome_failed and we re-enable here. As a defence against
            // any silent failure path that misses both, a timeout fires after 6s.
            saveBtn.disabled = true;
            cancelBtn.disabled = true;
            saveBtn.textContent = 'Saving…';
            errorBox.style.display = 'none';
            const timeoutId = setTimeout(() => {
                restoreEditableWithError('Save timed out — try again, or check the project is registered.');
            }, 6000);
            pendingOutcomeSave = {
                branchName: branchName,
                saveBtn: saveBtn,
                cancelBtn: cancelBtn,
                ta: ta,
                errorBox: errorBox,
                timeoutId: timeoutId,
                restoreEditableWithError: restoreEditableWithError,
            };
        }
        function discardEdit() {
            clearPending();
            // Re-render Details from current state — no save.
            renderInspectorDetails();
        }
        saveBtn.addEventListener('click', commitSave);
        cancelBtn.addEventListener('click', discardEdit);
        ta.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                e.preventDefault();
                discardEdit();
            } else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                commitSave();
            }
        });
    }

    function renderInspectorBranchDetails(pane, b) {
        if (!b) {
            pane.appendChild(detailEmpty('Branch not found in current state.'));
            return;
        }
        pane.appendChild(detailHeading(b.name || '', 'branch'));

        // Outcome — read-only display + inline edit affordance (item 8 of
        // task 6a56f56c). Click the pencil to swap to a textarea + Save/
        // Cancel; Save posts set_branch_outcome to C# which writes via
        // BranchMetadataService and fires BranchOutcomeUpdated → tree
        // refreshes → outcome reappears in row + Details on next state pass.
        pane.appendChild(buildOutcomeRow(b));

        const status = b.checkedOut
            ? 'Checked out (open in working folder)'
            : 'Orphan (no working folder)';
        pane.appendChild(detailField('Status', status));

        if (b.worktreePath) {
            pane.appendChild(detailField('Worktree', b.worktreePath, 'mono'));
        }
        if (b.tipSha) {
            const tipText = String(b.tipSha) + (b.tipSubject ? ' · ' + String(b.tipSubject) : '');
            pane.appendChild(detailField('Tip', tipText));
        }
        if (b.when) {
            pane.appendChild(detailField('Last commit', formatRelativeTime(b.when)));
        }

        const tasks = Array.isArray(b.linkedTasks) ? b.linkedTasks : [];
        pane.appendChild(detailSubheading('Linked tasks (' + tasks.length + ')'));
        if (tasks.length === 0) {
            pane.appendChild(detailEmpty('No tasks recorded for this branch.'));
        } else {
            const list = document.createElement('div');
            list.className = 'detail-tasklist';
            for (const t of tasks) {
                const row = document.createElement('div');
                row.className = 'detail-task';
                const id = document.createElement('span');
                id.className = 'detail-task-id';
                const tid = String(t.id || '');
                id.textContent = tid.length >= 8 ? tid.substring(0, 8) : tid;
                const title = document.createElement('span');
                title.className = 'detail-task-title';
                title.textContent = String(t.title || '');
                row.appendChild(id);
                row.appendChild(title);
                list.appendChild(row);
            }
            pane.appendChild(list);
        }
    }

    function renderInspectorFileDetails(pane, ctx) {
        if (!ctx) {
            pane.appendChild(detailEmpty('File not found in current state.'));
            return;
        }
        const file = ctx.file;
        const folder = ctx.folder;
        pane.appendChild(detailHeading(String(file.path || ''), 'file'));
        pane.appendChild(detailField('Change type', kindLabel(file.kind || 'M')));
        if (folder && folder.path) {
            pane.appendChild(detailField('Worktree', String(folder.path), 'mono'));
            const fullPath = joinPath(folder.path, file.path);
            if (fullPath) pane.appendChild(detailField('Full path', fullPath, 'mono'));
        }
        if (typeof file.linesAdded === 'number' || typeof file.linesDeleted === 'number') {
            const added = typeof file.linesAdded === 'number' ? file.linesAdded : 0;
            const deleted = typeof file.linesDeleted === 'number' ? file.linesDeleted : 0;
            pane.appendChild(detailField('Lines', '+' + added + ' / -' + deleted));
        }
        if (file.taskTitle) {
            const taskRow = document.createElement('div');
            taskRow.className = 'detail-field';
            const label = document.createElement('span');
            label.className = 'detail-label';
            label.textContent = 'Linked task';
            taskRow.appendChild(label);
            const value = document.createElement('span');
            value.className = 'detail-value';
            const tidShort = file.taskId ? String(file.taskId).substring(0, 8) : '';
            value.textContent = String(file.taskTitle) + (tidShort ? ' (' + tidShort + ')' : '');
            taskRow.appendChild(value);
            pane.appendChild(taskRow);
        }
        if (file.agent) pane.appendChild(detailField('Agent', String(file.agent)));
        if (file.linkageState && file.linkageState !== 'none') {
            pane.appendChild(detailField('Linkage', String(file.linkageState)));
        }
        if (file.pipelineStatus) {
            pane.appendChild(detailField('Pipeline', String(file.pipelineStatus)));
        }
    }

    function renderInspectorCommitDetails(pane, ctx) {
        if (!ctx) {
            pane.appendChild(detailEmpty('Commit not found in current state.'));
            return;
        }
        const commit = ctx.commit;
        const folder = ctx.folder;
        pane.appendChild(detailHeading(String(commit.shortSha || ''), 'commit'));
        if (commit.subject) pane.appendChild(detailField('Subject', String(commit.subject)));
        if (commit.fullSha) pane.appendChild(detailField('Full SHA', String(commit.fullSha), 'mono'));
        if (commit.authorName) pane.appendChild(detailField('Author', String(commit.authorName)));
        if (Array.isArray(commit.coAuthors) && commit.coAuthors.length > 0) {
            pane.appendChild(detailField('Co-authors', commit.coAuthors.join(', ')));
        }
        if (commit.when) {
            pane.appendChild(detailField('When', formatRelativeTime(commit.when)));
        }
        if (folder && folder.path) {
            pane.appendChild(detailField('On worktree', String(folder.path), 'mono'));
        }
    }

    // --- Inspector Help tab content (item 6 of task 6a56f56c).
    // Context-sensitive plain-English explanations. Different copy per node
    // type — written to teach a git-naive user what they're looking at and
    // what they can do with it, not to recapitulate field labels.
    function helpPara(htmlSafeText) {
        const p = document.createElement('p');
        p.className = 'help-text';
        p.innerHTML = htmlSafeText;
        return p;
    }
    function helpTip(htmlSafeText) {
        const t = document.createElement('div');
        t.className = 'help-tip';
        t.innerHTML = htmlSafeText;
        return t;
    }

    function renderInspectorHelp() {
        const pane = document.querySelector('.inspector-tab-pane[data-tab="help"]');
        if (!pane) return;
        pane.innerHTML = '';
        if (selectedBranchName) {
            const b = findBranchByName(selectedBranchName);
            renderInspectorBranchHelp(pane, b);
        } else if (selectedPath) {
            renderInspectorFileHelp(pane);
        } else if (selectedSha) {
            renderInspectorCommitHelp(pane);
        } else {
            pane.appendChild(helpPara(
                'This is the unified branch tree for your project. Each row is either a ' +
                '<strong>branch</strong> (a line of work) or a checked-out branch\'s ' +
                '<strong>working folder</strong> where you can edit files. Click anything ' +
                'in the tree to learn what it is and what you can do with it.'));
            pane.appendChild(helpTip(
                '<strong>Filled vs empty dot:</strong> a filled dot next to a branch means ' +
                'it has a working folder you can edit in. An empty dot means the branch ' +
                'exists in git but isn\'t checked out anywhere right now.'));
        }
    }

    function renderInspectorBranchHelp(pane, b) {
        if (!b) {
            pane.appendChild(helpPara('A branch in this project. (Details for the selected branch aren\'t in the current view.)'));
            return;
        }
        const isCheckedOut = !!b.checkedOut;
        if (isCheckedOut) {
            pane.appendChild(helpPara(
                'This is a <strong>branch</strong> — a separate line of work in your project. ' +
                'Because it\'s checked out (filled dot), it has a <strong>working folder</strong> ' +
                'where you can edit files without affecting other branches. Expand it in the ' +
                'tree to see the files you\'ve changed and recent commits on it.'));
            pane.appendChild(helpTip(
                '<strong>About the outcome line:</strong> the outcome at the top of the Details ' +
                'tab is the <em>user-facing capability</em> this branch delivers — separate from ' +
                'the developer task titles inside it. Ask any agent to draft one, or click the ' +
                '<strong>✎ pencil</strong> next to the outcome value to type your own.'));
        } else {
            pane.appendChild(helpPara(
                'This is a <strong>branch with no working folder</strong> (empty dot). It exists ' +
                'in git history but isn\'t checked out anywhere right now — so you can see its ' +
                'tip commit and any recorded outcome, but you can\'t edit files on it without ' +
                'creating a working folder for it first.'));
            pane.appendChild(helpTip(
                '<strong>Where orphans come from:</strong> these are usually branches from completed ' +
                'tasks whose working folders have been cleaned up. The outcome (in the Details tab) ' +
                'tells you what capability the branch was supposed to deliver.'));
        }
    }

    function renderInspectorFileHelp(pane) {
        pane.appendChild(helpPara(
            'This is a <strong>file you\'ve edited</strong> but not yet committed. The change ' +
            'type tells you the kind of change: <strong>Modified</strong> (existing file changed), ' +
            '<strong>Added</strong> (new file), <strong>Deleted</strong> (removed), or ' +
            '<strong>Untracked</strong> (new file git doesn\'t know about yet).'));
        pane.appendChild(helpTip(
            '<strong>What you can do:</strong> right-click the row in the tree to open the file ' +
            'in the Code Review editor and see the diff. When you\'re ready to save the change ' +
            'permanently, commit it from your terminal — git records it on whichever branch this ' +
            'working folder is checked out to.'));
    }

    function renderInspectorCommitHelp(pane) {
        pane.appendChild(helpPara(
            'This is a <strong>commit</strong> — a saved snapshot of the project at a point in ' +
            'time on this branch. The <strong>short SHA</strong> is a 7-character ID; the ' +
            '<strong>full SHA</strong> is the unambiguous one git uses internally. The ' +
            '<strong>author</strong> made the commit; <strong>co-authors</strong> are extra ' +
            'contributors recorded in the commit message (often used to attribute AI-assisted work).'));
        pane.appendChild(helpTip(
            '<strong>What you can do:</strong> click the commit in the tree to load its diff ' +
            '(existing behavior). The commit lives on the worktree shown above — to share it ' +
            'with another branch, you\'d <code>git merge</code> or <code>git cherry-pick</code> ' +
            'from your terminal.'));
    }

    send({ type: 'ready' });
})();
</script>
</body>
</html>
