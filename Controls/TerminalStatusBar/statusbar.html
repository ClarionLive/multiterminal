<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Status Bar</title>
    <style>
        /* ============================================
           CSS Variables - Shared Design System
           ============================================ */
        :root {
            /* Team member accent colors */
            --color-alice: #6366f1;   /* indigo */
            --color-bob: #22c55e;     /* green */
            --color-charlie: #f59e0b; /* amber */
            --color-diana: #ec4899;   /* pink */

            /* Base theme (dark) */
            --bg-panel: #1e1e2e;
            --bg-card: #2a2a3e;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border-color: #3f3f50;

            /* Status line colors */
            --ctx-green: #22c55e;
            --ctx-yellow: #eab308;
            --ctx-orange: #f97316;
            --ctx-red: #ef4444;
            --bar-empty: #3f3f50;
            --model-bg: #1a3a2a;

            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;

            /* Typography */
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-size-xs: 15px;
            --font-size-sm: 16px;
        }

        /* Light theme overrides */
        body.light {
            --bg-panel: #f4f4f5;
            --bg-card: #ffffff;
            --text-primary: #18181b;
            --text-secondary: #52525b;
            --text-muted: #a1a1aa;
            --border-color: #d4d4d8;
            --bar-empty: #d4d4d8;
            --model-bg: #dcfce7;
        }

        /* ============================================
           Base Styles
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 140px;
            overflow: hidden;
        }

        body {
            font-family: var(--font-family);
            font-size: var(--font-size-sm);
            background: var(--bg-card);
            color: var(--text-primary);
            line-height: 1.4;
        }

        /* ============================================
           Status Bar Container
           ============================================ */
        .status-bar-container {
            display: flex;
            flex-direction: column;
            height: 140px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
        }

        /* ============================================
           Row 1: Identity
           ============================================ */
        .row-identity {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px 2px 12px;
            min-height: 40px;
        }

        .avatar-container {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--member-color, var(--bg-panel));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
            text-transform: uppercase;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .status-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #22c55e;
            border: 2px solid var(--bg-card);
        }

        .info-container {
            flex: 1;
            min-width: 0;
        }

        .terminal-name {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-primary);
        }

        .current-task {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-label {
            color: var(--text-muted);
        }

        /* Input source pill (Local / Remote) */
        .input-pill {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 7px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            user-select: none;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .input-pill .input-label {
            color: var(--text-muted);
        }

        .input-pill .input-value {
            color: var(--text-secondary);
        }

        .input-pill.remote {
            background: rgba(99, 102, 241, 0.15);
            border-color: #6366f1;
        }

        .input-pill.remote .input-value {
            color: #6366f1;
        }

        /* HUD slide toggle */
        .hud-toggle {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
        }

        .hud-toggle-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .hud-toggle.active .hud-toggle-label {
            color: var(--text-secondary);
        }

        .hud-toggle-track {
            width: 30px;
            height: 16px;
            border-radius: 8px;
            background: var(--border-color);
            position: relative;
            transition: background 0.2s ease;
        }

        .hud-toggle.active .hud-toggle-track {
            background: #6366f1;
        }

        .hud-toggle-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-muted);
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .hud-toggle.active .hud-toggle-thumb {
            transform: translateX(14px);
            background: white;
        }

        .home-button {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            padding: 0;
        }

        .home-button:hover {
            background: var(--bg-panel);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        .home-button:active {
            transform: scale(0.95);
        }

        .home-button svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* ============================================
           Row 2: Folder Path
           ============================================ */
        .row-folder {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
            min-height: 30px;
            border-top: 1px solid var(--border-color);
        }

        .folder-icon {
            flex-shrink: 0;
            font-size: var(--font-size-xs);
            color: var(--text-muted);
        }

        .folder-path {
            flex: 1;
            min-width: 0;
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            cursor: default;
        }

        .open-folder-button {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            padding: 0;
        }

        .open-folder-button:hover {
            background: var(--bg-panel);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .open-folder-button:active {
            transform: scale(0.95);
        }

        .open-folder-button svg {
            width: 13px;
            height: 13px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ============================================
           Row 3: Status Line (model / git / context)
           ============================================ */
        .row-statusline {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 0 12px;
            min-height: 30px;
            border-top: 1px solid var(--border-color);
        }

        .sl-segment {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            font-size: var(--font-size-xs);
            font-family: 'Cascadia Code', 'Consolas', monospace;
            white-space: nowrap;
            height: 24px;
            border-radius: 3px;
            margin-right: 6px;
        }

        .sl-model {
            background: var(--model-bg);
            color: var(--ctx-green);
            font-weight: 600;
        }

        .context-label {
            color: var(--text-muted);
            font-size: var(--font-size-xs);
            font-family: var(--font-family);
            margin-right: 4px;
        }

        .sl-quota {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            margin-right: 12px;
            font-size: 13px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            color: var(--text-secondary);
            /* On a narrow terminal the quota (rightmost) yields/clips before Context does. */
            min-width: 0;
            overflow: hidden;
        }

        .sl-quota.hidden { display: none; }

        .quota-window {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .quota-label {
            color: var(--text-muted);
            font-size: 12px;
        }

        .quota-pct {
            font-size: 13px;
            min-width: 22px;
        }

        .quota-pace {
            font-size: 12px;
            font-weight: 600;
        }

        .quota-pace.surplus { color: var(--ctx-green); }
        .quota-pace.overspend { color: var(--ctx-red); }

        .quota-sep {
            color: var(--border-color);
            margin: 0 4px;
        }

        .sl-context {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: var(--font-size-xs);
            font-family: 'Cascadia Code', 'Consolas', monospace;
            /* Context sits left (after the model badge) and must never be clipped —
               the quota block to its right yields first on narrow terminals. */
            flex-shrink: 0;
        }

        .context-bar {
            display: inline-flex;
            gap: 1px;
            height: 10px;
            align-items: flex-end;
        }

        .context-bar-segment {
            width: 6px;
            border-radius: 1px;
            transition: height 0.3s ease, background 0.3s ease;
        }

        .context-pct {
            color: var(--text-secondary);
            font-size: var(--font-size-xs);
            min-width: 28px;
            text-align: right;
        }

        /* Context bar color classes */
        .ctx-green { background: var(--ctx-green); }
        .ctx-yellow { background: var(--ctx-yellow); }
        .ctx-orange { background: var(--ctx-orange); }
        .ctx-red { background: var(--ctx-red); }
        .ctx-empty { background: var(--bar-empty); }

        .ctx-blink {
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .quota-reset {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 2px;
        }

        /* Token meter (task f2702f69) — tokens / cost / burn, between Context and quota */
        .sl-tokens {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            margin-left: 10px;
            font-size: var(--font-size-xs);
            font-family: 'Cascadia Code', 'Consolas', monospace;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .sl-tokens.hidden { display: none; }
        .tok-cache { color: var(--text-muted); }
        .tok-cache.hidden { display: none; }
        .tok-cost { color: var(--ctx-green); }
        .tok-burn { color: var(--text-muted); }

        /* Hidden state for rows 2-3 before data arrives */
        .row-folder.hidden,
        .row-statusline.hidden {
            display: none;
        }

        /* ============================================
           Avatar member colors
           ============================================ */
        .avatar[data-member="Alice"],
        .avatar[data-member="alice"] { background: var(--color-alice); }
        .avatar[data-member="Bob"],
        .avatar[data-member="bob"] { background: var(--color-bob); }
        .avatar[data-member="Charlie"],
        .avatar[data-member="charlie"] { background: var(--color-charlie); }
        .avatar[data-member="Diana"],
        .avatar[data-member="diana"] { background: var(--color-diana); }
    </style>
</head>
<body>
    <div class="status-bar-container">
        <!-- Row 1: Identity -->
        <div class="row-identity">
            <div class="avatar-container">
                <div class="avatar" id="avatar" data-member="">
                    <span id="avatar-initials">?</span>
                    <img id="avatar-image" class="avatar-image" style="display: none;" />
                </div>
                <div class="status-indicator" id="status-indicator"></div>
            </div>
            <div class="info-container">
                <div class="terminal-name" id="terminal-name">Terminal</div>
                <div class="current-task" id="current-task">
                    <span class="task-label">Ready to work</span>
                </div>
            </div>
            <div class="input-pill" id="input-pill" title="Input source (Local = desktop, Remote = phone)">
                <span class="input-label">Input:</span>
                <span class="input-value" id="input-value">Local</span>
            </div>
            <div class="hud-toggle active" id="hud-toggle" title="Show/Hide Task HUD" onclick="onHudToggleClick()">
                <span class="hud-toggle-label">HUD</span>
                <div class="hud-toggle-track">
                    <div class="hud-toggle-thumb"></div>
                </div>
            </div>
            <button class="home-button" id="home-button" title="Return to Start Screen (Ctrl+Shift+H)" onclick="onHomeClick()">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
        </div>

        <!-- Row 2: Folder Path -->
        <div class="row-folder hidden" id="row-folder">
            <span class="folder-icon">&#128193;</span>
            <span class="folder-path" id="folder-path" title="" data-path=""></span>
            <button class="open-folder-button" id="open-folder-button" title="Open in Explorer" onclick="onOpenFolderClick()">
                <svg viewBox="0 0 24 24">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
            </button>
        </div>

        <!-- Row 3: Status Line (model / context / quota) -->
        <div class="row-statusline hidden" id="row-statusline">
            <span class="sl-segment sl-model" id="sl-model">claude</span>
            <span class="sl-context" id="sl-context">
                <span class="context-label">Context:</span>
                <span class="context-bar" id="context-bar"></span>
                <span class="context-pct" id="context-pct">--%</span>
            </span>
            <span class="sl-tokens hidden" id="sl-tokens">
                <span class="tok-total" id="tok-total"></span>
                <span class="tok-cache hidden" id="tok-cache"></span>
                <span class="tok-cost" id="tok-cost"></span>
                <span class="tok-burn" id="tok-burn"></span>
            </span>
            <span class="sl-quota hidden" id="sl-quota">
                <span class="quota-window" id="quota-5h">
                    <span class="quota-label">5h</span>
                    <span class="quota-pct" id="quota-5h-pct"></span>
                    <span class="quota-pace" id="quota-5h-pace"></span>
                    <span class="quota-reset" id="quota-5h-reset"></span>
                </span>
                <span class="quota-sep">|</span>
                <span class="quota-window" id="quota-7d">
                    <span class="quota-label">7d</span>
                    <span class="quota-pct" id="quota-7d-pct"></span>
                    <span class="quota-pace" id="quota-7d-pace"></span>
                </span>
            </span>
        </div>
    </div>

    <script>
        // WebView2 communication
        function postMessage(type, data) {
            window.chrome.webview.postMessage({ type, ...data });
        }

        function onHomeClick() {
            postMessage('home', {});
        }

        function onHudToggleClick() {
            postMessage('hudToggle', {});
        }

        function setHudToggleState(isActive) {
            var el = document.getElementById('hud-toggle');
            if (isActive) el.classList.add('active');
            else el.classList.remove('active');
        }

        function setRemoteMode(enabled) {
            var el = document.getElementById('input-pill');
            var valEl = document.getElementById('input-value');
            if (!el || !valEl) return;
            if (enabled) {
                el.classList.add('remote');
                valEl.textContent = 'Remote';
            } else {
                el.classList.remove('remote');
                valEl.textContent = 'Local';
            }
        }

        function onOpenFolderClick() {
            var path = document.getElementById('folder-path').getAttribute('data-path') || '';
            if (path) {
                postMessage('openFolder', { path: path });
            }
        }

        // Notify C# that JS is ready
        postMessage('ready', {});

        // Theme management
        function applyTheme(isDark) {
            document.body.classList.toggle('light', !isDark);
        }

        // Update identity (Row 1) - existing functionality
        function updateStatus(data) {
            var name = data.name;
            var avatarUrl = data.avatarUrl;
            var activityDescription = data.activityDescription;
            var taskTitle = data.taskTitle;
            var taskId = data.taskId;
            var status = data.status;

            var projectName = data.projectName;
            var projectDescription = data.projectDescription;

            // Update display name: show project name if available, otherwise agent name
            var displayName = (projectName && projectName.trim() !== '') ? projectName : (name || 'Terminal');
            document.getElementById('terminal-name').textContent = displayName;

            // Update avatar (still based on agent name)
            var avatarEl = document.getElementById('avatar');
            var initialsEl = document.getElementById('avatar-initials');
            var imageEl = document.getElementById('avatar-image');
            avatarEl.setAttribute('data-member', name || '');

            if (avatarUrl && avatarUrl.trim() !== '' && avatarUrl !== 'null') {
                imageEl.src = avatarUrl;
                imageEl.style.display = 'block';
                initialsEl.style.display = 'none';
            } else {
                initialsEl.textContent = (name || 'T').substring(0, 1).toUpperCase();
                initialsEl.style.display = 'block';
                imageEl.style.display = 'none';
            }

            // Update subtitle: show project description if available, otherwise task/activity/status
            var taskEl = document.getElementById('current-task');
            if (projectDescription && projectDescription.trim() !== '') {
                taskEl.innerHTML = escapeHtml(projectDescription);
            } else if (activityDescription && activityDescription.trim() !== '') {
                taskEl.innerHTML = escapeHtml(activityDescription);
            } else if (taskTitle && taskTitle.trim() !== '') {
                taskEl.innerHTML = '<span class="task-label">Task:</span> ' + escapeHtml(taskTitle);
            } else {
                var statusText = status === 'active' ? 'Working' :
                                 status === 'idle' ? 'Ready to work' :
                                 status === 'offline' ? 'Offline' : 'Ready to work';
                taskEl.innerHTML = '<span class="task-label">' + statusText + '</span>';
            }

            // Update status indicator color
            var indicatorEl = document.getElementById('status-indicator');
            if (status === 'active') indicatorEl.style.background = '#22c55e';
            else if (status === 'busy') indicatorEl.style.background = '#3b82f6';
            else if (status === 'idle') indicatorEl.style.background = '#eab308';
            else indicatorEl.style.background = '#6b7280';
        }

        // Update status line (Rows 2 & 3). `seq` is the C# send id, echoed back in the ack so C# only
        // honors the ack for the latest delivery (task d14048ef).
        function updateStatusLine(data, seq) {
            var model = data.model;
            var folder = data.folder;
            var contextPct = data.contextPct;

            // Row 2: Folder path
            var folderShown = false;
            if (folder) {
                var folderPathEl = document.getElementById('folder-path');
                folderPathEl.textContent = folder;
                folderPathEl.title = folder;
                folderPathEl.setAttribute('data-path', folder);
                document.getElementById('row-folder').classList.remove('hidden');
                folderShown = true;
            }

            // Row 3: Status line
            document.getElementById('row-statusline').classList.remove('hidden');

            // Model badge
            var modelEl = document.getElementById('sl-model');
            modelEl.textContent = model || 'claude';

            // Context usage bar
            updateContextBar(contextPct);

            // Quota pacing + reset timer
            updateQuotaPacing(data.quota5h, data.quota7d, data.pace5h, data.pace7d, data.resetIn5h);

            // Per-band ack back to C#: report whether the FOLDER row actually un-hid (the stats row
            // always does) and echo the send `seq` so C# only honors this ack for the latest delivery.
            // C# keeps re-pushing while a folder it sent isn't shown yet, so an empty-folder delivery
            // can't falsely satisfy the loop and leave the folder band hidden (task d14048ef).
            postMessage('statuslineRendered', { folderShown: folderShown, seq: seq });
        }

        // Token meter (task f2702f69): cumulative tokens, est. cost, burn rate.
        function updateTokenMeter(data) {
            var el = document.getElementById('sl-tokens');
            if (!el) return;

            var total = data.tokensTotal;
            if (total === null || total === undefined) {
                el.classList.add('hidden');
                return;
            }
            el.classList.remove('hidden');

            var totalEl = document.getElementById('tok-total');
            totalEl.textContent = formatTokens(total) + ' tok';
            var sub = data.subagentTokens;
            totalEl.title = (sub && sub > 0) ? (formatTokens(sub) + ' from subagents') : '';

            // Split cache vs non-cache: on long sessions cache reads dominate the cumulative
            // total (every turn re-reads the cached prefix), so surface the cache slice in a
            // muted label. Non-cache (fresh input+output) = total - cache, shown in the tooltip.
            var cacheEl = document.getElementById('tok-cache');
            var cache = data.cacheTokens;
            if (cache !== null && cache !== undefined && total > 0) {
                var nonCache = Math.max(total - cache, 0);
                cacheEl.textContent = formatTokens(cache) + ' cache';
                cacheEl.title = formatTokens(nonCache) + ' non-cache (fresh input+output) · '
                    + formatTokens(cache) + ' cache (read+write)';
                cacheEl.classList.remove('hidden');
            } else {
                cacheEl.textContent = '';
                cacheEl.classList.add('hidden');
            }

            var costEl = document.getElementById('tok-cost');
            if (data.costUsd !== null && data.costUsd !== undefined) {
                var prefix = data.costIsEstimate ? '~$' : '$';
                var suffix = data.costIsLowerBound ? '+' : '';
                costEl.textContent = prefix + Number(data.costUsd).toFixed(2) + suffix;
                costEl.title = data.costIsLowerBound
                    ? 'Lower bound — some tokens used a model with no known price'
                    : (data.costIsEstimate ? 'Estimated equivalent API cost (subscription plan)' : 'Exact metered API cost');
            } else {
                costEl.textContent = '';
                costEl.title = '';
            }

            var burnEl = document.getElementById('tok-burn');
            var burn = data.tokensPerMinute;
            if (burn && burn > 0) {
                burnEl.textContent = formatTokens(Math.round(burn)) + '/min';
            } else {
                burnEl.textContent = '';
            }
        }

        function formatTokens(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return Math.round(n / 1000) + 'k';
            return String(n);
        }

        function updateContextBar(pct) {
            var barEl = document.getElementById('context-bar');
            var pctEl = document.getElementById('context-pct');

            if (pct === null || pct === undefined) {
                pctEl.textContent = '--%';
                barEl.innerHTML = '';
                return;
            }

            pctEl.textContent = pct + '%';

            // Color based on usage level
            var colorClass, blink = false;
            if (pct > 95) { colorClass = 'ctx-red'; blink = true; }
            else if (pct > 85) { colorClass = 'ctx-orange'; }
            else if (pct > 70) { colorClass = 'ctx-yellow'; }
            else { colorClass = 'ctx-green'; }

            // Build 10-segment bar
            var totalSegments = 10;
            var filled = Math.min(Math.round(pct / 10), totalSegments);
            var html = '';
            for (var i = 0; i < totalSegments; i++) {
                var isFilled = i < filled;
                var cls = isFilled ? colorClass : 'ctx-empty';
                var blinkCls = (isFilled && blink) ? ' ctx-blink' : '';
                var h = isFilled ? 10 : 6;
                html += '<div class="context-bar-segment ' + cls + blinkCls + '" style="height:' + h + 'px"></div>';
            }
            barEl.innerHTML = html;

            // Color the percentage text
            pctEl.className = 'context-pct';
            if (pct > 95) pctEl.style.color = 'var(--ctx-red)';
            else if (pct > 85) pctEl.style.color = 'var(--ctx-orange)';
            else if (pct > 70) pctEl.style.color = 'var(--ctx-yellow)';
            else pctEl.style.color = 'var(--text-secondary)';
        }

        function updateQuotaPacing(quota5h, quota7d, pace5h, pace7d, resetIn5h) {
            var container = document.getElementById('sl-quota');

            // Hide if no quota data available
            if (quota5h === null && quota5h === undefined && quota7d === null && quota7d === undefined) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            // 5-hour window
            var pct5El = document.getElementById('quota-5h-pct');
            var pace5El = document.getElementById('quota-5h-pace');
            if (quota5h !== null && quota5h !== undefined) {
                pct5El.textContent = quota5h + '%';
                pct5El.style.color = quotaColor(quota5h);
                if (pace5h !== null && pace5h !== undefined && Math.abs(pace5h) > 5) {
                    pace5El.textContent = (pace5h > 0 ? '+' : '') + pace5h + '%';
                    pace5El.className = 'quota-pace ' + (pace5h > 0 ? 'surplus' : 'overspend');
                } else {
                    pace5El.textContent = '';
                    pace5El.className = 'quota-pace';
                }
                // Reset countdown
                var reset5El = document.getElementById('quota-5h-reset');
                reset5El.textContent = resetIn5h ? '\u21BB' + resetIn5h : '';
            } else {
                pct5El.textContent = '--%';
                pct5El.style.color = '';
                pace5El.textContent = '';
                document.getElementById('quota-5h-reset').textContent = '';
            }

            // 7-day window
            var pct7El = document.getElementById('quota-7d-pct');
            var pace7El = document.getElementById('quota-7d-pace');
            if (quota7d !== null && quota7d !== undefined) {
                pct7El.textContent = quota7d + '%';
                pct7El.style.color = quotaColor(quota7d);
                if (pace7d !== null && pace7d !== undefined && Math.abs(pace7d) > 5) {
                    pace7El.textContent = (pace7d > 0 ? '+' : '') + pace7d + '%';
                    pace7El.className = 'quota-pace ' + (pace7d > 0 ? 'surplus' : 'overspend');
                } else {
                    pace7El.textContent = '';
                    pace7El.className = 'quota-pace';
                }
            } else {
                pct7El.textContent = '--%';
                pct7El.style.color = '';
                pace7El.textContent = '';
            }
        }

        function quotaColor(pct) {
            if (pct > 90) return 'var(--ctx-red)';
            if (pct > 75) return 'var(--ctx-orange)';
            if (pct > 50) return 'var(--ctx-yellow)';
            return 'var(--text-secondary)';
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Listen for messages from C#
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', function(event) {
                var data = event.data;
                if (typeof data === 'string') {
                    if (data.startsWith('theme:')) {
                        applyTheme(data.split(':')[1] === 'dark');
                    } else if (data.startsWith('update:')) {
                        updateStatus(JSON.parse(data.substring(7)));
                    } else if (data.startsWith('statusline:')) {
                        // Wire format: "statusline:{seq}:{json}". Split on the first ':' after the prefix
                        // (the seq is digits, the payload is a JSON object starting with '{').
                        var slRest = data.substring(11);
                        var slColon = slRest.indexOf(':');
                        var slSeq = parseInt(slRest.substring(0, slColon), 10);
                        updateStatusLine(JSON.parse(slRest.substring(slColon + 1)), slSeq);
                    } else if (data.startsWith('tokenmeter:')) {
                        updateTokenMeter(JSON.parse(data.substring(11)));
                    } else if (data.startsWith('hudState:')) {
                        setHudToggleState(data.split(':')[1] === 'true');
                    } else if (data.startsWith('remoteMode:')) {
                        setRemoteMode(data.split(':')[1] === 'true');
                    }
                }
            });
        }
    </script>
