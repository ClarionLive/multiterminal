<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knowledge Base</title>
<style>
body {
    --bg-primary: #1a1a2e;
    --bg-card: #2d2d44;
    --bg-card-hover: #353550;
    --border: #3d3d5c;
    --border-column: #2a2a4a;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b8;
    --text-muted: #707088;
    --accent: #89b4fa;
    --bg-header: #12122a;
    --bg-input: #252540;
    --green: #a6e3a1;
    --yellow: #f9e2af;
    --red: #f38ba8;

    margin: 0; padding: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
body.light {
    --bg-primary: #f5f5f5; --bg-card: #ffffff; --bg-card-hover: #fafafa;
    --border: #e0e0e0; --border-column: #dcdcdc; --text-primary: #333;
    --text-secondary: #666; --text-muted: #999; --accent: #1e66f5;
    --bg-header: #e8e8e8; --bg-input: #fff; --green: #40a02b;
    --yellow: #df8e1d; --red: #d20f39;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.kb-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; background: var(--bg-header);
    border-bottom: 1px solid var(--border-column); flex-shrink: 0;
}
.kb-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-secondary);
}
.kb-count {
    font-size: 10px; color: var(--text-muted);
    background: rgba(255,255,255,0.08); padding: 0 5px;
    border-radius: 8px;
}
.search-box {
    flex: 1; background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; color: var(--text-primary);
    font-size: 11px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-muted); }

.kb-list {
    flex: 1; overflow-y: auto; padding: 6px 10px; min-height: 0;
}

.kb-card {
    border: 1px solid var(--border); border-radius: 4px;
    padding: 8px 10px; margin-bottom: 6px; background: var(--bg-card);
    cursor: default; transition: background 0.15s;
}
.kb-card:hover { background: var(--bg-card-hover); }

.kb-card-header {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.kb-card-title {
    font-size: 12px; font-weight: 600; color: var(--text-primary);
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; cursor: pointer;
}
.kb-card-title:hover { color: var(--accent); text-decoration: underline; }
.kb-badge {
    font-size: 9px; padding: 0 5px; border-radius: 8px; font-weight: 500;
    white-space: nowrap;
}
.kb-badge.pattern { background: rgba(137,180,250,0.15); color: var(--accent); border: 1px solid rgba(137,180,250,0.3); }
.kb-badge.decision { background: rgba(166,227,161,0.15); color: var(--green); border: 1px solid rgba(166,227,161,0.3); }
.kb-badge.gotcha { background: rgba(243,139,168,0.15); color: var(--red); border: 1px solid rgba(243,139,168,0.3); }
.kb-badge.preference { background: rgba(249,226,175,0.15); color: var(--yellow); border: 1px solid rgba(249,226,175,0.3); }
.kb-badge.debug_insight { background: rgba(249,226,175,0.15); color: var(--yellow); border: 1px solid rgba(249,226,175,0.3); }
.kb-badge.default { background: rgba(255,255,255,0.08); color: var(--text-muted); border: 1px solid var(--border); }

.kb-card-content {
    font-size: 11px; color: var(--text-secondary); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
}
.kb-card-meta {
    font-size: 9px; color: var(--text-muted); margin-top: 4px;
}

.kb-empty {
    text-align: center; padding: 24px; color: var(--text-muted); font-size: 11px;
}
.kb-empty-icon { font-size: 28px; opacity: 0.3; margin-bottom: 6px; }

.no-project { display: none; flex: 1; flex-direction: column; align-items: center;
    justify-content: center; color: var(--text-muted); font-size: 12px; gap: 6px; }
.no-project-icon { font-size: 28px; opacity: 0.3; }
body.no-project-state .kb-header, body.no-project-state .kb-list { display: none; }
body.no-project-state .no-project { display: flex; }

.kb-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.55);
    align-items: center; justify-content: center; padding: 24px;
}
.kb-modal-overlay.open { display: flex; }
.kb-modal {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; width: 100%; max-width: 640px; max-height: 80vh;
    display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.kb-modal-header {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.kb-modal-title {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    flex: 1; min-width: 0; line-height: 1.3;
}
.kb-modal-close {
    background: none; border: none; color: var(--text-muted);
    font-size: 18px; line-height: 1; cursor: pointer; padding: 0 2px; flex-shrink: 0;
}
.kb-modal-close:hover { color: var(--text-primary); }
.kb-modal-body {
    padding: 14px; overflow-y: auto; flex: 1; min-height: 0;
    font-size: 12px; color: var(--text-primary); line-height: 1.5;
    white-space: pre-wrap; word-wrap: break-word;
}
.kb-modal-meta {
    padding: 8px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    font-size: 10px; color: var(--text-muted);
}
</style>
</head>
<body>
<div class="no-project">
    <div class="no-project-icon">&#128218;</div>
    <span>Open a project to browse knowledge</span>
</div>

<div class="kb-header">
    <span class="kb-title">Knowledge</span>
    <span class="kb-count" id="kb-count">0</span>
    <input type="text" class="search-box" id="search-box" placeholder="Search knowledge...">
</div>
<div class="kb-list" id="kb-list">
    <div class="kb-empty">
        <div class="kb-empty-icon">&#128218;</div>
        <div>No knowledge entries yet</div>
    </div>
</div>

<div class="kb-modal-overlay" id="kb-modal">
    <div class="kb-modal" role="dialog" aria-modal="true">
        <div class="kb-modal-header">
            <span class="kb-modal-title" id="kb-modal-title"></span>
            <span class="kb-badge" id="kb-modal-badge"></span>
            <button class="kb-modal-close" id="kb-modal-close" title="Close" aria-label="Close">&times;</button>
        </div>
        <div class="kb-modal-body" id="kb-modal-body"></div>
        <div class="kb-modal-meta" id="kb-modal-meta"></div>
    </div>
</div>

<script>
let allEntries = [];
const searchBox = document.getElementById('search-box');

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }
function applyTheme(isDark) { document.body.classList.toggle('light', !isDark); }

function badgeClass(cat) {
    if (['pattern','decision','gotcha','preference','debug_insight'].includes(cat)) return cat;
    return 'default';
}

function renderEntries(entries) {
    document.body.classList.remove('no-project-state');
    allEntries = entries || [];
    document.getElementById('kb-count').textContent = allEntries.length;
    filterAndRender();
}

function filterAndRender() {
    const q = searchBox.value.toLowerCase().trim();
    const filtered = q
        ? allEntries.filter(e => (e.title||'').toLowerCase().includes(q) || (e.content||'').toLowerCase().includes(q) || (e.tags||'').toLowerCase().includes(q))
        : allEntries;

    const list = document.getElementById('kb-list');
    if (filtered.length === 0) {
        list.innerHTML = `<div class="kb-empty"><div class="kb-empty-icon">&#128269;</div><div>${q ? 'No matches' : 'No knowledge entries'}</div></div>`;
        return;
    }

    let html = '';
    filtered.forEach(e => {
        const cat = (e.category||'').toLowerCase();
        const tags = e.tags ? ` &middot; ${escapeHtml(e.tags)}` : '';
        const agent = e.sourceAgent ? ` by ${escapeHtml(e.sourceAgent)}` : '';
        html += `<div class="kb-card">
            <div class="kb-card-header">
                <span class="kb-card-title" data-id="${escapeHtml(e.id)}" title="Click to read full entry">${escapeHtml(e.title)}</span>
                <span class="kb-badge ${badgeClass(cat)}">${escapeHtml(cat||'note')}</span>
            </div>
            <div class="kb-card-content">${escapeHtml(e.content)}</div>
            <div class="kb-card-meta">${escapeHtml(e.confidence||'observed')}${agent}${tags}</div>
        </div>`;
    });
    list.innerHTML = html;
}

searchBox.addEventListener('input', filterAndRender);

// --- Reader modal ---
const modal = document.getElementById('kb-modal');

function openEntry(id) {
    const e = allEntries.find(x => String(x.id) === String(id));
    if (!e) return;
    const cat = (e.category||'').toLowerCase();
    const tags = e.tags ? ` &middot; ${escapeHtml(e.tags)}` : '';
    const agent = e.sourceAgent ? ` by ${escapeHtml(e.sourceAgent)}` : '';
    document.getElementById('kb-modal-title').textContent = e.title || '';
    const badge = document.getElementById('kb-modal-badge');
    badge.className = `kb-badge ${badgeClass(cat)}`;
    badge.textContent = cat || 'note';
    document.getElementById('kb-modal-body').textContent = e.content || '';
    document.getElementById('kb-modal-meta').innerHTML = `${escapeHtml(e.confidence||'observed')}${agent}${tags}`;
    modal.classList.add('open');
}

function closeModal() { modal.classList.remove('open'); }

// Event delegation: titles are re-rendered on every filter, so bind to the list.
document.getElementById('kb-list').addEventListener('click', (ev) => {
    const titleEl = ev.target.closest('.kb-card-title');
    if (titleEl && titleEl.dataset.id) openEntry(titleEl.dataset.id);
});
document.getElementById('kb-modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', (ev) => { if (ev.target === modal) closeModal(); });
document.addEventListener('keydown', (ev) => { if (ev.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage({ type: 'ready' });
    window.chrome.webview.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'knowledge_entries') renderEntries(data.entries);
        else if (data.type === 'theme') applyTheme(data.isDark !== false);
        else if (data.type === 'no_project') document.body.classList.add('no-project-state');
    });
}
</script>
</body>
</html>
