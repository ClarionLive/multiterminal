# Apollo MSR-2 — ESPHome config for MT presence routing (task 9f9c3141, item [10])
#
# STATUS: This is the WORKING mmWave desk-occupancy config, flashed & verified on real hardware
# (2026-06-26). v1 is mmWave-only (0 phones); the BLE/per-phone section at the bottom is commented
# out for item [11].
#
# Hardware facts (from Apollo's official MSR-2 Core.yaml — the MSR-2 is ESP32-C3, NOT S3):
#   board    : esp32c3, 4MB, esp-idf
#   LD2410   : hardware UART tx=GPIO21 rx=GPIO20 @ 256000 8N1
#   logger   : USB-Serial-JTAG (frees the UART0 pins for the radar)
#
# BUILD/FLASH (Windows): esphome MUST run from a native shell (PowerShell/cmd), NOT Git Bash/MSYS
# (PlatformIO rejects MSYS). If your Windows username has a space, point PlatformIO at a space-free
# core dir. Provide secrets via secrets.yaml next to this file (see secrets.yaml.example):
#   $env:PLATFORMIO_CORE_DIR="C:\pio"
#   python -m esphome run msr2-presence.yaml --device COM5
#
# Topic contract (docs/presence-routing.md §2 — flat schema, NOT ESPHome auto-topics):
#   mt/presence/desk/occupancy           ON|OFF   retained   (PRIMARY mmWave gate)
#   mt/presence/status                   online|offline      (birth/LWT — drives MT degradation)
#   mt/presence/ble/<deviceId>/presence  ON|OFF   retained   (SECONDARY, item [11])
#   mt/presence/ble/<deviceId>/rssi      "-67"    not retained

substitutions:
  device_name: msr2-desk
  topic_prefix: mt/presence

esphome:
  name: ${device_name}
  on_boot:
    # Desk-zone calibration: cap detection at gate 3 (~2.25m) so the desk (<=2.1m) reads present
    # but a couch ~3-4m off to the side reads away. Persisted in the radar's own flash.
    priority: -100
    then:
      - delay: 4s                  # let the LD2410 UART come up before sending config
      - number.set: { id: max_move_gate,  value: 3 }
      - number.set: { id: max_still_gate, value: 3 }
      - number.set: { id: radar_timeout,  value: 5 }
      - logger.log: "Applied desk-zone calibration: max move/still gate=3 (~2.25m), timeout=5s"

esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf

# Log over the native USB-Serial-JTAG so UART0's GPIO21/20 are free for the LD2410.
logger:
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password      # ESP32 is 2.4GHz only — use a 2.4GHz SSID

mqtt:
  broker: !secret mqtt_broker          # the box running Mosquitto (needs a LAN listener + fw allow on 1883)
  port: 1883
  # username: !secret mqtt_user        # uncomment if the broker requires auth
  # password: !secret mqtt_password
  discovery: false                     # we emit explicit flat topics, not HA discovery
  topic_prefix: ${topic_prefix}
  log_topic:                           # silence per-device log spam on mt/presence/debug
    topic: ${topic_prefix}/debug
    level: NONE
  birth_message:
    topic: ${topic_prefix}/status
    payload: online
    retain: true
  will_message:                        # LWT → MT fail-safe degradation when the sensor drops
    topic: ${topic_prefix}/status
    payload: offline
    retain: true
  on_connect:                          # republish current occupancy immediately on (re)connect
    - mqtt.publish:
        topic: ${topic_prefix}/desk/occupancy
        payload: !lambda 'return id(desk_occupancy).state ? "ON" : "OFF";'
        retain: true
        qos: 1

# --- mmWave (LD2410) on the MSR-2's hardware UART ---------------------------
uart:
  tx_pin: GPIO21
  rx_pin: GPIO20
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  id: ld2410_radar

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Desk occupancy"
      id: desk_occupancy
      internal: true                   # suppress ESPHome's auto entity-state topic; we publish the flat topic
      on_state:
        - mqtt.publish:                # publish immediately on every change (low latency)
            topic: ${topic_prefix}/desk/occupancy
            payload: !lambda 'return x ? "ON" : "OFF";'
            retain: true
            qos: 1

# Radar distance readings — internal (no MQTT noise). Flip internal:false temporarily to re-observe
# distances when recalibrating the gate cap.
sensor:
  - platform: ld2410
    moving_distance:
      name: "Radar moving distance"
      id: radar_moving_distance
      internal: true
    still_distance:
      name: "Radar still distance"
      id: radar_still_distance
      internal: true

# LD2410 detection-range config (values applied at boot above).
number:
  - platform: ld2410
    timeout:
      name: "Radar timeout"
      id: radar_timeout
      internal: true
    max_move_distance_gate:
      name: "Max move gate"
      id: max_move_gate
      internal: true
    max_still_distance_gate:
      name: "Max still gate"
      id: max_still_gate
      internal: true

# Republish current occupancy every 10s so MT always has fresh state, even with no change and
# across either side reconnecting (retained). Belt-and-suspenders vs the on_state publish above.
interval:
  - interval: 10s
    then:
      - mqtt.publish:
          topic: ${topic_prefix}/desk/occupancy
          payload: !lambda 'return id(desk_occupancy).state ? "ON" : "OFF";'
          retain: true
          qos: 1

