<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Preview</title>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-tertiary: #2d2d30;
            --bg-hover: #3e3e42;
            --border-color: #3e3e42;
            --text-primary: #cccccc;
            --text-secondary: #9d9d9d;
            --text-muted: #6d6d6d;
            --accent-color: #0078d4;
            --accent-hover: #1084d8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header bar */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            min-height: 32px;
        }

        .header .file-icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        .header .file-name {
            font-weight: 600;
            font-size: 12px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header .file-path {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .header .file-info {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Welcome state */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 8px;
        }

        .welcome .icon {
            font-size: 32px;
            opacity: 0.5;
        }

        .welcome .text {
            font-size: 12px;
        }

        /* Content area */
        .content {
            flex: 1;
            overflow: auto;
            min-height: 0;
        }

        .content::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        /* Code view with line numbers */
        .code-view {
            display: flex;
            min-height: 100%;
        }

        .line-nums {
            text-align: right;
            padding: 10px 8px 10px 10px;
            color: var(--text-muted);
            font-family: 'Cascadia Mono', Consolas, 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            user-select: none;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
            white-space: pre;
        }

        .code-content {
            flex: 1;
            min-width: 0;
            padding: 10px;
            font-family: 'Cascadia Mono', Consolas, 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: var(--text-primary);
            white-space: pre;
            overflow-x: auto;
            tab-size: 4;
        }

        /* Image view */
        .image-view {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 16px;
        }

        .image-view img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Error / info messages */
        .info-message {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 12px;
            font-style: italic;
        }

        /* Syntax highlighting tokens */
        .syn-keyword { color: #569cd6; }
        .syn-string { color: #ce9178; }
        .syn-comment { color: #6a9955; }
        .syn-number { color: #b5cea8; }
        .syn-type { color: #4ec9b0; }
        .syn-function { color: #dcdcaa; }
        .syn-tag { color: #569cd6; }
        .syn-attr { color: #9cdcfe; }

        /* Light theme */
        .light {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f3f3;
            --bg-tertiary: #e8e8e8;
            --bg-hover: #e0e0e0;
            --border-color: #d4d4d4;
            --text-primary: #1e1e1e;
            --text-secondary: #616161;
            --text-muted: #999999;
            --accent-color: #0078d4;
        }

        .light .syn-keyword { color: #0000ff; }
        .light .syn-string { color: #a31515; }
        .light .syn-comment { color: #008000; }
        .light .syn-number { color: #098658; }
        .light .syn-type { color: #267f99; }
        .light .syn-function { color: #795e26; }
        .light .syn-tag { color: #800000; }
        .light .syn-attr { color: #ff0000; }
    </style>
</head>
<body>
    <div id="container" class="container">
        <div class="welcome">
            <div class="icon">&#128196;</div>
            <div class="text">Click a file in the File Explorer to preview it here</div>
        </div>
    </div>

    <script>
        // ─── State ──────────────────────────────────────────────
        let currentFilePath = null;

        // ─── Host Communication ─────────────────────────────────
        function sendToHost(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(msg);
            }
        }

        // ─── Render File ────────────────────────────────────────
        function renderFile(filePath, content, isBinary) {
            currentFilePath = filePath;
            const fileName = filePath.split(/[\\/]/).pop();
            const ext = fileName.includes('.') ? fileName.split('.').pop().toLowerCase() : '';
            const container = document.getElementById('container');

            if (isBinary && content.startsWith('data:image')) {
                // Image preview
                container.innerHTML = `
                    <div class="header">
                        <span class="file-icon">&#128444;</span>
                        <span class="file-name">${escapeHtml(fileName)}</span>
                        <span class="file-path">${escapeHtml(filePath)}</span>
                    </div>
                    <div class="content">
                        <div class="image-view">
                            <img src="${content}" alt="${escapeHtml(fileName)}">
                        </div>
                    </div>`;
            } else if (content.startsWith('[')) {
                // Error/info message (e.g., "[File too large]")
                container.innerHTML = `
                    <div class="header">
                        <span class="file-icon">&#128196;</span>
                        <span class="file-name">${escapeHtml(fileName)}</span>
                        <span class="file-path">${escapeHtml(filePath)}</span>
                    </div>
                    <div class="content">
                        <div class="info-message">${escapeHtml(content)}</div>
                    </div>`;
            } else {
                // Text file with syntax highlighting
                const highlighted = highlightSyntax(content, ext);
                const lines = content.split('\n');
                const lineNums = lines.map((_, i) => i + 1).join('\n');
                const lineCount = lines.length;
                const sizeStr = formatSize(content.length);

                container.innerHTML = `
                    <div class="header">
                        <span class="file-icon">${getFileIcon(ext)}</span>
                        <span class="file-name">${escapeHtml(fileName)}</span>
                        <span class="file-path">${escapeHtml(filePath)}</span>
                        <span class="file-info">${lineCount} lines &middot; ${sizeStr}</span>
                    </div>
                    <div class="content">
                        <div class="code-view">
                            <pre class="line-nums">${lineNums}</pre>
                            <pre class="code-content">${highlighted}</pre>
                        </div>
                    </div>`;
            }
        }

        function showLoading(filePath) {
            currentFilePath = filePath;
            const fileName = filePath.split(/[\\/]/).pop();
            const container = document.getElementById('container');
            container.innerHTML = `
                <div class="header">
                    <span class="file-icon">&#128196;</span>
                    <span class="file-name">${escapeHtml(fileName)}</span>
                    <span class="file-path">${escapeHtml(filePath)}</span>
                </div>
                <div class="content">
                    <div class="info-message">Loading...</div>
                </div>`;
        }

        function showWelcome() {
            currentFilePath = null;
            const container = document.getElementById('container');
            container.innerHTML = `
                <div class="welcome">
                    <div class="icon">&#128196;</div>
                    <div class="text">Click a file in the File Explorer to preview it here</div>
                </div>`;
        }

        // ─── Helpers ────────────────────────────────────────────
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function getFileIcon(ext) {
            const icons = {
                'cs': '&#9839;',   // C#
                'js': '&#9998;',
                'ts': '&#9998;',
                'html': '&#127760;',
                'htm': '&#127760;',
                'css': '&#127912;',
                'json': '&#128203;',
                'xml': '&#128203;',
                'xaml': '&#128203;',
                'md': '&#128214;',
                'py': '&#128013;',
                'ps1': '&#9889;',
                'sql': '&#128451;',
                'clw': '&#9881;',
                'inc': '&#9881;',
                'png': '&#128444;',
                'jpg': '&#128444;',
                'jpeg': '&#128444;',
                'gif': '&#128444;',
                'svg': '&#128444;',
            };
            return icons[ext] || '&#128196;';
        }

        // ─── Syntax Highlighting ────────────────────────────────
        function highlightSyntax(code, ext) {
            const escaped = escapeHtml(code);

            const langGroup = {
                'cs': 'csharp', 'js': 'js', 'ts': 'js', 'jsx': 'js', 'tsx': 'js',
                'html': 'html', 'htm': 'html', 'xaml': 'html', 'xml': 'html', 'svg': 'html',
                'css': 'css', 'json': 'json', 'py': 'python',
                'ps1': 'powershell', 'sh': 'shell', 'bat': 'shell',
                'md': 'markdown', 'sql': 'sql', 'clw': 'clarion', 'inc': 'clarion', 'equ': 'clarion'
            };

            const lang = langGroup[ext] || 'generic';
            let result = escaped;

            // Strings
            result = result.replace(/(&#x27;(?:[^&#]|&#(?!x27;))*?&#x27;|&quot;(?:[^&]|&(?!quot;))*?&quot;)/g,
                '<span class="syn-string">$1</span>');

            // Single-line comments
            if (['csharp', 'js', 'json', 'css'].includes(lang)) {
                result = result.replace(/(\/\/.*?)$/gm, '<span class="syn-comment">$1</span>');
            } else if (['python', 'powershell', 'shell'].includes(lang)) {
                result = result.replace(/(#.*?)$/gm, '<span class="syn-comment">$1</span>');
            } else if (lang === 'html') {
                result = result.replace(/(&lt;!--.*?--&gt;)/gs, '<span class="syn-comment">$1</span>');
            } else if (lang === 'sql') {
                result = result.replace(/(--.*?)$/gm, '<span class="syn-comment">$1</span>');
            }

            // Numbers
            result = result.replace(new RegExp('(<[^>]+>)|\\b(\\d+\\.?\\d*)\\b', 'g'),
                (m, tag, num) => tag ? tag : '<span class="syn-number">' + num + '</span>');

            // Keywords
            let keywords = [];
            if (lang === 'csharp') {
                keywords = ['abstract','as','async','await','base','bool','break','byte','case','catch','char','checked','class','const','continue','decimal','default','delegate','do','double','else','enum','event','explicit','extern','false','finally','fixed','float','for','foreach','goto','if','implicit','in','int','interface','internal','is','lock','long','namespace','new','null','object','operator','out','override','params','private','protected','public','readonly','ref','return','sbyte','sealed','short','sizeof','stackalloc','static','string','struct','switch','this','throw','true','try','typeof','uint','ulong','unchecked','unsafe','ushort','using','var','virtual','void','volatile','while','yield'];
            } else if (lang === 'js') {
                keywords = ['async','await','break','case','catch','class','const','continue','debugger','default','delete','do','else','export','extends','false','finally','for','from','function','if','import','in','instanceof','let','new','null','of','return','static','super','switch','this','throw','true','try','typeof','undefined','var','void','while','with','yield'];
            } else if (lang === 'python') {
                keywords = ['and','as','assert','async','await','break','class','continue','def','del','elif','else','except','False','finally','for','from','global','if','import','in','is','lambda','None','nonlocal','not','or','pass','raise','return','True','try','while','with','yield'];
            } else if (lang === 'sql') {
                keywords = ['SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','JOIN','INNER','LEFT','RIGHT','OUTER','ON','AND','OR','NOT','NULL','IS','IN','LIKE','BETWEEN','ORDER','BY','GROUP','HAVING','UNION','AS','DISTINCT','TOP','LIMIT','OFFSET','BEGIN','END','COMMIT','ROLLBACK','TRANSACTION','PRIMARY','KEY','FOREIGN','REFERENCES','CONSTRAINT','DEFAULT','CHECK','UNIQUE','CASCADE','EXISTS','EXEC','DECLARE','IF','ELSE','WHILE','RETURN','PROCEDURE','FUNCTION','VIEW','TRIGGER','INT','VARCHAR','TEXT','INTEGER','REAL','BLOB','DATETIME','BOOLEAN'];
            }

            if (keywords.length > 0) {
                const kwPattern = new RegExp('(<[^>]+>)|\\b(' + keywords.join('|') + ')\\b', 'g');
                result = result.replace(kwPattern, (m, tag, kw) => tag ? tag : '<span class="syn-keyword">' + kw + '</span>');
            }

            // HTML tags
            if (lang === 'html') {
                result = result.replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="syn-tag">$2</span>');
                result = result.replace(/\b([\w-]+)=/g, '<span class="syn-attr">$1</span>=');
            }

            return result;
        }

        // ─── Theme ──────────────────────────────────────────────
        function applyTheme(isDark) {
            document.body.classList.toggle('light', !isDark);
        }

        // ─── Message Handler ────────────────────────────────────
        window.chrome.webview.addEventListener('message', function(event) {
            const raw = event.data;
            if (typeof raw !== 'string') return;

            const colonIdx = raw.indexOf(':');
            if (colonIdx < 0) return;

            const cmd = raw.substring(0, colonIdx);
            const data = raw.substring(colonIdx + 1);

            switch (cmd) {
                case 'theme':
                    applyTheme(data === 'dark');
                    break;
                case 'fileContent': {
                    try {
                        const fileData = JSON.parse(data);
                        renderFile(fileData.path, fileData.content, fileData.isBinary);
                    } catch (err) {
                        console.error('fileContent parse error:', err, 'data preview:', data.substring(0, 200));
                        const container = document.getElementById('container');
                        container.innerHTML = `
                            <div class="content">
                                <div class="info-message">Error parsing file content: ${escapeHtml(err.message)}</div>
                            </div>`;
                    }
                    break;
                }
                case 'loading':
                    showLoading(data);
                    break;
                case 'welcome':
                    showWelcome();
                    break;
                case 'fontSize':
                    document.documentElement.style.fontSize = parseFloat(data) + 'px';
                    break;
            }
        });

        // Signal ready
        sendToHost({ type: 'ready' });
    </script>
</body>
</html>
