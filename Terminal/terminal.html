<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #terminal-container {
            width: 100%;
            height: 100%;
        }
        /* Reserve the scrollbar gutter permanently so the viewport's usable width
           NEVER changes when the vertical scrollbar shows/hides. fitAddon.proposeDimensions()
           subtracts the LIVE scrollbar width; without a stable gutter that width flips 0<->10px
           as content overflow toggles, which at some window widths lands on a 1-column boundary
           and makes proposeDimensions oscillate (e.g. 97<->98 cols). The 2s drift heartbeat then
           refits on every tick, reflowing the whole grid — the "terminal blanks/repaints every
           ~2s" flash (task 5e36e90b, rescoped from the Project-panel guard). Stable gutter keeps
           the width constant → proposeDimensions stable → no per-tick refit. */
        .xterm-viewport {
            scrollbar-gutter: stable;
        }
        /* Hide scrollbar in xterm viewport for cleaner look - scrolling still works */
        .xterm-viewport::-webkit-scrollbar {
            width: 10px;
        }
        .xterm-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: #666;
        }
    </style>
</head>
<body>
    <div id="terminal-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/lib/addon-web-links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.9.0/lib/addon-unicode11.min.js"></script>

    <script>
        // Theme definitions matching TerminalTheme.cs
        const themes = {
            dark: {
                background: '#0C0C0C',
                foreground: '#CCCCCC',
                cursor: '#FFFFFF',
                cursorAccent: '#000000',
                selectionBackground: '#264F78',
                selectionForeground: '#FFFFFF',
                black: '#0C0C0C',
                red: '#C50F1F',
                green: '#13A10E',
                yellow: '#C19C00',
                blue: '#0037DA',
                magenta: '#881798',
                cyan: '#3A96DD',
                white: '#CCCCCC',
                brightBlack: '#767676',
                brightRed: '#E74856',
                brightGreen: '#16C60C',
                brightYellow: '#F9F1A5',
                brightBlue: '#3B78FF',
                brightMagenta: '#B4009E',
                brightCyan: '#61D6D6',
                brightWhite: '#F2F2F2'
            },
            light: {
                background: '#FFFFFF',
                foreground: '#1E1E1E',
                cursor: '#000000',
                cursorAccent: '#FFFFFF',
                selectionBackground: '#ADD6FF',
                selectionForeground: '#000000',
                black: '#1E1E1E',
                red: '#C50F1F',
                green: '#13A10E',
                yellow: '#C19C00',
                blue: '#0037DA',
                magenta: '#881798',
                cyan: '#3A96DD',
                white: '#CCCCCC',
                brightBlack: '#767676',
                brightRed: '#E74856',
                brightGreen: '#16C60C',
                brightYellow: '#F9F1A5',
                brightBlue: '#3B78FF',
                brightMagenta: '#B4009E',
                brightCyan: '#61D6D6',
                brightWhite: '#F2F2F2'
            }
        };

        let term = null;
        let fitAddon = null;
        let currentFontSize = 10;
        let isInitialized = false;

        // Initialize terminal
        function initTerminal(themeName = 'dark') {
            const container = document.getElementById('terminal-container');

            term = new Terminal({
                cursorBlink: false,
                cursorStyle: 'block',
                fontFamily: '"Cascadia Mono", Consolas, "Courier New", monospace',
                fontSize: currentFontSize,
                theme: themes[themeName] || themes.dark,
                allowProposedApi: true,
                scrollback: 10000,
                convertEol: false,
                letterSpacing: -1,
                lineHeight: 1
            });

            // Load addons
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            const webLinksAddon = new WebLinksAddon.WebLinksAddon();
            term.loadAddon(webLinksAddon);

            // Unicode 11 width tables. xterm.js defaults to Unicode 6, in which
            // many modern emoji (🧪, 📎, 🌟, etc.) are NOT classified as wide.
            // ConPTY on Windows 10/11 treats them as 2-cell. Without this addon,
            // every wide-emoji glyph creates 1 column of cumulative cursor-position
            // drift between xterm.js and ConPTY — manifests as column-aligned
            // stray characters when subsequent ANSI cursor-relative redraws
            // (e.g. menu re-renders) land in the wrong columns.
            const unicode11Addon = new Unicode11Addon.Unicode11Addon();
            term.loadAddon(unicode11Addon);
            term.unicode.activeVersion = '11';

            // Open terminal in container
            term.open(container);

            // Initial fit
            fitAddon.fit();

            // Custom key handler for Windows-style shortcuts
            term.attachCustomKeyEventHandler((event) => {
                // CTRL+C: Copy if text selected, otherwise let it pass as interrupt
                if (event.ctrlKey && event.key === 'c' && event.type === 'keydown') {
                    const selection = term.getSelection();
                    if (selection && selection.length > 0) {
                        // Route copy through the C# host. The page is hosted from a
                        // file:// URL where navigator.clipboard.writeText silently fails,
                        // so the host writes the Windows clipboard (mirrors the paste path).
                        sendToHost({ type: 'copy', selectedText: selection });
                        return false; // Prevent default (don't send to terminal)
                    }
                    // No selection - let CTRL+C pass through as interrupt
                    return true;
                }

                // CTRL+V: Request paste from C# (avoids clipboard permission prompts)
                if (event.ctrlKey && event.key === 'v' && event.type === 'keydown') {
                    event.preventDefault();
                    event.stopPropagation();
                    sendToHost({ type: 'paste' });
                    return false; // Prevent xterm.js from processing
                }

                // CTRL+Enter: Send LF (newline) instead of CR (carriage return)
                if (event.ctrlKey && event.key === 'Enter' && event.type === 'keydown') {
                    sendToHost({ type: 'input', data: btoa('\n') });
                    return false; // Prevent default Enter behavior
                }

                // Let all other keys pass through normally
                return true;
            });

            // OSC 52 clipboard handler. TUI apps running inside the terminal
            // (Claude Code, vim, tmux, etc.) copy to the clipboard by emitting an
            // OSC 52 escape sequence (ESC ] 52 ; <target> ; <base64> BEL) rather
            // than touching the system clipboard directly. xterm.js does not write
            // the host clipboard for OSC 52 on its own, so without this the app's
            // "copied N chars" succeeds from its point of view but nothing lands on
            // the Windows clipboard. Route the payload through the same host copy
            // path used by Ctrl-C / right-click so OnCopyRequested writes it.
            // xterm strips the leading "52;" and hands us "<target>;<base64>".
            term.parser.registerOscHandler(52, (data) => {
                try {
                    const sep = data.indexOf(';');
                    const payload = sep >= 0 ? data.slice(sep + 1) : data;
                    // "?" is a clipboard *read* query — we don't support reporting
                    // the clipboard back, so let xterm handle/ignore it.
                    if (!payload || payload === '?') {
                        return false;
                    }
                    let text;
                    try {
                        const binary = atob(payload);
                        const bytes = Uint8Array.from(binary, (c) => c.charCodeAt(0));
                        text = new TextDecoder('utf-8').decode(bytes);
                    } catch (e) {
                        // Malformed base64 — not ours to handle cleanly.
                        return false;
                    }
                    if (text) {
                        sendToHost({ type: 'copy', selectedText: text });
                    }
                    return true; // handled; suppress default xterm processing
                } catch (e) {
                    return false;
                }
            });

            // Handle user input - send to C#
            // Use TextEncoder to properly encode multi-byte (UTF-8) characters before Base64
            term.onData((data) => {
                const encoder = new TextEncoder();
                const bytes = encoder.encode(data);
                const binary = String.fromCharCode(...bytes);
                sendToHost({ type: 'input', data: btoa(binary) });
            });

            // Handle resize - notify C#
            term.onResize((size) => {
                sendToHost({ type: 'resize', cols: size.cols, rows: size.rows });
            });

            // Handle title changes
            term.onTitleChange((title) => {
                sendToHost({ type: 'title', title: title });
            });

            // Refit xterm.js whenever anything changes the rendering area.
            // window.resize alone misses content-driven shifts (scrollbar appearance
            // when scrollback first exceeds viewport, async font load changing cell
            // metrics, layout reflows inside WebView2 that never bubble to the OS
            // window). When the cell grid drifts without xterm.js refitting, ConPTY
            // keeps writing assuming the old cols/rows while xterm.js renders at
            // slightly different effective dims — surfaces as column-aligned stray
            // characters appearing 1-3 rows away from where they belong.
            let resizeTimeout = null;
            const scheduleRefit = () => {
                if (resizeTimeout) {
                    clearTimeout(resizeTimeout);
                }
                resizeTimeout = setTimeout(() => {
                    if (fitAddon) {
                        fitAddon.fit();
                    }
                    resizeTimeout = null;
                }, 50);
            };

            // ResizeObserver catches container size changes from any cause.
            if (typeof ResizeObserver !== 'undefined') {
                const ro = new ResizeObserver(scheduleRefit);
                ro.observe(container);
            }

            // Kept as a defensive fallback in case the observer is ever silenced.
            window.addEventListener('resize', scheduleRefit);

            // Heartbeat: catches silent drift that ResizeObserver cannot see.
            // Container size can stay constant while xterm.js's effective cell
            // grid changes — async font load, glyph fallback the first time a
            // box-drawing char is rendered, internal renderer rebuild after
            // scrollback fills, DPI/zoom shifts WebView2 swallows. Compares
            // xterm's currently-believed cols/rows against what fitAddon would
            // propose right now; if they disagree, refit so ConPTY gets
            // re-synced via term.onResize. Cheap (~one font-metric calc per tick).
            //
            // Anti-oscillation damper (task 5e36e90b): proposeDimensions() can be
            // unstable on a 1-column boundary (its live scrollbar-width term flips as
            // overflow toggles), making it bounce e.g. 97<->98 forever. Each refit
            // reflowed the whole grid every 2s — a visible full-terminal blank/repaint.
            // The scrollbar-gutter:stable CSS above removes the usual cause; this guard
            // is defense-in-depth: refuse a refit that would send us straight BACK to the
            // size we just left (that's oscillation, not drift). Genuine drift proposes a
            // NEW stable target and still corrects; real container resizes go through the
            // ResizeObserver's direct fit(), not this heartbeat, so they're unaffected.
            let prevBeforeHeartbeatFit = null;
            setInterval(() => {
                if (!term || !fitAddon) return;
                try {
                    const proposed = fitAddon.proposeDimensions();
                    if (!proposed || !proposed.cols || !proposed.rows) return;
                    if (proposed.cols === term.cols && proposed.rows === term.rows) {
                        prevBeforeHeartbeatFit = null; // stable — clear the oscillation guard
                        return;
                    }
                    // Would this refit just bounce us back to the size the previous heartbeat
                    // fit left? Then it's a ±1 oscillation — suppress it and stay put.
                    if (prevBeforeHeartbeatFit &&
                        proposed.cols === prevBeforeHeartbeatFit.cols &&
                        proposed.rows === prevBeforeHeartbeatFit.rows) {
                        return;
                    }
                    console.warn(`[Terminal] Drift detected: term=${term.cols}x${term.rows}, proposed=${proposed.cols}x${proposed.rows}. Refitting.`);
                    prevBeforeHeartbeatFit = { cols: term.cols, rows: term.rows };
                    fitAddon.fit();
                } catch (e) {
                    // proposeDimensions can throw if container is detached — ignore.
                }
            }, 2000);

            // Handle Ctrl+mousewheel for font size
            container.addEventListener('wheel', (e) => {
                if (e.ctrlKey) {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -1 : 1;
                    const newSize = Math.max(6, Math.min(32, currentFontSize + delta));
                    if (newSize !== currentFontSize) {
                        setFontSize(newSize);
                        // Notify C# of font size change so it can be saved
                        sendToHost({ type: 'fontSizeChanged', fontSize: newSize });
                    }
                }
            }, { passive: false });

            // Capture the selection on right mousedown in the CAPTURE phase, before
            // xterm.js (whose listeners are on descendant elements, target/bubble phase)
            // clears the selection. Without this, the contextmenu handler below sees an
            // empty selection and right-click -> Copy has nothing to copy.
            let lastMenuSelection = '';
            container.addEventListener('mousedown', (e) => {
                if (e.button === 2 && term && term.hasSelection()) {
                    lastMenuSelection = term.getSelection();
                }
            }, true);

            // Handle right-click for context menu
            container.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const selectedText = (term && term.hasSelection())
                    ? term.getSelection()
                    : lastMenuSelection;
                lastMenuSelection = '';
                sendToHost({
                    type: 'contextmenu',
                    x: e.clientX,
                    y: e.clientY,
                    selectedText: selectedText
                });
            });

            // Notify C# when terminal is clicked (for dropdown close)
            container.addEventListener('mousedown', () => {
                sendToHost({ type: 'terminalclick' });
            });

            isInitialized = true;

            // Notify C# that terminal is ready
            sendToHost({ type: 'ready', cols: term.cols, rows: term.rows });
        }

        // Send message to C# host
        function sendToHost(message) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(message);
            }
        }

        // Handle messages from C#
        function handleHostMessage(message) {
            if (!term) return;

            if (typeof message === 'string') {
                // Simple string protocol: "command:data"
                const colonIndex = message.indexOf(':');
                if (colonIndex > 0) {
                    const command = message.substring(0, colonIndex);
                    const data = message.substring(colonIndex + 1);

                    switch (command) {
                        case 'data':
                            // Base64 encoded terminal data - decode as UTF-8
                            // Note: Must mask with 0xFF to handle multi-byte UTF-8 chars (emojis)
                            const binaryString = atob(data);
                            const bytes = new Uint8Array(binaryString.length);
                            for (let i = 0; i < binaryString.length; i++) {
                                bytes[i] = binaryString.charCodeAt(i) & 0xFF;
                            }
                            const text = new TextDecoder('utf-8').decode(bytes);
                            term.write(text);
                            break;

                        case 'theme':
                            setTheme(data);
                            break;

                        case 'fontSize':
                            setFontSize(parseFloat(data));
                            break;

                        case 'clear':
                            term.clear();
                            break;

                        case 'reset':
                            term.reset();
                            break;

                        case 'focus':
                            term.focus();
                            break;

                        case 'scrollToBottom':
                            term.scrollToBottom();
                            break;

                        case 'typeInput':
                            // Character-by-character injection — mimics real keyboard typing
                            // (e.g. the "initializing..." banner and prompt auto-answers).
                            // Format: "typeInput:delayMs:base64data"
                            // Each character is sent individually through the xterm input path
                            // with a configurable delay between keystrokes.
                            {
                                let charDelay = 15;
                                let charData = data;
                                const delayMatch = data.match(/^(\d+):(.+)$/);
                                if (delayMatch) {
                                    charDelay = parseInt(delayMatch[1], 10);
                                    charData = delayMatch[2];
                                }
                                const decoded = atob(charData);
                                let charIndex = 0;
                                const typeNextChar = () => {
                                    if (charIndex < decoded.length) {
                                        sendToHost({ type: 'input', data: btoa(decoded[charIndex]) });
                                        charIndex++;
                                        setTimeout(typeNextChar, charDelay);
                                    }
                                };
                                typeNextChar();
                            }
                            break;

                        case 'sendEnter':
                            // Simulate Enter key by sending CR through the input path
                            // This goes through the same channel as physical keypresses

                            // Capture cursor position BEFORE sending Enter
                            const cursorYBefore = term.buffer.active.cursorY;
                            const cursorXBefore = term.buffer.active.cursorX;

                            sendToHost({ type: 'input', data: btoa('\r') });

                            // Poll for cursor movement to verify Enter was processed
                            // If cursor moves to a new line, the prompt was submitted
                            const startTime = Date.now();
                            const maxWaitMs = 500; // Wait up to 500ms for cursor movement

                            const checkCursorMoved = () => {
                                const cursorYAfter = term.buffer.active.cursorY;
                                const cursorXAfter = term.buffer.active.cursorX;
                                const elapsed = Date.now() - startTime;

                                // Success: Cursor moved to a new line OR went back to column 0
                                // (indicates prompt was submitted and new prompt started)
                                if (cursorYAfter !== cursorYBefore || cursorXAfter < cursorXBefore) {
                                    sendToHost({ type: 'enterAck' });
                                    return;
                                }

                                // Timeout: Enter wasn't processed
                                if (elapsed >= maxWaitMs) {
                                    console.warn(`[Terminal] Enter key timeout after ${elapsed}ms - cursor didn't move (Y: ${cursorYBefore} -> ${cursorYAfter}, X: ${cursorXBefore} -> ${cursorXAfter})`);
                                    sendToHost({ type: 'enterAck' }); // Still ack to prevent hang
                                    return;
                                }

                                // Keep polling every 10ms
                                setTimeout(checkCursorMoved, 10);
                            };

                            // Start polling after brief delay to let terminal process
                            setTimeout(checkCursorMoved, 20);
                            break;
                    }
                }
            }
        }

        // Set theme
        function setTheme(themeName) {
            const theme = themes[themeName] || themes.dark;
            if (term) {
                term.options.theme = theme;
                document.body.style.backgroundColor = theme.background;
            }
        }

        // Set font size
        function setFontSize(size) {
            size = Math.max(6, Math.min(32, size));
            currentFontSize = size;
            if (term) {
                term.options.fontSize = size;
                if (fitAddon) {
                    fitAddon.fit();
                }
            }
        }

        // Get selected text from terminal (exposed to C# via window object)
        function getSelectedText() {
            return (term && term.hasSelection()) ? term.getSelection() : '';
        }
        window.terminalGetSelection = getSelectedText;

        // Listen for messages from C#
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', (event) => {
                handleHostMessage(event.data);
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initTerminal('dark');
        });

        // Also handle case where DOM is already loaded
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(() => {
                if (!isInitialized) {
                    initTerminal('dark');
                }
            }, 0);
        }
    </script>
</body>
</html>
