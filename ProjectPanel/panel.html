        // Start editing a cell in an assoc row (single-line only)
        function startAssocEdit(element, tableName, rowId) {
            const field = element.dataset.field;
            const originalValue = element.dataset.value || '';
            _openEditor(element, originalValue, false, (val) => {
                _closeEditor(element, val, (v) => updateAssociation(tableName, rowId, field, v));
            });
        }

        // Primary key field name per table — used when adding a new row
        const ASSOC_PRIMARY_KEY = {
            agents: 'agentName',
            mcpServers: 'serverName',
            skills: 'skillName',
            specialistAgents: 'agentType',
            projectPaths: 'pathValue',
            dbPrompts: 'promptText'
        };

        // Tables that use a picker popup instead of free-text add
        const PICKER_TABLES = { agents: true, mcpServers: true, skills: true, specialistAgents: true };

        // Add a new association row (or open picker for supported tables)
        function addAssociation(tableName) {
            if (PICKER_TABLES[tableName]) {
                openAssociationPicker(tableName);
                return;
            }

            const container = document.getElementById('assoc-rows-' + tableName);
            if (!container) return;

            const primaryKey = ASSOC_PRIMARY_KEY[tableName] || 'name';

            const newRow = document.createElement('div');
            newRow.className = 'assoc-row adding';
            newRow.dataset.table = tableName;
            newRow.dataset.id = 'new_' + Date.now();

            const input = document.createElement('input');
            input.className = 'edit-input';
            input.type = 'text';
            input.placeholder = 'Enter value...';
            input.style.flex = '1';

            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'remove-btn';
            cancelBtn.style.opacity = '1';
            cancelBtn.innerHTML = '&#x2715;';
            cancelBtn.onclick = () => newRow.remove();

            newRow.appendChild(input);
            newRow.appendChild(cancelBtn);
            container.appendChild(newRow);
            input.focus();

            let committed = false;
            function commitAdd() {
                if (committed) return;
                committed = true;
                const val = input.value.trim();
                if (!val) { newRow.remove(); return; }
                sendToHost({ type: 'updateAssociation', tableName: tableName, action: 'add', item: JSON.stringify({ [primaryKey]: val }) });
                newRow.remove();
                // Badge will be updated when associationSaved arrives with newId
            }

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); commitAdd(); }
                else if (e.key === 'Escape') { newRow.remove(); }
            });
            input.addEventListener('blur', () => setTimeout(commitAdd, EDIT_BLUR_DELAY));
        }

        // Remove an association row
        function removeAssociation(tableName, pkValue) {
            const pkField = ASSOC_PRIMARY_KEY[tableName] || 'id';
            sendToHost({ type: 'updateAssociation', tableName: tableName, action: 'delete', item: JSON.stringify({ [pkField]: pkValue }) });
            const row = document.querySelector(`.assoc-row[data-table="${tableName}"][data-id="${pkValue}"]`)
                     || document.querySelector(`.assoc-row[data-table="${tableName}"] .editable[data-value="${pkValue}"]`)?.closest('.assoc-row');
            if (row) row.remove();
            // Update badge
            const badge = document.querySelector(`#assoc-rows-${tableName}`)?.closest('.section')?.querySelector('.section-badge');
            if (badge) badge.textContent = Math.max(0, parseInt(badge.textContent) - 1);
        }

        // Update a single association field
        function updateAssociation(tableName, id, field, value) {
            sendToHost({ type: 'updateAssociation', tableName: tableName, action: 'update', item: JSON.stringify({ id: id, [field]: value }) });
        }

        function openAgentsPicker() {
            // Get currently assigned agent names
            const assigned = new Set(
                (currentAssociations?.agents || []).map(a => a.agentName)
            );

            // Build picker items from cached available agents
            const items = cachedAvailableAgents.map(p => ({
                id: p.id,
                displayName: p.displayName || p.id,
                role: p.role || '',
                preferredModel: p.preferredModel || '',
                checked: assigned.has(p.displayName) || assigned.has(p.id)
            }));

            if (items.length === 0) {

                showPickerDialog('Select Agents', '<div class="picker-empty">No team member profiles found.</div>', null);

            let listHtml = '';
            items.forEach((item, i) => {

                listHtml += `
                    <label class="picker-item">

        function showPickerDialog(title, listHtml, onSave) {
            // Remove any existing picker
            const existing = document.querySelector('.picker-overlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.className = 'picker-overlay';
            overlay.innerHTML = `
                <div class="picker-dialog">
                    <div class="picker-header">${escapeHtml(title)}</div>
                    <div class="picker-list">${listHtml}</div>
                    <div class="picker-footer">
                        <button class="picker-btn cancel-btn">Cancel</button>
                        ${onSave ? '<button class="picker-btn primary save-btn">Save</button>' : ''}
                    </div>
                </div>`;

            // Wire cancel
            overlay.querySelector('.cancel-btn').onclick = () => overlay.remove();

            // Close on overlay click (outside dialog)
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

            // Wire save
            if (onSave) {
                overlay.querySelector('.save-btn').onclick = () => {
                    onSave();
                    overlay.remove();
                };
            }

            // Escape to close
            const onKey = (e) => {
                if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); }
            };
            document.addEventListener('keydown', onKey);

            document.body.appendChild(overlay);
        }

        function commitAgentsPicker() {
            const overlay = document.querySelector('.picker-overlay');
            if (!overlay) return;

            // Get currently assigned agent names
            const currentAgents = (currentAssociations?.agents || []);
            const assignedNames = new Set(currentAgents.map(a => a.agentName));

            // Get checked agent names from picker
            const checkboxes = overlay.querySelectorAll('input[type="checkbox"]');
            const checkedNames = new Set();
            const checkedDetails = {};
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const name = cb.dataset.agentName;
                    checkedNames.add(name);
                    checkedDetails[name] = {
                        role: cb.dataset.agentRole || '',
                        preferredModel: cb.dataset.agentModel || ''
                    };
                }
            });

            // Compute diff: agents to add
            checkedNames.forEach(name => {
                if (!assignedNames.has(name)) {
                    const details = checkedDetails[name];
                    sendToHost({
                        type: 'updateAssociation',
                        tableName: 'agents',
                        action: 'add',
                        item: JSON.stringify({
                            agentName: name,
                            role: details.role,
                            preferredModel: details.preferredModel
                        })
                    });
                }
            });

            // Compute diff: agents to remove
            currentAgents.forEach(a => {
                if (!checkedNames.has(a.agentName)) {
                    sendToHost({
                        type: 'updateAssociation',
                        tableName: 'agents',
                        action: 'delete',
                        item: JSON.stringify({ agentName: a.agentName })
                    });
                }
            });
        }

        // ─── Tabs ──────────────────────────────────────────────────────
        function switchTab(tabId, btnEl) {
            // Deactivate all tabs and buttons
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            // Activate selected
            const tabEl = document.getElementById('tab-' + tabId);
            if (tabEl) tabEl.classList.add('active');
            if (btnEl) btnEl.classList.add('active');

            // Lazy-load file explorer on first switch
            if (tabId === 'file-explorer' && currentData && currentData.path) {
                const tree = document.getElementById('file-tree');
                if (tree && tree.children.length === 0) {
                    loadDirectory(currentData.path, tree, 0);
                }
            }
        }

        // ─── File Explorer ────────────────────────────────────────────
        let pendingDirCallbacks = {};

        function loadDirectory(dirPath, containerEl, depth) {
            // Show loading indicator
            const loadingEl = document.createElement('div');
            loadingEl.className = 'tree-loading';
            loadingEl.style.setProperty('--indent', (depth * 16) + 'px');
            loadingEl.textContent = 'Loading...';
            containerEl.appendChild(loadingEl);

            // Register callback for when data arrives
            pendingDirCallbacks[dirPath] = { container: containerEl, depth: depth, loading: loadingEl };
            sendToHost({ type: 'listDirectory', path: dirPath });
        }

        function renderDirectoryListing(dirPath, entries) {
            const cb = pendingDirCallbacks[dirPath];
            if (!cb) return;
            delete pendingDirCallbacks[dirPath];

            // Remove loading indicator
            if (cb.loading && cb.loading.parentElement) {
                cb.loading.remove();
            }

            const container = cb.container;
            const depth = cb.depth;

            entries.forEach(entry => {
                if (entry.isDir) {
                    // Directory node
                    const nodeEl = document.createElement('div');

                    const headerEl = document.createElement('div');
                    headerEl.className = 'tree-node';
                    headerEl.style.setProperty('--indent', (depth * 16) + 'px');
                    headerEl.innerHTML = `
                        <span class="tree-toggle">&#9654;</span>
                        <span class="tree-icon">\uD83D\uDCC1</span>
                        <span class="tree-name">${escapeHtml(entry.name)}</span>`;

                    const childrenEl = document.createElement('div');
                    childrenEl.className = 'tree-children collapsed';

                    let loaded = false;
                    headerEl.addEventListener('click', () => {
                        const isCollapsed = childrenEl.classList.contains('collapsed');
                        if (isCollapsed) {
                            childrenEl.classList.remove('collapsed');
                            headerEl.querySelector('.tree-toggle').innerHTML = '&#9660;';
                            headerEl.querySelector('.tree-icon').textContent = '\uD83D\uDCC2'; // 📂
                            if (!loaded) {
                                loaded = true;
                                loadDirectory(entry.path, childrenEl, depth + 1);
                            }
                        } else {
                            childrenEl.classList.add('collapsed');
                            headerEl.querySelector('.tree-toggle').innerHTML = '&#9654;';
                            headerEl.querySelector('.tree-icon').textContent = '\uD83D\uDCC1'; // 📁
                        }
                    });

                    nodeEl.appendChild(headerEl);
                    nodeEl.appendChild(childrenEl);
                    container.appendChild(nodeEl);
                } else {
                    // File node
                    const nodeEl = document.createElement('div');
                    nodeEl.className = 'tree-node';
                    nodeEl.style.setProperty('--indent', (depth * 16) + 'px');
                    const fileIcon = getFileIcon(entry.name);
                    nodeEl.innerHTML = `
                        <span class="tree-toggle"></span>
                        <span class="tree-icon">${fileIcon}</span>
                        <span class="tree-name">${escapeHtml(entry.name)}</span>
                        <span class="tree-size">${formatFileSize(entry.size)}</span>`;
                    nodeEl.addEventListener('click', () => {
                        // Deselect all, select this
                        document.querySelectorAll('.tree-node.selected').forEach(el => el.classList.remove('selected'));
                        nodeEl.classList.add('selected');
                        openFile(entry.path, entry.name);
                    });
                    container.appendChild(nodeEl);
                }
            });

            if (entries.length === 0) {
                const emptyEl = document.createElement('div');
                emptyEl.className = 'tree-loading';
                emptyEl.style.setProperty('--indent', (depth * 16 + 20) + 'px');
                emptyEl.textContent = '(empty)';
                container.appendChild(emptyEl);
            }
        }

        function getFileIcon(filename) {
            const ext = filename.includes('.') ? filename.split('.').pop().toLowerCase() : '';
            const icons = {
                'cs': '\uD83D\uDCDD', 'js': '\uD83D\uDFE8', 'ts': '\uD83D\uDD35', 'html': '\uD83C\uDF10',
                'css': '\uD83C\uDFA8', 'json': '\u2699\uFE0F', 'xml': '\uD83D\uDCC4', 'md': '\uD83D\uDCD6',
                'py': '\uD83D\uDC0D', 'ps1': '\uD83D\uDCBB', 'sh': '\uD83D\uDCBB', 'bat': '\uD83D\uDCBB',
                'png': '\uD83D\uDDBC\uFE0F', 'jpg': '\uD83D\uDDBC\uFE0F', 'jpeg': '\uD83D\uDDBC\uFE0F',
                'gif': '\uD83D\uDDBC\uFE0F', 'svg': '\uD83D\uDDBC\uFE0F', 'ico': '\uD83D\uDDBC\uFE0F',
                'sln': '\uD83D\uDCE6', 'csproj': '\uD83D\uDCE6', 'clw': '\uD83D\uDD27', 'inc': '\uD83D\uDD27',
                'xaml': '\uD83D\uDDA5\uFE0F', 'sql': '\uD83D\uDDC3\uFE0F'
            };
            return icons[ext] || '\uD83D\uDCC4';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // ─── File Viewer ──────────────────────────────────────────────
        function openFile(filePath, fileName) {
            sendToHost({ type: 'readFile', path: filePath });
            // Show loading in viewer
            const viewer = document.getElementById('file-viewer-container');
            if (viewer) {
                viewer.innerHTML = `
                    <div class="file-viewer">
                        <div class="file-viewer-header">
                            <span class="file-name">${escapeHtml(fileName)}</span>
                            <span style="color:var(--text-muted);font-size:10px;">${escapeHtml(filePath)}</span>
                            <button class="file-viewer-close" onclick="closeFileViewer()" title="Close">&times;</button>
                        </div>
                        <div class="file-viewer-content">
                            <div style="padding:16px;color:var(--text-muted);">Loading...</div>
                        </div>
                    </div>`;
            }
        }

        function renderFileContent(filePath, content, isBinary) {
            const viewer = document.getElementById('file-viewer-container');
            if (!viewer) return;

            const fileName = filePath.split(/[\\/]/).pop();
            const ext = fileName.includes('.') ? fileName.split('.').pop().toLowerCase() : '';

            let bodyHtml;
            if (isBinary && content.startsWith('data:image')) {
                // Image
                bodyHtml = `<div class="file-viewer-image"><img src="${content}" alt="${escapeHtml(fileName)}"></div>`;
            } else {
                // Text content with syntax highlighting and line numbers
                const highlighted = highlightSyntax(content, ext);
                const lines = content.split('\n');
                const lineNums = lines.map((_, i) => i + 1).join('\n');
                bodyHtml = `
                    <div class="line-numbers">
                        <pre class="line-nums">${lineNums}</pre>
                        <pre>${highlighted}</pre>
                    </div>`;
            }

            viewer.innerHTML = `
                <div class="file-viewer">
                    <div class="file-viewer-header">
                        <span class="file-name">${escapeHtml(fileName)}</span>
                        <span style="color:var(--text-muted);font-size:10px;">${escapeHtml(filePath)}</span>
                        <button class="file-viewer-close" onclick="closeFileViewer()" title="Close">&times;</button>
                    </div>
                    <div class="file-viewer-content">
                        ${bodyHtml}
                    </div>
                </div>`;
        }

        function closeFileViewer() {
            const viewer = document.getElementById('file-viewer-container');
            if (viewer) viewer.innerHTML = '';
            document.querySelectorAll('.tree-node.selected').forEach(el => el.classList.remove('selected'));
        }

        // ─── Simple Syntax Highlighting ───────────────────────────────
        function highlightSyntax(code, ext) {
            const escaped = escapeHtml(code);

            const langGroup = {
                'cs': 'csharp', 'js': 'js', 'ts': 'js', 'jsx': 'js', 'tsx': 'js',
                'html': 'html', 'htm': 'html', 'xaml': 'html', 'xml': 'html', 'svg': 'html',
                'css': 'css', 'json': 'json', 'py': 'python',
                'ps1': 'powershell', 'sh': 'shell', 'bat': 'shell',
                'md': 'markdown', 'sql': 'sql', 'clw': 'clarion', 'inc': 'clarion', 'equ': 'clarion'
            };

            const lang = langGroup[ext] || 'generic';

            // Apply comment and string highlighting first (these take priority)
            let result = escaped;

            // Strings (double-quoted and single-quoted)
            result = result.replace(/(&#x27;(?:[^&#]|&#(?!x27;))*?&#x27;|&quot;(?:[^&]|&(?!quot;))*?&quot;)/g,
                '<span class="syn-string">$1</span>');

            // Single-line comments
            if (['csharp', 'js', 'json', 'css'].includes(lang)) {
                result = result.replace(/(\/\/.*?)$/gm, '<span class="syn-comment">$1</span>');
            } else if (lang === 'python') {
                result = result.replace(/(#.*?)$/gm, '<span class="syn-comment">$1</span>');
            } else if (['powershell', 'shell'].includes(lang)) {
                result = result.replace(/(#.*?)$/gm, '<span class="syn-comment">$1</span>');
            } else if (lang === 'html') {
                result = result.replace(/(&lt;!--.*?--&gt;)/gs, '<span class="syn-comment">$1</span>');
            } else if (lang === 'sql') {
                result = result.replace(/(--.*?)$/gm, '<span class="syn-comment">$1</span>');
            }

            // Numbers — tag-aware to avoid corrupting already-highlighted spans
            result = result.replace(new RegExp('(<[^>]+>)|\\b(\\d+\\.?\\d*)\\b', 'g'),
                (m, tag, num) => tag ? tag : '<span class="syn-number">' + num + '</span>');

            // Keywords by language
            let keywords = [];
            if (lang === 'csharp') {
                keywords = ['abstract','as','async','await','base','bool','break','byte','case','catch','char','checked','class','const','continue','decimal','default','delegate','do','double','else','enum','event','explicit','extern','false','finally','fixed','float','for','foreach','goto','if','implicit','in','int','interface','internal','is','lock','long','namespace','new','null','object','operator','out','override','params','private','protected','public','readonly','ref','return','sbyte','sealed','short','sizeof','stackalloc','static','string','struct','switch','this','throw','true','try','typeof','uint','ulong','unchecked','unsafe','ushort','using','var','virtual','void','volatile','while','yield'];
            } else if (lang === 'js') {
                keywords = ['async','await','break','case','catch','class','const','continue','debugger','default','delete','do','else','export','extends','false','finally','for','from','function','if','import','in','instanceof','let','new','null','of','return','static','super','switch','this','throw','true','try','typeof','undefined','var','void','while','with','yield'];
            } else if (lang === 'python') {
                keywords = ['and','as','assert','async','await','break','class','continue','def','del','elif','else','except','False','finally','for','from','global','if','import','in','is','lambda','None','nonlocal','not','or','pass','raise','return','True','try','while','with','yield'];
            } else if (lang === 'sql') {
                keywords = ['SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','JOIN','INNER','LEFT','RIGHT','OUTER','ON','AND','OR','NOT','NULL','IS','IN','LIKE','BETWEEN','ORDER','BY','GROUP','HAVING','UNION','AS','DISTINCT','TOP','LIMIT','OFFSET','BEGIN','END','COMMIT','ROLLBACK','TRANSACTION','PRIMARY','KEY','FOREIGN','REFERENCES','CONSTRAINT','DEFAULT','CHECK','UNIQUE','CASCADE','EXISTS','EXEC','DECLARE','IF','ELSE','WHILE','RETURN','PROCEDURE','FUNCTION','VIEW','TRIGGER','INT','VARCHAR','TEXT','INTEGER','REAL','BLOB','DATETIME','BOOLEAN'];
            }

            // Tag-aware keyword replacement — skips content inside HTML tags from earlier passes
            if (keywords.length > 0) {
                const kwPattern = new RegExp('(<[^>]+>)|\\b(' + keywords.join('|') + ')\\b', 'g');
                result = result.replace(kwPattern, (m, tag, kw) => tag ? tag : '<span class="syn-keyword">' + kw + '</span>');
            }

            // HTML tags
            if (lang === 'html') {
                result = result.replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="syn-tag">$2</span>');
                result = result.replace(/\b([\w-]+)=/g, '<span class="syn-attr">$1</span>=');
            }

            return result;
        }

        // ─── Project Selector ───────────────────────────────────────────
        let cachedProjectList = [];
        let cachedCurrentProjectId = '';
        let _projectSelectorPendingOpen = false;
        let _projectListLoading = false; // true while a getProjectList request is outstanding

        function openProjectSelector() {
            if (cachedProjectList.length > 0) {
                showProjectSelectorPopup();
            } else {
                // Open the popup IMMEDIATELY in a loading state and request data — the
                // 'projectList' reply refreshes the already-open popup (existing path).
                // Never leave the click a silent no-op: if the host reply races or is
                // lost (task d2dd75a3 defect 1), the user still sees the popup with its
                // loading row and a working Close, instead of nothing happening.
                _projectSelectorPendingOpen = true;
                _projectListLoading = true;
                showProjectSelectorPopup();
                sendToHost({ type: 'getProjectList' });
            }
        }

        function showProjectSelectorPopup(filterText) {
            filterText = (filterText || '').toLowerCase();
            const filtered = filterText
                ? cachedProjectList.filter(p =>
                    p.name.toLowerCase().includes(filterText) ||
                    (p.description || '').toLowerCase().includes(filterText))
                : cachedProjectList;

            let itemsHtml = '';
            if (filtered.length === 0) {
                // Distinguish the three empty cases: still waiting on the host,
                // genuinely no registered projects (first run), or filter miss.
                itemsHtml = _projectListLoading
                    ? '<div class="picker-empty">Loading projects…</div>'
                    : (cachedProjectList.length === 0 && !filterText
                        ? '<div class="picker-empty">No projects registered yet — use <strong>Manage Projects</strong> to add one, or run <code>/multiterminal-addproject</code> in a Claude Code terminal</div>'
                        : '<div class="picker-empty">No matching projects</div>');
            } else {
                filtered.forEach(p => {
                    const isCurrent = p.id === cachedCurrentProjectId;
                    const icon = p.icon || '\uD83D\uDCC1'; // 📁
                    const iconStyle = p.iconColor ? `style="color:${escapeHtml(p.iconColor)}"` : '';
                    itemsHtml += `
                        <div class="project-selector-item${isCurrent ? ' current' : ''}"
                             onclick="selectProject('${escapeJs(p.id)}')">
                            <span class="project-selector-icon" ${iconStyle}>${escapeHtml(icon)}</span>
                            <div class="project-selector-info">
                                <div class="project-selector-name">${escapeHtml(p.name)}${isCurrent ? ' <span style=\"font-size:10px;color:var(--accent-color)\">(current)</span>' : ''}</div>
                                ${p.description ? `<div class="project-selector-desc">${escapeHtml(p.description)}</div>` : ''}
                                <div class="project-selector-path">${escapeHtml(p.path)}</div>
                            </div>
                        </div>`;
                });
            }

            // Remove existing overlay if any
            const existing = document.querySelector('.picker-overlay.project-selector');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.className = 'picker-overlay project-selector';
            overlay.innerHTML = `
                <div class="picker-dialog" style="width:440px;">
                    <div class="picker-header">Switch Project</div>
                    <input class="project-selector-search" type="text" placeholder="Search projects..."
                           value="${escapeHtml(filterText)}" oninput="onProjectSearchInput(this.value)">
                    <div class="picker-list" style="max-height:55vh; padding: 4px 0;">
                        ${itemsHtml}
                    </div>
                    <div class="project-selector-footer">
                        <button class="picker-btn" onclick="closeProjectSelector()">Close</button>
                    </div>
                </div>`;
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closeProjectSelector();
            });
            document.body.appendChild(overlay);

            // Focus search
            const searchInput = overlay.querySelector('.project-selector-search');
            if (searchInput) setTimeout(() => searchInput.focus(), 50);
        }

        function onProjectSearchInput(value) {
            showProjectSelectorPopup(value);
        }

        function selectProject(projectId) {
            closeProjectSelector();
            sendToHost({ type: 'selectProject', value: projectId });
        }

        function closeProjectSelector() {
            const overlay = document.querySelector('.picker-overlay.project-selector');
            if (overlay) overlay.remove();
        }

        // Handle messages from C#
        function handleHostMessage(message) {
            if (typeof message === 'string') {
                const colonIndex = message.indexOf(':');
                if (colonIndex > 0) {
                    const command = message.substring(0, colonIndex);
                    const data = message.substring(colonIndex + 1);

                    switch (command) {
                        case 'project':
                            currentData = JSON.parse(data);
                            renderProject(currentData);
                            applyTeamLeadOptions(); // Re-apply cached options after re-render
                            break;
                        case 'welcome':
                            renderWelcome();
                            break;
                        case 'notRegistered':
                            renderNotRegistered(data);
                            break;
                        case 'theme':
                            setTheme(data);
                            break;
                        case 'sessions':
                            const sessions = JSON.parse(data);
                            renderSessions(sessions);
                            break;
                        case 'syncResult':
                            const count = parseInt(data) || 0;
                            const btn = document.getElementById('sync-sessions-btn');
                            if (btn) btn.classList.remove('spinning');
                            console.log('Synced ' + count + ' sessions');
                            break;
                        case 'sessionMessages':
                            const msgData = JSON.parse(data);
                            renderSessionMessages(msgData.sessionId, msgData.messages);
                            break;
                        case 'searchResults':
                            const searchData = JSON.parse(data);
                            renderSearchResults(searchData);
                            break;
                        case 'fontSize':
                            const size = parseFloat(data);
                            if (!isNaN(size)) {
                                document.body.style.fontSize = size + 'px';
                            }
                            break;
                        case 'fieldSaved': {
                            const saved = JSON.parse(data);
                            if (saved.success) {
                                // Flash all elements with this data-field
                                document.querySelectorAll(`[data-field="${saved.field}"]`).forEach(el => flashElement(el));
                            }
                            break;
                        }
                        case 'teamLeadOptions': {
                            cachedTeamLeadOptions = JSON.parse(data);
                            applyTeamLeadOptions();
                            break;
                        }
                        case 'sourceAccountOptions': {
                            cachedSourceAccountOptions = JSON.parse(data);
                            applySourceAccountOptions();
                            break;
                        }
                        case 'availableAgents': {
                            cachedAvailableAgents = JSON.parse(data);
                            break;
                        }
                        case 'availableMcpServers': {
                            // Gateway servers: DTOs with name, displayName, description, enabled, connected, toolCount
                            const wasEmpty = cachedAvailableMcpServers.length === 0;
                            cachedAvailableMcpServers = JSON.parse(data);
                            // If the picker was deferred because the cache was empty, open it now.
                            if (_mcpPickerPendingOpen) {
                                _mcpPickerPendingOpen = false;
                                if (cachedAvailableMcpServers.length > 0) {
                                    openMcpServersPicker(true);
                                } else {
                                    showPickerDialog('Select MCP Servers', '<div class="picker-empty">No MCP servers found in gateway.</div>', null);
                                }
                            }
                            // Re-render only when transitioning from empty cache to populated.
                            if (wasEmpty && currentAssociations) {
                                renderAssociations(currentAssociations);
                            }
                            break;
                        }
                        case 'availableSkills': {
                            cachedAvailableSkills = JSON.parse(data);
                            if (_skillsPickerPendingOpen) {
                                _skillsPickerPendingOpen = false;
                                if (cachedAvailableSkills.length > 0) {
                                    openSkillsPicker();
                                } else {
                                    showPickerDialog('Select Skills', '<div class="picker-empty">No skills found in ~/.claude/skills/</div>', null);
                                }
                            }
                            break;
                        }
                        case 'availableSpecialistAgents': {
                            cachedAvailableSpecialistAgents = JSON.parse(data);
                            if (_specialistAgentsPickerPendingOpen) {
                                _specialistAgentsPickerPendingOpen = false;
                                if (cachedAvailableSpecialistAgents.length > 0) {
                                    openSpecialistAgentsPicker();
                                } else {
                                    showPickerDialog('Select Specialist Agents', '<div class="picker-empty">No agents found in .claude/agents/</div>', null);
                                }
                            }
                            break;
                        }
                        case 'associations': {
                            const assocData = JSON.parse(data);
                            renderAssociations(assocData);
                            break;
                        }
                        case 'associationSaved': {
                            const asSaved = JSON.parse(data);
                            if (asSaved.success) {
                                // Re-request associations to get fresh data rendered
                                sendToHost({ type: 'getAssociations' });
                            }
                            break;
                        }
                        case 'mcpJsonWriteResult': {
                            const wr = JSON.parse(data);
                            showMcpToast(
                                wr.success ? '.mcp.json written successfully.' : ('Write failed: ' + (wr.error || 'unknown error')),
                                wr.success ? 'success' : 'error'
                            );
                            break;
                        }
                        case 'directoryListing': {
                            const dirData = JSON.parse(data);
                            renderDirectoryListing(dirData.path, dirData.entries || []);
                            break;
                        }
                        case 'fileContent': {
                            const fileData = JSON.parse(data);
                            renderFileContent(fileData.path, fileData.content, fileData.isBinary);
                            break;
                        }
                        case 'projectList': {
                            const plData = JSON.parse(data);
                            cachedProjectList = plData.projects || [];
                            cachedCurrentProjectId = plData.currentProjectId || '';
                            _projectListLoading = false; // reply arrived — loading row becomes real content (or true empty-state)
                            // If the selector was waiting for data, open it now
                            if (_projectSelectorPendingOpen) {
                                _projectSelectorPendingOpen = false;
                                showProjectSelectorPopup();
                            }
                            // If the selector popup is already open, refresh it
                            const existingSelector = document.querySelector('.picker-overlay.project-selector');
                            if (existingSelector) {
                                const searchInput = existingSelector.querySelector('.project-selector-search');
                                showProjectSelectorPopup(searchInput ? searchInput.value : '');
                            }
                            break;
                        }
                        case 'newProjectHint': {
                            const container = document.getElementById('container');
                            // Prevent duplicate hints
                            const existing = container?.querySelector('.new-project-hint');
                            if (existing) break;
                            if (container) {
                                const hint = document.createElement('div');
                                hint.className = 'new-project-hint';
                                hint.innerHTML = `
                                    <span>To add a new project, run <code>/new-project</code> in a Claude Code terminal.</span>
                                    <button class="hint-close" onclick="this.parentElement.remove()" title="Dismiss">&times;</button>
                                `;
                                container.prepend(hint);
                            }
                            break;
                        }
                    }
                }
            }
        }

        // Listen for messages from C#
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', (event) => {
                handleHostMessage(event.data);
            });
        }

        // Initialize with welcome state
        document.addEventListener('DOMContentLoaded', () => {
            renderWelcome();
            sendToHost({ type: 'ready' });
        });
    </script>
</body>
</html>
