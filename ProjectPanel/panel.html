<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Panel</title>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-tertiary: #2d2d30;
            --bg-hover: #3e3e42;
            --border-color: #3e3e42;
            --text-primary: #cccccc;
            --text-secondary: #9d9d9d;
            --text-muted: #6d6d6d;
            --accent-color: #0078d4;
            --accent-hover: #1084d8;
            --success-color: #4ec9b0;
            --warning-color: #dcdcaa;
            --stat-bg: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .container {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
        }

        .container::-webkit-scrollbar {
            width: 8px;
        }

        .container::-webkit-scrollbar-track {
            background: transparent;
        }

        .container::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .container::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        /* Header Section */
        .project-header {
            margin-bottom: 16px;
        }

        .project-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-name .icon {
            font-size: 18px;
        }

        .project-path {
            font-size: 11px;
            color: var(--text-muted);
            word-break: break-all;
            cursor: pointer;
            transition: color 0.2s;
        }

        .project-path:hover {
            color: var(--accent-color);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--stat-bg);
            border-radius: 6px;
            padding: 10px 8px;
            text-align: center;
            transition: background 0.2s, transform 0.2s;
        }

        .stat-card:hover {
            background: var(--bg-hover);
            transform: translateY(-1px);
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--success-color);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Section */
        .section {
            margin-bottom: 12px;
        }

        .section-header {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 8px;
        }

        .section-header:hover {
            color: var(--accent-color);
        }

        .section-toggle {
            font-size: 10px;
            margin-right: 8px;
            transition: transform 0.2s;
            color: var(--text-secondary);
        }

        .section-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .section-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .section-content.collapsed {
            max-height: 0 !important;
        }

        /* Description & Changelog */
        .text-content {
            font-size: 12px;
            color: var(--text-primary);
            line-height: 1.5;
            white-space: pre-wrap;
            padding: 8px 10px;
            background: var(--bg-secondary);
            border-radius: 4px;
            border-left: 3px solid var(--accent-color);
        }

        .text-content.empty {
            color: var(--text-muted);
            font-style: italic;
            border-left-color: var(--border-color);
        }

        /* Prompts Tree */
        .prompts-tree {
            list-style: none;
        }

        .prompt-category {
            margin-bottom: 4px;
        }

        .category-header {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .category-header:hover {
            background: var(--bg-hover);
        }

        .category-toggle {
            font-size: 10px;
            margin-right: 6px;
            color: var(--text-secondary);
            transition: transform 0.2s;
        }

        .category-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .category-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .category-count {
            margin-left: auto;
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .prompt-list {
            list-style: none;
            margin-left: 20px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .prompt-list.collapsed {
            max-height: 0 !important;
        }

        .prompt-item {
            padding: 5px 10px;
            margin: 2px 0;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
            color: var(--text-primary);
        }

        .prompt-item:hover {
            background: var(--bg-hover);
        }

        .prompt-item .icon {
            color: var(--warning-color);
            font-size: 12px;
        }

        .prompt-item.global .icon {
            color: var(--success-color);
        }

        /* Welcome State */
        .welcome-state {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .welcome-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .tips-list {
            text-align: left;
            background: var(--bg-secondary);
            border-radius: 6px;
            padding: 16px;
        }

        .tip-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .tip-item .icon {
            color: var(--accent-color);
            flex-shrink: 0;
        }

        /* Not Registered State */
        .not-registered {
            text-align: center;
            padding: 30px 20px;
        }

        .not-registered .icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .not-registered .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--warning-color);
        }

        .not-registered .path {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 16px;
            word-break: break-all;
        }

        .command-box {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Cascadia Mono', Consolas, monospace;
            font-size: 12px;
            color: var(--success-color);
            margin-top: 12px;
        }

        /* Sessions List */
        .sessions-list { max-height: none; overflow-y: auto; }
        .session-item { padding: 8px 10px; margin: 4px 0; border-radius: 4px; background: var(--bg-secondary); border-left: 3px solid transparent; transition: border-color 0.2s; }
        .session-item:hover { background: var(--bg-hover); }
        .session-item.expanded { border-left-color: var(--accent-color); }
        .session-header { display: flex; align-items: flex-start; gap: 6px; cursor: pointer; }
        .session-header .expand-icon { font-size: 10px; color: var(--text-secondary); transition: transform 0.2s; margin-top: 3px; flex-shrink: 0; }
        .session-item.expanded .expand-icon { transform: rotate(90deg); }
        .session-title { font-weight: 500; margin-bottom: 4px; flex: 1; }
        .session-meta { font-size: 10px; color: var(--text-secondary); display: flex; gap: 12px; margin-left: 16px; flex-wrap: wrap; }
        .session-badge { margin-left: auto; font-size: 10px; background: var(--bg-tertiary); padding: 2px 6px; border-radius: 10px; }

        /* Session Messages */
        .session-messages { max-height: 400px; overflow-y: auto; padding: 10px; background: var(--bg-tertiary); border-radius: 4px; margin-top: 8px; margin-left: 16px; }
        .session-messages::-webkit-scrollbar { width: 6px; }
        .session-messages::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        .session-message { padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; }
        .session-message.user { background: rgba(59, 130, 246, 0.15); border-left: 2px solid #3b82f6; }
        .session-message.assistant { background: rgba(75, 85, 99, 0.2); border-left: 2px solid #6b7280; }
        .session-message-role { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; letter-spacing: 0.5px; }
        .session-message-content { font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; max-height: 150px; overflow-y: auto; color: var(--text-primary); }
        .session-message-content::-webkit-scrollbar { width: 6px; }
        .session-message-content::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        .session-message-content::-webkit-scrollbar-track { background: transparent; }
        .session-message-content.truncated::after { content: '...'; color: var(--text-muted); }
        .session-loading { text-align: center; padding: 20px; color: var(--text-secondary); }

        /* Search Results */
        .search-results { margin-top: 8px; }
        .search-result { padding: 10px 12px; margin-bottom: 8px; background: var(--bg-secondary); border-radius: 6px; border-left: 3px solid var(--accent-color); cursor: pointer; transition: background 0.15s; }
        .search-result:hover { background: var(--bg-hover); }
        .search-result-session { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-result-role { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.5px; }
        .search-result-snippet { font-size: 12px; line-height: 1.5; color: var(--text-primary); white-space: pre-wrap; word-break: break-word; }
        .search-result-snippet.collapsed { max-height: 60px; overflow: hidden; }
        .search-result-snippet.expanded { max-height: none; }
        .search-highlight { background: rgba(255, 213, 0, 0.4); color: inherit; padding: 1px 2px; border-radius: 2px; }
        .search-result-time { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
        .search-result-count { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }

        /* Sync Button */
        .sync-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            margin-left: 8px;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
            line-height: 1;
        }

        .sync-btn:hover {
            color: var(--accent-color);
            background: var(--bg-hover);
        }

        .sync-btn:active {
            transform: scale(0.95);
        }

        .sync-btn.spinning {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sessions-search {
            width: 100%;
            padding: 6px 10px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 12px;
        }

        .sessions-search:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .sessions-search::placeholder {
            color: var(--text-muted);
        }

        /* Project Info / badge styles */
        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .info-label {
            color: var(--text-secondary);
            min-width: 60px;
            flex-shrink: 0;
        }

        .info-value {
            color: var(--text-primary);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            background: var(--bg-tertiary);
            color: var(--success-color);
            border: 1px solid var(--border-color);
        }

        .badge.version {
            color: var(--warning-color);
        }

        /* Command blocks */
        .command-block {
            margin-bottom: 8px;
        }

        .command-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .command-code {
            font-family: 'Cascadia Mono', Consolas, monospace;
            font-size: 11px;
            color: var(--success-color);
            background: var(--bg-tertiary);
            border-radius: 4px;
            padding: 5px 8px;
            word-break: break-all;
        }

        /* Git section */
        .git-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .git-label {
            color: var(--text-secondary);
            min-width: 80px;
            flex-shrink: 0;
        }

        .git-link {
            color: var(--accent-color);
            text-decoration: none;
            word-break: break-all;
        }

        .git-link:hover {
            text-decoration: underline;
        }

        .git-status {
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
        }

        .git-status.enabled {
            background: rgba(78, 201, 176, 0.15);
            color: var(--success-color);
            border: 1px solid rgba(78, 201, 176, 0.3);
        }

        .git-status.disabled {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        /* Light theme */
        body.light {
            --bg-primary: #f3f3f3;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8e8;
            --bg-hover: #e0e0e0;
            --border-color: #d4d4d4;
            --text-primary: #1e1e1e;
            --text-secondary: #6e6e6e;
            --text-muted: #999999;
            --stat-bg: #e8e8e8;
            --success-color: #0d7377;
            --warning-color: #795e26;
        }

        /* Inline editing */
        .editable {
            cursor: text;
            border-radius: 3px;
            padding: 1px 3px;
            transition: background 0.15s;
            display: inline-block;
            min-width: 20px;
        }

        .editable:hover {
            background: var(--bg-hover);
            outline: 1px dashed var(--border-color);
        }

        .editable.editing {
            background: transparent;
            outline: none;
        }

        .edit-input {
            background: var(--bg-tertiary);
            border: 1px solid var(--accent-color);
            border-radius: 3px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: inherit;
            padding: 2px 5px;
            outline: none;
            min-width: 80px;
        }

        .edit-input.multiline {
            display: block;
            width: 100%;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }

        .edit-select {
            background: var(--bg-tertiary);
            border: 1px solid var(--accent-color);
            border-radius: 3px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: inherit;
            padding: 2px 5px;
            outline: none;
        }

        .readonly {
            color: var(--text-muted);
            font-size: 11px;
        }

        /* Save flash animation */
        .save-flash {
            animation: flash-green 0.6s ease;
        }

        @keyframes flash-green {
            0% { background: rgba(78, 201, 176, 0.35); }
            100% { background: transparent; }
        }

        /* Toggle switch */
        .toggle-switch {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input[type="checkbox"] {
            display: none;
        }

        .toggle-track {
            width: 32px;
            height: 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            position: relative;
            border: 1px solid var(--border-color);
            transition: background 0.2s, border-color 0.2s;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 10px;
            height: 10px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: left 0.2s, background 0.2s;
        }

        .toggle-switch input:checked + .toggle-track {
            background: rgba(78, 201, 176, 0.25);
            border-color: var(--success-color);
        }

        .toggle-switch input:checked + .toggle-track::after {
            left: 18px;
            background: var(--success-color);
        }

        .toggle-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Paths section */
        .path-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .path-label {
            color: var(--text-secondary);
            min-width: 90px;
            flex-shrink: 0;
        }

        /* Date/meta row */
        .meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 11px;
        }

        .meta-label {
            color: var(--text-muted);
            min-width: 80px;
            flex-shrink: 0;
        }

        /* Association rows */
        .assoc-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 6px;
            border-radius: 4px;
            margin-bottom: 3px;
            background: var(--bg-secondary);
            transition: background 0.15s;
        }

        .assoc-row:hover {
            background: var(--bg-hover);
        }

        .assoc-row:hover .remove-btn {
            opacity: 1;
        }

        .assoc-cell {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .assoc-cell.narrow {
            flex: 0 0 100px;
        }

        .assoc-cell.toggle-cell {
            flex: 0 0 60px;
        }

        .assoc-cell.prompt-cell {
            flex: 2;
        }

        .remove-btn {
            flex-shrink: 0;
            background: transparent;
            border: none;
            color: #e05252;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 2px 5px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s;
        }

        .remove-btn:hover {
            background: rgba(224, 82, 82, 0.15);
        }

        .add-btn {
            display: block;
            background: transparent;
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            margin-top: 4px;
            width: 100%;
            text-align: left;
            transition: border-color 0.15s, color 0.15s;
        }

        .add-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .assoc-header-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 6px;
            margin-bottom: 4px;
        }

        .assoc-col-label {
            flex: 1;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-muted);
        }

        .assoc-col-label.narrow {
            flex: 0 0 100px;
        }

        .assoc-col-label.toggle-cell {
            flex: 0 0 60px;
        }

        .assoc-empty {
            color: var(--text-muted);
            font-style: italic;
            font-size: 11px;
            padding: 6px 8px;
        }

        .section-badge {
            margin-left: auto;
            font-size: 10px;
            background: var(--bg-tertiary);
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* New-project hint card */
        .new-project-hint {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--accent-color);
            border-radius: 6px;
            padding: 14px 16px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .hint-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            flex-shrink: 0;
        }
        .hint-close:hover {
            color: var(--text-primary);
        }

        .new-project-hint code {
            font-family: 'Cascadia Mono', Consolas, monospace;
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--success-color);
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- Content populated by JavaScript -->
    </div>

    <script>
        let currentData = null;
        let cachedTeamLeadOptions = [];

        // Send message to C# host
        function sendToHost(message) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(message);
            }
        }

        // Render project view
        function renderProject(project) {
            const container = document.getElementById('container');

            const statsHtml = project.stats ? `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${project.stats.fileCount || 0}</div>
                        <div class="stat-label">Files</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(project.stats.linesOfCode || 0)}</div>
                        <div class="stat-label">Lines</div>
                    </div>
                    <div class="stat-card">

        function formatNumber(num) {

        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;');
        }

        // Escape for JS strings
        function escapeJs(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        // Format relative date for sessions
        function formatRelativeDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diffMs = now - date;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

            if (diffDays === 0) {
                return 'Today';
            } else if (diffDays === 1) {
                return 'Yesterday';
            } else if (diffDays < 7) {
                return diffDays + ' days ago';
            } else if (diffDays < 30) {
                const weeks = Math.floor(diffDays / 7);
                return weeks + (weeks === 1 ? ' week ago' : ' weeks ago');
            } else {
                const months = Math.floor(diffDays / 30);
                return months + (months === 1 ? ' month ago' : ' months ago');
            }
        }

        // Format date with both absolute and relative
        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const absolute = date.toLocaleDateString([], { month: 'short', day: 'numeric' }) +
                            ', ' + date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            const relative = formatRelativeDate(dateStr);
            return `${absolute} (${relative})`;
        }

        // Format session time range (created to modified)
        function formatSessionTimeRange(created, modified) {
            if (!created) return '';
            const startDate = new Date(created);
            const endDate = modified ? new Date(modified) : null;

            const startDateStr = startDate.toLocaleDateString([], { month: 'short', day: 'numeric' });
            const startTimeStr = startDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

            let result = `${startDateStr}, ${startTimeStr}`;

            if (endDate && endDate > startDate) {
                const endDateStr = endDate.toLocaleDateString([], { month: 'short', day: 'numeric' });
                const endTimeStr = endDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

                // Same day? Just show end time
                if (startDateStr === endDateStr) {
                    result += ` → ${endTimeStr}`;
                } else {
                    result += ` → ${endDateStr}, ${endTimeStr}`;
                }
            }

            // Add relative date
            const relative = formatRelativeDate(created);
            result += ` (${relative})`;

            return result;
        }

        // Track expanded session
        let expandedSessionId = null;

        // Render sessions list
        function renderSessions(sessions) {
            const listEl = document.getElementById('sessions-list');
            const countEl = document.getElementById('sessions-count');

            if (!listEl) return;

            if (countEl) {
                countEl.textContent = sessions ? sessions.length : 0;
            }

            if (!sessions || sessions.length === 0) {
                listEl.innerHTML = '<div class="text-content empty">No sessions found</div>';
                return;
            }

            let html = '';
            sessions.forEach(session => {
                const title = session.summary || session.firstPrompt || 'Untitled Session';
                const dateStr = formatSessionTimeRange(session.created, session.modified);
                const messageCount = session.messageCount || 0;
                const branch = session.gitBranch || '';

                html += `
                    <div class="session-item" data-session-id="${escapeHtml(session.sessionId)}">
                        <div class="session-header" onclick="toggleSession('${escapeJs(session.sessionId)}')">
                            <span class="expand-icon">▶</span>
                            <div class="session-title">${escapeHtml(title)}</div>
                        </div>
                        <div class="session-meta">
                            <span>${dateStr}</span>
                            <span>${messageCount} messages</span>
                            ${branch ? '<span>' + escapeHtml(branch) + '</span>' : ''}
                        </div>
                        <div class="session-messages" style="display: none;"></div>
                    </div>
                `;
            });

            listEl.innerHTML = html;
            expandedSessionId = null;
        }

        // Toggle session expansion
        function toggleSession(sessionId) {
            const item = document.querySelector(`[data-session-id="${sessionId}"]`);
            if (!item) return;

            if (expandedSessionId === sessionId) {
                // Collapse current
                item.classList.remove('expanded');
                item.querySelector('.session-messages').style.display = 'none';
                expandedSessionId = null;
            } else {
                // Collapse previous if exists
                if (expandedSessionId) {
                    const prev = document.querySelector(`[data-session-id="${expandedSessionId}"]`);
                    if (prev) {
                        prev.classList.remove('expanded');
                        prev.querySelector('.session-messages').style.display = 'none';
                    }
                }
                // Expand new
                item.classList.add('expanded');
                expandedSessionId = sessionId;
                loadSessionMessages(sessionId);
            }
        }

        // Load session messages from host
        function loadSessionMessages(sessionId) {
            const item = document.querySelector(`[data-session-id="${sessionId}"]`);
            if (!item) return;

            const container = item.querySelector('.session-messages');
            container.innerHTML = '<div class="session-loading">Loading messages...</div>';
            container.style.display = 'block';

            sendToHost({ type: 'getSessionMessages', sessionId: sessionId });
        }

        // Render session messages
        function renderSessionMessages(sessionId, messages) {
            const item = document.querySelector(`[data-session-id="${sessionId}"]`);
            if (!item) return;

            const container = item.querySelector('.session-messages');

            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="text-content empty">No messages found</div>';
                return;
            }

            let html = '';
            messages.forEach(msg => {
                const role = msg.role || 'unknown';
                const content = msg.content || '';

                // Skip empty messages (check for any visible content)
                if (!content.replace(/[\s\u200B-\u200D\uFEFF]/g, '')) return;

                const truncated = content.length > 500;
                const displayContent = truncated ? content.substring(0, 500) : content;

                html += `
                    <div class="session-message ${escapeHtml(role)}">
                        <div class="session-message-role">${escapeHtml(role)}</div>
                        <div class="session-message-content${truncated ? ' truncated' : ''}">${escapeHtml(displayContent)}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Render search results with highlighted matches
        function renderSearchResults(data) {
            const container = document.getElementById('sessions-list');
            if (!container) return;

            const results = data.results || [];
            const query = data.query || '';

            if (results.length === 0) {
                container.innerHTML = '<div class="text-content empty">No messages found matching "' + escapeHtml(query) + '"</div>';
                return;
            }

            let html = '<div class="search-results">';
            html += '<div class="search-result-count">Found ' + results.length + ' message' + (results.length !== 1 ? 's' : '') + ' matching "' + escapeHtml(query) + '"</div>';

            results.forEach((result, index) => {
                const sessionTitle = result.sessionSummary || 'Untitled Session';
                const role = result.role || 'unknown';
                const snippet = result.snippet || '';
                const timestamp = result.timestamp ? formatDate(result.timestamp) : '';

                // Highlight the search term in the snippet
                const highlightedSnippet = highlightText(snippet, query);

                html += `
                    <div class="search-result" data-session-id="${escapeHtml(result.sessionId)}" data-index="${index}" onclick="toggleSearchResult(this)">
                        <div class="search-result-session">${escapeHtml(sessionTitle)}</div>
                        <div class="search-result-role">${escapeHtml(role)}</div>
                        <div class="search-result-snippet collapsed">${highlightedSnippet}</div>
                        <div class="search-result-time">${escapeHtml(timestamp)}</div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // Highlight search term in text
        function highlightText(text, query) {
            if (!query || !text) return escapeHtml(text);

            const escaped = escapeHtml(text);
            const escapedQuery = escapeHtml(query);

            // Case-insensitive replace with highlight
            const regex = new RegExp('(' + escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            return escaped.replace(regex, '<mark class="search-highlight">$1</mark>');
        }

        // Toggle search result expansion
        function toggleSearchResult(element) {
            const snippet = element.querySelector('.search-result-snippet');
            if (snippet) {
                snippet.classList.toggle('collapsed');
                snippet.classList.toggle('expanded');
            }
        }

        // Open a session in dialog (keep for double-click or button)
        function openSession(sessionId) {
            sendToHost({ type: 'openSession', sessionId: sessionId });
        }

        // Search sessions
        function searchSessions(query) {
            sendToHost({ type: 'searchSessions', query: query });
        }

        // Sync sessions from Claude
        function syncSessions() {
            const btn = document.getElementById('sync-sessions-btn');
            if (btn) {
                btn.classList.add('spinning');
                // Remove spinning class after 2 seconds (host will update sessions which re-renders)
                setTimeout(() => btn.classList.remove('spinning'), 2000);
            }
            sendToHost({ type: 'syncSessions' });
        }

        // ============================================================
        // INLINE EDITING ENGINE
        // ============================================================

        let _activeEditor = null; // tracks the currently open editor element
        const EDIT_BLUR_DELAY = 150; // ms — allows click-on-other-editable to win before blur saves

        // Core edit setup: replaces element content with an input/textarea and wires events.
        // onCommit(newValue) is called when the user confirms; cancelEdit() is called on Escape.
        function _openEditor(element, originalValue, isMultiline, onCommit) {
            if (_activeEditor && _activeEditor !== element) cancelEdit(_activeEditor);

            element.classList.add('editing');
            element._originalText = element.innerHTML;

            let input;
            if (isMultiline) {
                input = document.createElement('textarea');
                input.className = 'edit-input multiline';
                input.rows = 4;
            } else {
                input = document.createElement('input');
                input.className = 'edit-input';
                input.type = 'text';
            }
            input.value = originalValue;
            element.innerHTML = '';
            element.appendChild(input);
            input.focus();
            input.select();
            _activeEditor = element;

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !isMultiline) { e.preventDefault(); onCommit(input.value); }
                else if (e.key === 'Escape') { cancelEdit(element); }
            });
            input.addEventListener('blur', () => {
                setTimeout(() => { if (_activeEditor === element) onCommit(input.value); }, EDIT_BLUR_DELAY);
            });
        }

        // Core commit: clears editor state, updates element, calls saveFn.
        function _closeEditor(element, newValue, saveFn) {
            _activeEditor = null;
            element.classList.remove('editing');
            element.dataset.value = newValue;
            element.innerHTML = escapeHtml(newValue || '—');
            saveFn(newValue);
        }

        // Start editing a project field span
        function startEdit(element) {
            const field = element.dataset.field;
            const originalValue = element.dataset.value || '';
            const isMultiline = element.dataset.multiline === 'true';
            _openEditor(element, originalValue, isMultiline, (val) => {
                _closeEditor(element, val, (v) => sendToHost({ type: 'updateField', field: field, value: v }));
            });
        }

        // Cancel edit, restore original content
        function cancelEdit(element) {
            if (!element) return;
            _activeEditor = null;
            element.classList.remove('editing');
            element.innerHTML = element._originalText || escapeHtml(element.dataset.value || '—');
        }

        // Save a <select> field immediately on change
        function saveSelectField(selectEl) {
            const field = selectEl.dataset.field;
            sendToHost({ type: 'updateField', field: field, value: selectEl.value });
            flashElement(selectEl);
        }

        // Save a toggle checkbox immediately on change
        function saveToggleField(checkboxEl) {
            const field = checkboxEl.dataset.field;
            const value = checkboxEl.checked ? 'true' : 'false';
            const label = checkboxEl.closest('.toggle-switch')?.querySelector('.toggle-label');
            if (label) label.textContent = (field === 'gitAutoCommit') ? (checkboxEl.checked ? 'On' : 'Off') : (checkboxEl.checked ? 'Yes' : 'No');
            sendToHost({ type: 'updateField', field: field, value: value });
            flashElement(checkboxEl.closest('.toggle-switch'));
        }

        // Flash an element green to confirm save
        function flashElement(el) {
            if (!el) return;
            el.classList.remove('save-flash');
            void el.offsetWidth; // force reflow to restart animation
            el.classList.add('save-flash');
        }

        // Toggle a checkbox in an association row and save
        function toggleAssoc(checkboxEl, tableName, id, field) {
            updateAssociation(tableName, id, field, checkboxEl.checked ? 'true' : 'false');
            flashElement(checkboxEl.closest('.toggle-switch'));
        }

        // ============================================================
        // ASSOCIATION HELPERS
        // ============================================================

        let currentAssociations = null;

        // Render all 6 association sections into #associations-container
        function renderAssociations(data) {
            currentAssociations = data;
            const container = document.getElementById('associations-container');
            if (!container) return;

            container.innerHTML =
                renderAssocSection('Agents', 'agents', data.agents || [], [
                    { key: 'agentName', label: 'Name' },
                    { key: 'role', label: 'Role' },
                    { key: 'preferredModel', label: 'Model', narrow: true }
                ]) +
                renderAssocSection('MCP Servers', 'mcpServers', data.mcpServers || [], [
                    { key: 'serverName', label: 'Server Name' },
                    { key: 'isEnabled', label: 'Enabled', toggle: true, narrow: true }
                ]) +
                renderAssocSection('Skills', 'skills', data.skills || [], [
                    { key: 'skillName', label: 'Skill Name' },
                    { key: 'isEnabled', label: 'Enabled', toggle: true, narrow: true }
                ]) +
                renderAssocSection('Specialist Agents', 'specialistAgents', data.specialistAgents || [], [
                    { key: 'agentType', label: 'Type', narrow: true },
                    { key: 'isEnabled', label: 'Enabled', toggle: true, narrow: true },
                    { key: 'customPrompt', label: 'Custom Prompt', wide: true }
                ]) +
                renderAssocSection('Project Paths', 'projectPaths', data.projectPaths || [], [
                    { key: 'pathType', label: 'Type', narrow: true },
                    { key: 'pathValue', label: 'Path', wide: true },
                    { key: 'description', label: 'Description' }
                ]) +
                renderAssocSection('DB Prompts', 'dbPrompts', data.dbPrompts || [], [
                    { key: 'promptType', label: 'Type', narrow: true },
                    { key: 'promptText', label: 'Text', wide: true },
                    { key: 'displayOrder', label: 'Order', narrow: true }
                ]);
        }

        // Build HTML for one association section
        function renderAssocSection(title, tableName, rows, columns) {
            const count = rows.length;

            let colHeaderHtml = columns.map(c => {
                const cls = c.toggle ? 'assoc-col-label toggle-cell' : (c.narrow ? 'assoc-col-label narrow' : 'assoc-col-label');
                return `<span class="${cls}">${escapeHtml(c.label)}</span>`;
            }).join('') + '<span style="flex:0 0 28px"></span>';

            let rowsHtml = '';
            if (rows.length === 0) {
                rowsHtml = `<div class="assoc-empty">None</div>`;
            } else {
                rows.forEach(row => {
                    rowsHtml += buildAssocRow(tableName, row, columns);
                });
            }

            return `
                <div class="section">
                    <div class="section-header" onclick="toggleSection(this)">
                        <span class="section-toggle collapsed">▼</span>
                        <span class="section-title">${escapeHtml(title)}</span>
                        <span class="section-badge">${count}</span>
                    </div>
                    <div class="section-content collapsed">
                        <div class="assoc-header-row">${colHeaderHtml}</div>
                        <div id="assoc-rows-${escapeHtml(tableName)}">${rowsHtml}</div>
                        <button class="add-btn" onclick="addAssociation('${escapeHtml(tableName)}')">+ Add</button>
                    </div>
                </div>
            `;
        }

        // Build one assoc row element (HTML string)
        function buildAssocRow(tableName, row, columns) {
            const id = row.id || '';
            let cellsHtml = columns.map(c => {
                const val = row[c.key] !== undefined ? row[c.key] : '';
                if (c.toggle) {
                    const checked = val === true || val === 'true' || val === 1;
                    return `
                        <span class="assoc-cell toggle-cell">
                            <label class="toggle-switch">
                                <input type="checkbox" ${checked ? 'checked' : ''}
                                    onchange="toggleAssoc(this, '${escapeHtml(tableName)}', ${id}, '${escapeHtml(c.key)}')">
                                <span class="toggle-track"></span>
                            </label>
                        </span>`;
                }
                const cellClass = c.narrow ? 'assoc-cell narrow' : (c.wide ? 'assoc-cell prompt-cell' : 'assoc-cell');
                return `<span class="${cellClass} editable" data-field="${escapeHtml(c.key)}" data-value="${escapeHtml(String(val))}"
                    onclick="startAssocEdit(this, '${escapeHtml(tableName)}', ${id})">${escapeHtml(String(val) || '—')}</span>`;
            }).join('');

            return `
                <div class="assoc-row" data-table="${escapeHtml(tableName)}" data-id="${id}">
                    ${cellsHtml}
                    <button class="remove-btn" onclick="removeAssociation('${escapeHtml(tableName)}', ${id})">&#x2715;</button>
                </div>`;
        }

        // Start editing a cell in an assoc row (single-line only)
        function startAssocEdit(element, tableName, rowId) {
            const field = element.dataset.field;
            const originalValue = element.dataset.value || '';
            _openEditor(element, originalValue, false, (val) => {
                _closeEditor(element, val, (v) => updateAssociation(tableName, rowId, field, v));
            });
        }

        // Primary key field name per table — used when adding a new row
        const ASSOC_PRIMARY_KEY = {
            agents: 'agentName',
            mcpServers: 'serverName',
            skills: 'skillName',
            specialistAgents: 'agentType',
            projectPaths: 'pathValue',
            dbPrompts: 'promptText'
        };

        // Add a new association row (single input for primary field, sends to host on confirm)
        function addAssociation(tableName) {
            const container = document.getElementById('assoc-rows-' + tableName);
            if (!container) return;

            const primaryKey = ASSOC_PRIMARY_KEY[tableName] || 'name';

            const newRow = document.createElement('div');
            newRow.className = 'assoc-row adding';
            newRow.dataset.table = tableName;
            newRow.dataset.id = 'new_' + Date.now();

            const input = document.createElement('input');
            input.className = 'edit-input';
            input.type = 'text';
            input.placeholder = 'Enter value...';
            input.style.flex = '1';

            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'remove-btn';
            cancelBtn.style.opacity = '1';
            cancelBtn.innerHTML = '&#x2715;';
            cancelBtn.onclick = () => newRow.remove();

            newRow.appendChild(input);
            newRow.appendChild(cancelBtn);
            container.appendChild(newRow);
            input.focus();

            let committed = false;
            function commitAdd() {
                if (committed) return;
                committed = true;
                const val = input.value.trim();
                if (!val) { newRow.remove(); return; }
                sendToHost({ type: 'updateAssociation', tableName: tableName, action: 'add', item: JSON.stringify({ [primaryKey]: val }) });
                newRow.remove();
                // Badge will be updated when associationSaved arrives with newId
            }

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); commitAdd(); }
                else if (e.key === 'Escape') { newRow.remove(); }
            });
            input.addEventListener('blur', () => setTimeout(commitAdd, EDIT_BLUR_DELAY));
        }

        // Remove an association row
        function removeAssociation(tableName, id) {
            sendToHost({ type: 'updateAssociation', tableName: tableName, action: 'delete', item: JSON.stringify({ id: id }) });
            const row = document.querySelector(`.assoc-row[data-table="${tableName}"][data-id="${id}"]`);
            if (row) row.remove();
            // Update badge
            const badge = document.querySelector(`#assoc-rows-${tableName}`)?.closest('.section')?.querySelector('.section-badge');
            if (badge) badge.textContent = Math.max(0, parseInt(badge.textContent) - 1);
        }

        // Update a single association field
        function updateAssociation(tableName, id, field, value) {
            sendToHost({ type: 'updateAssociation', tableName: tableName, action: 'update', item: JSON.stringify({ id: id, [field]: value }) });
        }

        // Re-apply cached team lead options to the dropdown (survives re-renders)
        function applyTeamLeadOptions() {
            const select = document.querySelector('[data-field="teamLead"]');
            if (!select) return;
            while (select.options.length > 1) select.remove(1);
            cachedTeamLeadOptions.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt.id;
                o.textContent = opt.displayName;
                select.add(o);
            });
            if (currentData && currentData.teamLead) {
                select.value = currentData.teamLead;
            }
        }

        // Handle messages from C#
        function handleHostMessage(message) {
            if (typeof message === 'string') {
                const colonIndex = message.indexOf(':');
                if (colonIndex > 0) {
                    const command = message.substring(0, colonIndex);
                    const data = message.substring(colonIndex + 1);

                    switch (command) {
                        case 'project':
                            currentData = JSON.parse(data);
                            renderProject(currentData);
                            applyTeamLeadOptions(); // Re-apply cached options after re-render
                            break;
                        case 'welcome':
                            renderWelcome();
                            break;
                        case 'notRegistered':
                            renderNotRegistered(data);
                            break;
                        case 'theme':
                            setTheme(data);
                            break;
                        case 'sessions':
                            const sessions = JSON.parse(data);
                            renderSessions(sessions);
                            break;
                        case 'syncResult':
                            const count = parseInt(data) || 0;
                            const btn = document.getElementById('sync-sessions-btn');
                            if (btn) btn.classList.remove('spinning');
                            console.log('Synced ' + count + ' sessions');
                            break;
                        case 'sessionMessages':
                            const msgData = JSON.parse(data);
                            renderSessionMessages(msgData.sessionId, msgData.messages);
                            break;
                        case 'searchResults':
                            const searchData = JSON.parse(data);
                            renderSearchResults(searchData);
                            break;
                        case 'fontSize':
                            const size = parseFloat(data);
                            if (!isNaN(size)) {
                                document.body.style.fontSize = size + 'px';
                            }
                            break;
                        case 'fieldSaved': {
                            const saved = JSON.parse(data);
                            if (saved.success) {
                                // Flash all elements with this data-field
                                document.querySelectorAll(`[data-field="${saved.field}"]`).forEach(el => flashElement(el));
                            }
                            break;
                        }
                        case 'teamLeadOptions': {
                            cachedTeamLeadOptions = JSON.parse(data);
                            applyTeamLeadOptions();
                            break;
                        }
                        case 'associations': {
                            const assocData = JSON.parse(data);
                            renderAssociations(assocData);
                            break;
                        }
                        case 'associationSaved': {
                            const asSaved = JSON.parse(data);
                            if (asSaved.success && asSaved.newId && asSaved.tableName) {
                                // Re-request associations to get the full new row rendered
                                sendToHost({ type: 'getAssociations' });
                            }
                            break;
                        }
                        case 'newProjectHint': {
                            const container = document.getElementById('container');
                            // Prevent duplicate hints
                            const existing = container?.querySelector('.new-project-hint');
                            if (existing) break;
                            if (container) {
                                const hint = document.createElement('div');
                                hint.className = 'new-project-hint';
                                hint.innerHTML = `
                                    <span>To add a new project, run <code>/new-project</code> in a Claude Code terminal.</span>
                                    <button class="hint-close" onclick="this.parentElement.remove()" title="Dismiss">&times;</button>
                                `;
                                container.prepend(hint);
                            }
                            break;
                        }
                    }
                }
            }
        }

        // Listen for messages from C#
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', (event) => {
                handleHostMessage(event.data);
            });
        }

        // Initialize with welcome state
        document.addEventListener('DOMContentLoaded', () => {
            renderWelcome();
            sendToHost({ type: 'ready' });
        });
    </script>
</body>
</html>
