        function crSetupScrollTracking() {
            const diffArea = document.getElementById('cr-diff-area');
            if (!diffArea) return;
            let scrollTimeout;
            diffArea.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    // Find which hunk is most visible (only in the currently visible diff pane)
                    const visiblePane = diffArea.querySelector('.cr-diff-pane[style*="display:block"], .cr-diff-pane[style*="display: block"]');
                    if (!visiblePane) return;
                    const hunks = visiblePane.querySelectorAll('.diff-line.hunk');
                    const areaRect = diffArea.getBoundingClientRect();
                    // Use top-third as anchor — hunks entering the viewport feel "current" sooner than center
                    const areaCenter = areaRect.top + areaRect.height / 3;
                    let closestHunk = null;
                    let closestDist = Infinity;
                    hunks.forEach(h => {
                        const rect = h.getBoundingClientRect();
                        const dist = Math.abs(rect.top - areaCenter);
                        if (dist < closestDist) { closestDist = dist; closestHunk = h; }
                    });
                    if (closestHunk && closestHunk.id) {
                        const match = closestHunk.id.match(/cr-hunk-(\d+)-(\d+)/);
                        if (match) crSetActiveCard(parseInt(match[1]), parseInt(match[2]));
                    }
                }, 100);
            });
        }

        function crMatchAgentSummary(fileSummaries, startLine, endLine) {
            // fileSummaries is an array of { startLine, endLine, summary }
            if (!Array.isArray(fileSummaries)) return null;
            for (const s of fileSummaries) {
                // Check if ranges overlap
                if (s.startLine <= endLine && s.endLine >= startLine) return s.summary;
            }
            return null;
        }

        function crParseAgentReport(reportContent) {
            // Parse the code-reviewer report to extract per-hunk change summaries
            // Looks for a "### Change Summaries" section with lines like:
            // - **file.cs:100-120** — Description of what changed
            if (!reportContent) return null;
            const summaryMatch = reportContent.match(/###\s*Change Summaries([\s\S]*?)(?=###|$)/i);
            if (!summaryMatch) return null;

            const result = {};
            const lines = summaryMatch[1].split('\n');
            for (const line of lines) {
                const m = line.match(/[-*]\s+\*\*(.+?):(\d+)-(\d+)\*\*\s*[—\-]+\s*(.+)/);
                if (m) {
                    const filePath = m[1].trim();
                    const startLine = parseInt(m[2]);
                    const endLine = parseInt(m[3]);
                    const summary = m[4].trim();
                    if (!result[filePath]) result[filePath] = [];
                    result[filePath].push({ startLine, endLine, summary });
                }
            }
            return Object.keys(result).length > 0 ? result : null;
        }

        function handleHelperSessionUpdate(data) {
            // Update task with latest helper session info
            const task = tasks.find(t => t.id === data.taskId);
            if (!task) return;

            // Initialize NativeHelpers array if not exists
            if (!task.NativeHelpers) {
                task.NativeHelpers = [];
            }

            // Find existing helper or add new one
            let helper = task.NativeHelpers.find(h => h.id === data.helperId);
            if (!helper) {
                helper = {
                    id: data.helperId,
                    name: data.helperName || 'Helper',
                    prompt: data.prompt || '',
                    status: data.status || 'spawning'
                };
                task.NativeHelpers.push(helper);
            } else {
                // Update existing helper
                helper.status = data.status || helper.status;
                helper.name = data.helperName || helper.name;
            }

            // Remove helpers that are dissolved (after fade animation)
            if (data.status === 'dissolved') {
                setTimeout(() => {
                    task.NativeHelpers = task.NativeHelpers.filter(h => h.id !== data.helperId);
                    renderAllTasks();
                }, 2000); // Wait for fade animation
            }

            // Re-render tasks to show updated helper status
            renderAllTasks();

            // Show toast for status changes
            if (data.status === 'spawning') {
                showToast(`Helper spawning for task: ${task.title}`);
            } else if (data.status === 'working') {
                showToast(`Helper working on: ${task.title}`);
            } else if (data.status === 'completed') {
                showToast(`Helper completed work on: ${task.title}`);
            }
        }

            }
            const cached = taskReportsCache[taskId];
            const reports = (cached && !cached.loading) ? cached.reports : [];
            const agentResults = REVIEW_AGENTS.map(agent => {
                const report = reports.find(r => agent.match(r.agent_name));
                if (!report) return { ...agent, status: 'pending', score: null, reportId: null };
                const passed = /pass/i.test(report.verdict);
                return { ...agent, status: passed ? 'pass' : 'fail', score: report.score, reportId: report.id, verdict: report.verdict };
            });
            const badges = agentResults.map(a => {
                const icon = a.status === 'pass' ? '&#x2705;' : a.status === 'fail' ? '&#x274C;' : '&#x23F3;';
                const scoreText = a.score !== null ? ` ${a.score}` : '';
                const onclick = a.reportId ? `onclick="event.stopPropagation(); viewAgentReport('${taskId}', '${a.reportId}')"` : '';
                return `<span class="agent-badge ${a.status}" style="cursor:${a.reportId ? 'pointer' : 'default'}" ${onclick}>${icon} ${a.label}${scoreText}</span>`;
            }).join(' ');
            const popup = document.createElement('div');
            popup.className = 'status-popup';
            popup.dataset.taskId = taskId;
            popup.innerHTML = `<div class="status-popup-title">Pipeline Status</div><div>${badges || '<span style="color:#888">No reports yet</span>'}</div>`;
            const btn = event.currentTarget;
            const iconsRow = btn.closest('.task-card-icons');
            iconsRow.appendChild(popup);
            _activeStatusPopup = popup;
        }
        // Close status popup on outside click
        document.addEventListener('click', () => { if (_activeStatusPopup) { _activeStatusPopup.remove(); _activeStatusPopup = null; } });

        // Old modal functions removed - edit is now handled by lifecycle board

        // Delete popover state
        let currentDeleteTaskId = null;

        function openDeletePopover(event, taskId) {
            event.stopPropagation();
            currentDeleteTaskId = taskId;

            const popover = document.getElementById('deletePopover');
            const button = event.currentTarget;
            const rect = button.getBoundingClientRect();

            // Position popover near the delete button
            popover.style.top = (rect.bottom + 4) + 'px';
            popover.style.left = (rect.left - 100) + 'px';
            popover.classList.add('open');
        }

        function closeDeletePopover() {
            document.getElementById('deletePopover').classList.remove('open');
            currentDeleteTaskId = null;
        }

        function confirmDelete() {
            if (currentDeleteTaskId) {
                sendToHost({
                    type: 'delete_task',
                    taskId: currentDeleteTaskId
                });
            }
            closeDeletePopover();
        }

        // Close popover when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.delete-popover') && !e.target.closest('.task-icon-btn.delete')) {
                closeDeletePopover();
            }
        });

        // Handle keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeDeletePopover();
                hideAllInlineAddForms();
            }
        });

        // Column visibility functions
        function loadColumnVisibility() {
            try {
                const stored = localStorage.getItem(VISIBILITY_STORAGE_KEY);
                if (stored) {
                    return JSON.parse(stored);
                }
            } catch (e) {
                console.error('Failed to load column visibility:', e);
            }
            // Default: all columns visible
            return { suggestion: true, todo: true, in_progress: true, done: true };
        }

        function saveColumnVisibility() {
            try {
                localStorage.setItem(VISIBILITY_STORAGE_KEY, JSON.stringify(columnVisibility));
            } catch (e) {
                console.error('Failed to save column visibility:', e);
            }
        }

        function toggleColumnVisibility(columnKey) {
            columnVisibility[columnKey] = !columnVisibility[columnKey];
            saveColumnVisibility();
            applyColumnVisibility();
            updateHiddenColumnsIndicator();
        }

        function showColumn(columnKey) {
            columnVisibility[columnKey] = true;
            saveColumnVisibility();
            applyColumnVisibility();
            updateHiddenColumnsIndicator();
            closeDropdown();
        }

        function applyColumnVisibility() {
            Object.keys(columnVisibility).forEach(key => {
                const columnId = 'column' + key.split('_').map((s, i) =>
                    i === 0 ? s.charAt(0).toUpperCase() + s.slice(1) : s.charAt(0).toUpperCase() + s.slice(1)
                ).join('');
                const column = document.getElementById(columnId);
                if (column) {
                    if (columnVisibility[key]) {
                        column.classList.remove('hidden');
                    } else {
                        column.classList.add('hidden');
                    }
                }
            });
        }

        function updateHiddenColumnsIndicator() {
            const hiddenColumns = Object.entries(columnVisibility)
                .filter(([key, visible]) => !visible)
                .map(([key]) => key);

            const indicator = document.getElementById('hiddenColumnsIndicator');
            const countSpan = document.getElementById('hiddenColumnsCount');
            const dropdown = document.getElementById('hiddenColumnsDropdown');

            if (hiddenColumns.length > 0) {
                indicator.classList.add('visible');
                countSpan.textContent = hiddenColumns.length === 1
                    ? '1 column hidden'
                    : `${hiddenColumns.length} columns hidden`;

                // Build dropdown items
                dropdown.innerHTML = hiddenColumns.map(key =>
                    `<div class="hidden-column-item" onclick="showColumn('${key}')">${columnNames[key]}</div>`
                ).join('');
            } else {
                indicator.classList.remove('visible');
                closeDropdown();
            }
        }

        function toggleDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('hiddenColumnsDropdown');
            dropdown.classList.toggle('open');
        }

        function closeDropdown() {
            const dropdown = document.getElementById('hiddenColumnsDropdown');
            dropdown.classList.remove('open');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.hidden-columns-indicator')) {
                closeDropdown();
            }
        });

        // Apply visibility on load
        applyColumnVisibility();
        updateHiddenColumnsIndicator();

        // Project selector functions
        function loadSelectedProject() {
            try {
                const stored = localStorage.getItem(PROJECT_STORAGE_KEY);
                if (stored) {
                    selectedProjectId = stored === '' ? null : stored;
                }
            } catch (e) {
                console.error('Failed to load selected project:', e);
            }
        }

        function saveSelectedProject() {
            try {
                localStorage.setItem(PROJECT_STORAGE_KEY, selectedProjectId || '');
            } catch (e) {
                console.error('Failed to save selected project:', e);
            }
        }

        function updateProjects(newProjects) {
            projects = newProjects || [];

            // Validate stored project selection - clear if project no longer exists
            if (selectedProjectId) {
                const projectExists = projects.some(p => p.id === selectedProjectId);
                if (!projectExists) {
                    selectedProjectId = null;
                    saveSelectedProject();
                    // Notify backend to clear filter and resend all tasks
                    sendToHost({ type: 'select_project', projectId: '' });
                }
            }

            renderProjectDropdown();
            updateSelectedProjectDisplay();
        }

        function renderProjectDropdown() {
            const dropdown = document.getElementById('projectDropdown');
            if (!dropdown) return;

            let html = `<div class="project-selector-item${!selectedProjectId ? ' selected' : ''}" onclick="selectProject('')">
                <span class="project-name">All Projects</span>
                <span class="task-count">${tasks.length}</span>
            </div>`;

            projects.forEach(p => {
                const isSelected = selectedProjectId === p.id;
                html += `<div class="project-selector-item${isSelected ? ' selected' : ''}" onclick="selectProject('${escapeHtml(p.id)}')">
                    <span class="project-name">${escapeHtml(p.name)}</span>
                    <span class="task-count">${p.taskCount}</span>
                </div>`;
            });

            dropdown.innerHTML = html;
        }

        function updateSelectedProjectDisplay() {
            const nameSpan = document.getElementById('selectedProjectName');
            if (!nameSpan) return;

            if (!selectedProjectId) {
                nameSpan.textContent = 'All Projects';
            } else {
                const project = projects.find(p => p.id === selectedProjectId);
                nameSpan.textContent = project ? project.name : 'All Projects';
            }
        }

        function toggleProjectDropdown(event) {
            event.stopPropagation();
            closeTerminalDropdown();
            const dropdown = document.getElementById('projectDropdown');
            dropdown.classList.toggle('open');
        }

        function closeProjectDropdown() {
            const dropdown = document.getElementById('projectDropdown');
            if (dropdown) {
                dropdown.classList.remove('open');
            }
        }

        function selectProject(projectId) {
            selectedProjectId = projectId || null;
            saveSelectedProject();
            updateSelectedProjectDisplay();
            renderProjectDropdown();
            closeProjectDropdown();

            // Notify backend of project selection
            sendToHost({
                type: 'select_project',
                projectId: selectedProjectId || ''
            });
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#projectSelectorBtn') && !e.target.closest('#projectDropdown')) {
                closeProjectDropdown();
            }
            if (!e.target.closest('#terminalSelectorContainer')) {
                closeTerminalDropdown();
            }
        });

        // Load selected project from storage on init
        loadSelectedProject();
        renderProjectDropdown();  // Render immediately so dropdown works before backend responds
        updateSelectedProjectDisplay();

        // Request projects from backend after ready
        function requestProjects() {
            sendToHost({ type: 'get_projects' });
        }

        // Terminal selector functions
        function loadSelectedTerminal() {
            try {
                const stored = localStorage.getItem(TERMINAL_STORAGE_KEY);
                if (stored) {
                    selectedTerminalName = stored === '' ? null : stored;
                }
            } catch (e) {
                console.error('Failed to load selected terminal:', e);
            }
        }

        function saveSelectedTerminal() {
            try {
                localStorage.setItem(TERMINAL_STORAGE_KEY, selectedTerminalName || '');
            } catch (e) {
                console.error('Failed to save selected terminal:', e);
            }
        }

        function getUniqueAssignees() {
            const names = new Set();
            tasks.forEach(t => {
                if (t.assignee) names.add(t.assignee);
            });
            terminals.forEach(t => {
                if (t.name) names.add(t.name);
            });
            return Array.from(names).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        }

        function renderTerminalDropdown() {
            const dropdown = document.getElementById('terminalDropdown');
            if (!dropdown) return;

            const assignees = getUniqueAssignees();

            let html = `<div class="project-selector-item${!selectedTerminalName ? ' selected' : ''}" onclick="selectTerminal('')">
                <span class="project-name">All Terminals</span>
                <span class="task-count">${tasks.length}</span>
            </div>`;

            assignees.forEach(name => {
                const isSelected = selectedTerminalName === name;
                const count = tasks.filter(t => t.assignee === name).length;
                const color = getTerminalColor(name);
                html += `<div class="project-selector-item${isSelected ? ' selected' : ''}" onclick="selectTerminal('${escapeHtml(name)}')">
                    <span class="project-name">
                        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background-color:${color};margin-right:6px;vertical-align:middle;"></span>${escapeHtml(name)}
                    </span>
                    <span class="task-count">${count}</span>
                </div>`;
            });

            dropdown.innerHTML = html;
        }

        function updateSelectedTerminalDisplay() {
            const nameSpan = document.getElementById('selectedTerminalName');
            if (!nameSpan) return;
            nameSpan.textContent = selectedTerminalName || 'All Terminals';
        }

        function toggleTerminalDropdown(event) {
            event.stopPropagation();
            closeProjectDropdown();
            const dropdown = document.getElementById('terminalDropdown');
            dropdown.classList.toggle('open');
        }

        function closeTerminalDropdown() {
            const dropdown = document.getElementById('terminalDropdown');
            if (dropdown) {
                dropdown.classList.remove('open');
            }
        }

        function selectTerminal(name) {
            selectedTerminalName = name || null;
            saveSelectedTerminal();
            updateSelectedTerminalDisplay();
            renderTerminalDropdown();
            closeTerminalDropdown();
            renderAllTasks();
        }

        // Load selected terminal from storage on init
        loadSelectedTerminal();
        renderTerminalDropdown();
        updateSelectedTerminalDisplay();

        // Drag and drop functionality
        let draggedTaskId = null;

        function handleDragStart(event) {
            const card = event.target.closest('.task-card');
            if (!card) return;

            draggedTaskId = card.dataset.taskId;
            card.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            // Include task title for cross-control drag (kanban → terminal drop)
            const task = tasks.find(t => t.id === draggedTaskId);
            const dragPayload = JSON.stringify({
                taskId: draggedTaskId,
                title: task ? task.title : '',
                source: 'multiterminal-kanban'
            });
            event.dataTransfer.setData('text/plain', dragPayload);

            // Side-channel: notify C# host about drag data
            // (WebView2 doesn't reliably pass dataTransfer to WinForms OLE drag-drop)
            sendToHost({ type: 'task_drag_start', taskId: draggedTaskId, title: task ? task.title : '' });
        }

        function handleDragEnd(event) {
            const card = event.target.closest('.task-card');
            if (card) {
                card.classList.remove('dragging');
            }
            draggedTaskId = null;

            // Remove drag-over from all columns
            document.querySelectorAll('.column-tasks').forEach(col => {
                col.classList.remove('drag-over');
            });

            // Clear the side-channel drag data
            sendToHost({ type: 'task_drag_end' });
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
        }

        function handleDragEnter(event) {
            const column = event.target.closest('.column-tasks');
            if (column) {
                column.classList.add('drag-over');
            }
        }

        function handleDragLeave(event) {
            const column = event.target.closest('.column-tasks');
            if (column && !column.contains(event.relatedTarget)) {
                column.classList.remove('drag-over');
            }
        }

        function handleDrop(event) {
            event.preventDefault();
            const column = event.target.closest('.column-tasks');
            if (!column || !draggedTaskId) return;

            column.classList.remove('drag-over');

            // Get the target status from the column's parent
            const kanbanColumn = column.closest('.kanban-column');
            const newStatus = kanbanColumn ? kanbanColumn.dataset.column : null;

            if (!newStatus) return;

            // Find the current task to check if status actually changed
            const task = tasks.find(t => t.id === draggedTaskId);
            if (task && task.status !== newStatus) {
                sendToHost({
                    type: 'update_task',
                    taskId: draggedTaskId,
                    status: newStatus
                });
            }
        }

        // Set up drag event listeners on column containers
        document.querySelectorAll('.column-tasks').forEach(column => {
            column.addEventListener('dragover', handleDragOver);
            column.addEventListener('dragenter', handleDragEnter);
            column.addEventListener('dragleave', handleDragLeave);
            column.addEventListener('drop', handleDrop);
        });

        // Assign dropdown state
        let currentAssignTaskId = null;

        // Returns all unique member names grouped by online/offline status
        function getAllMemberNames() {
            const online = [];
            const offline = [];
            const seen = new Set();
            members.forEach(m => {
                if (!seen.has(m.name.toLowerCase())) {
                    seen.add(m.name.toLowerCase());
                    if (m.isOnline) online.push(m.name);
                    else offline.push(m.name);
                }
            });
            // Add any terminals not already in members
            terminals.forEach(t => {
                if (!seen.has(t.name.toLowerCase())) {
                    seen.add(t.name.toLowerCase());
                    online.push(t.name);
                }
            });
            return { online, offline, all: online.concat(offline) };
        }

        function openAssignDropdown(event, taskId) {
            event.stopPropagation();
            currentAssignTaskId = taskId;

            const dropdown = document.getElementById('assignDropdown');
            const itemsContainer = document.getElementById('assignDropdownItems');
            const button = event.currentTarget;
            const rect = button.getBoundingClientRect();

            const memberData = getAllMemberNames();

            if (memberData.all.length === 0) {
                itemsContainer.innerHTML = '<div class="assign-dropdown-empty">No team members available</div>';
            } else {
                let html = '';

                // Unassign option
                const task = tasks.find(t => t.id === taskId);
                if (task && task.assignee) {
                    html += `<div class="assign-dropdown-item unassign" onclick="assignToTerminal('')">
                        <span>Unassign</span>
                    </div>`;
                    html += '<div class="assign-dropdown-divider"></div>';
                }

                // Online group
                if (memberData.online.length > 0) {
                    html += '<div class="assign-dropdown-group-label">Online</div>';
                    html += memberData.online.map(name => `
                        <div class="assign-dropdown-item" onclick="assignToTerminal('${escapeHtml(name)}')">
                            <span class="status-dot idle"></span>
                            <span>${escapeHtml(name)}</span>
                        </div>
                    `).join('');
                }

                // Offline group
                if (memberData.offline.length > 0) {
                    if (memberData.online.length > 0) {
                        html += '<div class="assign-dropdown-divider"></div>';
                    }
                    html += '<div class="assign-dropdown-group-label">Offline</div>';
                    html += memberData.offline.map(name => `
                        <div class="assign-dropdown-item" onclick="assignToTerminal('${escapeHtml(name)}')">
                            <span class="status-dot unknown"></span>
                            <span>${escapeHtml(name)}</span>
                        </div>
                    `).join('');
                }

                itemsContainer.innerHTML = html;
            }

            // Position dropdown near the button
            dropdown.style.top = (rect.bottom + 4) + 'px';
            dropdown.style.left = Math.max(4, rect.left - 100) + 'px';
            dropdown.classList.add('open');
        }

        function closeAssignDropdown() {
            document.getElementById('assignDropdown').classList.remove('open');
            currentAssignTaskId = null;
        }

        function assignToTerminal(terminalName) {
            if (!currentAssignTaskId) return;

            const task = tasks.find(t => t.id === currentAssignTaskId);
            if (!task) {
                closeAssignDropdown();
                return;
            }

            // Send assignment request to C#
            sendToHost({
                type: 'assign_to_terminal',
                taskId: currentAssignTaskId,
                terminalName: terminalName,
                taskTitle: task.title,
                taskDescription: task.description || ''
            });

            closeAssignDropdown();
            showToast(terminalName ? `Task assigned to ${terminalName}` : 'Task unassigned');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.toggle('error', !!isError);
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, isError ? 5000 : 3000);
        }

        // Close assign dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.assign-dropdown') && !e.target.closest('.task-icon-btn.assign')) {
                closeAssignDropdown();
            }
        });

        // Signal ready and send initial project selection if saved
        console.log('[TasksPanel JS] Sending ready signal to host, selectedProjectId =', selectedProjectId);
        sendToHost({ type: 'ready' });

        // If we have a saved project selection, notify backend
        if (selectedProjectId) {
            sendToHost({
                type: 'select_project',
                projectId: selectedProjectId
            });
        }
    </script>
</body>
</html>
