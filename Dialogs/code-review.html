<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Code Review</title>
<style>
    :root {
        --bg-color: #1a1a2e;
        --text-color: #ddd;
        --border-color: #333;
        --timestamp-color: #888;
    }
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: var(--bg-color);
        color: var(--text-color);
        font-family: 'Segoe UI', 'Arial', sans-serif;
        overflow: hidden;
    }
    #cr-root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
    }
    #cr-loading, #cr-empty, #cr-error {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        padding: 24px;
        font-size: 13px;
        color: var(--text-color);
        text-align: center;
    }
    #cr-error { color: #ef5350; }

    /* ── Code Review overlay layout ── */
    .cr-container { display: flex; height: 100%; flex-direction: column; }
    .cr-body { display: flex; flex: 1; overflow: hidden; }
    .cr-file-list { width: 220px; border-right: 1px solid var(--border-color, #333); overflow-y: auto; padding: 4px 0; flex-shrink: 0; }
    .cr-file-item { padding: 6px 10px; font-size: 11px; cursor: pointer; color: var(--text-color, #ddd); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
    .cr-file-item:hover { background: rgba(255, 255, 255, 0.05); }
    .cr-file-item.active { background: rgba(74, 144, 217, 0.2); border-left: 2px solid #4A90D9; }
    .cr-file-badge { font-size: 9px; padding: 1px 5px; border-radius: 8px; background: rgba(255, 255, 255, 0.1); color: #aaa; margin-left: auto; display: none; }
    .cr-file-badge.has-comments { display: inline; }
    .cr-diff-area { flex: 1; overflow: auto; }
    .cr-diff-pane { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; }
    .diff-header { padding: 8px 12px; background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid var(--border-color, #333); color: var(--timestamp-color, #888); font-size: 11px; }
    .diff-line { padding: 0 12px; line-height: 20px; white-space: pre-wrap; word-break: break-all; display: flex; }
    .diff-line:hover { background: rgba(255, 255, 255, 0.04); }
    .diff-line.add { background: rgba(76, 175, 80, 0.1); color: #a5d6a7; }
    .diff-line.add:hover { background: rgba(76, 175, 80, 0.18); }
    .diff-line.remove { background: rgba(244, 67, 54, 0.1); color: #ef9a9a; }
    .diff-line.remove:hover { background: rgba(244, 67, 54, 0.18); }
    .diff-line.hunk { color: #4A90D9; background: rgba(74, 144, 217, 0.05); padding: 4px 12px; margin: 4px 0; }
    .diff-line.context { color: var(--text-color, #ccc); }
    .diff-line-num { width: 40px; text-align: right; padding-right: 8px; color: #666; cursor: pointer; user-select: none; flex-shrink: 0; font-size: 11px; }
    .diff-line-num:hover { color: #4A90D9; text-decoration: underline; }
    .diff-line-content { flex: 1; }
    .diff-line.hunk .diff-line-num { color: transparent; cursor: default; }
    .diff-line.hunk .diff-line-num:hover { color: transparent; text-decoration: none; }

    /* Comment input box */
    .cr-comment-input { padding: 8px 12px 8px 48px; background: rgba(74, 144, 217, 0.08); border-left: 3px solid #4A90D9; margin: 2px 0; }
    .cr-comment-row { display: flex; gap: 8px; align-items: flex-start; }
    .cr-severity-select { background: #2a2a2a; color: #ddd; border: 1px solid #555; border-radius: 4px; padding: 4px 6px; font-size: 11px; }
    .cr-comment-textarea { flex: 1; background: #1e1e1e; color: #ddd; border: 1px solid #555; border-radius: 4px; padding: 6px 8px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 40px; max-height: 120px; }
    .cr-comment-textarea:focus { border-color: #4A90D9; outline: none; }
    .cr-comment-actions { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }
    .cr-comment-btn { padding: 4px 12px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; }
    .cr-comment-btn.add { background: #4A90D9; color: #fff; }
    .cr-comment-btn.add:hover { background: #3a7bc8; }
    .cr-comment-btn.cancel { background: #555; color: #ddd; }
    .cr-comment-btn.cancel:hover { background: #666; }

    /* Inline comment badge (saved comment) */
    .cr-inline-comment { padding: 6px 12px 6px 48px; margin: 1px 0; display: flex; align-items: flex-start; gap: 8px; font-size: 11px; }
    .cr-inline-comment .cr-sev-tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .cr-sev-tag.BLOCKER { background: rgba(244, 67, 54, 0.2); color: #ef5350; }
    .cr-sev-tag.SUGGESTION { background: rgba(74, 144, 217, 0.2); color: #64B5F6; }
    .cr-sev-tag.NITPICK { background: rgba(158, 158, 158, 0.2); color: #bbb; }
    .cr-sev-tag.QUESTION { background: rgba(255, 193, 7, 0.2); color: #FFD54F; }
    .cr-inline-comment .cr-comment-text { flex: 1; color: #ddd; }
    .cr-inline-comment .cr-comment-del { cursor: pointer; color: #888; font-size: 13px; }
    .cr-inline-comment .cr-comment-del:hover { color: #F44336; }
    .cr-inline-comment .cr-comment-edit { cursor: pointer; color: #888; font-size: 13px; margin-right: 2px; }
    .cr-inline-comment .cr-comment-edit:hover { color: #4A90D9; }

    /* Bottom bar */
    .cr-bottom { border-top: 1px solid var(--border-color, #333); }
    .cr-summary { padding: 6px 12px; font-size: 11px; color: #aaa; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .cr-summary-tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
    .cr-actions { display: flex; gap: 8px; padding: 8px 12px; justify-content: flex-end; }
    .cr-btn { padding: 6px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .cr-btn.pass { background: #4CAF50; color: #fff; }
    .cr-btn.pass:hover { background: #388E3C; }
    .cr-btn.pass[disabled] { opacity: 0.5; cursor: not-allowed; }
    .cr-btn.submit-notes { background: #4A90D9; color: #fff; opacity: 0.4; pointer-events: none; }
    .cr-btn.submit-notes.enabled { opacity: 1; pointer-events: auto; cursor: pointer; }
    .cr-btn.submit-notes.enabled:hover { background: #3a7bc8; }
    .cr-btn.submit-notes.enabled[disabled] { opacity: 0.5; pointer-events: none; cursor: not-allowed; }

    /* Summary sidebar */
    .cr-summary-sidebar { width: 260px; border-left: 1px solid var(--border-color, #333); overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; transition: width 0.2s ease, padding 0.2s ease; }
    .cr-summary-sidebar.collapsed { width: 0; border-left: none; overflow: hidden; padding: 0; }
    .cr-sidebar-header { padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--text-color, #ddd); border-bottom: 1px solid var(--border-color, #333); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .cr-sidebar-header button { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 0 4px; }
    .cr-sidebar-header button:hover { color: var(--text-color, #ddd); }
    .cr-sidebar-content { flex: 1; overflow-y: auto; padding: 4px 0; }
    .cr-summary-card { padding: 8px 12px; margin: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; border-left: 3px solid #555; background: rgba(255, 255, 255, 0.02); transition: background 0.15s, border-left-color 0.15s; }
    .cr-summary-card:hover { background: rgba(255, 255, 255, 0.06); }
    .cr-summary-card.active { background: rgba(74, 144, 217, 0.12); border-left-color: #4A90D9 !important; }
    .cr-summary-card.additions { border-left-color: #4CAF50; }
    .cr-summary-card.deletions { border-left-color: #F44336; }
    .cr-summary-card.mixed { border-left-color: #FF9800; }
    .cr-scard-title { color: var(--text-color, #ddd); margin-bottom: 3px; line-height: 1.3; }
    .cr-scard-meta { color: #888; font-size: 10px; }
    .cr-scard-agent { color: #64B5F6; font-size: 10px; margin-top: 4px; line-height: 1.3; }
    .diff-line.hunk.highlighted { background: rgba(74, 144, 217, 0.15); }
    .cr-toggle-sidebar { background: none; border: 1px solid var(--border-color, #555); color: var(--text-color, #ddd); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .cr-toggle-sidebar:hover { background: rgba(255, 255, 255, 0.05); }
</style>
</head>
<body>
<div id="cr-root"><div id="cr-loading">Loading review...</div></div>

<script>
    // ── Host bridge ──
    // Wire is a plain JSON-stringified postMessage. The host (CodeReviewPopupForm)
    // owns all REST + broker side effects; this page never makes its own HTTP calls.
    function sendToHost(obj) {
        try {
            if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) {
                window.chrome.webview.postMessage(JSON.stringify(obj));
            }
        } catch (e) { console.error('sendToHost failed:', e); }
    }

    function escapeHtml(text) {
        if (text == null) return '';
        return String(text).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    // ── State ──
    // Same shape as the previous in-panel overlay so all cr* functions can be
    // lifted verbatim; identity binding via stable per-line ids (lineRefId)
    // unchanged.
    let _crComments = {};        // { fileIndex: [{ file, line, lineContent, severity, comment, lineRefId, timestamp? }] }
    let _crFiles = [];           // files array from CodeReviewService
    let _crTaskId = null;
    let _crTaskTitle = '';
    let _crHunkSummaries = {};   // { fileIndex: [{ oldStart, oldCount, newStart, newCount, addedLines, removedLines, hunkId, hunkIndex, changeType, basicSummary }] }
    let _crAgentSummaries = null;
    let _crPendingPreselect = null; // filePath from init, applied when data arrives
    let _crSubmitInFlight = false;  // guards double-submit

    // ── Theme ──
    function applyTheme(theme) {
        const root = document.documentElement;
        if (theme === 'light') {
            root.style.setProperty('--bg-color', '#f5f5f5');
            root.style.setProperty('--text-color', '#222');
            root.style.setProperty('--border-color', '#ccc');
            root.style.setProperty('--timestamp-color', '#666');
        } else {
            root.style.setProperty('--bg-color', '#1a1a2e');
            root.style.setProperty('--text-color', '#ddd');
            root.style.setProperty('--border-color', '#333');
            root.style.setProperty('--timestamp-color', '#888');
        }
    }

    // ── Host → Page protocol ──
    // init           — { taskId, taskTitle, filePath?, theme }                              once after 'ready'
    // preselect_file — { filePath }                                                          on focus-reuse of an existing popup
    // theme_changed  — { theme }                                                              live theme switch
    // data           — { payload: { files, agentReport? } }                                   response to fetch_data
    // submit_result  — { ok, error? }                                                         response to code_review_verdict
    function onHostMessage(rawData) {
        let msg;
        try {
            msg = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
        } catch (e) {
            console.error('Bad host message (parse failed):', rawData, e);
            return;
        }
        if (!msg || !msg.type) return;
        switch (msg.type) {
            case 'init':
                _crTaskId = msg.taskId || null;
                _crTaskTitle = msg.taskTitle || '';
                applyTheme(msg.theme);
                if (msg.filePath) _crPendingPreselect = msg.filePath;
                if (_crTaskId) sendToHost({ type: 'fetch_data', taskId: _crTaskId });
                else showError('No taskId supplied by host.');
                break;
            case 'data':
                showCodeReviewOverlay(_crTaskId, msg.payload || {}, _crPendingPreselect);
                _crPendingPreselect = null;
                break;
            case 'preselect_file':
                // If overlay already rendered, switch tabs. Otherwise stash for when data lands.
                if (_crFiles && _crFiles.length > 0) {
                    const idx = findFileIndex(msg.filePath);
                    if (idx >= 0) showFileDiff(idx);
                } else {
                    _crPendingPreselect = msg.filePath;
                }
                break;
            case 'theme_changed':
                applyTheme(msg.theme);
                break;
            case 'submit_result':
                _crSubmitInFlight = false;
                reEnableActions();
                if (msg.ok) {
                    sendToHost({ type: 'close' });
                } else {
                    const err = msg.error || 'unknown error';
                    alert('Could not save review verdict:\n\n' + err);
                }
                break;
            default:
                // Unknown message type — log and ignore.
                console.warn('Unknown host message type:', msg.type);
        }
    }

    function findFileIndex(filePath) {
        if (!filePath || !_crFiles.length) return -1;
        const target = (filePath || '').replace(/\\/g, '/').toLowerCase();
        const idx = _crFiles.findIndex(f => (f.filePath || '').replace(/\\/g, '/').toLowerCase() === target);
        if (idx === -1) {
            // F-R2-6 defense-in-depth: host should resolve to an absolute path
            // before sending preselect_file / init.filePath. Warn loudly so a
            // silent wrong-file fallback to index 0 is observable in DevTools.
            try { console.warn('[code-review] findFileIndex no-match', { requested: filePath, available: _crFiles.map(f => f.filePath) }); } catch (_) {}
        }
        return idx;
    }

    function showError(msg) {
        const root = document.getElementById('cr-root');
        if (root) root.innerHTML = '<div id="cr-error">' + escapeHtml(msg) + '</div>';
    }

    function disableActions() {
        const submitBtn = document.getElementById('cr-submit-btn');
        const passBtn = document.querySelector('.cr-btn.pass');
        if (submitBtn) submitBtn.setAttribute('disabled', 'disabled');
        if (passBtn) passBtn.setAttribute('disabled', 'disabled');
    }
    function reEnableActions() {
        const submitBtn = document.getElementById('cr-submit-btn');
        const passBtn = document.querySelector('.cr-btn.pass');
        if (submitBtn) submitBtn.removeAttribute('disabled');
        if (passBtn) passBtn.removeAttribute('disabled');
    }

    // ── Code Review overlay (lifted from tasks-panel.html, adapted for popup) ──
    function showCodeReviewOverlay(taskId, data, targetFilePath) {
        const root = document.getElementById('cr-root');
        const files = data.files || [];
        if (files.length === 0) {
            root.innerHTML = '<div id="cr-empty">No linked files found for this task.<br>Agents should call <code style="margin:0 4px;background:rgba(255,255,255,0.06);padding:1px 4px;border-radius:3px;">link_task_file</code> to track changed files.</div>';
            return;
        }

        // Reset state
        _crComments = {};
        _crFiles = files;
        _crTaskId = taskId;
        _crHunkSummaries = {};
        _crAgentSummaries = null;

        // Resolve the file tab to land on. Default = 0; when the caller passed
        // a target path (Git-tab right-click escalation), find the linked file
        // whose path matches it and select that one instead. Match is normalized
        // (lowercase + forward slashes).
        const normalizePath = p => (p || '').replace(/\\/g, '/').toLowerCase();
        let initialIndex = 0;
        if (targetFilePath) {
            const target = normalizePath(targetFilePath);
            const found = files.findIndex(f => normalizePath(f.filePath) === target);
            if (found >= 0) initialIndex = found;
        }

        const fileListHtml = files.map((f, i) => {
            const shortPath = f.filePath.split(/[/\\]/).slice(-2).join('/');
            const statusIcon = f.hasDiff ? '&#x1F4DD;' : '&#x2796;';
            return `<div class="cr-file-item ${i === initialIndex ? 'active' : ''}" id="cr-file-tab-${i}" onclick="showFileDiff(${i})" title="${escapeHtml(f.filePath)}">${statusIcon} ${escapeHtml(shortPath)}<span class="cr-file-badge" id="cr-file-badge-${i}"></span></div>`;
        }).join('');

        const diffHtml = files.map((f, i) => {
            if (!f.diff) return `<div class="cr-diff-pane" id="cr-diff-${i}" style="display:${i===initialIndex?'block':'none'};padding:16px;color:var(--text-color,#ddd);">No changes detected for this file.</div>`;
            return `<div class="cr-diff-pane" id="cr-diff-${i}" style="display:${i===initialIndex?'block':'none'};">${renderUnifiedDiff(f.diff, f.filePath, i)}</div>`;
        }).join('');

        root.innerHTML = `
            <div class="cr-container">
                <div class="cr-body">
                    <div class="cr-file-list">${fileListHtml}</div>
                    <div class="cr-diff-area" id="cr-diff-area">${diffHtml}</div>
                    <div class="cr-summary-sidebar" id="cr-summary-sidebar">
                        <div class="cr-sidebar-header">
                            <span>Changes</span>
                            <button onclick="toggleSummarySidebar()" title="Hide sidebar">&#x2715;</button>
                        </div>
                        <div class="cr-sidebar-content" id="cr-sidebar-content"></div>
                    </div>
                </div>
                <div class="cr-bottom">
                    <div class="cr-summary" id="cr-summary"></div>
                    <div class="cr-actions">
                        <button class="cr-toggle-sidebar" onclick="toggleSummarySidebar()" id="cr-sidebar-toggle" style="display:none;">&#x1F4CB; Changes</button>
                        <button class="cr-btn submit-notes" id="cr-submit-btn" onclick="crSubmitNotes()">&#x1F4DD; Submit Notes &mdash; Back to Coding</button>
                        <button class="cr-btn pass" onclick="codeReviewVerdict('${escapeHtml(taskId)}', 'pass')">&#x2705; Pass &mdash; Approve</button>
                    </div>
                </div>
            </div>
        `;
        crUpdateSummary();

        if (data.agentReport) _crAgentSummaries = crParseAgentReport(data.agentReport);

        // Render initial summary cards for the selected file and start scroll
        // tracking so the sidebar follows the user's position.
        crRenderSummaryCards(initialIndex);
        crSetupScrollTracking();
    }

    function showFileDiff(index) {
        document.querySelectorAll('.cr-diff-pane').forEach((el, i) => el.style.display = i === index ? 'block' : 'none');
        document.querySelectorAll('.cr-file-item').forEach((el, i) => el.classList.toggle('active', i === index));
        crRenderSummaryCards(index);
    }

    function renderUnifiedDiff(diffText, filePath, fileIndex) {
        const lines = diffText.split(/\r?\n/);
        let html = '<div class="diff-header">' + escapeHtml(filePath) + '</div>';
        let lineNum = 0;
        let hunkIndex = -1;
        let hunkLineOffset = -1;
        let currentHunk = null;
        _crHunkSummaries[fileIndex] = [];

        // Per-line stable id: cr-line-${fileIndex}-${hunkIndex}-${withinHunkOffset}.
        // Comment identity binds to this id, NOT to the rendered line number, so:
        //   - editing a comment never collides with the same number in another hunk;
        //   - removed-line comments (where lineNum may be 0) still anchor to a real
        //     element instead of being silently dropped at lookup time.
        // Fixes the comment-identity bug family flagged by debugger Run 1 (task 87ee90c3 F2).

        for (let idx = 0; idx < lines.length; idx++) {
            const line = lines[idx];
            if (line.startsWith('@@')) {
                if (currentHunk) crFinalizeHunk(currentHunk, fileIndex);

                const match = line.match(/@@ -(\d+),?(\d*) \+(\d+),?(\d*) @@/);
                hunkIndex++;
                hunkLineOffset = -1;
                const hunkId = 'cr-hunk-' + fileIndex + '-' + hunkIndex;
                currentHunk = {
                    oldStart: match ? parseInt(match[1]) : 0,
                    oldCount: match ? parseInt(match[2] || '1') : 0,
                    newStart: match ? parseInt(match[3]) : 0,
                    newCount: match ? parseInt(match[4] || '1') : 0,
                    addedLines: 0,
                    removedLines: 0,
                    hunkId: hunkId,
                    hunkIndex: hunkIndex
                };
                if (match) lineNum = parseInt(match[3]) - 1;
                html += `<div class="diff-line hunk" id="${hunkId}" onclick="crHighlightSummaryCard(${fileIndex},${hunkIndex})"><span class="diff-line-num"></span><span class="diff-line-content">${escapeHtml(line)}</span></div>`;
            } else if (line.startsWith('+') && !line.startsWith('+++')) {
                lineNum++;
                hunkLineOffset++;
                if (currentHunk) currentHunk.addedLines++;
                const lineRefId = 'cr-line-' + fileIndex + '-' + hunkIndex + '-' + hunkLineOffset;
                html += `<div class="diff-line add" id="${lineRefId}"><span class="diff-line-num" onclick="crOpenComment(${fileIndex},${lineNum},this)" title="Click to add a review note">${lineNum}</span><span class="diff-line-content">${escapeHtml(line)}</span></div>`;
            } else if (line.startsWith('-') && !line.startsWith('---')) {
                hunkLineOffset++;
                if (currentHunk) currentHunk.removedLines++;
                const lineRefId = 'cr-line-' + fileIndex + '-' + hunkIndex + '-' + hunkLineOffset;
                // For remove-lines we still pass the running new-file lineNum (may be 0
                // at hunk start) — the lineRefId on the parent div is what comment
                // identity binds to, the visible number is purely informational.
                html += `<div class="diff-line remove" id="${lineRefId}"><span class="diff-line-num" onclick="crOpenComment(${fileIndex},${lineNum},this)" title="Click to add a review note">&minus;</span><span class="diff-line-content">${escapeHtml(line)}</span></div>`;
            } else if (line.startsWith('---') || line.startsWith('+++')) {
                continue;
            } else {
                lineNum++;
                hunkLineOffset++;
                const lineRefId = 'cr-line-' + fileIndex + '-' + hunkIndex + '-' + hunkLineOffset;
                html += `<div class="diff-line context" id="${lineRefId}"><span class="diff-line-num" onclick="crOpenComment(${fileIndex},${lineNum},this)" title="Click to add a review note">${lineNum}</span><span class="diff-line-content">${escapeHtml(line)}</span></div>`;
            }
        }
        if (currentHunk) crFinalizeHunk(currentHunk, fileIndex);
        return html;
    }

    function crFinalizeHunk(hunk, fileIndex) {
        let changeType = 'mixed';
        if (hunk.addedLines > 0 && hunk.removedLines === 0) changeType = 'additions';
        else if (hunk.removedLines > 0 && hunk.addedLines === 0) changeType = 'deletions';

        let basicSummary = '';
        if (changeType === 'additions') basicSummary = 'Added ' + hunk.addedLines + ' line' + (hunk.addedLines !== 1 ? 's' : '');
        else if (changeType === 'deletions') basicSummary = 'Removed ' + hunk.removedLines + ' line' + (hunk.removedLines !== 1 ? 's' : '');
        else basicSummary = 'Changed: +' + hunk.addedLines + ' −' + hunk.removedLines + ' lines';

        _crHunkSummaries[fileIndex].push({
            oldStart: hunk.oldStart, oldCount: hunk.oldCount,
            newStart: hunk.newStart, newCount: hunk.newCount,
            addedLines: hunk.addedLines, removedLines: hunk.removedLines,
            hunkId: hunk.hunkId, hunkIndex: hunk.hunkIndex,
            changeType: changeType,
            basicSummary: basicSummary
        });
    }

    // editingIndex (when set) means "this input box is editing comment[fileIndex][editingIndex] in
    // place" rather than adding a new one. Comment identity is anchored by lineRefId.
    function crOpenComment(fileIndex, lineNum, clickedEl, editingIndex) {
        if (document.querySelector('.cr-comment-input')) {
            document.querySelector('.cr-comment-input').remove();
        }
        const lineEl = clickedEl.closest('.diff-line');
        const lineContent = lineEl ? lineEl.querySelector('.diff-line-content')?.textContent || '' : '';
        const lineRefId = lineEl ? lineEl.id : '';

        const inputDiv = document.createElement('div');
        inputDiv.className = 'cr-comment-input';
        inputDiv.setAttribute('data-file-index', fileIndex);
        inputDiv.setAttribute('data-line-num', lineNum);
        inputDiv.setAttribute('data-line-content', lineContent);
        inputDiv.setAttribute('data-line-ref-id', lineRefId);
        if (editingIndex !== undefined && editingIndex !== null) {
            inputDiv.setAttribute('data-editing-index', editingIndex);
        }
        inputDiv.innerHTML = `
            <div class="cr-comment-row">
                <select class="cr-severity-select" id="cr-sev-select">
                    <option value="BLOCKER">BLOCKER</option>
                    <option value="SUGGESTION" selected>SUGGESTION</option>
                    <option value="NITPICK">NITPICK</option>
                    <option value="QUESTION">QUESTION</option>
                </select>
                <textarea class="cr-comment-textarea" id="cr-comment-text" placeholder="What should the agent know about this line?" rows="2"></textarea>
            </div>
            <div class="cr-comment-actions">
                <button class="cr-comment-btn cancel" onclick="this.closest('.cr-comment-input').remove()">Cancel</button>
                <button class="cr-comment-btn add" onclick="crAddCommentFromInput(this)">${editingIndex !== undefined && editingIndex !== null ? 'Save Note' : 'Add Note'}</button>
            </div>
        `;
        lineEl.after(inputDiv);

        const textarea = inputDiv.querySelector('#cr-comment-text');
        textarea.focus();
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { inputDiv.remove(); e.stopPropagation(); }
            if (e.key === 'Enter' && e.ctrlKey) {
                document.querySelector('.cr-comment-btn.add')?.click();
                e.preventDefault();
            }
        });
    }

    function crAddCommentFromInput(btnEl) {
        const container = btnEl.closest('.cr-comment-input');
        if (!container) return;
        const fileIndex = parseInt(container.getAttribute('data-file-index'));
        const lineNum = parseInt(container.getAttribute('data-line-num'));
        const lineContent = container.getAttribute('data-line-content') || '';
        const lineRefId = container.getAttribute('data-line-ref-id') || '';
        const editingAttr = container.getAttribute('data-editing-index');
        const editingIndex = editingAttr !== null && editingAttr !== '' ? parseInt(editingAttr) : null;
        crAddComment(fileIndex, lineNum, lineContent, lineRefId, editingIndex);
    }

    function crAddComment(fileIndex, lineNum, lineContent, lineRefId, editingIndex) {
        const severity = document.getElementById('cr-sev-select').value;
        const comment = document.getElementById('cr-comment-text').value.trim();
        if (!comment) return;

        if (!_crComments[fileIndex]) _crComments[fileIndex] = [];
        const file = _crFiles[fileIndex];

        // Editing in place — overwrite the comment at editingIndex instead of pushing.
        // Non-destructive edit: the original is never removed before the new content
        // is committed, so a failed save / Escape keeps the original intact.
        if (editingIndex !== null && editingIndex !== undefined && _crComments[fileIndex][editingIndex]) {
            const existing = _crComments[fileIndex][editingIndex];
            existing.severity = severity;
            existing.comment = comment;
        } else {
            _crComments[fileIndex].push({
                file: file.filePath,
                line: lineNum,
                lineContent: lineContent,
                severity: severity,
                comment: comment,
                lineRefId: lineRefId
            });
        }

        document.querySelector('.cr-comment-input')?.remove();

        crRenderInlineComments(fileIndex);
        crUpdateSummary();
        crUpdateFileBadges();
    }

    function crDeleteComment(fileIndex, commentIndex) {
        if (_crComments[fileIndex]) {
            _crComments[fileIndex].splice(commentIndex, 1);
            if (_crComments[fileIndex].length === 0) delete _crComments[fileIndex];
        }
        crRenderInlineComments(fileIndex);
        crUpdateSummary();
        crUpdateFileBadges();
    }

    function crEditComment(fileIndex, commentIndex) {
        const comment = _crComments[fileIndex] && _crComments[fileIndex][commentIndex];
        if (!comment) return;

        let targetLineEl = null;
        if (comment.lineRefId) {
            targetLineEl = document.getElementById(comment.lineRefId);
        }
        if (!targetLineEl) {
            const diffPane = document.getElementById('cr-diff-' + fileIndex);
            if (diffPane) {
                const lineNums = diffPane.querySelectorAll('.diff-line-num');
                for (const ln of lineNums) {
                    if (ln.textContent.trim() == String(comment.line)) {
                        targetLineEl = ln.closest('.diff-line');
                        break;
                    }
                }
            }
        }
        if (!targetLineEl) return;

        const lineNumEl = targetLineEl.querySelector('.diff-line-num');
        crOpenComment(fileIndex, comment.line, lineNumEl || targetLineEl, commentIndex);
        setTimeout(() => {
            const sevSelect = document.getElementById('cr-sev-select');
            const textArea = document.getElementById('cr-comment-text');
            if (sevSelect) sevSelect.value = comment.severity;
            if (textArea) { textArea.value = comment.comment; textArea.focus(); textArea.select(); }
        }, 50);
    }

    function crRenderInlineComments(fileIndex) {
        const diffPane = document.getElementById('cr-diff-' + fileIndex);
        if (!diffPane) return;
        diffPane.querySelectorAll('.cr-inline-comment').forEach(el => el.remove());

        const comments = _crComments[fileIndex] || [];
        const validSeverities = ['BLOCKER', 'SUGGESTION', 'NITPICK', 'QUESTION'];

        const lineNums = diffPane.querySelectorAll('.diff-line-num');
        const lineMap = {};
        lineNums.forEach(ln => {
            const num = ln.textContent.trim();
            if (num && num !== '−') lineMap[num] = ln.closest('.diff-line');
        });

        comments.forEach((c, ci) => {
            let targetLine = null;
            if (c.lineRefId) targetLine = document.getElementById(c.lineRefId);
            if (!targetLine) targetLine = lineMap[c.line];
            if (!targetLine) return;

            const safeSeverity = validSeverities.includes(c.severity) ? c.severity : 'SUGGESTION';
            const badge = document.createElement('div');
            badge.className = 'cr-inline-comment';
            badge.innerHTML = `
                <span class="cr-sev-tag ${safeSeverity}">${escapeHtml(safeSeverity)}</span>
                <span class="cr-comment-text">${escapeHtml(c.comment)}</span>
                <span class="cr-comment-edit" onclick="crEditComment(${fileIndex},${ci})" title="Edit">&#x270E;</span>
                <span class="cr-comment-del" onclick="crDeleteComment(${fileIndex},${ci})" title="Delete">&#x2716;</span>
            `;
            let insertAfter = targetLine;
            let next = insertAfter.nextElementSibling;
            while (next && next.classList.contains('cr-inline-comment')) {
                insertAfter = next;
                next = insertAfter.nextElementSibling;
            }
            insertAfter.after(badge);
        });
    }

    function crUpdateSummary() {
        const summaryEl = document.getElementById('cr-summary');
        const submitBtn = document.getElementById('cr-submit-btn');
        if (!summaryEl) return;

        const allComments = Object.values(_crComments).flat();
        const total = allComments.length;

        if (total === 0) {
            summaryEl.innerHTML = '<span style="color:#888;">Click a line number to add review notes</span>';
            if (submitBtn) submitBtn.classList.remove('enabled');
            return;
        }

        const counts = { BLOCKER: 0, SUGGESTION: 0, NITPICK: 0, QUESTION: 0 };
        allComments.forEach(c => { counts[c.severity] = (counts[c.severity] || 0) + 1; });

        let parts = [`<span>${total} note${total !== 1 ? 's' : ''}:</span>`];
        if (counts.BLOCKER) parts.push(`<span class="cr-summary-tag cr-sev-tag BLOCKER">${counts.BLOCKER} blocker${counts.BLOCKER !== 1 ? 's' : ''}</span>`);
        if (counts.SUGGESTION) parts.push(`<span class="cr-summary-tag cr-sev-tag SUGGESTION">${counts.SUGGESTION} suggestion${counts.SUGGESTION !== 1 ? 's' : ''}</span>`);
        if (counts.NITPICK) parts.push(`<span class="cr-summary-tag cr-sev-tag NITPICK">${counts.NITPICK} nitpick${counts.NITPICK !== 1 ? 's' : ''}</span>`);
        if (counts.QUESTION) parts.push(`<span class="cr-summary-tag cr-sev-tag QUESTION">${counts.QUESTION} question${counts.QUESTION !== 1 ? 's' : ''}</span>`);
        summaryEl.innerHTML = parts.join('');

        if (submitBtn) submitBtn.classList.add('enabled');
    }

    function crUpdateFileBadges() {
        _crFiles.forEach((f, i) => {
            const badge = document.getElementById('cr-file-badge-' + i);
            if (!badge) return;
            const count = (_crComments[i] || []).length;
            if (count > 0) {
                badge.textContent = count;
                badge.classList.add('has-comments');
            } else {
                badge.textContent = '';
                badge.classList.remove('has-comments');
            }
        });
    }

    // crSubmitNotes / codeReviewVerdict — adapted for popup: do NOT close immediately.
    // Send the verdict, disable action buttons to prevent double-submit, and wait for
    // submit_result.ok=true from the host before posting {type:"close"}.
    function crSubmitNotes() {
        if (_crSubmitInFlight) return;
        const allComments = Object.values(_crComments).flat();
        if (allComments.length === 0) return;

        const now = new Date().toISOString();
        allComments.forEach(c => c.timestamp = now);

        _crSubmitInFlight = true;
        disableActions();
        sendToHost({
            type: 'code_review_verdict',
            taskId: _crTaskId,
            verdict: 'fail',
            reviewNotes: allComments
        });
    }

    function codeReviewVerdict(taskId, verdict) {
        if (_crSubmitInFlight) return;
        _crSubmitInFlight = true;
        disableActions();
        sendToHost({ type: 'code_review_verdict', taskId: taskId, verdict: verdict });
    }

    // ── Summary Sidebar ──

    function crRenderSummaryCards(fileIndex) {
        const sidebar = document.getElementById('cr-sidebar-content');
        if (!sidebar) return;
        const hunks = _crHunkSummaries[fileIndex] || [];
        if (hunks.length === 0) {
            sidebar.innerHTML = '<div style="padding:12px;color:#888;font-size:11px;">No changes in this file.</div>';
            return;
        }
        const filePath = _crFiles[fileIndex] ? _crFiles[fileIndex].filePath : '';
        const shortFile = filePath.split(/[/\\]/).pop() || filePath;

        const agentFileSummaries = _crAgentSummaries ? (_crAgentSummaries[filePath] || _crAgentSummaries[shortFile] || null) : null;

        sidebar.innerHTML = hunks.map((h, i) => {
            let agentText = null;
            if (agentFileSummaries) {
                agentText = crMatchAgentSummary(agentFileSummaries, h.newStart, h.newStart + h.newCount - 1);
            }
            const title = agentText || h.basicSummary;
            const metaRange = 'Lines ' + h.newStart + '–' + (h.newStart + h.newCount - 1);
            const metaStats = '+' + h.addedLines + ' −' + h.removedLines;
            return '<div class="cr-summary-card ' + h.changeType + '" id="cr-scard-' + fileIndex + '-' + i + '" onclick="crScrollToHunk(' + fileIndex + ',' + i + ')">' +
                '<div class="cr-scard-title">' + escapeHtml(title) + '</div>' +
                '<div class="cr-scard-meta">' + metaRange + ' &middot; ' + metaStats + '</div>' +
                '</div>';
        }).join('');

        const header = document.querySelector('.cr-sidebar-header span');
        if (header) header.textContent = 'Changes (' + hunks.length + ')';
    }

    function crScrollToHunk(fileIndex, hunkIndex) {
        const hunk = (_crHunkSummaries[fileIndex] || [])[hunkIndex];
        if (!hunk) return;
        const el = document.getElementById(hunk.hunkId);
        if (!el) return;

        document.querySelectorAll('.diff-line.hunk.highlighted').forEach(h => h.classList.remove('highlighted'));
        el.classList.add('highlighted');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => el.classList.remove('highlighted'), 2000);

        crSetActiveCard(fileIndex, hunkIndex);
    }

    function crHighlightSummaryCard(fileIndex, hunkIndex) {
        crSetActiveCard(fileIndex, hunkIndex);
        const card = document.getElementById('cr-scard-' + fileIndex + '-' + hunkIndex);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function crSetActiveCard(fileIndex, hunkIndex) {
        document.querySelectorAll('.cr-summary-card.active').forEach(c => c.classList.remove('active'));
        const card = document.getElementById('cr-scard-' + fileIndex + '-' + hunkIndex);
        if (card) card.classList.add('active');
    }

    function toggleSummarySidebar() {
        const sidebar = document.getElementById('cr-summary-sidebar');
        const toggleBtn = document.getElementById('cr-sidebar-toggle');
        if (!sidebar) return;
        const isCollapsed = sidebar.classList.toggle('collapsed');
        if (toggleBtn) toggleBtn.style.display = isCollapsed ? 'inline-block' : 'none';
    }

    function crSetupScrollTracking() {
        const diffArea = document.getElementById('cr-diff-area');
        if (!diffArea) return;
        let scrollTimeout;
        diffArea.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                const visiblePane = diffArea.querySelector('.cr-diff-pane[style*="display:block"], .cr-diff-pane[style*="display: block"]');
                if (!visiblePane) return;
                const hunks = visiblePane.querySelectorAll('.diff-line.hunk');
                const areaRect = diffArea.getBoundingClientRect();
                const areaCenter = areaRect.top + areaRect.height / 3;
                let closestHunk = null;
                let closestDist = Infinity;
                hunks.forEach(h => {
                    const rect = h.getBoundingClientRect();
                    const dist = Math.abs(rect.top - areaCenter);
                    if (dist < closestDist) { closestDist = dist; closestHunk = h; }
                });
                if (closestHunk && closestHunk.id) {
                    const match = closestHunk.id.match(/cr-hunk-(\d+)-(\d+)/);
                    if (match) crSetActiveCard(parseInt(match[1]), parseInt(match[2]));
                }
            }, 100);
        });
    }

    function crMatchAgentSummary(fileSummaries, startLine, endLine) {
        if (!Array.isArray(fileSummaries)) return null;
        for (const s of fileSummaries) {
            if (s.startLine <= endLine && s.endLine >= startLine) return s.summary;
        }
        return null;
    }

    function crParseAgentReport(reportContent) {
        if (!reportContent) return null;
        const summaryMatch = reportContent.match(/###\s*Change Summaries([\s\S]*?)(?=###|$)/i);
        if (!summaryMatch) return null;

        const result = {};
        const lines = summaryMatch[1].split('\n');
        for (const line of lines) {
            const m = line.match(/[-*]\s+\*\*(.+?):(\d+)-(\d+)\*\*\s*[—\-]+\s*(.+)/);
            if (m) {
                const filePath = m[1].trim();
                const startLine = parseInt(m[2]);
                const endLine = parseInt(m[3]);
                const summary = m[4].trim();
                if (!result[filePath]) result[filePath] = [];
                result[filePath].push({ startLine, endLine, summary });
            }
        }
        return Object.keys(result).length > 0 ? result : null;
    }

    // ── Bootstrap ──
    if (window.chrome && window.chrome.webview && window.chrome.webview.addEventListener) {
        window.chrome.webview.addEventListener('message', e => onHostMessage(e.data));
    }
    window.addEventListener('DOMContentLoaded', () => {
        sendToHost({ type: 'ready' });
    });
</script>
</body>
</html>
