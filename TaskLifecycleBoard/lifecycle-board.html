<script>
/* =============================================================
   Task Lifecycle Board - JavaScript Controller
   ============================================================= */
(function () {
    "use strict";

    // -----------------------------------------------------------
    // State
    // -----------------------------------------------------------
    let currentTask = null;
    let currentAttachments = [];
    let checklist = [];       // Parsed checklist items
    // (originalIndices removed — unused after notes stream refactor)
    let terminals = [];
    let members = [];   // All team members (online + offline) from profiles
    let projects = [];
    let draggedCardIndex = null; // original checklist index of card being dragged
    let draggedElement = null;
    let swimlanesEnabled = false;
    let swimlanesManuallySet = false; // true once user explicitly toggles

    // -----------------------------------------------------------
    // Markdown Renderer (lightweight)
    // -----------------------------------------------------------
    function renderMarkdown(text) {
        if (!text) return "";
        var html = text;

        // Escape HTML entities first
        html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // Code blocks (``` ... ```) — must come before inline processing
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function (m, lang, code) {
            return '<pre><code>' + code.trimEnd() + '</code></pre>';
        });

        // Inline code (`...`)
        html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

        // Headings
        html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

        // Horizontal rules
        html = html.replace(/^---+$/gm, '<hr>');

        // Bold and italic
        html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

        // Blockquotes
        html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

        // Unordered lists: convert consecutive "- " lines
        html = html.replace(/(?:^- .+\n?)+/gm, function (block) {
            var items = block.trim().split("\n").map(function (line) {
                return '<li>' + line.replace(/^- /, '') + '</li>';
            }).join("\n");
            return '<ul>' + items + '</ul>';
        });

        // Ordered lists: convert consecutive "N. " lines
        html = html.replace(/(?:^\d+\. .+\n?)+/gm, function (block) {
            var items = block.trim().split("\n").map(function (line) {
                return '<li>' + line.replace(/^\d+\. /, '') + '</li>';
            }).join("\n");
            return '<ol>' + items + '</ol>';
        });

        // Paragraphs: wrap remaining loose text lines
        // Split by double newlines, wrap non-tag blocks in <p>
        html = html.split(/\n{2,}/).map(function (block) {
            block = block.trim();
            if (!block) return "";
            // Don't wrap blocks that start with HTML tags
            if (/^<(h[1-6]|ul|ol|li|pre|blockquote|hr|p)/.test(block)) return block;
            return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
        }).join("\n");

        // Clean up: merge adjacent blockquotes
        html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

        // Defense-in-depth: strip any script tags or event handlers that
        // could theoretically result from regex edge cases
        html = html.replace(/<script[\s\S]*?<\/script>/gi, "");
        html = html.replace(/\bon\w+\s*=/gi, "data-blocked=");

        return html;
    }

    // -----------------------------------------------------------
    // Host Communication
    // -----------------------------------------------------------
    function sendToHost(message) {
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(message);
        }
    }

    // Listen for messages from the C# host
    function initHostListener() {
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener("message", function (event) {
                var data = event.data;
                if (typeof data === "string") {
                    handleStringMessage(data);
                } else if (typeof data === "object" && data !== null) {
                    handleObjectMessage(data);
                }
            });
        }
    }

    function handleStringMessage(msg) {
        if (msg === "theme:dark") {
            document.body.classList.remove("light");
        } else if (msg === "theme:light") {
            document.body.classList.add("light");
        }
    }

    function handleObjectMessage(data) {
        if (data.type === "task_data") {
            currentTask = data.task || null;
            terminals = data.terminals || [];
            members = data.members || [];
            projects = data.projects || [];
            currentAttachments = data.attachments || [];
            if (currentTask) {
                parseChecklist();
                renderAll();
            }
        } else if (data.type === "attachments_updated") {
            currentAttachments = data.attachments || [];
            // Re-render images if card modal is open
            if (cardModalOpenIndex !== null) {
                renderCardModalImages(cardModalOpenIndex);
            }
        }
    }

    // Returns all unique member names (online first, then offline), for dropdowns
    function getAllMemberNames() {
        var online = [];
        var offline = [];
        members.forEach(function (m) {
            if (m.isOnline) online.push(m.name);
            else offline.push(m.name);
        });
        // Add any terminals not in members
        terminals.forEach(function (name) {
            if (online.indexOf(name) === -1 && offline.indexOf(name) === -1) {
                online.push(name);
            }
        });
        return { online: online, offline: offline, all: online.concat(offline) };
    }

    // Populate a <select> with member options, grouped by online/offline
    function populateMemberDropdown(select, memberData, selectedValue) {
        if (memberData.online.length > 0) {
            var onlineGroup = document.createElement("optgroup");
            onlineGroup.label = "Online";
            memberData.online.forEach(function (name) {
                var opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                if (selectedValue === name) opt.selected = true;
                onlineGroup.appendChild(opt);
            });
            select.appendChild(onlineGroup);
        }
        if (memberData.offline.length > 0) {
            var offlineGroup = document.createElement("optgroup");
            offlineGroup.label = "Offline";
            memberData.offline.forEach(function (name) {
                var opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                if (selectedValue === name) opt.selected = true;
                offlineGroup.appendChild(opt);
            });
            select.appendChild(offlineGroup);
        }
        // If selected value isn't in any group (e.g. removed profile), still show it
        if (selectedValue && memberData.all.indexOf(selectedValue) === -1) {
            var opt = document.createElement("option");
            opt.value = selectedValue;
            opt.textContent = selectedValue + " (unknown)";
            opt.selected = true;
            select.appendChild(opt);
        }
    }

    // -----------------------------------------------------------
    // Checklist Parsing
    // -----------------------------------------------------------
    function parseChecklist() {
        checklist = [];
        if (!currentTask || !currentTask.checklistJson) return;

        try {
            var raw = currentTask.checklistJson;
            if (typeof raw === "string") {
                checklist = JSON.parse(raw);
            } else if (Array.isArray(raw)) {
                checklist = raw;
            }
        } catch (e) {
            checklist = [];
        }

        // Normalize casing (C# SetChecklist serializes camelCase, JS expects PascalCase)
        for (var i = 0; i < checklist.length; i++) {
            var item = checklist[i];
            // Map camelCase → PascalCase if needed
            if (item.item !== undefined && item.Item === undefined) item.Item = item.item;
            if (item.status !== undefined && item.Status === undefined) item.Status = item.status;
            if (item.done !== undefined && item.Done === undefined) item.Done = item.done;
            if (item.notes !== undefined && item.Notes === undefined) item.Notes = item.notes;
            if (item.assignedTo !== undefined && item.AssignedTo === undefined) item.AssignedTo = item.assignedTo;
            if (item.cycleCount !== undefined && item.CycleCount === undefined) item.CycleCount = item.cycleCount;
            if (item.sortOrder !== undefined && item.SortOrder === undefined) item.SortOrder = item.sortOrder;

            if (!item.Status || item.Status === "") {
                // Legacy: only has Done boolean
                item.Status = item.Done === true ? "done" : "pending";
            }
            // Ensure fields exist
            if (!item.Notes) item.Notes = [];
            if (typeof item.CycleCount !== "number") item.CycleCount = 0;
            if (item.AssignedTo === undefined) item.AssignedTo = null;

            // Normalize note objects: camelCase → PascalCase, handle plain strings
            for (var n = 0; n < item.Notes.length; n++) {
                var note = item.Notes[n];
                if (typeof note === "string") {
                    // Legacy plain string note → structured object
                    item.Notes[n] = { By: "System", At: null, Transition: null, Text: note };
                } else if (note && typeof note === "object") {
                    if (note.by !== undefined && note.By === undefined) note.By = note.by;
                    if (note.at !== undefined && note.At === undefined) note.At = note.at;
                    if (note.transition !== undefined && note.Transition === undefined) note.Transition = note.transition;
                    if (note.text !== undefined && note.Text === undefined) note.Text = note.text;
                }
            }
        }
    }

    // -----------------------------------------------------------
    // Swimlane Helpers
    // -----------------------------------------------------------
    function getUniqueAssignees() {
        var seen = {};
        for (var i = 0; i < checklist.length; i++) {
            var a = checklist[i].AssignedTo || "";
            seen[a] = true;
        }
        return Object.keys(seen);
    }

    // -----------------------------------------------------------
    // Render All
    // -----------------------------------------------------------
    function renderAll() {
        // Auto-enable swimlanes when 2+ assignees (unless user manually toggled)
        if (!swimlanesManuallySet) {
            var uniqueAssignees = getUniqueAssignees();
            swimlanesEnabled = uniqueAssignees.length >= 2;
        }

        renderHeader();
        renderDescription();
        renderColumns();
        renderNotesStream();
    }

    // -----------------------------------------------------------
    // Header
    // -----------------------------------------------------------
    function renderHeader() {
        if (!currentTask) return;

        var titleEl = document.getElementById("headerTitle");
        titleEl.textContent = currentTask.title || "Untitled Task";
        titleEl.title = "Double-click to edit: " + (currentTask.title || "");

        // Weighted progress: Planning=0%, Coding=33%, Testing=66%, Done=100%
        var totalCards = checklist.length;
        var pct = 0;
        if (totalCards > 0) {
            var weightSum = 0;
            for (var pi = 0; pi < checklist.length; pi++) {
                var s = checklist[pi].Status;
                if (s === "done") weightSum += 100;
                else if (s === "testing") weightSum += 66;
                else if (s === "coding") weightSum += 33;
                // pending = 0
            }
            pct = Math.round(weightSum / totalCards);
        }

        document.getElementById("progressFill").style.width = pct + "%";
        document.getElementById("progressText").textContent = pct + "%";

        // Chips
        var chipsEl = document.getElementById("headerChips");
        chipsEl.innerHTML = "";

        // Status chip
        if (currentTask.status) {
            var statusChip = createEl("span", "chip chip-status " + currentTask.status);
            statusChip.textContent = formatStatus(currentTask.status);
            chipsEl.appendChild(statusChip);
        }

        // Priority chip
        var priority = (currentTask.priority || "normal").toLowerCase();
        var priorityChip = createEl("span", "chip chip-priority " + priority);
        priorityChip.textContent = priority;
        chipsEl.appendChild(priorityChip);

        // Assignee chip
        if (currentTask.assignee) {
            var assigneeChip = createEl("span", "chip chip-assignee");
            assigneeChip.textContent = currentTask.assignee;
            chipsEl.appendChild(assigneeChip);
        }
    }

    function formatStatus(s) {
        if (!s) return "";
        return s.replace(/_/g, " ");
    }

    // -----------------------------------------------------------
    // Title Editing
    // -----------------------------------------------------------
    (function initTitleEditing() {
        var titleEl = document.getElementById("headerTitle");

        titleEl.addEventListener("dblclick", function () {
            if (titleEl.contentEditable === "true") return;
            // Restore full title from data model before entering edit mode
            if (currentTask && currentTask.title) {
                titleEl.textContent = currentTask.title;
            }
            titleEl.contentEditable = "true";
            titleEl.classList.add("editing");
            titleEl.focus();

            // Select all text
            var range = document.createRange();
            range.selectNodeContents(titleEl);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        });

        titleEl.addEventListener("blur", function () {
            titleEl.contentEditable = "false";
            titleEl.classList.remove("editing");
            var newTitle = titleEl.textContent.trim();
            if (newTitle && currentTask && newTitle !== currentTask.title) {
                currentTask.title = newTitle;
                sendToHost({ type: "update_title", title: newTitle });
            }
        });

        titleEl.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                titleEl.blur();
            } else if (e.key === "Escape") {
                titleEl.textContent = currentTask ? currentTask.title : "";
                titleEl.blur();
            }
        });
    })();

    // -----------------------------------------------------------
    // Columns Rendering
    // -----------------------------------------------------------
    var STATUS_ORDER = ["pending", "coding", "testing", "done"];
    var STATUS_LABELS = { pending: "Planning", coding: "Coding", testing: "Testing", done: "Done" };

    function renderColumns() {
        // Group cards by status, tracking original index
        var groups = { pending: [], coding: [], testing: [], done: [] };

        for (var i = 0; i < checklist.length; i++) {
            var status = checklist[i].Status;
            if (!groups[status]) status = "pending"; // fallback
            groups[status].push({ item: checklist[i], originalIndex: i });
        }

        // Determine if swimlanes should render
        var uniqueAssignees = getUniqueAssignees();
        var showSwimlanes = swimlanesEnabled && uniqueAssignees.length >= 2;

        // Update toggle button visibility and state
        var toggleBtn = document.getElementById("swimlaneToggle");
        if (uniqueAssignees.length >= 2) {
            toggleBtn.classList.remove("hidden");
            if (swimlanesEnabled) {
                toggleBtn.classList.add("active");
            } else {
                toggleBtn.classList.remove("active");
            }
        } else {
            toggleBtn.classList.add("hidden");
        }

        // Build ordered assignee list: named first (sorted), then unassigned last
        var assigneeOrder = [];
        if (showSwimlanes) {
            var named = uniqueAssignees.filter(function (a) { return a !== ""; }).sort();
            assigneeOrder = named;
            if (uniqueAssignees.indexOf("") !== -1) {
                assigneeOrder.push("");
            }
        }

        STATUS_ORDER.forEach(function (status) {
            var body = document.querySelector('[data-drop="' + status + '"]');
            var countEl = document.querySelector('[data-count="' + status + '"]');
            var cards = groups[status] || [];

            // Update count
            countEl.textContent = cards.length;

            // Clear existing cards
            body.innerHTML = "";

            if (showSwimlanes) {
                // Group cards by assignee within this column
                var byAssignee = {};
                assigneeOrder.forEach(function (a) { byAssignee[a] = []; });

                cards.forEach(function (entry) {
                    var a = entry.item.AssignedTo || "";
                    if (!byAssignee[a]) byAssignee[a] = [];
                    byAssignee[a].push(entry);
                });

                assigneeOrder.forEach(function (assignee) {
                    var section = createEl("div", "swimlane-section");
                    section.dataset.swimlane = assignee;

                    var header = createEl("div", "swimlane-header");
                    var icon = createEl("span", "swimlane-header-icon");
                    icon.textContent = assignee ? "\uD83D\uDC64" : "\u2753";
                    header.appendChild(icon);
                    var label = createEl("span", "");
                    label.textContent = assignee || "Unassigned";
                    header.appendChild(label);
                    section.appendChild(header);

                    var cardsContainer = createEl("div", "swimlane-cards");
                    var sectionCards = byAssignee[assignee] || [];

                    if (sectionCards.length === 0) {
                        var emptyEl = createEl("div", "swimlane-empty");
                        emptyEl.textContent = "\u2014";
                        cardsContainer.appendChild(emptyEl);
                    } else {
                        sectionCards.forEach(function (entry) {
                            cardsContainer.appendChild(createCard(entry.item, entry.originalIndex));
                        });
                    }

                    section.appendChild(cardsContainer);
                    body.appendChild(section);
                });
            } else {
                // Standard flat rendering
                if (cards.length === 0) {
                    var empty = createEl("div", "empty-state");
                    empty.textContent = "No items";
                    body.appendChild(empty);
                } else {
                    cards.forEach(function (entry) {
                        body.appendChild(createCard(entry.item, entry.originalIndex));
                    });
                }
            }

            // (Add button is now in the column header)
        });
    }

    // -----------------------------------------------------------
    // Card Creation
    // -----------------------------------------------------------
    function createCard(item, originalIndex) {
        var card = createEl("div", "card");
        card.setAttribute("draggable", "true");
        card.dataset.originalIndex = originalIndex;

        // Content row: drag handle + text + delete
        var content = createEl("div", "card-content");

        // Drag Handle
        var handle = createEl("div", "card-drag-handle");
        for (var r = 0; r < 3; r++) {
            var row = createEl("div", "grip-row");
            row.appendChild(createEl("span", "grip-dot"));
            row.appendChild(createEl("span", "grip-dot"));
            handle.appendChild(row);
        }
        content.appendChild(handle);

        // Card Text
        var text = createEl("div", "card-text");
        text.textContent = item.Item || "";
        text.title = "Double-click to edit";
        content.appendChild(text);

        // Delete Button
        var del = createEl("button", "card-delete");
        del.innerHTML = "&times;";
        del.title = "Delete card";
        del.addEventListener("click", function (e) {
            e.stopPropagation();
            handleDeleteCard(originalIndex);
        });
        content.appendChild(del);

        card.appendChild(content);

        // Badges row
        var hasBadges = (item.CycleCount > 0) ||
                        (item.AssignedTo) ||
                        (item.Notes && item.Notes.length > 0);

        if (hasBadges) {
            var badges = createEl("div", "card-badges");

            if (item.CycleCount > 0) {
                var cycleBadge = createEl("span", "card-badge badge-cycle");
                cycleBadge.textContent = "\u21BB " + item.CycleCount;
                cycleBadge.title = "Cycle count: " + item.CycleCount;
                badges.appendChild(cycleBadge);
            }

            if (item.AssignedTo) {
                var assigneeBadge = createEl("span", "card-badge badge-assignee");
                assigneeBadge.textContent = "\uD83D\uDC64 " + item.AssignedTo;
                assigneeBadge.title = "Assigned to " + item.AssignedTo;
                badges.appendChild(assigneeBadge);
            }

            if (item.Notes && item.Notes.length > 0) {
                var notesBadge = createEl("span", "card-badge badge-notes");
                notesBadge.textContent = "\uD83D\uDCDD " + item.Notes.length;
                notesBadge.title = "Click to view notes";
                notesBadge.style.cursor = "pointer";
                notesBadge.style.textDecoration = "underline";
                notesBadge.style.textDecorationStyle = "dotted";
                notesBadge.addEventListener("click", function (e) {
                    e.stopPropagation();
                    if (card._clickTimer) {
                        clearTimeout(card._clickTimer);
                        card._clickTimer = null;
                    }
                    openCardModal(originalIndex);
                });
                badges.appendChild(notesBadge);
            }

            card.appendChild(badges);
        }

        // Single click on card opens detail modal
        // (but not on drag handle, delete button, or when editing)
        card.addEventListener("click", function (e) {
            // Don't open modal if clicking drag handle, delete button, or during editing
            if (e.target.closest(".card-drag-handle") ||
                e.target.closest(".card-delete") ||
                e.target.closest(".card-text.editing") ||
                e.target.closest(".badge-notes")) {
                return;
            }
            // Don't open on double-click (handled separately for inline editing)
            if (e.detail >= 2) {
                // Cancel any pending single-click timer
                if (card._clickTimer) {
                    clearTimeout(card._clickTimer);
                    card._clickTimer = null;
                }
                return;
            }

            // Delay to distinguish single-click from double-click (300ms matches browser dblclick window)
            if (card._clickTimer) clearTimeout(card._clickTimer);
            card._clickTimer = setTimeout(function () {
                card._clickTimer = null;
                openCardModal(originalIndex);
            }, 300);
        });

        // Inline text editing (double-click)
        text.addEventListener("dblclick", function (e) {
            // Cancel single-click modal open
            if (card._clickTimer) {
                clearTimeout(card._clickTimer);
                card._clickTimer = null;
            }
            e.stopPropagation();
            if (text.contentEditable === "true") return;
            text.contentEditable = "true";
            text.classList.add("editing");
            card.setAttribute("draggable", "false");
            text.focus();

            var range = document.createRange();
            range.selectNodeContents(text);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        });

        text.addEventListener("blur", function () {
            text.contentEditable = "false";
            text.classList.remove("editing");
            card.setAttribute("draggable", "true");
            var newText = text.textContent.trim();
            if (newText && newText !== item.Item) {
                item.Item = newText;
                sendToHost({ type: "update_card_text", cardIndex: originalIndex, text: newText });
            }
        });

        text.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                text.blur();
            } else if (e.key === "Escape") {
                text.textContent = item.Item || "";
                text.blur();
            }
        });

        // Drag events
        card.addEventListener("dragstart", function (e) {
            draggedCardIndex = originalIndex;
            draggedElement = card;
            card.classList.add("dragging");
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", String(originalIndex));
        });

        card.addEventListener("dragend", function () {
            card.classList.remove("dragging");
            draggedCardIndex = null;
            draggedElement = null;
            clearAllDropTargets();
        });

        return card;
    }

    // -----------------------------------------------------------
    // Transition Validation
    // -----------------------------------------------------------
    var VALID_TRANSITIONS = {
        "pending":  ["coding"],
        "coding":   ["testing"],
        "testing":  ["coding", "done"],
        "done":     []
    };

    function isValidTransition(fromStatus, toStatus) {
        if (fromStatus === toStatus) return true; // same-column reorder
        var allowed = VALID_TRANSITIONS[fromStatus];
        return allowed ? allowed.indexOf(toStatus) !== -1 : false;
    }

    // -----------------------------------------------------------
    // Invalid-Drop Toast
    // -----------------------------------------------------------
    var invalidDropToastTimer = null;
    var invalidDropThrottle = 0; // timestamp to avoid spamming during drag

    function showInvalidDropToast(fromStatus, toStatus) {
        var now = Date.now();
        if (now - invalidDropThrottle < 2000) return; // throttle: one toast per 2s
        invalidDropThrottle = now;

        var statusLabels = STATUS_LABELS;
        var fromLabel = statusLabels[fromStatus] || fromStatus;
        var toLabel = statusLabels[toStatus] || toStatus;
        var toast = document.getElementById("invalidDropToast");
        toast.textContent = "Cannot move from " + fromLabel + " to " + toLabel;
        toast.classList.add("visible");

        if (invalidDropToastTimer) clearTimeout(invalidDropToastTimer);
        invalidDropToastTimer = setTimeout(function () {
            toast.classList.remove("visible");
            invalidDropToastTimer = null;
        }, 2000);
    }

    function transitionRequiresNotes(fromStatus, toStatus) {
        if (fromStatus === toStatus) return false;
        // Notes required when leaving coding or testing
        return fromStatus === "coding" || fromStatus === "testing";
    }

    function getTransitionPromptText(fromStatus, toStatus) {
        if (fromStatus === "coding" && toStatus === "testing")
            return "What was implemented? What should be tested?";
        if (fromStatus === "testing" && toStatus === "coding")
            return "What needs to be fixed or changed?";
        if (fromStatus === "testing" && toStatus === "done")
            return "What was verified? Any release notes?";
        return "Describe the transition.";
    }

    // -----------------------------------------------------------
    // Transition Prompt
    // -----------------------------------------------------------
    var pendingMove = null; // { cardIndex, newStatus, dropPosition }

    function initTransitionPrompt() {
        var backdrop = document.getElementById("transitionPromptBackdrop");
        var cancelBtn = document.getElementById("transitionPromptCancel");
        var confirmBtn = document.getElementById("transitionPromptConfirm");
        var textarea = document.getElementById("transitionPromptNotes");

        backdrop.addEventListener("click", function (e) {
            if (e.target === backdrop) cancelTransitionPrompt();
        });

        cancelBtn.addEventListener("click", function () {
            cancelTransitionPrompt();
        });

        confirmBtn.addEventListener("click", function () {
            confirmTransitionPrompt();
        });

        textarea.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && e.ctrlKey) {
                e.preventDefault();
                confirmTransitionPrompt();
            } else if (e.key === "Escape") {
                cancelTransitionPrompt();
            }
        });
    }

    function showTransitionPrompt(cardIndex, oldStatus, newStatus, dropPosition) {
        var item = checklist[cardIndex];
        var itemName = item ? (item.Item || "Card") : "Card";

        var statusLabels = STATUS_LABELS;
        var fromLabel = statusLabels[oldStatus] || oldStatus;
        var toLabel = statusLabels[newStatus] || newStatus;

        document.getElementById("transitionPromptHeader").textContent =
            "Moving: " + (itemName.length > 40 ? itemName.substring(0, 40) + "..." : itemName);

        var contextEl = document.getElementById("transitionPromptContext");
        contextEl.innerHTML = "";
        var fromBadge = createEl("span", "transition-prompt-badge from");
        fromBadge.textContent = fromLabel;
        contextEl.appendChild(fromBadge);
        contextEl.appendChild(document.createTextNode(" \u2192 "));
        var toBadge = createEl("span", "transition-prompt-badge to-" + newStatus);
        toBadge.textContent = toLabel;
        contextEl.appendChild(toBadge);
        contextEl.appendChild(document.createElement("br"));
        contextEl.appendChild(document.createElement("br"));
        contextEl.appendChild(document.createTextNode(getTransitionPromptText(oldStatus, newStatus)));

        var textarea = document.getElementById("transitionPromptNotes");
        textarea.value = "";
        textarea.placeholder = getTransitionPromptText(oldStatus, newStatus);

        pendingMove = { cardIndex: cardIndex, newStatus: newStatus, dropPosition: dropPosition };

        document.getElementById("transitionPromptBackdrop").classList.add("visible");
        setTimeout(function () { textarea.focus(); }, 50);
    }

    function confirmTransitionPrompt() {
        if (!pendingMove) return;

        var notes = document.getElementById("transitionPromptNotes").value.trim();
        if (!notes) {
            document.getElementById("transitionPromptNotes").style.borderColor = "#EF4444";
            document.getElementById("transitionPromptNotes").focus();
            setTimeout(function () {
                document.getElementById("transitionPromptNotes").style.borderColor = "";
            }, 1500);
            return;
        }

        // Send the atomic move_card message
        sendToHost({
            type: "move_card",
            cardIndex: pendingMove.cardIndex,
            newStatus: pendingMove.newStatus,
            dropPosition: pendingMove.dropPosition,
            notes: notes
        });

        closeTransitionPrompt();
    }

    function cancelTransitionPrompt() {
        pendingMove = null;
        closeTransitionPrompt();
        // Force re-render from server state (card stays in original column)
        if (currentTask) renderAll();
    }

    function closeTransitionPrompt() {
        document.getElementById("transitionPromptBackdrop").classList.remove("visible");
        document.getElementById("transitionPromptNotes").value = "";
        pendingMove = null;
    }

    // -----------------------------------------------------------
    // Drag and Drop on Columns
    // -----------------------------------------------------------
    function initDragDrop() {
        var bodies = document.querySelectorAll(".column-body");

        bodies.forEach(function (body) {
            body.addEventListener("dragover", function (e) {
                if (draggedCardIndex === null) return;

                // Check if this is a valid drop target
                var targetStatus = body.dataset.drop;
                var sourceStatus = checklist[draggedCardIndex] ? checklist[draggedCardIndex].Status : null;
                if (!isValidTransition(sourceStatus, targetStatus)) {
                    e.dataTransfer.dropEffect = "none";
                    showInvalidDropToast(sourceStatus, targetStatus);
                    return; // Don't show drop zone for invalid transitions
                }

                e.preventDefault();
                e.dataTransfer.dropEffect = "move";
                var column = body.closest(".column");
                if (column) column.classList.add("drag-over");

                // Position placeholder
                var afterElement = getDragAfterElement(body, e.clientY);
                var placeholder = body.querySelector(".drop-placeholder");
                if (!placeholder) {
                    placeholder = createEl("div", "drop-placeholder");
                    placeholder.dataset.placeholder = "true";
                }
                if (afterElement) {
                    body.insertBefore(placeholder, afterElement);
                } else {
                    // Insert before the add button
                    var addBtn = body.querySelector(".add-card-btn");
                    if (addBtn) {
                        body.insertBefore(placeholder, addBtn);
                    } else {
                        body.appendChild(placeholder);
                    }
                }
            });

            body.addEventListener("dragleave", function (e) {
                // Only remove if leaving the column-body itself
                if (!body.contains(e.relatedTarget)) {
                    var column = body.closest(".column");
                    if (column) column.classList.remove("drag-over");
                    removePlaceholder(body);
                }
            });

            body.addEventListener("drop", function (e) {
                e.preventDefault();
                var column = body.closest(".column");
                if (column) column.classList.remove("drag-over");
                removePlaceholder(body);

                var indexStr = e.dataTransfer.getData("text/plain");
                var cardOriginalIndex = parseInt(indexStr, 10);
                if (isNaN(cardOriginalIndex) || !checklist[cardOriginalIndex]) return;

                var newStatus = body.dataset.drop;
                if (!newStatus) return;

                var oldStatus = checklist[cardOriginalIndex].Status || "pending";

                // Client-side validation (belt and suspenders — server validates too)
                if (!isValidTransition(oldStatus, newStatus)) return;

                // Calculate drop position within the target column
                var dropPosition = getDropPosition(body, e.clientY);

                // If notes are required, show the transition prompt
                if (transitionRequiresNotes(oldStatus, newStatus)) {
                    showTransitionPrompt(cardOriginalIndex, oldStatus, newStatus, dropPosition);
                    return;
                }

                // No notes needed — send the move immediately
                sendToHost({
                    type: "move_card",
                    cardIndex: cardOriginalIndex,
                    newStatus: newStatus,
                    dropPosition: dropPosition,
                    notes: null
                });
            });
        });
    }

    function getDropPosition(columnBody, clientY) {
        var cards = Array.from(columnBody.querySelectorAll(".card:not(.dragging)"));
        for (var i = 0; i < cards.length; i++) {
            var box = cards[i].getBoundingClientRect();
            if (clientY < box.top + box.height / 2) {
                return i;
            }
        }
        return cards.length;
    }

    function getDragAfterElement(container, y) {
        var draggableElements = Array.from(container.querySelectorAll(".card:not(.dragging)"));

        var closest = null;
        var closestOffset = Number.NEGATIVE_INFINITY;

        draggableElements.forEach(function (child) {
            var box = child.getBoundingClientRect();
            var offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closestOffset) {
                closestOffset = offset;
                closest = child;
            }
        });

        return closest;
    }

    function clearAllDropTargets() {
        document.querySelectorAll(".column.drag-over").forEach(function (col) {
            col.classList.remove("drag-over");
        });
        document.querySelectorAll(".drop-placeholder").forEach(function (ph) {
            ph.remove();
        });
    }

    function removePlaceholder(container) {
        var ph = container.querySelector(".drop-placeholder");
        if (ph) ph.remove();
    }

    // -----------------------------------------------------------
    // Card Actions
    // -----------------------------------------------------------
    function handleAddCard(status) {
        var columnBody = document.querySelector('[data-drop="' + status + '"]');
        if (!columnBody) return;

        // If an inline input already exists in this column, focus it
        var existing = columnBody.querySelector(".add-card-inline");
        if (existing) {
            existing.querySelector("input").focus();
            return;
        }

        // Hide the add button and show an inline input
        var addBtn = columnBody.querySelector(".add-card-btn");
        if (addBtn) addBtn.style.display = "none";

        var wrapper = document.createElement("div");
        wrapper.className = "add-card-inline";
        var input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Enter card title...";
        wrapper.appendChild(input);
        columnBody.appendChild(wrapper);

        input.focus();

        function commit() {
            var text = input.value.trim();
            cleanup();
            if (text) {
                sendToHost({ type: "add_card", status: status, text: text });
            }
        }

        function cleanup() {
            wrapper.remove();
            if (addBtn) addBtn.style.display = "";
        }

        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                commit();
            } else if (e.key === "Escape") {
                cleanup();
            }
        });

        input.addEventListener("blur", function () {
            // Small delay so click events can fire first
            setTimeout(function () {
                if (document.body.contains(wrapper)) commit();
            }, 150);
        });
    }

    function handleDeleteCard(originalIndex) {
        var item = checklist[originalIndex];
        var label = item ? (item.Item || "this card") : "this card";
        if (!confirm("Delete \"" + label + "\"?")) return;

        sendToHost({ type: "delete_card", cardIndex: originalIndex });
    }

    // -----------------------------------------------------------
    // Description Bar
    // -----------------------------------------------------------
    function renderDescription() {
        if (!currentTask) return;
        var el = document.getElementById("descriptionText");
        var desc = currentTask.description || "";
        if (desc) {
            el.textContent = desc;
            el.classList.remove("empty");
        } else {
            el.textContent = "Add a description...";
            el.classList.add("empty");
        }
    }

    function initDescriptionBar() {
        var el = document.getElementById("descriptionText");

        el.addEventListener("click", function () {
            if (el.contentEditable === "true") return;
            var desc = (currentTask && currentTask.description) || "";
            el.textContent = desc;
            el.classList.remove("empty");
            el.contentEditable = "true";
            el.classList.add("editing");
            el.focus();
            if (desc) {
                var range = document.createRange();
                range.selectNodeContents(el);
                var sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        });

        el.addEventListener("blur", function () {
            el.contentEditable = "false";
            el.classList.remove("editing");
            var newDesc = el.textContent.trim();
            if (currentTask && newDesc !== (currentTask.description || "")) {
                currentTask.description = newDesc;
                sendToHost({ type: "update_description", description: newDesc });
            }
            renderDescription();
        });

        el.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                el.blur();
            } else if (e.key === "Escape") {
                el.textContent = (currentTask && currentTask.description) || "";
                el.blur();
            }
        });
    }

    // -----------------------------------------------------------
    // Notes Stream (unified notes feed)
    // -----------------------------------------------------------
    function buildNotesStream() {
        if (!currentTask) return [];
        var notes = [];

        // Plan
        var plan = currentTask.plan || "";
        if (plan) {
            notes.push({
                type: "plan",
                typeLabel: "Plan",
                title: "Implementation Plan",
                text: plan,
                phase: "planning",
                sortKey: 0
            });
        }

        // Implementation Summary
        var impl = currentTask.implementationSummary || "";
        if (impl) {
            notes.push({
                type: "impl",
                typeLabel: "Impl",
                title: "Implementation Summary",
                text: impl,
                phase: "coding",
                sortKey: 1
            });
        }

        // Test Results
        var testRes = currentTask.testResults || "";
        if (testRes) {
            notes.push({
                type: "test",
                typeLabel: "Test",
                title: "Test Results",
                text: testRes,
                phase: "testing",
                sortKey: 2
            });
        }

        // Continuation Notes
        var cont = currentTask.continuationNotes || "";
        if (cont) {
            notes.push({
                type: "continuation",
                typeLabel: "Session",
                title: "Continuation Notes",
                text: cont,
                phase: "session",
                sortKey: 3
            });
        }

        // Checklist Notes (grouped per item)
        for (var i = 0; i < checklist.length; i++) {
            var item = checklist[i];
            if (item.Notes && item.Notes.length > 0) {
                var itemLabel = item.Item || "Item " + (i + 1);
                if (itemLabel.length > 50) itemLabel = itemLabel.substring(0, 50) + "...";
                var combined = [];
                for (var n = item.Notes.length - 1; n >= 0; n--) {
                    var note = item.Notes[n];
                    var line = "";
                    if (note.By) line += note.By;
                    if (note.Transition) line += " (" + note.Transition + ")";
                    if (note.Text) line += ": " + note.Text;
                    combined.push(line);
                }
                notes.push({
                    type: "checklist",
                    typeLabel: "Checklist",
                    title: itemLabel,
                    text: combined.join("\n"),
                    meta: item.Notes.length + " note" + (item.Notes.length !== 1 ? "s" : ""),
                    sortKey: 4 + i
                });
            }
        }

        // Agent Reports (from task.reports if available)
        if (currentTask.reports && currentTask.reports.length > 0) {
            for (var r = 0; r < currentTask.reports.length; r++) {
                var report = currentTask.reports[r];
                var reportTitle = (report.agentName || "Agent") + " Report";
                if (report.verdict) reportTitle += " — " + report.verdict;
                if (report.score !== undefined && report.score !== null) reportTitle += " (" + report.score + "/100)";
                notes.push({
                    type: "report",
                    typeLabel: "Report",
                    title: reportTitle,
                    text: report.reportContent || "",
                    meta: report.agentName,
                    sortKey: 100 + r
                });
            }
        }

        return notes;
    }

    function renderNotesStream() {
        var container = document.getElementById("notesStreamBody");
        if (!container) return;

        var allNotes = buildNotesStream();
        var filterValue = document.getElementById("notesStreamFilter").value;
        var searchText = (document.getElementById("notesStreamSearch").value || "").toLowerCase().trim();

        // Apply filter
        var filtered = allNotes;
        if (filterValue !== "all") {
            filtered = filtered.filter(function (n) { return n.type === filterValue; });
        }

        // Apply search
        if (searchText) {
            filtered = filtered.filter(function (n) {
                return (n.title && n.title.toLowerCase().indexOf(searchText) !== -1) ||
                       (n.text && n.text.toLowerCase().indexOf(searchText) !== -1);
            });
        }

        container.innerHTML = "";

        if (filtered.length === 0) {
            var empty = createEl("div", "notes-stream-empty");
            empty.textContent = searchText || filterValue !== "all" ? "No matching notes" : "No notes yet";
            container.appendChild(empty);
            return;
        }

        filtered.forEach(function (note) {
            var entry = createEl("div", "stream-note");

            // Header line: type badge + title + meta
            var header = createEl("div", "stream-note-header");

            var typeBadge = createEl("span", "stream-note-type type-" + note.type);
            typeBadge.textContent = note.typeLabel;
            header.appendChild(typeBadge);

            var titleSpan = createEl("span", "stream-note-title");
            titleSpan.textContent = note.title;
            header.appendChild(titleSpan);

            if (note.meta) {
                var metaSpan = createEl("span", "stream-note-meta");
                metaSpan.textContent = note.meta;
                header.appendChild(metaSpan);
            }

            entry.appendChild(header);

            // Preview (2 lines)
            var preview = createEl("div", "stream-note-preview");
            // Strip markdown for preview
            var plainText = note.text.replace(/[#*`_~>\[\]()]/g, "").replace(/\n+/g, " ").trim();
            preview.textContent = plainText;
            entry.appendChild(preview);

            // Click to expand full-window
            entry.addEventListener("click", function () {
                openExpandOverlayFromStream(note);
            });

            container.appendChild(entry);
        });
    }

    function openExpandOverlayFromStream(note) {
        var overlay = document.getElementById("expandOverlay");
        var title = document.getElementById("expandTitle");
        var body = document.getElementById("expandBody");
        var textarea = document.getElementById("expandTextarea");
        var editBtn = document.getElementById("expandEditBtn");

        expandCurrentPhase = note.phase || null;
        expandEditMode = false;

        title.textContent = note.title;
        body.innerHTML = note.text ? renderMarkdown(note.text) : '<span class="notes-rendered-empty">No content</span>';
        body.style.display = "";
        textarea.classList.remove("visible");
        textarea.value = note.text || "";

        // Enable editing for plan, impl, test, continuation — not checklist/reports
        var editable = note.phase && note.type !== "checklist" && note.type !== "report";
        editBtn.style.display = editable ? "" : "none";

        overlay.classList.add("visible");
    }

    function initNotesStream() {
        document.getElementById("notesStreamFilter").addEventListener("change", function () {
            renderNotesStream();
        });
        document.getElementById("notesStreamSearch").addEventListener("input", function () {
            renderNotesStream();
        });
    }

    // -----------------------------------------------------------
    // Resize Handle for Notes Stream Panel
    // -----------------------------------------------------------
    function initResizeHandle() {
        var handle = document.getElementById("resizeHandle");
        var panel = document.getElementById("notesStreamPanel");
        var isResizing = false;

        handle.addEventListener("mousedown", function (e) {
            isResizing = true;
            handle.classList.add("dragging");
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
            e.preventDefault();
        });

        document.addEventListener("mousemove", function (e) {
            if (!isResizing) return;
            var panelRect = panel.getBoundingClientRect();
            var newWidth = e.clientX - panelRect.left;
            if (newWidth < 200) newWidth = 200;
            if (newWidth > 400) newWidth = 400;
            panel.style.width = newWidth + "px";
        });

        document.addEventListener("mouseup", function () {
            if (isResizing) {
                isResizing = false;
                handle.classList.remove("dragging");
                document.body.style.cursor = "";
                document.body.style.userSelect = "";
            }
        });

        // Reset resize state if mouse leaves browser window
        window.addEventListener("blur", function () {
            if (isResizing) {
                isResizing = false;
                handle.classList.remove("dragging");
                document.body.style.cursor = "";
                document.body.style.userSelect = "";
            }
        });
    }

    // -----------------------------------------------------------
    // Helper: update local task field from phase name
    // -----------------------------------------------------------
    function updateLocalPhaseField(phase, text) {
        if (!currentTask) return;
        if (phase === "planning") currentTask.plan = text;
        else if (phase === "coding") currentTask.implementationSummary = text;
        else if (phase === "testing") currentTask.testResults = text;
    }

    // -----------------------------------------------------------
    // Expand Overlay (fullscreen pop-out for reading notes)
    // -----------------------------------------------------------
    var expandCurrentPhase = null;
    var expandEditMode = false;

    function closeExpandOverlay() {
        var overlay = document.getElementById("expandOverlay");
        var textarea = document.getElementById("expandTextarea");
        var body = document.getElementById("expandBody");

        // If in edit mode, save before closing
        if (expandEditMode && expandCurrentPhase) {
            var newText = textarea.value;
            if (expandCurrentPhase === "session") {
                sendToHost({ type: "update_continuation_notes", notes: newText });
                if (currentTask) currentTask.continuationNotes = newText;
            } else {
                sendToHost({ type: "update_phase_notes", phase: expandCurrentPhase, notes: newText });
                updateLocalPhaseField(expandCurrentPhase, newText);
            }
            renderNotesStream();
        }

        overlay.classList.remove("visible");
        textarea.classList.remove("visible");
        body.style.display = "";
        expandEditMode = false;
        expandCurrentPhase = null;
    }

    function toggleExpandEdit() {
        var body = document.getElementById("expandBody");
        var textarea = document.getElementById("expandTextarea");
        var editBtn = document.getElementById("expandEditBtn");

        if (expandEditMode) {
            // Switch back to rendered view, save changes
            var newText = textarea.value;
            body.innerHTML = newText ? renderMarkdown(newText) : '<span class="notes-rendered-empty">No content yet</span>';
            body.style.display = "";
            textarea.classList.remove("visible");
            editBtn.textContent = "Edit";
            expandEditMode = false;

            // Save and update local model
            if (expandCurrentPhase === "session") {
                sendToHost({ type: "update_continuation_notes", notes: newText });
                if (currentTask) currentTask.continuationNotes = newText;
            } else if (expandCurrentPhase) {
                sendToHost({ type: "update_phase_notes", phase: expandCurrentPhase, notes: newText });
                updateLocalPhaseField(expandCurrentPhase, newText);
            }
            renderNotesStream();
        } else {
            // Switch to edit mode
            body.style.display = "none";
            textarea.classList.add("visible");
            textarea.focus();
            editBtn.textContent = "Done";
            expandEditMode = true;
        }
    }

    function initExpandOverlay() {
        document.getElementById("expandClose").addEventListener("click", closeExpandOverlay);
        document.getElementById("expandEditBtn").addEventListener("click", toggleExpandEdit);

        // Escape key closes overlay
        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape" && document.getElementById("expandOverlay").classList.contains("visible")) {
                closeExpandOverlay();
                e.stopPropagation();
            }
        });
    }

    // -----------------------------------------------------------
    // Gear Popover
    // -----------------------------------------------------------
    // Close Board Button

    // -----------------------------------------------------------
    var gearPopoverOpen = false;

    function initGearPopover() {
        var gearBtn = document.getElementById("gearBtn");
        var overlay = document.getElementById("gearPopoverOverlay");
        var popover = document.getElementById("gearPopover");
        var cancelBtn = document.getElementById("popoverCancel");
        var saveBtn = document.getElementById("popoverSave");

        gearBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (gearPopoverOpen) {
                closeGearPopover();
            } else {
                openGearPopover();
            }
        });

        overlay.addEventListener("click", function (e) {
            // Close if clicking on the overlay backdrop, not the popover itself
            if (e.target === overlay) {
                closeGearPopover();
            }
        });

        // Prevent clicks inside popover from closing it
        popover.addEventListener("click", function (e) {
            e.stopPropagation();
        });

        cancelBtn.addEventListener("click", function () {
            closeGearPopover();
        });

        saveBtn.addEventListener("click", function () {
            saveGearPopover();
        });
    }

    function openGearPopover() {
        if (!currentTask) return;

        var overlay = document.getElementById("gearPopoverOverlay");
        var popover = document.getElementById("gearPopover");
        var gearBtn = document.getElementById("gearBtn");

        // Position popover relative to gear button
        var btnRect = gearBtn.getBoundingClientRect();
        popover.style.position = "fixed";
        popover.style.top = (btnRect.bottom + 4) + "px";
        popover.style.right = (window.innerWidth - btnRect.right) + "px";
        popover.style.left = "auto";

        // Populate fields
        document.getElementById("popoverPriority").value = (currentTask.priority || "normal").toLowerCase();

        // Populate assignee dropdown (all team members, online + offline)
        var assigneeSelect = document.getElementById("popoverAssignee");
        assigneeSelect.innerHTML = '<option value="">Unassigned</option>';
        var memberData = getAllMemberNames();
        populateMemberDropdown(assigneeSelect, memberData, currentTask.assignee);

        document.getElementById("popoverDescription").value = currentTask.description || "";

        // Project dropdown
        var projectSelect = document.getElementById("popoverProject");
        projectSelect.innerHTML = '<option value="">No Project</option>';
        projects.forEach(function (proj) {
            var opt = document.createElement("option");
            opt.value = proj.id;
            opt.textContent = proj.name;
            if (currentTask.projectId === proj.id) opt.selected = true;
            projectSelect.appendChild(opt);
        });

        // Helpers chips
        renderHelperChips();

        // Add helper dropdown
        var addHelperSelect = document.getElementById("popoverAddHelper");
        addHelperSelect.innerHTML = '<option value="">+ Add helper...</option>';
        var currentHelpers = currentTask.helpers || [];
        var helperMembers = getAllMemberNames();
        helperMembers.all.forEach(function (name) {
            if (currentHelpers.indexOf(name) === -1) {
                var opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                if (helperMembers.offline.indexOf(name) !== -1) opt.style.opacity = "0.6";
                addHelperSelect.appendChild(opt);
            }
        });
        addHelperSelect.onchange = function () {
            var val = addHelperSelect.value;
            if (!val) return;
            if (!currentTask.helpers) currentTask.helpers = [];
            if (currentTask.helpers.indexOf(val) === -1) {
                currentTask.helpers.push(val);
                renderHelperChips();
                // Refresh the add-helper dropdown to remove the newly added helper
                for (var oi = 0; oi < addHelperSelect.options.length; oi++) {
                    if (addHelperSelect.options[oi].value === val) {
                        addHelperSelect.options[oi].remove();
                        break;
                    }
                }
            }
            addHelperSelect.value = "";
        };

        // Auto-status checkbox
        document.getElementById("popoverAutoStatus").checked = !!currentTask.autoStatus;

        // Metadata (read-only)
        document.getElementById("popoverTaskId").textContent = currentTask.id || "--";
        document.getElementById("popoverCreatedBy").textContent = currentTask.createdBy || "--";
        if (currentTask.createdAt) {
            try {
                var d = new Date(currentTask.createdAt);
                document.getElementById("popoverCreatedAt").textContent = d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            } catch (e) {
                document.getElementById("popoverCreatedAt").textContent = currentTask.createdAt;
            }
        } else {
            document.getElementById("popoverCreatedAt").textContent = "--";
        }
        document.getElementById("popoverSubStatus").textContent = currentTask.subStatus || "--";

        overlay.classList.add("visible");
        gearBtn.classList.add("active");
        gearPopoverOpen = true;
    }

    function renderHelperChips() {
        var container = document.getElementById("popoverHelperChips");
        container.innerHTML = "";
        var helpers = (currentTask && currentTask.helpers) ? currentTask.helpers : [];
        if (helpers.length === 0) {
            var emptySpan = createEl("span", "helper-chips-empty");
            emptySpan.textContent = "No helpers assigned";
            container.appendChild(emptySpan);
            return;
        }
        helpers.forEach(function (name) {
            var chip = createEl("span", "helper-chip");
            chip.textContent = name;
            var removeBtn = createEl("button", "helper-chip-remove");
            removeBtn.innerHTML = "&times;";
            removeBtn.title = "Remove " + name;
            removeBtn.addEventListener("click", function () {
                var idx = currentTask.helpers.indexOf(name);
                if (idx !== -1) currentTask.helpers.splice(idx, 1);
                renderHelperChips();
                // Re-add to the dropdown
                var addHelperSelect = document.getElementById("popoverAddHelper");
                var opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                addHelperSelect.appendChild(opt);
            });
            chip.appendChild(removeBtn);
            container.appendChild(chip);
        });
    }

    function closeGearPopover() {
        document.getElementById("gearPopoverOverlay").classList.remove("visible");
        document.getElementById("gearBtn").classList.remove("active");
        gearPopoverOpen = false;
    }

    function saveGearPopover() {
        if (!currentTask) { closeGearPopover(); return; }

        var newPriority = document.getElementById("popoverPriority").value;
        var newAssignee = document.getElementById("popoverAssignee").value;
        var newDescription = document.getElementById("popoverDescription").value;

        // Send updates for changed fields
        if (newPriority !== (currentTask.priority || "normal").toLowerCase()) {
            sendToHost({ type: "update_priority", priority: newPriority });
            currentTask.priority = newPriority;
        }

        if (newAssignee !== (currentTask.assignee || "")) {
            sendToHost({ type: "update_assignee", assignee: newAssignee });
            currentTask.assignee = newAssignee;
        }

        if (newDescription !== (currentTask.description || "")) {
            sendToHost({ type: "update_description", description: newDescription });
            currentTask.description = newDescription;
        }

        // Project
        var newProjectId = document.getElementById("popoverProject").value;
        if (newProjectId !== (currentTask.projectId || "")) {
            sendToHost({ type: "update_project", projectId: newProjectId });
            currentTask.projectId = newProjectId;
        }

        // Helpers (always send current list since chips may have been added/removed)
        var currentHelpers = currentTask.helpers || [];
        sendToHost({ type: "update_helpers", helpers: currentHelpers });

        // Auto-status
        var newAutoStatus = document.getElementById("popoverAutoStatus").checked;
        if (newAutoStatus !== !!currentTask.autoStatus) {
            sendToHost({ type: "set_auto_status", enabled: newAutoStatus });
            currentTask.autoStatus = newAutoStatus;
        }

        // Re-render chips to reflect changes
        renderHeader();
        renderDescription();
        closeGearPopover();
    }

    // -----------------------------------------------------------
    // Card Detail Modal
    // -----------------------------------------------------------
    var cardModalOpenIndex = null; // Original index of the card being viewed

    function initCardModal() {
        var backdrop = document.getElementById("cardModalBackdrop");
        var closeBtn = document.getElementById("cardModalClose");
        var closeBtnFooter = document.getElementById("cardModalCloseBtn");
        var saveBtn = document.getElementById("cardModalSaveBtn");
        var addNoteBtn = document.getElementById("cardModalNoteAddBtn");
        var noteInput = document.getElementById("cardModalNoteInput");

        backdrop.addEventListener("click", function (e) {
            if (e.target === backdrop) {
                closeCardModal();
            }
        });

        closeBtn.addEventListener("click", function () {
            closeCardModal();
        });

        closeBtnFooter.addEventListener("click", function () {
            closeCardModal();
        });

        saveBtn.addEventListener("click", function () {
            saveCardModal();
        });

        addNoteBtn.addEventListener("click", function () {
            addCardNote();
        });

        noteInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                addCardNote();
            }
        });

        // Escape to close (check innermost modal first)
        document.addEventListener("keydown", function (e) {
            if (e.key === "Escape") {
                if (pendingMove !== null) {
                    cancelTransitionPrompt();
                } else if (cardModalOpenIndex !== null) {
                    closeCardModal();
                } else if (gearPopoverOpen) {
                    closeGearPopover();
                }
            }
        });
    }

    function openCardModal(originalIndex) {
        if (originalIndex < 0 || originalIndex >= checklist.length) return;

        cardModalOpenIndex = originalIndex;
        var item = checklist[originalIndex];

        // Title
        document.getElementById("cardModalTitle").textContent = "Card Detail";

        // Card text
        document.getElementById("cardModalText").value = item.Item || "";

        // Assignee dropdown (all team members, online + offline)
        var assigneeSelect = document.getElementById("cardModalAssignee");
        assigneeSelect.innerHTML = '<option value="">Task default</option>';
        var cardMemberData = getAllMemberNames();
        populateMemberDropdown(assigneeSelect, cardMemberData, item.AssignedTo);

        // Status and cycles
        document.getElementById("cardModalStatus").textContent = item.Status || "pending";
        document.getElementById("cardModalCycles").textContent = String(item.CycleCount || 0);

        // Notes history
        renderCardModalNotes(item.Notes || []);

        // Clear add note input
        document.getElementById("cardModalNoteInput").value = "";

        // Render attached images
        renderCardModalImages(originalIndex);

        // Show modal
        document.getElementById("cardModalBackdrop").classList.add("visible");
    }

    function closeCardModal() {
        document.getElementById("cardModalBackdrop").classList.remove("visible");
        cardModalOpenIndex = null;
    }

    function renderCardModalNotes(notes) {
        var container = document.getElementById("cardModalNotesList");
        container.innerHTML = "";

        if (!notes || notes.length === 0) {
            var empty = createEl("div", "card-modal-note-empty");
            empty.textContent = "No notes yet";
            container.appendChild(empty);
            return;
        }

        // Show notes in reverse chronological order (newest first)
        for (var i = notes.length - 1; i >= 0; i--) {
            var note = notes[i];
            var noteEl = createEl("div", "card-modal-note");

            var header = createEl("div", "card-modal-note-header");

            var bySpan = createEl("span", "card-modal-note-by");
            bySpan.textContent = note.By || "Unknown";
            header.appendChild(bySpan);

            if (note.Transition) {
                var transSpan = createEl("span", "card-modal-note-transition");
                transSpan.textContent = note.Transition;
                header.appendChild(transSpan);
            }

            if (note.At) {
                var atSpan = createEl("span", "");
                try {
                    var d = new Date(note.At);
                    atSpan.textContent = d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
                } catch (e) {
                    atSpan.textContent = note.At;
                }
                header.appendChild(atSpan);
            }

            noteEl.appendChild(header);

            if (note.Text) {
                var textEl = createEl("div", "card-modal-note-text");
                textEl.textContent = note.Text;
                noteEl.appendChild(textEl);
            }

            container.appendChild(noteEl);
        }
    }

    function addCardNote() {
        if (cardModalOpenIndex === null) return;

        var input = document.getElementById("cardModalNoteInput");
        var text = input.value.trim();
        if (!text) return;

        var item = checklist[cardModalOpenIndex];

        // Add note locally
        var newNote = {
            By: (currentTask ? currentTask.assignee : null) || "User",
            At: new Date().toISOString(),
            Transition: null,
            Text: text
        };

        if (!item.Notes) item.Notes = [];
        item.Notes.push(newNote);

        // Re-render notes
        renderCardModalNotes(item.Notes);

        // Clear input
        input.value = "";

        // Send to host
        sendToHost({
            type: "add_card_note",
            cardIndex: cardModalOpenIndex,
            text: text,
            by: newNote.By
        });
    }

    function saveCardModal() {
        if (cardModalOpenIndex === null) { closeCardModal(); return; }

        var item = checklist[cardModalOpenIndex];

        // Update text
        var newText = document.getElementById("cardModalText").value.trim();
        if (newText && newText !== item.Item) {
            item.Item = newText;
            sendToHost({ type: "update_card_text", cardIndex: cardModalOpenIndex, text: newText });
        }

        // Update assignee
        var newAssignee = document.getElementById("cardModalAssignee").value;
        var oldAssignee = item.AssignedTo || "";
        if (newAssignee !== oldAssignee) {
            item.AssignedTo = newAssignee || null;
            sendToHost({ type: "update_card_assignee", cardIndex: cardModalOpenIndex, assignee: newAssignee });
        }

        // Re-render to reflect changes
        renderColumns();
        renderNotesStream();
        closeCardModal();
    }

    // -----------------------------------------------------------
    // Image Attachments
    // -----------------------------------------------------------
    function initImageHandlers() {
        var dropZone = document.getElementById("cardModalDropZone");
        if (!dropZone) return;

        dropZone.addEventListener("dragover", function (e) {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add("drag-over");
        });

        dropZone.addEventListener("dragleave", function (e) {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove("drag-over");
        });

        dropZone.addEventListener("drop", function (e) {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove("drag-over");
            handleImageFiles(e.dataTransfer.files);
        });

        // Click to open file picker
        dropZone.addEventListener("click", function () {
            var fileInput = document.createElement("input");
            fileInput.type = "file";
            fileInput.accept = "image/*";
            fileInput.multiple = true;
            fileInput.onchange = function () { handleImageFiles(fileInput.files); };
            fileInput.click();
        });

        // Ctrl+V paste (active when modal is open)
        document.addEventListener("paste", function (e) {
            // Only handle paste when card modal is open
            var backdrop = document.getElementById("cardModalBackdrop");
            if (!backdrop || !backdrop.classList.contains("visible")) return;
            if (cardModalOpenIndex === null) return;

            var items = e.clipboardData ? e.clipboardData.items : [];
            for (var i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image/") === 0) {
                    e.preventDefault();
                    var blob = items[i].getAsFile();
                    if (blob) {
                        handleImageBlob(blob, "clipboard-paste-" + Date.now() + ".png");
                    }
                    break;
                }
            }
        });
    }

    function handleImageFiles(fileList) {
        for (var i = 0; i < fileList.length; i++) {
            var file = fileList[i];
            if (!file.type.startsWith("image/")) continue;
            if (file.size > 10 * 1024 * 1024) {
                alert("Image too large (max 10MB): " + file.name);
                continue;
            }
            handleImageBlob(file, file.name);
        }
    }

    function handleImageBlob(blob, fileName) {
        var cardIndex = cardModalOpenIndex;
        if (cardIndex === null || cardIndex === undefined) return;

        var reader = new FileReader();
        reader.onload = function () {
            var base64 = reader.result.split(",")[1];
            var mimeType = blob.type || "image/png";

            sendToHost({
                type: "add_attachment",
                cardIndex: cardIndex,
                fileName: fileName,
                mimeType: mimeType,
                dataBase64: base64
            });
        };
        reader.readAsDataURL(blob);
    }

    function renderCardModalImages(cardIndex) {
        var container = document.getElementById("cardModalImagesList");
        if (!container) return;
        container.innerHTML = "";

        var itemAttachments = currentAttachments.filter(function (a) {
            return a.checklistItemIndex === cardIndex;
        });

        if (itemAttachments.length === 0) return;

        itemAttachments.forEach(function (att) {
            var thumb = createEl("div", "card-modal-image-thumb");

            var img = document.createElement("img");
            img.src = "http://localhost:5050/api/tasks/attachments/" + encodeURIComponent(att.id) + "/image";
            img.alt = att.fileName;
            img.loading = "lazy";
            thumb.appendChild(img);

            var deleteBtn = document.createElement("button");
            deleteBtn.className = "image-delete-btn";
            deleteBtn.textContent = "\u00d7";
            deleteBtn.addEventListener("click", function (e) {
                e.stopPropagation();
                if (confirm("Delete image " + att.fileName + "?")) {
                    sendToHost({ type: "delete_attachment", attachmentId: att.id });
                }
            });
            thumb.appendChild(deleteBtn);

            var nameLabel = createEl("div", "image-name");
            nameLabel.textContent = att.fileName;
            thumb.appendChild(nameLabel);

            container.appendChild(thumb);
        });
    }

    // -----------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------
    function createEl(tag, className) {
        var el = document.createElement(tag);
        if (className) el.className = className;
        return el;
    }

    // -----------------------------------------------------------
    // Initialization
    // -----------------------------------------------------------
    function init() {
        initHostListener();
        initDragDrop();
        initDescriptionBar();
        initNotesStream();
        initResizeHandle();
        initGearPopover();
        initCardModal();
        initImageHandlers();
        initTransitionPrompt();
        initExpandOverlay();

        // Column header add buttons
        document.querySelectorAll(".column-add-btn[data-add-status]").forEach(function (btn) {
            btn.addEventListener("click", function () {
                handleAddCard(btn.dataset.addStatus);
            });
        });

        // Swimlane toggle button
        document.getElementById("swimlaneToggle").addEventListener("click", function () {
            swimlanesManuallySet = true;
            swimlanesEnabled = !swimlanesEnabled;
            renderColumns();
        });

        // Signal ready to C# host
        sendToHost({ type: "ready" });
    }

    // Start when DOM is ready
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }

})();
</script>

</body>
</html>
