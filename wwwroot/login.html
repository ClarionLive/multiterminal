<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MultiRemote — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css?v=4" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-5 col-lg-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-terminal-fill text-primary" style="font-size: 3rem;"></i>
                            <h3 class="mt-2 fw-bold">MultiRemote</h3>
                            <p class="text-muted small">Remote access to MultiTerminal</p>
                        </div>

                        <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

                        <form id="login-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="username"
                                           autocomplete="username" autocapitalize="none" required autofocus>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password"
                                           autocomplete="current-password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn">
                                <span id="login-text">Sign In</span>
                                <span id="login-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorAlert = document.getElementById('error-alert');
            const loginText = document.getElementById('login-text');
            const loginSpinner = document.getElementById('login-spinner');

            btn.disabled = true;
            loginText.textContent = 'Signing in...';
            loginSpinner.classList.remove('d-none');
            errorAlert.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errorAlert.textContent = data.error || 'Login failed';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorAlert.textContent = 'Connection error. Is the server running?';
                errorAlert.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                loginText.textContent = 'Sign In';
                loginSpinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
